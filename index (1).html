rojetos pelo órgão ou entidade com circunscrição sobre a via."}, {"art": "Art. 52", "key": "52", "texto": "Art. 52. Os veículos de tração animal serão conduzidos pela direita da pista, junto à guia da calçada (meio-fio) ou acostamento, sempre que não houver faixa especial a eles destinada, devendo seus condutores obedecer, no que\n\fcouber, às normas de circulação previstas neste Código e às que vierem a ser fixadas pelo órgão ou entidade com circunscrição sobre a via."}, {"art": "Art. 53", "key": "53", "texto": "Art. 53. Os animais isolados ou em grupos só podem circular nas vias quando conduzidos por um guia, observado o seguinte:\n I - para facilitar os deslocamentos, os rebanhos deverão ser divididos em grupos de tamanho moderado e separados uns dos outros por espaços suficientes para não obstruir o trânsito;\n II - os animais que circularem pela pista de rolamento deverão ser mantidos junto ao bordo da pista."}, {"art": "Art. 54", "key": "54", "texto": "Art. 54. Os condutores de motocicletas, motonetas e ciclomotores só poderão circular nas vias:\n I - utilizando capacete de segurança, com viseira ou óculos protetores;\n II - segurando o guidom com as duas mãos;\n III - usando vestuário de proteção, de acordo com as especificações do CONTRAN."}, {"art": "Art. 55", "key": "55", "texto": "Art. 55. Os passageiros de motocicletas, motonetas e ciclomotores só poderão ser transportados:\n I - utilizando capacete de segurança;\n II - em carro lateral acoplado aos veículos ou em assento suplementar atrás do condutor;\n III - usando vestuário de proteção, de acordo com as especificações do CONTRAN."}, {"art": "Art. 56", "key": "56", "texto": "Art. 56. (VETADO)"}, {"art": "Art. 56-A", "key": "56-A", "texto": "Art. 56-A. (VETADO). (Incluído pela Lei nº 14.071, de 2020) (Vigência)"}, {"art": "Art. 57", "key": "57", "texto": "Art. 57. Os ciclomotores devem ser conduzidos pela direita da pista de rolamento, preferencialmente no centro da faixa mais à direita ou no bordo direito da pista sempre que não houver acostamento ou faixa própria a eles destinada, proibida a sua circulação nas vias de trânsito rápido e sobre as calçadas das vias urbanas.\n Parágrafo único. Quando uma via comportar duas ou mais faixas de trânsito e a da direita for destinada ao uso exclusivo de outro tipo de veículo, os ciclomotores deverão circular pela faixa adjacente à da direita."}, {"art": "Art. 58", "key": "58", "texto": "Art. 58. Nas vias urbanas e nas rurais de pista dupla, a circulação de bicicletas deverá ocorrer, quando não houver ciclovia, ciclofaixa, ou acostamento, ou quando não for possível a utilização destes, nos bordos da pista de rolamento, no mesmo sentido de circulação regulamentado para a via, com preferência sobre os veículos automotores.\n Parágrafo único. A autoridade de trânsito com circunscrição sobre a via poderá autorizar a circulação de bicicletas no sentido contrário ao fluxo dos veículos automotores, desde que dotado o trecho com ciclofaixa."}, {"art": "Art. 59", "key": "59", "texto": "Art. 59. Desde que autorizado e devidamente sinalizado pelo órgão ou entidade com circunscrição sobre a via, será permitida a circulação de bicicletas nos passeios."}, {"art": "Art. 60", "key": "60", "texto": "Art. 60. As vias abertas à circulação, de acordo com sua utilização, classificam-se em:\n I - vias urbanas:\n a) via de trânsito rápido;\n b) via arterial;\n c) via coletora;\n d) via local;\n II - vias rurais:\n a) rodovias;\n b) estradas."}, {"art": "Art. 61", "key": "61", "texto": "Art. 61. A velocidade máxima permitida para a via será indicada por meio de sinalização, obedecidas suas características técnicas e as condições de trânsito.\n § 1º Onde não existir sinalização regulamentadora, a velocidade máxima será de:\n I - nas vias urbanas:\n a) oitenta quilômetros por hora, nas vias de trânsito rápido:\n b) sessenta quilômetros por hora, nas vias arteriais;\n c) quarenta quilômetros por hora, nas vias coletoras;\n d) trinta quilômetros por hora, nas vias locais;\n II - nas vias rurais:\n a) nas rodovias de pista dupla: (Redação dada pela Lei nº 13.281, de 2016) (Vigência)\n 1. 110 km/h (cento e dez quilômetros por hora) para automóveis, camionetas, caminhonetes e motocicletas;\n(Redação dada pela Lei nº 14.440, de 2022)\n 2. 90 km/h (noventa quilômetros por hora) para os demais veículos; (Redação dada pela Lei nº 13.281, de 2016) (Vigência)\n 3. (revogado); (Redação dada pela Lei nº 13.281, de 2016) (Vigência)\n b) nas rodovias de pista simples: (Redação dada pela Lei nº 13.281, de 2016) (Vigência)\n 1. 100 km/h (cem quilômetros por hora) para automóveis, camionetas, caminhonetes e motocicletas;\n(Redação dada pela Lei nº 14.440, de 2022)\n 2. 90 km/h (noventa quilômetros por hora) para os demais veículos; (Incluído pela Lei nº 13.281, de 2016)\n(Vigência)\n c) nas estradas: 60 km/h (sessenta quilômetros por hora). (Incluído pela Lei nº 13.281, de 2016) (Vigência)\n § 2º O órgão ou entidade de trânsito ou rodoviário com circunscrição sobre a via poderá regulamentar, por meio de sinalização, velocidades superiores ou inferiores àquelas estabelecidas no parágrafo anterior."}, {"art": "Art. 62", "key": "62", "texto": "Art. 62. A velocidade mínima não poderá ser inferior à metade da velocidade máxima estabelecida, respeitadas as condições operacionais de trânsito e da via."}, {"art": "Art. 63", "key": "63", "texto": "Art. 63. (VETADO)"}, {"art": "Art. 64", "key": "64", "texto": "Art. 64. As crianças com idade inferior a 10 (dez) anos que não tenham atingido 1,45 m (um metro e quarenta e cinco centímetros) de altura devem ser transportadas nos bancos traseiros, em dispositivo de retenção adequado para cada idade, peso e altura, salvo exceções relacionadas a tipos específicos de veículos regulamentadas pelo Contran.\n(Redação dada pela Lei nº 14.071, de 2020) (Vigência)\n Parágrafo único. O Contran disciplinará o uso excepcional de dispositivos de retenção no banco dianteiro do veículo e as especificações técnicas dos dispositivos de retenção a que se refere o caput deste artigo. (Incluído pela Lei nº 14.071, de 2020) (Vigência)"}, {"art": "Art. 65", "key": "65", "texto": "Art. 65. É obrigatório o uso do cinto de segurança para condutor e passageiros em todas as vias do território nacional, salvo em situações regulamentadas pelo CONTRAN."}, {"art": "Art. 66", "key": "66", "texto": "Art. 66. (VETADO)"}, {"art": "Art. 67", "key": "67", "texto": "Art. 67. As provas ou competições desportivas, inclusive seus ensaios, em via aberta à circulação, só poderão ser realizadas mediante prévia permissão da autoridade de trânsito com circunscrição sobre a via e dependerão de:\n I - autorização expressa da respectiva confederação desportiva ou de entidades estaduais a ela filiadas;\n II - caução ou fiança para cobrir possíveis danos materiais à via;\n III - contrato de seguro contra riscos e sinistros em favor de terceiros; (Redação dada pela Lei nº 14.599, de 2023)\n\f IV - prévio recolhimento do valor correspondente aos custos operacionais em que o órgão ou entidade permissionária incorrerá.\n Parágrafo único. A autoridade com circunscrição sobre a via arbitrará os valores mínimos da caução ou fiança e do contrato de seguro.\n CAPÍTULO III-A\n (Incluído Lei nº 12.619, de 2012) (Vigência)\n DA CONDUÇÃO DE VEÍCULOS POR MOTORISTAS PROFISSIONAIS"}, {"art": "Art. 67-A", "key": "67-A", "texto": "Art. 67-A. O disposto neste Capítulo aplica-se aos motoristas profissionais: (Redação dada pela Lei nº 13.103, de 2015) (Vigência)\n I - de transporte rodoviário coletivo de passageiros; (Incluído pela Lei nº 13.103, de 2015) (Vigência)\n II - de transporte rodoviário de cargas. (Incluído pela Lei nº 13.103, de 2015) (Vigência)\n § 1o (Revogado). (Redação dada pela Lei nº 13.103, de 2015) (Vigência)\n § 2o (Revogado). (Redação dada pela Lei nº 13.103, de 2015) (Vigência)\n § 3o (Revogado). (Redação dada pela Lei nº 13.103, de 2015) (Vigência)\n § 4o (Revogado). (Redação dada pela Lei nº 13.103, de 2015) (Vigência)\n § 5o (Revogado). (Redação dada pela Lei nº 13.103, de 2015) (Vigência)\n § 6o (Revogado). (Redação dada pela Lei nº 13.103, de 2015) (Vigência)\n § 7o (Revogado). (Redação dada pela Lei nº 13.103, de 2015) (Vigência)\n § 8o (VETADO). (Incluído Lei nº 12.619, de 2012) (Vigência)\n Art 67-B. VETADO). (Incluído Lei nº 12.619, de 2012) (Vigência)"}, {"art": "Art. 67-C", "key": "67-C", "texto": "Art. 67-C. É vedado ao motorista profissional dirigir por mais de 5 (cinco) horas e meia ininterruptas veículos de transporte rodoviário coletivo de passageiros ou de transporte rodoviário de cargas. (Redação dada pela Lei nº 13.103, de 2015) (Vigência)\n § 1o Serão observados 30 (trinta) minutos para descanso dentro de cada 6 (seis) horas na condução de veículo de transporte de carga, sendo facultado o seu fracionamento e o do tempo de direção desde que não ultrapassadas 5\n(cinco) horas e meia contínuas no exercício da condução. (Incluído pela Lei nº 13.103, de 2015) (Vigência)\n § 1o-A. Serão observados 30 (trinta) minutos para descanso a cada 4 (quatro) horas na condução de veículo rodoviário de passageiros, sendo facultado o seu fracionamento e o do tempo de direção. (Incluído pela Lei nº 13.103, de 2015) (Vigência)\n § 2o Em situações excepcionais de inobservância justificada do tempo de direção, devidamente registradas, o tempo de direção poderá ser elevado pelo período necessário para que o condutor, o veículo e a carga cheguem a um lugar que ofereça a segurança e o atendimento demandados, desde que não haja comprometimento da segurança rodoviária. (Incluído pela Lei nº 13.103, de 2015) (Vigência)\n § 3o O condutor é obrigado, dentro do período de 24 (vinte e quatro) horas, a observar o mínimo de 11 (onze) horas de descanso, que podem ser fracionadas, usufruídas no veículo e coincidir com os intervalos mencionados no § 1o, observadas no primeiro período 8 (oito) horas ininterruptas de descanso. (Incluído pela Lei nº 13.103, de 2015)\n(Vigência) (Vide ADI 5322)\n § 4o Entende-se como tempo de direção ou de condução apenas o período em que o condutor estiver efetivamente ao volante, em curso entre a origem e o destino. (Incluído pela Lei nº 13.103, de 2015) (Vigência)\n § 5o Entende-se como início de viagem a partida do veículo na ida ou no retorno, com ou sem carga, considerando- se como sua continuação as partidas nos dias subsequentes até o destino. (Incluído pela Lei nº 13.103, de 2015)\n(Vigência)\n § 6o O condutor somente iniciará uma viagem após o cumprimento integral do intervalo de descanso previsto no § 3o deste artigo. (Incluído pela Lei nº 13.103, de 2015) (Vigência)\n\f § 7o Nenhum transportador de cargas ou coletivo de passageiros, embarcador, consignatário de cargas, operador de terminais de carga, operador de transporte multimodal de cargas ou agente de cargas ordenará a qualquer motorista a seu serviço, ainda que subcontratado, que conduza veículo referido no caput sem a observância do disposto no § 6o.\n(Incluído pela Lei nº 13.103, de 2015) (Vigência)\n § 8º Regulamentação do Contran definirá as situações excepcionais de inobservância justificada do tempo de direção e de descanso pelos motoristas profissionais condutores de veículos ou composições de transporte rodoviário de cargas justificadas por indisponibilidade de pontos de parada e de descanso na rota programada para a viagem ou por exaurimento das vagas de estacionamento neles disponíveis. (Redação dada pela Lei nº 14.599, de 2023)\n § 9º O órgão competente da União ou, conforme o caso, a autoridade do ente da Federação com circunscrição sobre a via publicará e revisará, periodicamente, relação dos espaços destinados a pontos de parada e de descanso disponibilizados aos motoristas profissionais condutores de veículos ou composições de transporte rodoviário de cargas, especialmente entre os previstos no art. 10 da Lei nº 13.103, de 2 de março de 2015, indicando o número de vagas de estacionamento disponíveis em cada localidade. (Incluído pela Lei nº 14.440, de 2022)"}, {"art": "Art. 67-D", "key": "67-D", "texto": "Art. 67-D. (VETADO). (Incluído Lei nº 12.619, de 2012) (Vigência)"}, {"art": "Art. 67-E", "key": "67-E", "texto": "Art. 67-E. O motorista profissional é responsável por controlar e registrar o tempo de condução estipulado no art. 67-C, com vistas à sua estrita observância. (Incluído pela Lei nº 13.103, de 2015) (Vigência)\n § 1o A não observância dos períodos de descanso estabelecidos no art. 67-C sujeitará o motorista profissional às penalidades daí decorrentes, previstas neste Código. (Incluído pela Lei nº 13.103, de 2015) (Vigência)\n § 1º-A. Não estará sujeito às penalidades previstas neste Código o motorista profissional condutor de veículos ou composições de transporte rodoviário de cargas que não observar os períodos de direção e de descanso quando ocorrer a situação excepcional descrita no § 8º do art. 67-C deste Código. (Incluído pela Lei nº 14.440, de 2022)\n § 2o O tempo de direção será controlado mediante registrador instantâneo inalterável de velocidade e tempo e, ou por meio de anotação em diário de bordo, ou papeleta ou ficha de trabalho externo, ou por meios eletrônicos instalados no veículo, conforme norma do Contran. (Incluído pela Lei nº 13.103, de 2015) (Vigência)\n § 3o O equipamento eletrônico ou registrador deverá funcionar de forma independente de qualquer interferência do condutor, quanto aos dados registrados. (Incluído pela Lei nº 13.103, de 2015) (Vigência)\n § 4o A guarda, a preservação e a exatidão das informações contidas no equipamento registrador instantâneo inalterável de velocidade e de tempo são de responsabilidade do condutor. (Incluído pela Lei nº 13.103, de 2015)\n(Vigência)\n CAPÍTULO IV\n DOS PEDESTRES E CONDUTORES DE VEÍCULOS NÃO MOTORIZADOS"}, {"art": "Art. 68", "key": "68", "texto": "Art. 68. É assegurada ao pedestre a utilização dos passeios ou passagens apropriadas das vias urbanas e dos acostamentos das vias rurais para circulação, podendo a autoridade competente permitir a utilização de parte da calçada para outros fins, desde que não seja prejudicial ao fluxo de pedestres.\n § 1º O ciclista desmontado empurrando a bicicleta equipara-se ao pedestre em direitos e deveres.\n § 2º Nas áreas urbanas, quando não houver passeios ou quando não for possível a utilização destes, a circulação de pedestres na pista de rolamento será feita com prioridade sobre os veículos, pelos bordos da pista, em fila única, exceto em locais proibidos pela sinalização e nas situações em que a segurança ficar comprometida.\n § 3º Nas vias rurais, quando não houver acostamento ou quando não for possível a utilização dele, a circulação de pedestres, na pista de rolamento, será feita com prioridade sobre os veículos, pelos bordos da pista, em fila única, em sentido contrário ao deslocamento de veículos, exceto em locais proibidos pela sinalização e nas situações em que a segurança ficar comprometida.\n § 4º (VETADO)\n § 5º Nos trechos urbanos de vias rurais e nas obras de arte a serem construídas, deverá ser previsto passeio destinado à circulação dos pedestres, que não deverão, nessas condições, usar o acostamento.\n § 6º Onde houver obstrução da calçada ou da passagem para pedestres, o órgão ou entidade com circunscrição sobre a via deverá assegurar a devida sinalização e proteção para circulação de pedestres."}, {"art": "Art. 69", "key": "69", "texto": "Art. 69. Para cruzar a pista de rolamento o pedestre tomará precauções de segurança, levando em conta, principalmente, a visibilidade, a distância e a velocidade dos veículos, utilizando sempre as faixas ou passagens a ele\n\fdestinadas sempre que estas existirem numa distância de até cinqüenta metros dele, observadas as seguintes disposições:\n I - onde não houver faixa ou passagem, o cruzamento da via deverá ser feito em sentido perpendicular ao de seu eixo;\n II - para atravessar uma passagem sinalizada para pedestres ou delimitada por marcas sobre a pista:\n a) onde houver foco de pedestres, obedecer às indicações das luzes;\n b) onde não houver foco de pedestres, aguardar que o semáforo ou o agente de trânsito interrompa o fluxo de veículos;\n III - nas interseções e em suas proximidades, onde não existam faixas de travessia, os pedestres devem atravessar a via na continuação da calçada, observadas as seguintes normas:\n a) não deverão adentrar na pista sem antes se certificar de que podem fazê-lo sem obstruir o trânsito de veículos;\n b) uma vez iniciada a travessia de uma pista, os pedestres não deverão aumentar o seu percurso, demorar-se ou parar sobre ela sem necessidade."}, {"art": "Art. 70", "key": "70", "texto": "Art. 70. Os pedestres que estiverem atravessando a via sobre as faixas delimitadas para esse fim terão prioridade de passagem, exceto nos locais com sinalização semafórica, onde deverão ser respeitadas as disposições deste\nCódigo.\n Parágrafo único. Nos locais em que houver sinalização semafórica de controle de passagem será dada preferência aos pedestres que não tenham concluído a travessia, mesmo em caso de mudança do semáforo liberando a passagem dos veículos."}, {"art": "Art. 71", "key": "71", "texto": "Art. 71. O órgão ou entidade com circunscrição sobre a via manterá, obrigatoriamente, as faixas e passagens de pedestres em boas condições de visibilidade, higiene, segurança e sinalização.\n CAPÍTULO V\n DO CIDADÃO"}, {"art": "Art. 72", "key": "72", "texto": "Art. 72. Todo cidadão ou entidade civil tem o direito de solicitar, por escrito, aos órgãos ou entidades do Sistema\nNacional de Trânsito, sinalização, fiscalização e implantação de equipamentos de segurança, bem como sugerir alterações em normas, legislação e outros assuntos pertinentes a este Código."}, {"art": "Art. 73", "key": "73", "texto": "Art. 73. Os órgãos ou entidades pertencentes ao Sistema Nacional de Trânsito têm o dever de analisar as solicitações e responder, por escrito, dentro de prazos mínimos, sobre a possibilidade ou não de atendimento, esclarecendo ou justificando a análise efetuada, e, se pertinente, informando ao solicitante quando tal evento ocorrerá.\n Parágrafo único. As campanhas de trânsito devem esclarecer quais as atribuições dos órgãos e entidades pertencentes ao Sistema Nacional de Trânsito e como proceder a tais solicitações.\n CAPÍTULO VI\n DA EDUCAÇÃO PARA O TRÂNSITO"}, {"art": "Art. 74", "key": "74", "texto": "Art. 74. A educação para o trânsito é direito de todos e constitui dever prioritário para os componentes do Sistema\nNacional de Trânsito.\n § 1º É obrigatória a existência de coordenação educacional em cada órgão ou entidade componente do Sistema\nNacional de Trânsito.\n § 2º Os órgãos ou entidades executivos de trânsito deverão promover, dentro de sua estrutura organizacional ou mediante convênio, o funcionamento de Escolas Públicas de Trânsito, nos moldes e padrões estabelecidos pelo\nCONTRAN."}, {"art": "Art. 75", "key": "75", "texto": "Art. 75. O CONTRAN estabelecerá, anualmente, os temas e os cronogramas das campanhas de âmbito nacional que deverão ser promovidas por todos os órgãos ou entidades do Sistema Nacional de Trânsito, em especial nos períodos referentes às férias escolares, feriados prolongados e à Semana Nacional de Trânsito.\n § 1º Os órgãos ou entidades do Sistema Nacional de Trânsito deverão promover outras campanhas no âmbito de sua circunscrição e de acordo com as peculiaridades locais.\n § 2º As campanhas de que trata este artigo são de caráter permanente, e os serviços de rádio e difusão sonora de sons e imagens explorados pelo poder público são obrigados a difundi-las gratuitamente, com a freqüência\n\frecomendada pelos órgãos competentes do Sistema Nacional de Trânsito."}, {"art": "Art. 76", "key": "76", "texto": "Art. 76. A educação para o trânsito será promovida na pré-escola e nas escolas de 1º, 2º e 3º graus, por meio de planejamento e ações coordenadas entre os órgãos e entidades do Sistema Nacional de Trânsito e de Educação, da\nUnião, dos Estados, do Distrito Federal e dos Municípios, nas respectivas áreas de atuação.\n Parágrafo único. Para a finalidade prevista neste artigo, o Ministério da Educação, mediante proposta do Contran e do Conselho de Reitores das Universidades Brasileiras, diretamente ou mediante convênio, promoverá: (Redação dada pela Lei nº 14.599, de 2023)\n I - a adoção, em todos os níveis de ensino, de um currículo interdisciplinar com conteúdo programático sobre segurança de trânsito;\n II - a adoção de conteúdos relativos à educação para o trânsito nas escolas de formação para o magistério e o treinamento de professores e multiplicadores;\n III - a criação de corpos técnicos interprofissionais para levantamento e análise de dados estatísticos relativos ao trânsito;\n IV - a elaboração de planos de redução de sinistros de trânsito com os núcleos interdisciplinares universitários de trânsito, com vistas à integração universidades-sociedade na área de trânsito. (Redação dada pela Lei nº 14.599, de 2023)"}, {"art": "Art. 77", "key": "77", "texto": "Art. 77. No âmbito da educação para o trânsito, caberá ao Ministério da Saúde, mediante proposta do Contran, estabelecer campanha nacional para esclarecer condutas a serem seguidas nos primeiros socorros em caso de sinistros de trânsito. (Redação dada pela Lei nº 14.599, de 2023)\n Parágrafo único. As campanhas terão caráter permanente por intermédio do Sistema Único de Saúde - SUS, sendo intensificadas nos períodos e na forma estabelecidos no art. 76."}, {"art": "Art. 77-A", "key": "77-A", "texto": "Art. 77-A. São assegurados aos órgãos ou entidades componentes do Sistema Nacional de Trânsito os mecanismos instituídos nos arts. 77-B a 77-E para a veiculação de mensagens educativas de trânsito em todo o território nacional, em caráter suplementar às campanhas previstas nos arts. 75 e 77. (Incluído pela Lei nº 12.006, de 2009)."}, {"art": "Art. 77-B", "key": "77-B", "texto": "Art. 77-B. Toda peça publicitária destinada à divulgação ou promoção, nos meios de comunicação social, de produto oriundo da indústria automobilística ou afim, incluirá, obrigatoriamente, mensagem educativa de trânsito a ser conjuntamente veiculada. (Incluído pela Lei nº 12.006, de 2009).\n § 1o Para os efeitos dos arts. 77-A a 77-E, consideram-se produtos oriundos da indústria automobilística ou afins: (Incluído pela Lei nº 12.006, de 2009).\n I – os veículos rodoviários automotores de qualquer espécie, incluídos os de passageiros e os de carga; (Incluído pela Lei nº 12.006, de 2009).\n II – os componentes, as peças e os acessórios utilizados nos veículos mencionados no inciso I. (Incluído pela\nLei nº 12.006, de 2009).\n § 2o O disposto no caput deste artigo aplica-se à propaganda de natureza comercial, veiculada por iniciativa do fabricante do produto, em qualquer das seguintes modalidades: (Incluído pela Lei nº 12.006, de 2009).\n I – rádio; (Incluído pela Lei nº 12.006, de 2009).\n II – televisão; (Incluído pela Lei nº 12.006, de 2009).\n III – jornal; (Incluído pela Lei nº 12.006, de 2009).\n IV – revista; (Incluído pela Lei nº 12.006, de 2009).\n V – outdoor. (Incluído pela Lei nº 12.006, de 2009).\n § 3o Para efeito do disposto no § 2o, equiparam-se ao fabricante o montador, o encarroçador, o importador e o revendedor autorizado dos veículos e demais produtos discriminados no § 1o deste artigo. (Incluído pela Lei nº 12.006, de 2009)."}, {"art": "Art. 77-C", "key": "77-C", "texto": "Art. 77-C. Quando se tratar de publicidade veiculada em outdoor instalado à margem de rodovia, dentro ou fora da respectiva faixa de domínio, a obrigação prevista no art. 77-B estende-se à propaganda de qualquer tipo de produto e anunciante, inclusive àquela de caráter institucional ou eleitoral. (Incluído pela Lei nº 12.006, de 2009)."}, {"art": "Art. 77-D", "key": "77-D", "texto": "Art. 77-D. O Conselho Nacional de Trânsito (Contran) especificará o conteúdo e o padrão de apresentação das mensagens, bem como os procedimentos envolvidos na respectiva veiculação, em conformidade com as diretrizes fixadas para as campanhas educativas de trânsito a que se refere o art. 75. (Incluído pela Lei nº 12.006, de 2009)."}, {"art": "Art. 77-E", "key": "77-E", "texto": "Art. 77-E. A veiculação de publicidade feita em desacordo com as condições fixadas nos arts. 77-A a 77-D constitui infração punível com as seguintes sanções: (Incluído pela Lei nº 12.006, de 2009).\n I – advertência por escrito; (Incluído pela Lei nº 12.006, de 2009).\n II – suspensão, nos veículos de divulgação da publicidade, de qualquer outra propaganda do produto, pelo prazo de até 60 (sessenta) dias; (Incluído pela Lei nº 12.006, de 2009).\n III - multa de R$ 1.627,00 (mil, seiscentos e vinte e sete reais) a R$ 8.135,00 (oito mil, cento e trinta e cinco reais), cobrada do dobro até o quíntuplo em caso de reincidência. (Redação dada pela Lei nº 13.281, de 2016) (Vigência)\n § 1o As sanções serão aplicadas isolada ou cumulativamente, conforme dispuser o regulamento. (Incluído pela\nLei nº 12.006, de 2009).\n § 2o Sem prejuízo do disposto no caput deste artigo, qualquer infração acarretará a imediata suspensão da veiculação da peça publicitária até que sejam cumpridas as exigências fixadas nos arts. 77-A a 77-D. (Incluído pela\nLei nº 12.006, de 2009)."}, {"art": "Art. 77-F", "key": "77-F", "texto": "Art. 77-F. (VETADO). (Incluído pela Lei nº 14.304, de 2022) (Vigência)"}, {"art": "Art. 78", "key": "78", "texto": "Art. 78. Os Ministérios da Saúde, da Educação, do Trabalho e Emprego, dos Transportes e da Justiça e Segurança\nPública, por intermédio do Contran, desenvolverão e implementarão programas destinados à prevenção de sinistros.\n(Redação dada pela Lei nº 14.599, de 2023)\n Parágrafo único. Será repassado, mensalmente, ao Coordenador do Sistema Nacional de Trânsito, para aplicação nos programas de que trata o caput deste artigo e na divulgação do SPVAT, o montante equivalente a até 5% (cinco por cento) do total dos valores arrecadados destinados à Seguridade Social dos prêmios do Seguro Obrigatório para\nProteção de Vítimas de Acidentes de Trânsito (SPVAT). (Redação dada pela Lei Complementar nº 207, de 2024)"}, {"art": "Art. 79", "key": "79", "texto": "Art. 79. Os órgãos e entidades executivos de trânsito poderão firmar convênio com os órgãos de educação da\nUnião, dos Estados, do Distrito Federal e dos Municípios, objetivando o cumprimento das obrigações estabelecidas neste capítulo.\n CAPÍTULO VII\n DA SINALIZAÇÃO DE TRÂNSITO"}, {"art": "Art. 80", "key": "80", "texto": "Art. 80. Sempre que necessário, será colocada ao longo da via, sinalização prevista neste Código e em legislação complementar, destinada a condutores e pedestres, vedada a utilização de qualquer outra.\n § 1º A sinalização será colocada em posição e condições que a tornem perfeitamente visível e legível durante o dia e a noite, em distância compatível com a segurança do trânsito, conforme normas e especificações do CONTRAN.\n § 2º O órgão máximo executivo de trânsito da União poderá autorizar, em caráter experimental e por período prefixado, a utilização de sinalização e equipamentos não previstos neste Código. (Redação dada pela Lei nº 14.599, de 2023)\n § 3º A responsabilidade pela instalação da sinalização nas vias internas pertencentes aos condomínios constituídos por unidades autônomas e nas vias e áreas de estacionamento de estabelecimentos privados de uso coletivo é de seu proprietário. (Incluído pela Lei nº 13.281, de 2016) (Vigência)"}, {"art": "Art. 81", "key": "81", "texto": "Art. 81. Nas vias públicas e nos imóveis é proibido colocar luzes, publicidade, inscrições, vegetação e mobiliário que possam gerar confusão, interferir na visibilidade da sinalização e comprometer a segurança do trânsito."}, {"art": "Art. 82", "key": "82", "texto": "Art. 82. É proibido afixar sobre a sinalização de trânsito e respectivos suportes, ou junto a ambos, qualquer tipo de publicidade, inscrições, legendas e símbolos que não se relacionem com a mensagem da sinalização."}, {"art": "Art. 83", "key": "83", "texto": "Art. 83. A afixação de publicidade ou de quaisquer legendas ou símbolos ao longo das vias condiciona-se à prévia aprovação do órgão ou entidade com circunscrição sobre a via."}, {"art": "Art. 84", "key": "84", "texto": "Art. 84. O órgão ou entidade de trânsito com circunscrição sobre a via poderá retirar ou determinar a imediata retirada de qualquer elemento que prejudique a visibilidade da sinalização viária e a segurança do trânsito, com ônus para quem o tenha colocado."}, {"art": "Art. 85", "key": "85", "texto": "Art. 85. Os locais destinados pelo órgão ou entidade de trânsito com circunscrição sobre a via à travessia de pedestres deverão ser sinalizados com faixas pintadas ou demarcadas no leito da via."}, {"art": "Art. 86", "key": "86", "texto": "Art. 86. Os locais destinados a postos de gasolina, oficinas, estacionamentos ou garagens de uso coletivo deverão ter suas entradas e saídas devidamente identificadas, na forma regulamentada pelo CONTRAN."}, {"art": "Art. 86-A", "key": "86-A", "texto": "Art. 86-A. As vagas de estacionamento regulamentado de que trata o inciso XVII do art. 181 desta Lei deverão ser sinalizadas com as respectivas placas indicativas de destinação e com placas informando os dados sobre a infração por estacionamento indevido. (Incluído pela Lei nº 13.146, de 2015) (Vigência)"}, {"art": "Art. 87", "key": "87", "texto": "Art. 87. Os sinais de trânsito classificam-se em:\n I - verticais;\n II - horizontais;\n III - dispositivos de sinalização auxiliar;\n IV - luminosos;\n V - sonoros;\n VI - gestos do agente de trânsito e do condutor."}, {"art": "Art. 88", "key": "88", "texto": "Art. 88. Nenhuma via pavimentada poderá ser entregue após sua construção, ou reaberta ao trânsito após a realização de obras ou de manutenção, enquanto não estiver devidamente sinalizada, vertical e horizontalmente, de forma a garantir as condições adequadas de segurança na circulação.\n Parágrafo único. Nas vias ou trechos de vias em obras deverá ser afixada sinalização específica e adequada."}, {"art": "Art. 89", "key": "89", "texto": "Art. 89. A sinalização terá a seguinte ordem de prevalência:\n I - as ordens do agente de trânsito sobre as normas de circulação e outros sinais;\n II - as indicações do semáforo sobre os demais sinais;\n III - as indicações dos sinais sobre as demais normas de trânsito."}, {"art": "Art. 90", "key": "90", "texto": "Art. 90. Não serão aplicadas as sanções previstas neste Código por inobservância à sinalização quando esta for insuficiente ou incorreta.\n § 1º O órgão ou entidade de trânsito com circunscrição sobre a via é responsável pela implantação da sinalização, respondendo pela sua falta, insuficiência ou incorreta colocação.\n § 2º O CONTRAN editará normas complementares no que se refere à interpretação, colocação e uso da sinalização.\n CAPÍTULO VIII\n DA ENGENHARIA DE TRÁFEGO, DA OPERAÇÃO, DA FISCALIZAÇÃO E DO POLICIAMENTO OSTENSIVO DE TRÂNSITO"}, {"art": "Art. 91", "key": "91", "texto": "Art. 91. O CONTRAN estabelecerá as normas e regulamentos a serem adotados em todo o território nacional quando da implementação das soluções adotadas pela Engenharia de Tráfego, assim como padrões a serem praticados por todos os órgãos e entidades do Sistema Nacional de Trânsito."}, {"art": "Art. 92", "key": "92", "texto": "Art. 92. (VETADO)"}, {"art": "Art. 93", "key": "93", "texto": "Art. 93. Nenhum projeto de edificação que possa transformar-se em pólo atrativo de trânsito poderá ser aprovado sem prévia anuência do órgão ou entidade com circunscrição sobre a via e sem que do projeto conste área para estacionamento e indicação das vias de acesso adequadas."}, {"art": "Art. 94", "key": "94", "texto": "Art. 94. Qualquer obstáculo à livre circulação e à segurança de veículos e pedestres, tanto na via quanto na calçada, caso não possa ser retirado, deve ser devida e imediatamente sinalizado.\n Parágrafo único. É proibida a utilização das ondulações transversais e de sonorizadores como redutores de velocidade, salvo em casos especiais definidos pelo órgão ou entidade competente, nos padrões e critérios estabelecidos pelo CONTRAN."}, {"art": "Art. 95", "key": "95", "texto": "Art. 95. Nenhuma obra ou evento que possa perturbar ou interromper a livre circulação de veículos e pedestres, ou colocar em risco sua segurança, será iniciada sem permissão prévia do órgão ou entidade de trânsito com circunscrição sobre a via.\n\f § 1º A obrigação de sinalizar é do responsável pela execução ou manutenção da obra ou do evento.\n § 2º Salvo em casos de emergência, a autoridade de trânsito com circunscrição sobre a via avisará a comunidade, por intermédio dos meios de comunicação social, com quarenta e oito horas de antecedência, de qualquer interdição da via, indicando-se os caminhos alternativos a serem utilizados.\n § 3º O descumprimento do disposto neste artigo será punido com multa de R$ 81,35 (oitenta e um reais e trinta e cinco centavos) a R$ 488,10 (quatrocentos e oitenta e oito reais e dez centavos), independentemente das cominações cíveis e penais cabíveis, além de multa diária no mesmo valor até a regularização da situação, a partir do prazo final concedido pela autoridade de trânsito, levando-se em consideração a dimensão da obra ou do evento e o prejuízo causado ao trânsito. (Redação pela Lei nº 13.281, de 2016) (Vigência)\n § 4º Ao servidor público responsável pela inobservância de qualquer das normas previstas neste e nos arts. 93 e 94, a autoridade de trânsito aplicará multa diária na base de cinqüenta por cento do dia de vencimento ou remuneração devida enquanto permanecer a irregularidade.\n CAPÍTULO IX\n DOS VEÍCULOS\n Seção I\n Disposições Gerais"}, {"art": "Art. 96", "key": "96", "texto": "Art. 96. Os veículos classificam-se em:\n I - quanto à tração:\n a) automotor;\n b) (revogada); (Redação dada pela Lei nº 14.599, de 2023)\n c) de propulsão humana;\n d) de tração animal;\n e) reboque ou semi-reboque;\n II - quanto à espécie:\n a) de passageiros:\n 1 - bicicleta;\n 2 - ciclomotor;\n 3 - motoneta;\n 4 - motocicleta;\n 5 - triciclo;\n 6 - quadriciclo;\n 7 - automóvel;\n 8 - microônibus;\n 9 - ônibus;\n 10 - bonde;\n 11 - reboque ou semi-reboque;\n 12 - charrete;\n b) de carga:\n 1 - motoneta;\n\f2 - motocicleta; 3 - triciclo; 4 - quadriciclo; 5 - caminhonete; 6 - caminhão; 7 - reboque ou semi-reboque; 8 - carroça; 9 - carro-de-mão; c) misto: 1 - camioneta; 2 - utilitário; 3 - outros; d) de competição; e) de tração: 1 - caminhão-trator; 2 - trator de rodas; 3 - trator de esteiras; 4 - trator misto; f) especial: (Redação dada pela Lei nº 14.599, de 2023)\n 1. motocicleta; (Incluído pela Lei nº 14.599, de 2023)\n 2. triciclo; (Incluído pela Lei nº 14.599, de 2023)\n 3. automóvel; (Incluído pela Lei nº 14.599, de 2023)\n 4. micro-ônibus; (Incluído pela Lei nº 14.599, de 2023)\n 5. ônibus; (Incluído pela Lei nº 14.599, de 2023)\n 6. reboque ou semirreboque; (Incluído pela Lei nº 14.599, de 2023)\n 7. camioneta; (Incluído pela Lei nº 14.599, de 2023)\n 8. caminhão; (Incluído pela Lei nº 14.599, de 2023)\n 9. caminhão-trator; (Incluído pela Lei nº 14.599, de 2023)\n 10. caminhonete; (Incluído pela Lei nº 14.599, de 2023)\n 11. utilitário; (Incluído pela Lei nº 14.599, de 2023)\n 12. motor-casa; (Incluído pela Lei nº 14.599, de 2023) g) de coleção;\nIII - quanto à categoria: a) oficial;\n\f b) de representação diplomática, de repartições consulares de carreira ou organismos internacionais acreditados junto ao Governo brasileiro;\n c) particular;\n d) de aluguel;\n e) de aprendizagem."}, {"art": "Art. 97", "key": "97", "texto": "Art. 97. As características dos veículos, suas especificações básicas, configuração e condições essenciais para registro, licenciamento e circulação serão estabelecidas pelo CONTRAN, em função de suas aplicações."}, {"art": "Art. 98", "key": "98", "texto": "Art. 98. Nenhum proprietário ou responsável poderá, sem prévia autorização da autoridade competente, fazer ou ordenar que sejam feitas no veículo modificações de suas características de fábrica.\n § 1º Os veículos e motores novos ou usados que sofrerem alterações ou conversões são obrigados a atender aos mesmos limites e exigências de emissão de poluentes e ruído previstos pelos órgãos ambientais competentes e pelo\nCONTRAN, cabendo à entidade executora das modificações e ao proprietário do veículo a responsabilidade pelo cumprimento das exigências. (Redação dada pela Lei nº 14.071, de 2020) (Vigência)\n § 2º Veículos classificados na espécie misto, tipo utilitário, carroçaria jipe poderão ter alterado o diâmetro externo do conjunto formado por roda e pneu, observadas restrições impostas pelo fabricante e exigências fixadas pelo\nContran. (Incluído pela Lei nº 14.071, de 2020) (Vigência)"}, {"art": "Art. 99", "key": "99", "texto": "Art. 99. Somente poderá transitar pelas vias terrestres o veículo cujo peso e dimensões atenderem aos limites estabelecidos pelo CONTRAN.\n § 1º O excesso de peso será aferido por equipamento de pesagem ou pela verificação de documento fiscal, na forma estabelecida pelo CONTRAN.\n § 2º Será tolerado um percentual sobre os limites de peso bruto total e peso bruto transmitido por eixo de veículos\nà superfície das vias, quando aferido por equipamento, na forma estabelecida pelo CONTRAN.\n § 3º Os equipamentos fixos ou móveis utilizados na pesagem de veículos serão aferidos de acordo com a metodologia e na periodicidade estabelecidas pelo CONTRAN, ouvido o órgão ou entidade de metrologia legal.\n § 4º Somente poderá haver autuação, por ocasião da pesagem do veículo, quando o veículo ou a combinação de veículos ultrapassar os limites de peso fixados, acrescidos da respectiva tolerância. (Incluído pela Lei nº 14.229, de 2021) (Vigência)\n § 5º O fabricante fará constar em lugar visível da estrutura do veículo e no Renavam o limite técnico de peso por eixo, na forma definida pelo Contran. (Incluído pela Lei nº 14.229, de 2021) (Vigência)"}, {"art": "Art. 100", "key": "100", "texto": "Art. 100. Nenhum veículo ou combinação de veículos poderá transitar com lotação de passageiros, com peso bruto total, ou com peso bruto total combinado com peso por eixo, superior ao fixado pelo fabricante, nem ultrapassar a capacidade máxima de tração da unidade tratora.\n § 1º Os veículos de transporte coletivo de passageiros poderão ser dotados de pneus extralargos. (Incluído pela\nLei nº 13.281, de 2016) (Vigência)\n § 2º O Contran regulamentará o uso de pneus extralargos para os demais veículos. (Incluído pela Lei nº 13.281, de 2016) (Vigência)\n § 3º É permitida a fabricação de veículos de transporte de passageiros de até 15 m (quinze metros) de comprimento na configuração de chassi 8x2. (Incluído pela Lei nº 13.281, de 2016) (Vigência)"}, {"art": "Art. 101", "key": "101", "texto": "Art. 101. Ao veículo ou à combinação de veículos utilizados no transporte de carga que não se enquadre nos limites de peso e dimensões estabelecidos pelo Contran, poderá ser concedida, pela autoridade com circunscrição sobre a via, autorização especial de trânsito, com prazo certo, válida para cada viagem ou por período, atendidas as medidas de segurança consideradas necessárias, conforme regulamentação do Contran. (Redação dada pela Lei nº 14.071, de 2020) (Vigência)\n § 1º A autorização será concedida mediante requerimento que especificará as características do veículo ou combinação de veículos e de carga, o percurso, a data e o horário do deslocamento inicial.\n § 2º A autorização não exime o beneficiário da responsabilidade por eventuais danos que o veículo ou a combinação de veículos causar à via ou a terceiros.\n\f § 3º Aos guindastes autopropelidos ou sobre caminhões poderá ser concedida, pela autoridade com circunscrição sobre a via, autorização especial de trânsito, com prazo de seis meses, atendidas as medidas de segurança consideradas necessárias.\n § 4º O Contran estabelecerá os requisitos mínimos e específicos a serem observados pela autoridade com circunscrição sobre a via para a concessão da autorização de que trata o caput deste artigo quando o veículo ou a combinação de veículos trafegar exclusivamente em via rural não pavimentada, os quais deverão contemplar o caráter diferenciado e regional dessas vias. (Incluído pela Lei nº 14.229, de 2021) (Vigência)"}, {"art": "Art. 102", "key": "102", "texto": "Art. 102. O veículo de carga deverá estar devidamente equipado quando transitar, de modo a evitar o derramamento da carga sobre a via.\n Parágrafo único. O CONTRAN fixará os requisitos mínimos e a forma de proteção das cargas de que trata este artigo, de acordo com a sua natureza.\n Seção II\n Da Segurança dos Veículos"}, {"art": "Art. 103", "key": "103", "texto": "Art. 103. O veículo só poderá transitar pela via quando atendidos os requisitos e condições de segurança estabelecidos neste Código e em normas do CONTRAN.\n § 1º Os fabricantes, os importadores, os montadores e os encarroçadores de veículos deverão emitir certificado de segurança, indispensável ao cadastramento no RENAVAM, nas condições estabelecidas pelo CONTRAN.\n § 2º O CONTRAN deverá especificar os procedimentos e a periodicidade para que os fabricantes, os importadores, os montadores e os encarroçadores comprovem o atendimento aos requisitos de segurança veicular, devendo, para isso, manter disponíveis a qualquer tempo os resultados dos testes e ensaios dos sistemas e componentes abrangidos pela legislação de segurança veicular.\n § 3º O Contran poderá autorizar, em caráter experimental e por período prefixado, a circulação de veículos ou combinação de veículos em condições não previstas no caput deste artigo. (Incluído pela Lei nº 14.599, de 2023)"}, {"art": "Art. 104", "key": "104", "texto": "Art. 104. Os veículos em circulação terão suas condições de segurança, de controle de emissão de gases poluentes e de ruído avaliadas mediante inspeção, que será obrigatória, na forma e periodicidade estabelecidas pelo\nCONTRAN para os itens de segurança e pelo CONAMA para emissão de gases poluentes e ruído.\n § 1º (VETADO)\n § 2º (VETADO)\n § 3º (VETADO)\n § 4º (VETADO)\n § 5º Será aplicada a medida administrativa de retenção aos veículos reprovados na inspeção de segurança e na de emissão de gases poluentes e ruído.\n § 6º Estarão isentos da inspeção de que trata o caput deste artigo, durante 3 (três) anos a partir do primeiro licenciamento, os veículos novos classificados na categoria particular, com capacidade para até 7 (sete) passageiros, desde que mantenham suas características originais de fábrica e não se envolvam em sinistro de trânsito com danos de média ou grande monta. (Redação dada pela Lei nº 14.599, de 2023)\n § 7º Para os demais veículos novos, o período de que trata o § 6º deste artigo será de 2 (dois) anos, desde que mantenham suas características originais de fábrica e não se envolvam em sinistro de trânsito com danos de média ou grande monta. (Redação dada pela Lei nº 14.599, de 2023)"}, {"art": "Art. 105", "key": "105", "texto": "Art. 105. São equipamentos obrigatórios dos veículos, entre outros a serem estabelecidos pelo CONTRAN:\n I - cinto de segurança, conforme regulamentação específica do CONTRAN, com exceção dos veículos destinados ao transporte de passageiros em percursos em que seja permitido viajar em pé;\n II - para os veículos de transporte e de condução escolar, os de transporte de passageiros com mais de dez lugares e os de carga com peso bruto total superior a quatro mil, quinhentos e trinta e seis quilogramas, equipamento registrador instantâneo inalterável de velocidade e tempo;\n III - encosto de cabeça, para todos os tipos de veículos automotores, segundo normas estabelecidas pelo\nCONTRAN;\n\f IV - (VETADO)\n V - dispositivo destinado ao controle de emissão de gases poluentes e de ruído, segundo normas estabelecidas pelo CONTRAN.\n VI - para as bicicletas, a campainha, sinalização noturna dianteira, traseira, lateral e nos pedais, e espelho retrovisor do lado esquerdo.\n VII - equipamento suplementar de retenção - air bag frontal para o condutor e o passageiro do banco dianteiro.\n(Incluído pela Lei nº 11.910, de 2009)\n VIII - luzes de rodagem diurna. (Incluído pela Lei nº 14.071, de 2020) (Vigência) (Vide Lei nº 14.071, de 2020)\n § 1º O CONTRAN disciplinará o uso dos equipamentos obrigatórios dos veículos e determinará suas especificações técnicas.\n § 2º Nenhum veículo poderá transitar com equipamento ou acessório proibido, sendo o infrator sujeito às penalidades e medidas administrativas previstas neste Código.\n § 3º Os fabricantes, os importadores, os montadores, os encarroçadores de veículos e os revendedores devem comercializar os seus veículos com os equipamentos obrigatórios definidos neste artigo, e com os demais estabelecidos pelo CONTRAN.\n § 4º O CONTRAN estabelecerá o prazo para o atendimento do disposto neste artigo.\n § 5o A exigência estabelecida no inciso VII do caput deste artigo será progressivamente incorporada aos novos projetos de automóveis e dos veículos deles derivados, fabricados, importados, montados ou encarroçados, a partir do 1o\n(primeiro) ano após a definição pelo Contran das especificações técnicas pertinentes e do respectivo cronograma de implantação e a partir do 5o (quinto) ano, após esta definição, para os demais automóveis zero quilômetro de modelos ou projetos já existentes e veículos deles derivados. (Incluído pela Lei nº 11.910, de 2009)\n § 6o A exigência estabelecida no inciso VII do caput deste artigo não se aplica aos veículos destinados à exportação. (Incluído pela Lei nº 11.910, de 2009)"}, {"art": "Art. 106", "key": "106", "texto": "Art. 106. No caso de fabricação artesanal ou de modificação de veículo ou, ainda, quando ocorrer substituição de equipamento de segurança especificado pelo fabricante, será exigido, para licenciamento e registro, certificado de segurança expedido por instituição técnica credenciada por órgão ou entidade de metrologia legal, conforme norma elaborada pelo CONTRAN.\n Parágrafo único. Quando se tratar de blindagem de veículo, não será exigido qualquer outro documento ou autorização para o registro ou o licenciamento. (Incluído pela Lei nº 14.071, de 2020) (Vigência)"}, {"art": "Art. 107", "key": "107", "texto": "Art. 107. Os veículos de aluguel, destinados ao transporte individual ou coletivo de passageiros, deverão satisfazer, além das exigências previstas neste Código, às condições técnicas e aos requisitos de segurança, higiene e conforto estabelecidos pelo poder competente para autorizar, permitir ou conceder a exploração dessa atividade."}, {"art": "Art. 108", "key": "108", "texto": "Art. 108. Onde não houver linha regular de ônibus, a autoridade com circunscrição sobre a via poderá autorizar, a título precário, o transporte de passageiros em veículo de carga ou misto, desde que obedecidas as condições de segurança estabelecidas neste Código e pelo CONTRAN.\n Parágrafo único. A autorização citada no caput não poderá exceder a doze meses, prazo a partir do qual a autoridade pública responsável deverá implantar o serviço regular de transporte coletivo de passageiros, em conformidade com a legislação pertinente e com os dispositivos deste Código. (Incluído pela Lei nº 9.602, de 1998)"}, {"art": "Art. 109", "key": "109", "texto": "Art. 109. O transporte de carga em veículos destinados ao transporte de passageiros só pode ser realizado de acordo com as normas estabelecidas pelo CONTRAN."}, {"art": "Art. 110", "key": "110", "texto": "Art. 110. O veículo que tiver alterada qualquer de suas características para competição ou finalidade análoga só poderá circular nas vias públicas com licença especial da autoridade de trânsito, em itinerário e horário fixados."}, {"art": "Art. 111", "key": "111", "texto": "Art. 111. É vedado, nas áreas envidraçadas do veículo:\n I - (VETADO)\n II - o uso de cortinas, persianas fechadas ou similares nos veículos em movimento, salvo nos que possuam espelhos retrovisores em ambos os lados.\n\f III - aposição de inscrições, películas refletivas ou não, painéis decorativos ou pinturas, quando comprometer a segurança do veículo, na forma de regulamentação do CONTRAN. (Incluído pela Lei nº 9.602, de 1998)\n Parágrafo único. É proibido o uso de inscrição de caráter publicitário ou qualquer outra que possa desviar a atenção dos condutores em toda a extensão do pára-brisa e da traseira dos veículos, salvo se não colocar em risco a segurança do trânsito."}, {"art": "Art. 112", "key": "112", "texto": "Art. 112. (Revogado pela Lei nº 9.792, de 1999)"}, {"art": "Art. 113", "key": "113", "texto": "Art. 113. Os importadores, as montadoras, as encarroçadoras e fabricantes de veículos e autopeças são responsáveis civil e criminalmente por danos causados aos usuários, a terceiros, e ao meio ambiente, decorrentes de falhas oriundas de projetos e da qualidade dos materiais e equipamentos utilizados na sua fabricação.\n Seção III\n Da Identificação do Veículo"}, {"art": "Art. 114", "key": "114", "texto": "Art. 114. O veículo será identificado obrigatoriamente por caracteres gravados no chassi ou no monobloco, reproduzidos em outras partes, conforme dispuser o CONTRAN.\n § 1º A gravação será realizada pelo fabricante ou montador, de modo a identificar o veículo, seu fabricante e as suas características, além do ano de fabricação, que não poderá ser alterado.\n § 2º As regravações, quando necessárias, dependerão de prévia autorização da autoridade executiva de trânsito e somente serão processadas por estabelecimento por ela credenciado, mediante a comprovação de propriedade do veículo, mantida a mesma identificação anterior, inclusive o ano de fabricação.\n § 3º Nenhum proprietário poderá, sem prévia permissão da autoridade executiva de trânsito, fazer, ou ordenar que se faça, modificações da identificação de seu veículo."}, {"art": "Art. 115", "key": "115", "texto": "Art. 115. O veículo será identificado externamente por meio de placas dianteira e traseira, sendo esta lacrada em sua estrutura, obedecidas as especificações e modelos estabelecidos pelo CONTRAN.\n § 1º Os caracteres das placas serão individualizados para cada veículo e o acompanharão até a baixa do registro, sendo vedado seu reaproveitamento.\n § 2º As placas com as cores verde e amarela da Bandeira Nacional serão usadas somente pelos veículos de representação pessoal do Presidente e do Vice-Presidente da República, dos Presidentes do Senado Federal e da\nCâmara dos Deputados, do Presidente e dos Ministros do Supremo Tribunal Federal, dos Ministros de Estado, do\nAdvogado-Geral da União e do Procurador-Geral da República.\n § 3º Os veículos de representação dos Presidentes dos Tribunais Federais, dos Governadores, Prefeitos,\nSecretários Estaduais e Municipais, dos Presidentes das Assembléias Legislativas, das Câmaras Municipais, dos\nPresidentes dos Tribunais Estaduais e do Distrito Federal, e do respectivo chefe do Ministério Público e ainda dos\nOficiais Generais das Forças Armadas terão placas especiais, de acordo com os modelos estabelecidos pelo\nCONTRAN.\n § 4o Os aparelhos automotores destinados a puxar ou a arrastar maquinaria de qualquer natureza ou a executar trabalhos de construção ou de pavimentação são sujeitos ao registro na repartição competente, se transitarem em via pública, dispensados o licenciamento e o emplacamento. (Redação dada pela Lei nº 13.154, de 2015) (Vide)\n § 4º-A. Os tratores e demais aparelhos automotores destinados a puxar ou a arrastar maquinaria agrícola ou a executar trabalhos agrícolas, desde que facultados a transitar em via pública, são sujeitos ao registro único, sem ônus, em cadastro específico do Ministério da Agricultura e Pecuária, acessível aos componentes do Sistema Nacional de\nTrânsito. (Redação dada pela Lei nº 14.599, de 2023)\n § 5º O disposto neste artigo não se aplica aos veículos de uso bélico.\n § 6º Os veículos de duas ou três rodas são dispensados da placa dianteira.\n § 7o Excepcionalmente, mediante autorização específica e fundamentada das respectivas corregedorias e com a devida comunicação aos órgãos de trânsito competentes, os veículos utilizados por membros do Poder Judiciário e do\nMinistério Público que exerçam competência ou atribuição criminal poderão temporariamente ter placas especiais, de forma a impedir a identificação de seus usuários específicos, na forma de regulamento a ser emitido, conjuntamente, pelo Conselho Nacional de Justiça - CNJ, pelo Conselho Nacional do Ministério Público - CNMP e pelo Conselho Nacional de Trânsito - CONTRAN. (Incluído pela Lei nº 12.694, de 2012)\n\f § 8o Os veículos artesanais utilizados para trabalho agrícola (jericos), para efeito do registro de que trata o § 4o-A, ficam dispensados da exigência prevista no art. 106. (Incluído pela Lei nº 13.154, de 2015)\n § 9º As placas que possuírem tecnologia que permita a identificação do veículo ao qual estão atreladas são dispensadas da utilização do lacre previsto no caput, na forma a ser regulamentada pelo Contran. (Incluído pela Lei nº 13.281, de 2016) (Vigência)\n § 10. O Contran estabelecerá os meios técnicos, de uso obrigatório, para garantir a identificação dos veículos que transitarem por rodovias e vias urbanas com cobrança de uso pelo sistema de livre passagem. (Incluído pela Lei nº 14.157, de 2021)"}, {"art": "Art. 116", "key": "116", "texto": "Art. 116. Os veículos de propriedade da União, dos Estados e do Distrito Federal, devidamente registrados e licenciados, ou aqueles sob posse dos órgãos de segurança pública, somente quando estritamente usados em serviço reservado de caráter policial, poderão usar placas particulares, obedecidos os critérios e os limites estabelecidos pela legislação que regula o uso de veículo oficial. (Redação dada pela Lei nº 14.599, de 2023)\n Parágrafo único. As placas a que se refere o caput deste artigo serão concedidas mediante solicitação aos órgãos executivos de trânsito dos Estados e do Distrito Federal e serão vinculadas ao órgão de segurança pública solicitante. (Redação dada pela Lei nº 14.599, de 2023)"}, {"art": "Art. 117", "key": "117", "texto": "Art. 117. Os veículos de transporte de carga e os coletivos de passageiros deverão conter, em local facilmente visível, a inscrição indicativa de sua tara, do peso bruto total (PBT), do peso bruto total combinado (PBTC) ou capacidade máxima de tração (CMT) e de sua lotação, vedado o uso em desacordo com sua classificação.\n CAPÍTULO X\n DOS VEÍCULOS EM CIRCULAÇÃO INTERNACIONAL"}, {"art": "Art. 118", "key": "118", "texto": "Art. 118. A circulação de veículo no território nacional, independentemente de sua origem, em trânsito entre o\nBrasil e os países com os quais exista acordo ou tratado internacional, reger-se-á pelas disposições deste Código, pelas convenções e acordos internacionais ratificados."}, {"art": "Art. 119", "key": "119", "texto": "Art. 119. As repartições aduaneiras e os órgãos de controle de fronteira comunicarão diretamente ao RENAVAM a entrada e saída temporária ou definitiva de veículos.\n § 1º Os veículos licenciados no exterior não poderão sair do território nacional sem o prévio pagamento ou o depósito, judicial ou administrativo, dos valores correspondentes às infrações de trânsito cometidas e ao ressarcimento de danos que tiverem causado ao patrimônio público ou de particulares, independentemente da fase do processo administrativo ou judicial envolvendo a questão. (Incluído pela Lei nº 13.281, de 2016) (Vigência)\n § 2º Os veículos que saírem do território nacional sem o cumprimento do disposto no § 1º e que posteriormente forem flagrados tentando ingressar ou já em circulação no território nacional serão retidos até a regularização da situação. (Incluído pela Lei nº 13. 281, de 2016) (Vigência)\n CAPÍTULO XI\n DO REGISTRO DE VEÍCULOS"}, {"art": "Art. 120", "key": "120", "texto": "Art. 120. Todo veículo automotor, articulado, reboque ou semirreboque, deve ser registrado perante o órgão executivo de trânsito do Estado ou do Distrito Federal, no Município de domicílio ou residência de seu proprietário, na forma da lei. (Redação dada pela Lei nº 14.599, de 2023)\n § 1º Os órgãos executivos de trânsito dos Estados e do Distrito Federal somente registrarão veículos oficiais de propriedade da administração direta, da União, dos Estados, do Distrito Federal e dos Municípios, de qualquer um dos poderes, com indicação expressa, por pintura nas portas, do nome, sigla ou logotipo do órgão ou entidade em cujo nome o veículo será registrado, excetuando-se os veículos de representação e os previstos no art. 116.\n § 2º O disposto neste artigo não se aplica ao veículo de uso bélico."}, {"art": "Art. 121", "key": "121", "texto": "Art. 121. Registrado o veículo, expedir-se-á o Certificado de Registro de Veículo (CRV), em meio físico e/ou digital, à escolha do proprietário, de acordo com os modelos e com as especificações estabelecidos pelo Contran, com as características e as condições de invulnerabilidade à falsificação e à adulteração. (Redação dada pela Lei nº 14.071, de 2020) (Vigência)"}, {"art": "Art. 122", "key": "122", "texto": "Art. 122. Para a expedição do Certificado de Registro de Veículo o órgão executivo de trânsito consultará o cadastro do RENAVAM e exigirá do proprietário os seguintes documentos:\n I - nota fiscal fornecida pelo fabricante ou revendedor, ou documento equivalente expedido por autoridade competente;\n\f II - documento fornecido pelo Ministério das Relações Exteriores, quando se tratar de veículo importado por membro de missões diplomáticas, de repartições consulares de carreira, de representações de organismos internacionais e de seus integrantes."}, {"art": "Art. 123", "key": "123", "texto": "Art. 123. Será obrigatória a expedição de novo Certificado de Registro de Veículo quando:\n I - for transferida a propriedade;\n II - o proprietário mudar o Município de domicílio ou residência;\n III - for alterada qualquer característica do veículo;\n IV - houver mudança de categoria.\n § 1º No caso de transferência de propriedade, o prazo para o proprietário adotar as providências necessárias à efetivação da expedição do novo Certificado de Registro de Veículo é de trinta dias, sendo que nos demais casos as providências deverão ser imediatas.\n § 2º No caso de transferência de domicílio ou residência no mesmo Município, o proprietário comunicará o novo endereço num prazo de trinta dias e aguardará o novo licenciamento para alterar o Certificado de Licenciamento\nAnual.\n § 3º A expedição do novo certificado será comunicada ao órgão executivo de trânsito que expediu o anterior e ao\nRENAVAM.\n § 4º A transferência de propriedade referida no inciso I do caput deste artigo poderá ser realizada integralmente por meio eletrônico pelo órgão máximo executivo de trânsito da União ou pelos órgãos executivos de trânsito dos\nEstados e do Distrito Federal, observadas as seguintes regras: (Incluído pela Lei nº 15.153, de 2025) Vigência\n I - no caso de transferência de propriedade realizada em meio eletrônico, o contrato de compra e venda de veículo deverá conter as assinaturas eletrônicas qualificadas ou avançadas, na forma da Lei nº 14.063, de 23 de setembro de 2020, e das normas regulamentares do Contran; (Incluído pela Lei nº 15.153, de 2025)\n II - o contrato de compra e venda de veículo em meio digital, quando assinado eletronicamente pelo comprador e pelo vendedor do veículo perante o órgão máximo executivo de trânsito da União, terá validade em todo o território nacional e deverá ser obrigatoriamente acatado por todos os órgãos de trânsito dos Estados e do Distrito Federal;\n(Incluído pela Lei nº 15.153, de 2025) Vigência\n III - a assinatura eletrônica avançada do contrato de compra e venda de veículo deverá ser realizada por meio de plataforma de assinatura homologada pelo órgão máximo executivo de trânsito da União ou pelos órgãos executivos de trânsito dos Estados e do Distrito Federal, conforme regulamentação do Contran; (Incluído pela Lei nº 15.153, de 2025)\n Vigência\n IV - (VETADO); (Incluído pela Lei nº 15.153, de 2025) Vigência\n V - a vistoria de transferência da propriedade poderá ser realizada em formato eletrônico a critério do órgão executivo de trânsito dos Estados e do Distrito Federal. (Incluído pela Lei nº 15.153, de 2025) Vigência"}, {"art": "Art. 124", "key": "124", "texto": "Art. 124. Para a expedição do novo Certificado de Registro de Veículo serão exigidos os seguintes documentos:\n I - Certificado de Registro de Veículo anterior;\n II - Certificado de Licenciamento Anual;\n III - comprovante de transferência de propriedade, quando for o caso, conforme modelo e normas estabelecidas pelo CONTRAN;\n IV - Certificado de Segurança Veicular e de emissão de poluentes e ruído, quando houver adaptação ou alteração de características do veículo;\n V - comprovante de procedência e justificativa da propriedade dos componentes e agregados adaptados ou montados no veículo, quando houver alteração das características originais de fábrica;\n VI - autorização do Ministério das Relações Exteriores, no caso de veículo da categoria de missões diplomáticas, de repartições consulares de carreira, de representações de organismos internacionais e de seus integrantes;\n\f VII - certidão negativa de roubo ou furto de veículo, expedida no Município do registro anterior, que poderá ser substituída por informação do RENAVAM;\n VIII - comprovante de quitação de débitos relativos a tributos, encargos e multas de trânsito vinculados ao veículo, independentemente da responsabilidade pelas infrações cometidas; (Vide ADIN 2998)\n IX - (Revogado pela Lei nº 9.602, de 1998)\n X - comprovante relativo ao cumprimento do disposto no art. 98, quando houver alteração nas características originais do veículo que afetem a emissão de poluentes e ruído;\n XI - comprovante de aprovação de inspeção veicular e de poluentes e ruído, quando for o caso, conforme regulamentações do CONTRAN e do CONAMA.\n Parágrafo único. Os veículos cuja transferência de propriedade seja resultado de apreensão ou de confisco por decisão judicial, leilão de veículo recolhido em depósito ou de doação a órgãos ou entidades da administração pública são dispensados do cumprimento do disposto no inciso VIII do caput deste artigo, e os débitos existentes devem ser cobrados do proprietário anterior. (Redação dada pela Lei nº 14.440, de 2022)"}, {"art": "Art. 125", "key": "125", "texto": "Art. 125. As informações sobre o chassi, o monobloco, os agregados e as características originais do veículo deverão ser prestadas ao RENAVAM:\n I - pelo fabricante ou montadora, antes da comercialização, no caso de veículo nacional;\n II - pelo órgão alfandegário, no caso de veículo importado por pessoa física;\n III - pelo importador, no caso de veículo importado por pessoa jurídica.\n Parágrafo único. As informações recebidas pelo RENAVAM serão repassadas ao órgão executivo de trânsito responsável pelo registro, devendo este comunicar ao RENAVAM, tão logo seja o veículo registrado."}, {"art": "Art. 126", "key": "126", "texto": "Art. 126. O proprietário de veículo irrecuperável, ou destinado à desmontagem, deverá requerer a baixa do registro, no prazo e forma estabelecidos pelo Contran, vedada a remontagem do veículo sobre o mesmo chassi de forma a manter o registro anterior. (Redação dada pela Lei nº 12.977, de 2014) (Vigência)\n § 1º. A obrigação de que trata este artigo é da companhia seguradora ou do adquirente do veículo destinado à desmontagem, quando estes sucederem ao proprietário. (Incluído pela Lei nº 14.440, de 2022)\n § 2º A existência de débitos fiscais ou de multas de trânsito e ambientais vinculadas ao veículo não impede a baixa do registro. (Incluído pela Lei nº 14.440, de 2022)"}, {"art": "Art. 127", "key": "127", "texto": "Art. 127. O órgão executivo de trânsito competente só efetuará a baixa do registro após prévia consulta ao cadastro do RENAVAM.\n Parágrafo único. Efetuada a baixa do registro, deverá ser esta comunicada, de imediato, ao RENAVAM."}, {"art": "Art. 128", "key": "128", "texto": "Art. 128. Não será expedido novo Certificado de Registro de Veículo enquanto houver débitos fiscais e de multas de trânsito e ambientais, vinculadas ao veículo, independentemente da responsabilidade pelas infrações cometidas.\n(Vide ADIN 2998)"}, {"art": "Art. 129", "key": "129", "texto": "Art. 129. O registro e o licenciamento dos veículos de propulsão humana e dos veículos de tração animal obedecerão\nà regulamentação estabelecida em legislação municipal do domicílio ou residência de seus proprietários. (Redação dada pela Lei nº 13.154, de 2015)"}, {"art": "Art. 129-A", "key": "129-A", "texto": "Art. 129-A. O registro dos tratores e demais aparelhos automotores destinados a puxar ou a arrastar maquinaria agrícola ou a executar trabalhos agrícolas será efetuado, sem ônus, pelo Ministério da Agricultura e Pecuária, diretamente ou mediante convênio. (Redação dada pela Lei nº 14.599, de 2023)"}, {"art": "Art. 129-B", "key": "129-B", "texto": "Art. 129-B. O registro de contratos de garantias de alienação fiduciária em operações financeiras, consórcio, arrendamento mercantil, reserva de domínio ou penhor será realizado nos órgãos ou entidades executivos de trânsito dos\nEstados e do Distrito Federal, em observância ao disposto no § 1º do art. 1.361 da Lei nº 10.406, de 10 de janeiro de 2002\n(Código Civil) , e na Lei nº 13.709, de 14 de agosto de 2018 (Lei Geral de Proteção de Dados Pessoais) . (Incluído pela Lei nº 14.071, de 2020) (Vigência)\n Parágrafo único. O registro previsto no caput deste artigo será executado por empresas registradoras de contrato especializadas, na modalidade de credenciamento pelos órgãos executivos de trânsito dos Estados e do Distrito\nFederal, observado o disposto no inciso III do parágrafo único do art. 79 da Lei nº 14.133, de 1º de abril de 2021.\n(Incluído dada pela Lei nº 14.599, de 2023)\n Í\n\f CAPÍTULO XII\n DO LICENCIAMENTO"}, {"art": "Art. 130", "key": "130", "texto": "Art. 130. Todo veículo automotor, articulado, reboque ou semirreboque, para transitar na via, deverá ser licenciado anualmente pelo órgão executivo de trânsito do Estado, ou do Distrito Federal, onde estiver registrado o veículo.\n(Redação dada pela Lei nº 14.599, de 2023)\n § 1º O disposto neste artigo não se aplica a veículo de uso bélico.\n § 2º No caso de transferência de residência ou domicílio, é válido, durante o exercício, o licenciamento de origem."}, {"art": "Art. 131", "key": "131", "texto": "Art. 131. O Certificado de Licenciamento Anual será expedido ao veículo licenciado, vinculado ao Certificado de\nRegistro de Veículo, em meio físico e/ou digital, à escolha do proprietário, de acordo com o modelo e com as especificações estabelecidos pelo Contran. (Redação dada pela Lei nº 14.071, de 2020) (Vigência)\n § 1º O primeiro licenciamento será feito simultaneamente ao registro.\n § 2º O veículo somente será considerado licenciado estando quitados os débitos relativos a tributos, encargos e multas de trânsito e ambientais, vinculados ao veículo, independentemente da responsabilidade pelas infrações cometidas. (Vide ADIN 2998)\n § 3º Ao licenciar o veículo, o proprietário deverá comprovar sua aprovação nas inspeções de segurança veicular e de controle de emissões de gases poluentes e de ruído, conforme disposto no art. 104.\n § 4º As informações referentes às campanhas de chamamento de consumidores para substituição ou reparo de veículos realizadas a partir de 1º de outubro de 2019 e não atendidas no prazo de 1 (um) ano, contado da data de sua comunicação, deverão constar do Certificado de Licenciamento Anual. (Redação dada pela Lei nº 14.229, de 2021)\n § 5º Após a inclusão das informações de que trata o § 4º deste artigo no Certificado de Licenciamento Anual, o veículo somente será licenciado mediante comprovação do atendimento às campanhas de chamamento de consumidores para substituição ou reparo de veículos. (Incluído pela Lei nº 14.071, de 2020) (Vigência)\n § 6º O Contran regulamentará a inserção dos dados no Certificado de Licenciamento Anual referentes às campanhas de chamamento de consumidores para substituição ou reparo de veículos realizadas antes da data prevista no § 4º deste artigo. (Incluído pela Lei nº 14.229, de 2021)\n § 7º O Contran, excepcionalmente, poderá prorrogar a exigência do disposto no § 5º deste artigo diante da comprovada falta de peças ou da necessidade de escalonamento para o atendimento ao chamamento dos consumidores, avaliadas as questões de segurança viária. (Incluído dada pela Lei nº 14.599, de 2023)"}, {"art": "Art. 132", "key": "132", "texto": "Art. 132. Os veículos novos não estão sujeitos ao licenciamento e terão sua circulação regulada pelo CONTRAN durante o trajeto entre a fábrica e o Município de destino.\n § 1o O disposto neste artigo aplica-se, igualmente, aos veículos importados, durante o trajeto entre a alfândega ou entreposto alfandegário e o Município de destino. (Renumerado do parágrafo único pela Lei nº 13.103, de 2015)\n(Vigência)\n § 2o (Revogado pela Lei nº 13.154, de 2015)"}, {"art": "Art. 133", "key": "133", "texto": "Art. 133. É obrigatório o porte do Certificado de Licenciamento Anual.\n Parágrafo único. O porte será dispensado quando, no momento da fiscalização, for possível ter acesso ao devido sistema informatizado para verificar se o veículo está licenciado. (Incluído pela Lei nº 13. 281, de 2016) (Vigência)"}, {"art": "Art. 134", "key": "134", "texto": "Art. 134. No caso de transferência de propriedade, expirado o prazo previsto no § 1º do art. 123 deste Código sem que o novo proprietário tenha tomado as providências necessárias à efetivação da expedição do novo Certificado de\nRegistro de Veículo, o antigo proprietário deverá encaminhar ao órgão executivo de trânsito do Estado ou do Distrito\nFederal, no prazo de 60 (sessenta) dias, cópia autenticada do comprovante de transferência de propriedade, devidamente assinado e datado, sob pena de ter que se responsabilizar solidariamente pelas penalidades impostas e suas reincidências até a data da comunicação. (Redação dada pela Lei nº 14.071, de 2020) (Vigência)\n Parágrafo único. O comprovante de transferência de propriedade de que trata o caput deste artigo poderá ser substituído por documento eletrônico com assinatura eletrônica válida, na forma regulamentada pelo Contran. (Redação dada pela Lei nº 14.071, de 2020) (Vigência)"}, {"art": "Art. 134-A", "key": "134-A", "texto": "Art. 134-A. O Contran especificará as bicicletas motorizadas e equiparados não sujeitos ao registro, ao licenciamento e ao emplacamento para circulação nas vias. (Incluído pela Lei nº 14.071, de 2020) (Vigência)"}, {"art": "Art. 135", "key": "135", "texto": "Art. 135. Os veículos de aluguel, destinados ao transporte individual ou coletivo de passageiros de linhas regulares ou empregados em qualquer serviço remunerado, para registro, licenciamento e respectivo emplacamento de característica comercial, deverão estar devidamente autorizados pelo poder público concedente.\n CAPÍTULO XIII\n DA CONDUÇÃO DE ESCOLARES"}, {"art": "Art. 136", "key": "136", "texto": "Art. 136. Os veículos especialmente destinados à condução coletiva de escolares somente poderão circular nas vias com autorização emitida pelo órgão ou entidade executivos de trânsito dos Estados e do Distrito Federal, exigindo-se, para tanto:\n I - registro como veículo de passageiros;\n II - inspeção semestral para verificação dos equipamentos obrigatórios e de segurança;\n III - pintura de faixa horizontal na cor amarela, com quarenta centímetros de largura, à meia altura, em toda a extensão das partes laterais e traseira da carroçaria, com o dístico ESCOLAR, em preto, sendo que, em caso de veículo de carroçaria pintada na cor amarela, as cores aqui indicadas devem ser invertidas;\n IV - equipamento registrador instantâneo inalterável de velocidade e tempo;\n V - lanternas de luz branca, fosca ou amarela dispostas nas extremidades da parte superior dianteira e lanternas de luz vermelha dispostas na extremidade superior da parte traseira;\n VI - cintos de segurança em número igual à lotação;\n VII - outros requisitos e equipamentos obrigatórios estabelecidos pelo CONTRAN."}, {"art": "Art. 137", "key": "137", "texto": "Art. 137. A autorização a que se refere o artigo anterior deverá ser afixada na parte interna do veículo, em local visível, com inscrição da lotação permitida, sendo vedada a condução de escolares em número superior à capacidade estabelecida pelo fabricante."}, {"art": "Art. 138", "key": "138", "texto": "Art. 138. O condutor de veículo destinado à condução de escolares deve satisfazer os seguintes requisitos:\n I - ter idade superior a vinte e um anos;\n II - ser habilitado na categoria D;\n III - (VETADO)\n IV - não ter cometido mais de uma infração gravíssima nos 12 (doze) últimos meses; (Redação dada pela Lei nº 14.071, de 2020) (Vigência)\n V - ser aprovado em curso especializado, nos termos da regulamentação do CONTRAN."}, {"art": "Art. 139", "key": "139", "texto": "Art. 139. O disposto neste Capítulo não exclui a competência municipal de aplicar as exigências previstas em seus regulamentos, para o transporte de escolares.\n CAPÍTULO XIII-A\n DA CONDUÇÃO DE MOTO-FRETE\n (Incluído pela Lei nº 12.009, de 2009)"}, {"art": "Art. 139-A", "key": "139-A", "texto": "Art. 139-A. As motocicletas e motonetas destinadas ao transporte remunerado de mercadorias (moto-frete) somente poderão circular nas vias com: (Redação dada pela Medida Provisória nº 1.360, de 2026)\n I – (Revogado pela Medida Provisória nº 1.360, de 2026)\n II – instalação de protetor de motor mata-cachorro, fixado no chassi do veículo, destinado a proteger o motor e a perna do condutor em caso de tombamento, nos termos de regulamentação do Conselho Nacional de Trânsito –\nContran; (Incluído pela Lei nº 12.009, de 2009)\n III – instalação de aparador de linha antena corta-pipas, nos termos de regulamentação do Contran; (Incluído pela Lei nº 12.009, de 2009)\n IV – (Revogado pela Medida Provisória nº 1.360, de 2026)\n\f § 1o A instalação ou incorporação de dispositivos para transporte de cargas deve estar de acordo com a regulamentação do Contran. (Incluído pela Lei nº 12.009, de 2009)\n § 2o É proibido o transporte de combustíveis, produtos inflamáveis ou tóxicos e de galões nos veículos de que trata este artigo, com exceção do gás de cozinha e de galões contendo água mineral, desde que com o auxílio de side- car, nos termos de regulamentação do Contran. (Incluído pela Lei nº 12.009, de 2009)"}, {"art": "Art. 139-B", "key": "139-B", "texto": "Art. 139-B. O disposto neste Capítulo não exclui a competência municipal ou estadual de aplicar as exigências previstas em seus regulamentos para as atividades de moto-frete no âmbito de suas circunscrições. (Incluído pela\nLei nº 12.009, de 2009)\n CAPÍTULO XIV\n DA HABILITAÇÃO"}, {"art": "Art. 140", "key": "140", "texto": "Art. 140. A habilitação para conduzir veículo automotor será apurada por meio de exames que deverão ser realizados no órgão ou entidade executivos do Estado ou do Distrito Federal, do domicílio ou residência do candidato, ou na sede estadual ou distrital do próprio órgão, e o condutor deverá preencher os seguintes requisitos: (Redação dada pela Lei nº 14.599, de 2023)\n I - ser penalmente imputável;\n II - saber ler e escrever;\n III - possuir Carteira de Identidade ou equivalente.\n Parágrafo único. As informações do candidato à habilitação serão cadastradas no RENACH."}, {"art": "Art. 141", "key": "141", "texto": "Art. 141. O processo de habilitação e as normas relativas à aprendizagem para conduzir veículos automotores e à autorização para conduzir ciclomotores serão regulamentados pelo Contran. (Redação dada pela Lei nº 14.599, de 2023)\n § 1º A autorização para conduzir veículos de propulsão humana e de tração animal ficará a cargo dos Municípios.\n § 2º (VETADO)"}, {"art": "Art. 142", "key": "142", "texto": "Art. 142. O reconhecimento de habilitação obtida em outro país está subordinado às condições estabelecidas em convenções e acordos internacionais e às normas do CONTRAN."}, {"art": "Art. 143", "key": "143", "texto": "Art. 143. Os candidatos poderão habilitar-se nas categorias de A a E, obedecida a seguinte gradação:\n I - Categoria A - condutor de veículo motorizado de duas ou três rodas, com ou sem carro lateral;\n II - Categoria B - condutor de veículo motorizado, não abrangido pela categoria A, cujo peso bruto total não exceda a três mil e quinhentos quilogramas e cuja lotação não exceda a oito lugares, excluído o do motorista;\n III - Categoria C - condutor de veículo abrangido pela categoria B e de veículo motorizado utilizado em transporte de carga cujo peso bruto total exceda a 3.500 kg (três mil e quinhentos quilogramas); (Redação dada pela Lei nº 14.440, de 2022)\n IV - Categoria D - condutor de veículo abrangido pelas categorias B e C e de veículo motorizado utilizado no transporte de passageiros cuja lotação exceda a 8 (oito) lugares, excluído o do motorista; (Redação dada pela Lei nº 14.440, de 2022)\n V - Categoria E - condutor de combinação de veículos em que a unidade tratora se enquadre nas categorias B, C ou D e cuja unidade acoplada, reboque, semirreboque, trailer ou articulada tenha 6.000 kg (seis mil quilogramas) ou mais de peso bruto total, ou cuja lotação exceda a 8 (oito) lugares. (Redação dada pela Lei nº 12.452, de 2011)\n § 1º Para habilitar-se na categoria C, o condutor deverá estar habilitado no mínimo há 1 (um) ano na categoria B e não ter cometido mais de uma infração gravíssima nos últimos 12 (doze) meses. (Redação dada pela Lei nº 14.440, de 2022)\n § 2o São os condutores da categoria B autorizados a conduzir veículo automotor da espécie motor-casa, definida nos termos do Anexo I deste Código, cujo peso não exceda a 6.000 kg (seis mil quilogramas), ou cuja lotação não exceda a 8 (oito) lugares, excluído o do motorista. (Incluído pela Lei nº 12.452, de 2011)\n § 3º Aplica-se o disposto no inciso V ao condutor da combinação de veículos com mais de uma unidade tracionada, independentemente da capacidade de tração ou do peso bruto total. (Renumerado pela Lei nº 12.452,\n\fde 2011)\n § 4º Respeitada a capacidade máxima de tração da unidade tratora, os condutores das categorias B, C e D podem conduzir combinação de veículos cuja unidade tratora se enquadre na respectiva categoria de habilitação e cuja unidade acoplada, reboque, semirreboque, trailer ou articulada tenha menos de 6.000 kg (seis mil quilogramas) de peso bruto total, e cuja lotação não exceda a 8 (oito) lugares. (Incluído pela Lei nº 14.440, de 2022)"}, {"art": "Art. 144", "key": "144", "texto": "Art. 144. O trator de roda, o trator de esteira, o trator misto ou o equipamento automotor destinado à movimentação de cargas ou execução de trabalho agrícola, de terraplenagem, de construção ou de pavimentação só podem ser conduzidos na via pública por condutor habilitado nas categorias C, D ou E.\n Parágrafo único. O trator de roda e os equipamentos automotores destinados a executar trabalhos agrícolas poderão ser conduzidos em via pública também por condutor habilitado na categoria B. (Incluído pela Lei nº 13.097, de 2015)"}, {"art": "Art. 145", "key": "145", "texto": "Art. 145. Para habilitar-se nas categorias D e E ou para conduzir veículo de transporte coletivo de passageiros, de escolares, de emergência ou de produto perigoso, o candidato deverá preencher os seguintes requisitos:\n I - ser maior de vinte e um anos;\n II - estar habilitado:\n a) no mínimo há dois anos na categoria B, ou no mínimo há um ano na categoria C, quando pretender habilitar-se na categoria D; e\n b) no mínimo há um ano na categoria C, quando pretender habilitar-se na categoria E;\n III - não ter cometido mais de uma infração gravíssima nos últimos 12 (doze) meses; (Redação dada pela Lei nº 14.071, de 2020) (Vigência)\n IV - ser aprovado e
