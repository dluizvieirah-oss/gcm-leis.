exto": "Art. 17. O direito ao respeito consiste na inviolabilidade da integridade física, psíquica e moral da criança e do adolescente, abrangendo a preservação da imagem, da identidade, da autonomia, dos valores, idéias e crenças, dos espaços e objetos pessoais."}, {"art": "Art. 18", "key": "18", "texto": "Art. 18. É dever de todos velar pela dignidade da criança e do adolescente, pondo-os a salvo de qualquer tratamento desumano, violento, aterrorizante, vexatório ou constrangedor."}, {"art": "Art. 18-A", "key": "18-A", "texto": "Art. 18-A. A criança e o adolescente têm o direito de ser educados e cuidados sem o uso de castigo físico ou de tratamento cruel ou degradante, como formas de correção, disciplina, educação ou qualquer outro pretexto, pelos pais, pelos integrantes da família ampliada, pelos responsáveis, pelos agentes públicos executores de medidas socioeducativas ou por qualquer pessoa encarregada de cuidar deles, tratá-los, educá-los ou protegê-los. (Incluído pela\nLei nº 13.010, de 2014)\n Parágrafo único. Para os fins desta Lei, considera-se: (Incluído pela Lei nº 13.010, de 2014)\n I - castigo físico: ação de natureza disciplinar ou punitiva aplicada com o uso da força física sobre a criança ou o adolescente que resulte em: (Incluído pela Lei nº 13.010, de 2014)\n a) sofrimento físico; ou (Incluído pela Lei nº 13.010, de 2014)\n b) lesão; (Incluído pela Lei nº 13.010, de 2014)\n II - tratamento cruel ou degradante: conduta ou forma cruel de tratamento em relação à criança ou ao adolescente que: (Incluído pela Lei nº 13.010, de 2014)\n a) humilhe; ou (Incluído pela Lei nº 13.010, de 2014)\n\f b) ameace gravemente; ou (Incluído pela Lei nº 13.010, de 2014)\n c) ridicularize. (Incluído pela Lei nº 13.010, de 2014)"}, {"art": "Art. 18-B", "key": "18-B", "texto": "Art. 18-B. Os pais, os integrantes da família ampliada, os responsáveis, os agentes públicos executores de medidas socioeducativas ou qualquer pessoa encarregada de cuidar de crianças e de adolescentes, tratá-los, educá-los ou protegê-los que utilizarem castigo físico ou tratamento cruel ou degradante como formas de correção, disciplina, educação ou qualquer outro pretexto estarão sujeitos, sem prejuízo de outras sanções cabíveis, às seguintes medidas, que serão aplicadas de acordo com a gravidade do caso: (Incluído pela Lei nº 13.010, de 2014)\n I - encaminhamento a programa oficial ou comunitário de proteção à família; (Incluído pela Lei nº 13.010, de 2014)\n II - encaminhamento a tratamento psicológico ou psiquiátrico; (Incluído pela Lei nº 13.010, de 2014)\n III - encaminhamento a cursos ou programas de orientação; (Incluído pela Lei nº 13.010, de 2014)\n IV - obrigação de encaminhar a criança a tratamento especializado; (Incluído pela Lei nº 13.010, de 2014)\n V - advertência. (Incluído pela Lei nº 13.010, de 2014)\n VI - garantia de tratamento de saúde especializado à vítima. (Incluído pela Lei nº 14.344, de 2022) Vigência\n Parágrafo único. As medidas previstas neste artigo serão aplicadas pelo Conselho Tutelar, sem prejuízo de outras providências legais. (Incluído pela Lei nº 13.010, de 2014)\n Capítulo III\n Do Direito à Convivência Familiar e Comunitária\n Seção I\n Disposições Gerais"}, {"art": "Art. 19", "key": "19", "texto": "Art. 19. É direito da criança e do adolescente ser criado e educado no seio de sua família e, excepcionalmente, em família substituta, assegurada a convivência familiar e comunitária, em ambiente que garanta seu desenvolvimento integral. (Redação dada pela Lei nº 13.257, de 2016)\n § 1 o Toda criança ou adolescente que estiver inserido em programa de acolhimento familiar ou institucional terá sua situação reavaliada, no máximo, a cada 6 (seis) meses, devendo a autoridade judiciária competente, com base em relatório elaborado por equipe interprofissional ou multidisciplinar, decidir de forma fundamentada pela possibilidade de reintegração familiar ou colocação em família substituta, em quaisquer das modalidades previstas no art. 28 desta Lei.\n(Incluído pela Lei nº 12.010, de 2009) Vigência\n § 1 o Toda criança ou adolescente que estiver inserido em programa de acolhimento familiar ou institucional terá sua situação reavaliada, no máximo, a cada 3 (três) meses, devendo a autoridade judiciária competente, com base em relatório elaborado por equipe interprofissional ou multidisciplinar, decidir de forma fundamentada pela possibilidade de reintegração familiar ou pela colocação em família substituta, em quaisquer das modalidades previstas no art. 28 desta\nLei. (Redação dada pela Lei nº 13.509, de 2017)\n § 2 o A permanência da criança e do adolescente em programa de acolhimento institucional não se prolongará por mais de 2 (dois) anos, salvo comprovada necessidade que atenda ao seu superior interesse, devidamente fundamentada pela autoridade judiciária. (Incluído pela Lei nº 12.010, de 2009) Vigência\n § 2 o A permanência da criança e do adolescente em programa de acolhimento institucional não se prolongará por mais de 18 (dezoito meses), salvo comprovada necessidade que atenda ao seu superior interesse, devidamente fundamentada pela autoridade judiciária. (Redação dada pela Lei nº 13.509, de 2017)\n § 3 o A manutenção ou reintegração de criança ou adolescente à sua família terá preferência em relação a qualquer outra providência, caso em que será esta incluída em programas de orientação e auxílio, nos termos do parágrafo único do art. 23, dos incisos I e IV do caput do art. 101 e dos incisos I a IV do caput do art. 129 desta Lei. (Incluído pela Lei nº 12.010, de 2009) Vigência\n § 3 o A manutenção ou a reintegração de criança ou adolescente à sua família terá preferência em relação a qualquer outra providência, caso em que será esta incluída em serviços e programas de proteção, apoio e promoção, nos\n\ftermos do § 1 o do art. 23, dos incisos I e IV do caput do art. 101 e dos incisos I a IV do caput do art. 129 desta Lei.\n(Redação dada pela Lei nº 13.257, de 2016)\n § 4 o Será garantida a convivência da criança e do adolescente com a mãe ou o pai privado de liberdade, por meio de visitas periódicas promovidas pelo responsável ou, nas hipóteses de acolhimento institucional, pela entidade responsável, independentemente de autorização judicial. (Incluído pela Lei nº 12.962, de 2014)\n § 5 o Será garantida a convivência integral da criança com a mãe adolescente que estiver em acolhimento institucional. (Incluído pela Lei nº 13.509, de 2017)\n § 6 o A mãe adolescente será assistida por equipe especializada multidisciplinar. (Incluído pela Lei nº 13.509, de 2017)"}, {"art": "Art. 19-A", "key": "19-A", "texto": "Art. 19-A. A gestante ou mãe que manifeste interesse em entregar seu filho para adoção, antes ou logo após o nascimento, será encaminhada à Justiça da Infância e da Juventude. (Incluído pela Lei nº 13.509, de 2017)\n § 1 o A gestante ou mãe será ouvida pela equipe interprofissional da Justiça da Infância e da Juventude, que apresentará relatório à autoridade judiciária, considerando inclusive os eventuais efeitos do estado gestacional e puerperal. (Incluído pela Lei nº 13.509, de 2017)\n § 2 o De posse do relatório, a autoridade judiciária poderá determinar o encaminhamento da gestante ou mãe, mediante sua expressa concordância, à rede pública de saúde e assistência social para atendimento especializado.\n(Incluído pela Lei nº 13.509, de 2017)\n § 3 o A busca à família extensa, conforme definida nos termos do parágrafo único do art. 25 desta Lei, respeitará o prazo máximo de 90 (noventa) dias, prorrogável por igual período. (Incluído pela Lei nº 13.509, de 2017)\n § 4 o Na hipótese de não haver a indicação do genitor e de não existir outro representante da família extensa apto a receber a guarda, a autoridade judiciária competente deverá decretar a extinção do poder familiar e determinar a colocação da criança sob a guarda provisória de quem estiver habilitado a adotá-la ou de entidade que desenvolva programa de acolhimento familiar ou institucional. (Incluído pela Lei nº 13.509, de 2017)\n § 5 o Após o nascimento da criança, a vontade da mãe ou de ambos os genitores, se houver pai registral ou pai indicado, deve ser manifestada na audiência a que se refere o § 1 o do art. 166 desta Lei, garantido o sigilo sobre a entrega. (Incluído pela Lei nº 13.509, de 2017)\n § 6 o (VETADO). (Incluído pela Lei nº 13.509, de 2017)\n § 6º Na hipótese de não comparecerem à audiência nem o genitor nem representante da família extensa para confirmar a intenção de exercer o poder familiar ou a guarda, a autoridade judiciária suspenderá o poder familiar da mãe, e a criança será colocada sob a guarda provisória de quem esteja habilitado a adotá-la. (Incluído pela Lei nº 13.509, de 2017)\n § 7 o Os detentores da guarda possuem o prazo de 15 (quinze) dias para propor a ação de adoção, contado do dia seguinte à data do término do estágio de convivência. (Incluído pela Lei nº 13.509, de 2017)\n § 8 o Na hipótese de desistência pelos genitores - manifestada em audiência ou perante a equipe interprofissional - da entrega da criança após o nascimento, a criança será mantida com os genitores, e será determinado pela Justiça da\nInfância e da Juventude o acompanhamento familiar pelo prazo de 180 (cento e oitenta) dias. (Incluído pela Lei nº 13.509, de 2017)\n § 9 o É garantido à mãe o direito ao sigilo sobre o nascimento, respeitado o disposto no art. 48 desta Lei. (Incluído pela Lei nº 13.509, de 2017)\n § 10. (VETADO). (Incluído pela Lei nº 13.509, de 2017)\n § 10. Serão cadastrados para adoção recém-nascidos e crianças acolhidas não procuradas por suas famílias no prazo de 30 (trinta) dias, contado a partir do dia do acolhimento. (Incluído pela Lei nº 13.509, de 2017)"}, {"art": "Art. 19-B", "key": "19-B", "texto": "Art. 19-B. A criança e o adolescente em programa de acolhimento institucional ou familiar poderão participar de programa de apadrinhamento. (Incluído pela Lei nº 13.509, de 2017)\n § 1 o O apadrinhamento consiste em estabelecer e proporcionar à criança e ao adolescente vínculos externos à instituição para fins de convivência familiar e comunitária e colaboração com o seu desenvolvimento nos aspectos social, moral, físico, cognitivo, educacional e financeiro. (Incluído pela Lei nº 13.509, de 2017)\n § 2 o (VETADO). (Incluído pela Lei nº 13.509, de 2017)\n\f § 2º Podem ser padrinhos ou madrinhas pessoas maiores de 18 (dezoito) anos não inscritas nos cadastros de adoção, desde que cumpram os requisitos exigidos pelo programa de apadrinhamento de que fazem parte. (Incluído pela\nLei nº 13.509, de 2017)\n § 3 o Pessoas jurídicas podem apadrinhar criança ou adolescente a fim de colaborar para o seu desenvolvimento.\n(Incluído pela Lei nº 13.509, de 2017)\n § 4 o O perfil da criança ou do adolescente a ser apadrinhado será definido no âmbito de cada programa de apadrinhamento, com prioridade para crianças ou adolescentes com remota possibilidade de reinserção familiar ou colocação em família adotiva. (Incluído pela Lei nº 13.509, de 2017)\n § 5 o Os programas ou serviços de apadrinhamento apoiados pela Justiça da Infância e da Juventude poderão ser executados por órgãos públicos ou por organizações da sociedade civil. (Incluído pela Lei nº 13.509, de 2017)\n § 6 o Se ocorrer violação das regras de apadrinhamento, os responsáveis pelo programa e pelos serviços de acolhimento deverão imediatamente notificar a autoridade judiciária competente. (Incluído pela Lei nº 13.509, de 2017)"}, {"art": "Art. 20", "key": "20", "texto": "Art. 20. Os filhos, havidos ou não da relação do casamento, ou por adoção, terão os mesmos direitos e qualificações, proibidas quaisquer designações discriminatórias relativas à filiação."}, {"art": "Art. 21", "key": "21", "texto": "Art. 21. O pátrio poder poder familiar será exercido, em igualdade de condições, pelo pai e pela mãe, na forma do que dispuser a legislação civil, assegurado a qualquer deles o direito de, em caso de discordância, recorrer à autoridade judiciária competente para a solução da divergência. (Expressão substituída pela Lei nº 12.010, de 2009) Vigência"}, {"art": "Art. 22", "key": "22", "texto": "Art. 22. Aos pais incumbe o dever de sustento, guarda, convivência, assistência material e afetiva e educação dos filhos menores, cabendo-lhes ainda, no interesse destes, a obrigação de cumprir e fazer cumprir as determinações judiciais.: (Redação dada pela Lei nº 15.240, de 2025)\n Parágrafo único. A mãe e o pai, ou os responsáveis, têm direitos iguais e deveres e responsabilidades compartilhados no cuidado e na educação da criança, devendo ser resguardado o direito de transmissão familiar de suas crenças e culturas, assegurados os direitos da criança estabelecidos nesta Lei. (Incluído pela Lei nº 13.257, de 2016)"}, {"art": "Art. 23", "key": "23", "texto": "Art. 23. A falta ou a carência de recursos materiais não constitui motivo suficiente para a perda ou a suspensão do pátrio poder poder familiar . (Expressão substituída pela Lei nº 12.010, de 2009) Vigência\n Parágrafo único. Não existindo outro motivo que por si só autorize a decretação da medida, a criança ou o adolescente será mantido em sua família de origem, a qual deverá obrigatoriamente ser incluída em programas oficiais de auxílio.\n § 1 o Não existindo outro motivo que por si só autorize a decretação da medida, a criança ou o adolescente será mantido em sua família de origem, a qual deverá obrigatoriamente ser incluída em programas oficiais de auxílio. (Incluído pela Lei nº 12.962, de 2014\n § 1 o Não existindo outro motivo que por si só autorize a decretação da medida, a criança ou o adolescente será mantido em sua família de origem, a qual deverá obrigatoriamente ser incluída em serviços e programas oficiais de proteção, apoio e promoção. (Redação dada pela Lei nº 13.257, de 2016)\n § 2 o A condenação criminal do pai ou da mãe não implicará a destituição do poder familiar, exceto na hipótese de condenação por crime doloso, sujeito à pena de reclusão, contra o próprio filho ou filha. (Incluído pela Lei nº 12.962, de 2014)\n § 2º A condenação criminal do pai ou da mãe não implicará a destituição do poder familiar, exceto na hipótese de condenação por crime doloso sujeito à pena de reclusão contra outrem igualmente titular do mesmo poder familiar ou contra filho, filha ou outro descendente. (Redação dada pela Lei nº 13.715, de 2018)"}, {"art": "Art. 24", "key": "24", "texto": "Art. 24. A perda e a suspensão do pátrio poder poder familiar serão decretadas judicialmente, em procedimento contraditório, nos casos previstos na legislação civil, bem como na hipótese de descumprimento injustificado dos deveres e obrigações a que alude o art. 22. (Expressão substituída pela Lei nº 12.010, de 2009) Vigência\n Seção II\n Da Família Natural"}, {"art": "Art. 25", "key": "25", "texto": "Art. 25. Entende-se por família natural a comunidade formada pelos pais ou qualquer deles e seus descendentes.\n\f Parágrafo único. Entende-se por família extensa ou ampliada aquela que se estende para além da unidade pais e filhos ou da unidade do casal, formada por parentes próximos com os quais a criança ou adolescente convive e mantém vínculos de afinidade e afetividade. (Incluído pela Lei nº 12.010, de 2009) Vigência"}, {"art": "Art. 26", "key": "26", "texto": "Art. 26. Os filhos havidos fora do casamento poderão ser reconhecidos pelos pais, conjunta ou separadamente, no próprio termo de nascimento, por testamento, mediante escritura ou outro documento público, qualquer que seja a origem da filiação.\n Parágrafo único. O reconhecimento pode preceder o nascimento do filho ou suceder-lhe ao falecimento, se deixar descendentes."}, {"art": "Art. 27", "key": "27", "texto": "Art. 27. O reconhecimento do estado de filiação é direito personalíssimo, indisponível e imprescritível, podendo ser exercitado contra os pais ou seus herdeiros, sem qualquer restrição, observado o segredo de Justiça.\n Seção III\n Da Família Substituta\n Subseção I\n Disposições Gerais"}, {"art": "Art. 28", "key": "28", "texto": "Art. 28. A colocação em família substituta far-se-á mediante guarda, tutela ou adoção, independentemente da situação jurídica da criança ou adolescente, nos termos desta Lei.\n § 1º Sempre que possível, a criança ou adolescente deverá ser previamente ouvido e a sua opinião devidamente considerada.\n § 1 o Sempre que possível, a criança ou o adolescente será previamente ouvido por equipe interprofissional, respeitado seu estágio de desenvolvimento e grau de compreensão sobre as implicações da medida, e terá sua opinião devidamente considerada. (Redação dada pela Lei nº 12.010, de 2009) Vigência\n § 2º Na apreciação do pedido levar-se-á em conta o grau de parentesco e a relação de afinidade ou de afetividade, a fim de evitar ou minorar as conseqüências decorrentes da medida.\n § 2 o Tratando-se de maior de 12 (doze) anos de idade, será necessário seu consentimento, colhido em audiência.\n(Redação dada pela Lei nº 12.010, de 2009) Vigência\n § 3 o Na apreciação do pedido levar-se-á em conta o grau de parentesco e a relação de afinidade ou de afetividade, a fim de evitar ou minorar as consequências decorrentes da medida. (Incluído pela Lei nº 12.010, de 2009) Vigência\n § 4 o Os grupos de irmãos serão colocados sob adoção, tutela ou guarda da mesma família substituta, ressalvada a comprovada existência de risco de abuso ou outra situação que justifique plenamente a excepcionalidade de solução diversa, procurando-se, em qualquer caso, evitar o rompimento definitivo dos vínculos fraternais. (Incluído pela Lei nº 12.010, de 2009) Vigência\n § 5 o A colocação da criança ou adolescente em família substituta será precedida de sua preparação gradativa e acompanhamento posterior, realizados pela equipe interprofissional a serviço da Justiça da Infância e da Juventude, preferencialmente com o apoio dos técnicos responsáveis pela execução da política municipal de garantia do direito à convivência familiar. (Incluído pela Lei nº 12.010, de 2009) Vigência\n § 6 o Em se tratando de criança ou adolescente indígena ou proveniente de comunidade remanescente de quilombo, é ainda obrigatório: (Incluído pela Lei nº 12.010, de 2009) Vigência\n I - que sejam consideradas e respeitadas sua identidade social e cultural, os seus costumes e tradições, bem como suas instituições, desde que não sejam incompatíveis com os direitos fundamentais reconhecidos por esta Lei e pela\nConstituição Federal; (Incluído pela Lei nº 12.010, de 2009) Vigência\n II - que a colocação familiar ocorra prioritariamente no seio de sua comunidade ou junto a membros da mesma etnia; (Incluído pela Lei nº 12.010, de 2009) Vigência\n III - a intervenção e oitiva de representantes do órgão federal responsável pela política indigenista, no caso de crianças e adolescentes indígenas, e de antropólogos, perante a equipe interprofissional ou multidisciplinar que irá acompanhar o caso. (Incluído pela Lei nº 12.010, de 2009) Vigência"}, {"art": "Art. 29", "key": "29", "texto": "Art. 29. Não se deferirá colocação em família substituta a pessoa que revele, por qualquer modo, incompatibilidade com a natureza da medida ou não ofereça ambiente familiar adequado."}, {"art": "Art. 30", "key": "30", "texto": "Art. 30. A colocação em família substituta não admitirá transferência da criança ou adolescente a terceiros ou a entidades governamentais ou não-governamentais, sem autorização judicial."}, {"art": "Art. 31", "key": "31", "texto": "Art. 31. A colocação em família substituta estrangeira constitui medida excepcional, somente admissível na modalidade de adoção."}, {"art": "Art. 32", "key": "32", "texto": "Art. 32. Ao assumir a guarda ou a tutela, o responsável prestará compromisso de bem e fielmente desempenhar o encargo, mediante termo nos autos.\n Subseção II\n Da Guarda"}, {"art": "Art. 33", "key": "33", "texto": "Art. 33. A guarda obriga a prestação de assistência material, moral e educacional à criança ou adolescente, conferindo a seu detentor o direito de opor-se a terceiros, inclusive aos pais. (Vide Lei nº 12.010, de 2009) Vigência\n § 1º A guarda destina-se a regularizar a posse de fato, podendo ser deferida, liminar ou incidentalmente, nos procedimentos de tutela e adoção, exceto no de adoção por estrangeiros.\n § 2º Excepcionalmente, deferir-se-á a guarda, fora dos casos de tutela e adoção, para atender a situações peculiares ou suprir a falta eventual dos pais ou responsável, podendo ser deferido o direito de representação para a prática de atos determinados.\n § 3º A guarda confere à criança ou adolescente a condição de dependente, para todos os fins e efeitos de direito, inclusive previdenciários.\n § 4 o Salvo expressa e fundamentada determinação em contrário, da autoridade judiciária competente, ou quando a medida for aplicada em preparação para adoção, o deferimento da guarda de criança ou adolescente a terceiros não impede o exercício do direito de visitas pelos pais, assim como o dever de prestar alimentos, que serão objeto de regulamentação específica, a pedido do interessado ou do Ministério Público. (Incluído pela Lei nº 12.010, de 2009)\nVigência"}, {"art": "Art. 34", "key": "34", "texto": "Art. 34. O poder público estimulará, por meio de assistência jurídica, incentivos fiscais e subsídios, o acolhimento, sob a forma de guarda, de criança ou adolescente afastado do convívio familiar. (Redação dada pela Lei nº 12.010, de 2009) Vigência\n § 1 o A inclusão da criança ou adolescente em programas de acolhimento familiar terá preferência a seu acolhimento institucional, observado, em qualquer caso, o caráter temporário e excepcional da medida, nos termos desta\nLei. (Incluído pela Lei nº 12.010, de 2009)\n § 2 o Na hipótese do § 1 o deste artigo a pessoa ou casal cadastrado no programa de acolhimento familiar poderá receber a criança ou adolescente mediante guarda, observado o disposto nos arts. 28 a 33 desta Lei. (Incluído pela Lei nº 12.010, de 2009) Vigência\n § 3 o A União apoiará a implementação de serviços de acolhimento em família acolhedora como política pública, os quais deverão dispor de equipe que organize o acolhimento temporário de crianças e de adolescentes em residências de famílias selecionadas, capacitadas e acompanhadas que não estejam no cadastro de adoção. (Incluído pela Lei nº 13.257, de 2016)\n § 4 o Poderão ser utilizados recursos federais, estaduais, distritais e municipais para a manutenção dos serviços de acolhimento em família acolhedora, facultando-se o repasse de recursos para a própria família acolhedora. (Incluído pela\nLei nº 13.257, de 2016)"}, {"art": "Art. 35", "key": "35", "texto": "Art. 35. A guarda poderá ser revogada a qualquer tempo, mediante ato judicial fundamentado, ouvido o Ministério\nPúblico.\n Subseção III\n Da Tutela"}, {"art": "Art. 36", "key": "36", "texto": "Art. 36. A tutela será deferida, nos termos da lei civil, a pessoa de até 18 (dezoito) anos incompletos. (Redação dada pela Lei nº 12.010, de 2009) Vigência\n\f Parágrafo único. O deferimento da tutela pressupõe a prévia decretação da perda ou suspensão do pátrio poder poder familiar e implica necessariamente o dever de guarda. (Expressão substituída pela Lei nº 12.010, de 2009) Vigência"}, {"art": "Art. 37", "key": "37", "texto": "Art. 37. O tutor nomeado por testamento ou qualquer documento autêntico, conforme previsto no parágrafo único do art. 1.729 da Lei n o 10.406, de 10 de janeiro de 2002 - Código Civil , deverá, no prazo de 30 (trinta) dias após a abertura da sucessão, ingressar com pedido destinado ao controle judicial do ato, observando o procedimento previsto nos arts. 165 a 170 desta Lei. (Redação dada pela Lei nº 12.010, de 2009) Vigência\n Parágrafo único. Na apreciação do pedido, serão observados os requisitos previstos nos arts. 28 e 29 desta Lei, somente sendo deferida a tutela à pessoa indicada na disposição de última vontade, se restar comprovado que a medida é vantajosa ao tutelando e que não existe outra pessoa em melhores condições de assumi-la. (Redação dada pela Lei nº 12.010, de 2009) Vigência"}, {"art": "Art. 38", "key": "38", "texto": "Art. 38. Aplica-se à destituição da tutela o disposto no art. 24.\n Subseção IV\n Da Adoção"}, {"art": "Art. 39", "key": "39", "texto": "Art. 39. A adoção de criança e de adolescente reger-se-á segundo o disposto nesta Lei.\n Parágrafo único. É vedada a adoção por procuração.\n § 1 o A adoção é medida excepcional e irrevogável, à qual se deve recorrer apenas quando esgotados os recursos de manutenção da criança ou adolescente na família natural ou extensa, na forma do parágrafo único do art. 25 desta Lei.\n(Incluído pela Lei nº 12.010, de 2009) Vigência\n § 2 o É vedada a adoção por procuração. (Incluído pela Lei nº 12.010, de 2009) Vigência\n § 3 o Em caso de conflito entre direitos e interesses do adotando e de outras pessoas, inclusive seus pais biológicos, devem prevalecer os direitos e os interesses do adotando. (Incluído pela Lei nº 13.509, de 2017)"}, {"art": "Art. 40", "key": "40", "texto": "Art. 40. O adotando deve contar com, no máximo, dezoito anos à data do pedido, salvo se já estiver sob a guarda ou tutela dos adotantes."}, {"art": "Art. 41", "key": "41", "texto": "Art. 41. A adoção atribui a condição de filho ao adotado, com os mesmos direitos e deveres, inclusive sucessórios, desligando-o de qualquer vínculo com pais e parentes, salvo os impedimentos matrimoniais.\n § 1º Se um dos cônjuges ou concubinos adota o filho do outro, mantêm-se os vínculos de filiação entre o adotado e o cônjuge ou concubino do adotante e os respectivos parentes.\n § 2º É recíproco o direito sucessório entre o adotado, seus descendentes, o adotante, seus ascendentes, descendentes e colaterais até o 4º grau, observada a ordem de vocação hereditária."}, {"art": "Art. 42", "key": "42", "texto": "Art. 42. Podem adotar os maiores de 18 (dezoito) anos, independentemente do estado civil. (Redação dada pela\nLei nº 12.010, de 2009) Vigência\n § 1º Não podem adotar os ascendentes e os irmãos do adotando.\n § 2º A adoção por ambos os cônjuges ou concubinos poderá ser formalizada, desde que um deles tenha completado vinte e um anos de idade, comprovada a estabilidade da família.\n § 2 o Para adoção conjunta, é indispensável que os adotantes sejam casados civilmente ou mantenham união estável, comprovada a estabilidade da família. (Redação dada pela Lei nº 12.010, de 2009) Vigência\n § 3º O adotante há de ser, pelo menos, dezesseis anos mais velho do que o adotando.\n § 4º Os divorciados e os judicialmente separados poderão adotar conjuntamente, contanto que acordem sobre a guarda e o regime de visitas, e desde que o estágio de convivência tenha sido iniciado na constância da sociedade\n\fconjugal.\n § 4 o Os divorciados, os judicialmente separados e os ex-companheiros podem adotar conjuntamente, contanto que acordem sobre a guarda e o regime de visitas e desde que o estágio de convivência tenha sido iniciado na constância do período de convivência e que seja comprovada a existência de vínculos de afinidade e afetividade com aquele não detentor da guarda, que justifiquem a excepcionalidade da concessão. (Redação dada pela Lei nº 12.010, de 2009)\nVigência\n § 5º A adoção poderá ser deferida ao adotante que, após inequívoca manifestação de vontade, vier a falecer no curso do procedimento, antes de prolatada a sentença.\n § 5 o Nos casos do § 4 o deste artigo, desde que demonstrado efetivo benefício ao adotando, será assegurada a guarda compartilhada, conforme previsto no art. 1.584 da Lei n o 10.406, de 10 de janeiro de 2002 - Código Civil .\n(Redação dada pela Lei nº 12.010, de 2009) Vigência\n § 6 o A adoção poderá ser deferida ao adotante que, após inequívoca manifestação de vontade, vier a falecer no curso do procedimento, antes de prolatada a sentença. (Incluído pela Lei nº 12.010, de 2009) Vigência"}, {"art": "Art. 43", "key": "43", "texto": "Art. 43. A adoção será deferida quando apresentar reais vantagens para o adotando e fundar-se em motivos legítimos."}, {"art": "Art. 44", "key": "44", "texto": "Art. 44. Enquanto não der conta de sua administração e saldar o seu alcance, não pode o tutor ou o curador adotar o pupilo ou o curatelado."}, {"art": "Art. 45", "key": "45", "texto": "Art. 45. A adoção depende do consentimento dos pais ou do representante legal do adotando.\n § 1º. O consentimento será dispensado em relação à criança ou adolescente cujos pais sejam desconhecidos ou tenham sido destituídos do pátrio poder poder familiar . (Expressão substituída pela Lei nº 12.010, de 2009) Vigência\n § 2º. Em se tratando de adotando maior de doze anos de idade, será também necessário o seu consentimento."}, {"art": "Art. 46", "key": "46", "texto": "Art. 46. A adoção será precedida de estágio de convivência com a criança ou adolescente, pelo prazo máximo de 90 (noventa) dias, observadas a idade da criança ou adolescente e as peculiaridades do caso. (Redação dada pela Lei nº 13.509, de 2017)\n § 1º O estágio de convivência poderá ser dispensado se o adotando não tiver mais de um ano de idade ou se, qualquer que seja a sua idade, já estiver na companhia do adotante durante tempo suficiente para se poder avaliar a conveniência da constituição do vínculo.\n § 1 o O estágio de convivência poderá ser dispensado se o adotando já estiver sob a tutela ou guarda legal do adotante durante tempo suficiente para que seja possível avaliar a conveniência da constituição do vínculo. (Redação dada pela Lei nº 12.010, de 2009) Vigência\n § 2º Em caso de adoção por estrangeiro residente ou domiciliado fora do País, o estágio de convivência, cumprido no território nacional, será de no mínimo quinze dias para crianças de até dois anos de idade, e de no mínimo trinta dias quando se tratar de adotando acima de dois anos de idade.\n § 2 o A simples guarda de fato não autoriza, por si só, a dispensa da realização do estágio de convivência.\n(Redação dada pela Lei nº 12.010, de 2009) Vigência\n § 2 o -A. O prazo máximo estabelecido no caput deste artigo pode ser prorrogado por até igual período, mediante decisão fundamentada da autoridade judiciária. (Incluído pela Lei nº 13.509, de 2017)\n § 3 o Em caso de adoção por pessoa ou casal residente ou domiciliado fora do País, o estágio de convivência, cumprido no território nacional, será de, no mínimo, 30 (trinta) dias (Incluído pela Lei nº 12.010, de 2009) Vigência\n § 3 o Em caso de adoção por pessoa ou casal residente ou domiciliado fora do País, o estágio de convivência será de, no mínimo, 30 (trinta) dias e, no máximo, 45 (quarenta e cinco) dias, prorrogável por até igual período, uma única vez, mediante decisão fundamentada da autoridade judiciária. (Redação dada pela Lei nº 13.509, de 2017)\n § 3 o -A. Ao final do prazo previsto no § 3 o deste artigo, deverá ser apresentado laudo fundamentado pela equipe mencionada no § 4 o deste artigo, que recomendará ou não o deferimento da adoção à autoridade judiciária. (Incluído pela Lei nº 13.509, de 2017)\n\f § 4 o O estágio de convivência será acompanhado pela equipe interprofissional a serviço da Justiça da Infância e da Juventude, preferencialmente com apoio dos técnicos responsáveis pela execução da política de garantia do direito à convivência familiar, que apresentarão relatório minucioso acerca da conveniência do deferimento da medida. (Incluído pela Lei nº 12.010, de 2009) Vigência\n § 5 o O estágio de convivência será cumprido no território nacional, preferencialmente na comarca de residência da criança ou adolescente, ou, a critério do juiz, em cidade limítrofe, respeitada, em qualquer hipótese, a competência do juízo da comarca de residência da criança. (Incluído pela Lei nº 13.509, de 2017)"}, {"art": "Art. 47", "key": "47", "texto": "Art. 47. O vínculo da adoção constitui-se por sentença judicial, que será inscrita no registro civil mediante mandado do qual não se fornecerá certidão.\n § 1º A inscrição consignará o nome dos adotantes como pais, bem como o nome de seus ascendentes.\n § 2º O mandado judicial, que será arquivado, cancelará o registro original do adotado.\n § 3º Nenhuma observação sobre a origem do ato poderá constar nas certidões do registro.\n § 3 o A pedido do adotante, o novo registro poderá ser lavrado no Cartório do Registro Civil do Município de sua residência. (Redação dada pela Lei nº 12.010, de 2009) Vigência\n § 4º A critério da autoridade judiciária, poderá ser fornecida certidão para a salvaguarda de direitos.\n § 4 o Nenhuma observação sobre a origem do ato poderá constar nas certidões do registro. (Redação dada pela Lei nº 12.010, de 2009) Vigência\n § 5º A sentença conferirá ao adotado o nome do adotante e, a pedido deste, poderá determinar a modificação do prenome.\n § 5 o A sentença conferirá ao adotado o nome do adotante e, a pedido de qualquer deles, poderá determinar a modificação do prenome. (Redação dada pela Lei nº 12.010, de 2009) Vigência\n § 6º A adoção produz seus efeitos a partir do trânsito em julgado da sentença, exceto na hipótese prevista no art. 42, § 5º, caso em que terá força retroativa à data do óbito.\n § 6 o Caso a modificação de prenome seja requerida pelo adotante, é obrigatória a oitiva do adotando, observado o disposto nos §§ 1 o e 2 o do art. 28 desta Lei. (Redação dada pela Lei nº 12.010, de 2009) Vigência\n § 7 o A adoção produz seus efeitos a partir do trânsito em julgado da sentença constitutiva, exceto na hipótese prevista no § 6 o do art. 42 desta Lei, caso em que terá força retroativa à data do óbito. (Incluído pela Lei nº 12.010, de 2009) Vigência\n § 8 o O processo relativo à adoção assim como outros a ele relacionados serão mantidos em arquivo, admitindo-se seu armazenamento em microfilme ou por outros meios, garantida a sua conservação para consulta a qualquer tempo.\n(Incluído pela Lei nº 12.010, de 2009) Vigência\n § 9º Terão prioridade de tramitação os processos de adoção em que o adotando for criança ou adolescente com deficiência ou com doença crônica. (Incluído pela Lei nº 12.955, de 2014)\n § 10. O prazo máximo para conclusão da ação de adoção será de 120 (cento e vinte) dias, prorrogável uma única vez por igual período, mediante decisão fundamentada da autoridade judiciária. (Incluído pela Lei nº 13.509, de 2017)"}, {"art": "Art. 48", "key": "48", "texto": "Art. 48. O adotado tem direito de conhecer sua origem biológica, bem como de obter acesso irrestrito ao processo no qual a medida foi aplicada e seus eventuais incidentes, após completar 18 (dezoito) anos. (Redação dada pela Lei nº 12.010, de 2009) Vigência\n Parágrafo único. O acesso ao processo de adoção poderá ser também deferido ao adotado menor de 18 (dezoito) anos, a seu pedido, assegurada orientação e assistência jurídica e psicológica. (Incluído pela Lei nº 12.010, de 2009)\nVigência"}, {"art": "Art. 49", "key": "49", "texto": "Art. 49. A morte dos adotantes não restabelece o pátrio poder poder familiar dos pais naturais. (Expressão substituída pela Lei nº 12.010, de 2009) Vigência"}, {"art": "Art. 50", "key": "50", "texto": "Art. 50. A autoridade judiciária manterá, em cada comarca ou foro regional, um registro de crianças e adolescentes em condições de serem adotados e outro de pessoas interessadas na adoção. (Vide Lei nº 12.010, de 2009) Vigência\n\f § 1º O deferimento da inscrição dar-se-á após prévia consulta aos órgãos técnicos do juizado, ouvido o Ministério\nPúblico.\n § 2º Não será deferida a inscrição se o interessado não satisfizer os requisitos legais, ou verificada qualquer das hipóteses previstas no art. 29.\n § 3 o A inscrição de postulantes à adoção será precedida de um período de preparação psicossocial e jurídica, orientado pela equipe técnica da Justiça da Infância e da Juventude, preferencialmente com apoio dos técnicos responsáveis pela execução da política municipal de garantia do direito à convivência familiar. (Incluído pela Lei nº 12.010, de 2009) Vigência\n § 4 o Sempre que possível e recomendável, a preparação referida no § 3 o deste artigo incluirá o contato com crianças e adolescentes em acolhimento familiar ou institucional em condições de serem adotados, a ser realizado sob a orientação, supervisão e avaliação da equipe técnica da Justiça da Infância e da Juventude, com apoio dos técnicos responsáveis pelo programa de acolhimento e pela execução da política municipal de garantia do direito à convivência familiar. (Incluído pela Lei nº 12.010, de 2009) Vigência\n § 5 o Serão criados e implementados cadastros estaduais e nacional de crianças e adolescentes em condições de serem adotados e de pessoas ou casais habilitados à adoção. (Incluído pela Lei nº 12.010, de 2009) Vigência\n § 5º Serão criados e implementados cadastros estaduais, distrital e nacional de crianças e adolescentes em condições de serem adotados e de pessoas ou casais habilitados à adoção, que deverão obrigatoriamente ser consultados pela autoridade judiciária em qualquer procedimento de adoção, ressalvadas as hipóteses do § 13 deste artigo e as particularidades das crianças e adolescentes indígenas ou provenientes de comunidade remanescente de quilombo previstas no inciso II do § 6º do art. 28 desta Lei. (Redação dada pela Lei nº 14.979, de 2024)\n § 6 o Haverá cadastros distintos para pessoas ou casais residentes fora do País, que somente serão consultados na inexistência de postulantes nacionais habilitados nos cadastros mencionados no § 5 o deste artigo. (Incluído pela Lei nº 12.010, de 2009) Vigência\n § 7 o As autoridades estaduais e federais em matéria de adoção terão acesso integral aos cadastros, incumbindo- lhes a troca de informações e a cooperação mútua, para melhoria do sistema. (Incluído pela Lei nº 12.010, de 2009)\nVigência\n § 8 o A autoridade judiciária providenciará, no prazo de 48 (quarenta e oito) horas, a inscrição das crianças e adolescentes em condições de serem adotados que não tiveram colocação familiar na comarca de origem, e das pessoas ou casais que tiveram deferida sua habilitação à adoção nos cadastros estadual e nacional referidos no § 5 o deste artigo, sob pena de responsabilidade. (Incluído pela Lei nº 12.010, de 2009) Vigência\n § 9 o Compete à Autoridade Central Estadual zelar pela manutenção e correta alimentação dos cadastros, com posterior comunicação à Autoridade Central Federal Brasileira. (Incluído pela Lei nº 12.010, de 2009) Vigência\n § 10. A adoção internacional somente será deferida se, após consulta ao cadastro de pessoas ou casais habilitados à adoção, mantido pela Justiça da Infância e da Juventude na comarca, bem como aos cadastros estadual e nacional referidos no § 5 o deste artigo, não for encontrado interessado com residência permanente no Brasil. (Incluído pela Lei nº 12.010, de 2009) Vigência\n § 10. Consultados os cadastros e verificada a ausência de pretendentes habilitados residentes no País com perfil compatível e interesse manifesto pela adoção de criança ou adolescente inscrito nos cadastros existentes, será realizado o encaminhamento da criança ou adolescente à adoção internacional. (Redação dada pela Lei nº 13.509, de 2017)\n § 11. Enquanto não localizada pessoa ou casal interessado em sua adoção, a criança ou o adolescente, sempre que possível e recomendável, será colocado sob guarda de família cadastrada em programa de acolhimento familiar.\n(Incluído pela Lei nº 12.010, de 2009) Vigência\n § 12. A alimentação do cadastro e a convocação criteriosa dos postulantes à adoção serão fiscalizadas pelo\nMinistério Público. (Incluído pela Lei nº 12.010, de 2009) Vigência\n § 13. Somente poderá ser deferida adoção em favor de candidato domiciliado no Brasil não cadastrado previamente nos termos desta Lei quando: (Incluído pela Lei nº 12.010, de 2009) Vigência\n I - se tratar de pedido de adoção unilateral; (Incluído pela Lei nº 12.010, de 2009) Vigência\n II - for formulada por parente com o qual a criança ou adolescente mantenha vínculos de afinidade e afetividade;\n(Incluído pela Lei nº 12.010, de 2009) Vigência\n III - oriundo o pedido de quem detém a tutela ou guarda legal de criança maior de 3 (três) anos ou adolescente, desde que o lapso de tempo de convivência comprove a fixação de laços de afinidade e afetividade, e não seja\n\fconstatada a ocorrência de má-fé ou qualquer das situações previstas nos arts. 237 ou 238 desta Lei. (Incluído pela Lei nº 12.010, de 2009) Vigência\n § 14. Nas hipóteses previstas no § 13 deste artigo, o candidato deverá comprovar, no curso do procedimento, que preenche os requisitos necessários à adoção, conforme previsto nesta Lei. (Incluído pela Lei nº 12.010, de 2009) Vigência\n § 15. Será assegurada prioridade no cadastro a pessoas interessadas em adotar criança ou adolescente com deficiência, com doença crônica ou com necessidades específicas de saúde, além de grupo de irmãos. (Incluído pela Lei nº 13.509, de 2017)"}, {"art": "Art. 51", "key": "51", "texto": "Art. 51. Considera-se adoção internacional aquela na qual o pretendente possui residência habitual em país-parte da Convenção de Haia, de 29 de maio de 1993, Relativa à Proteção das Crianças e à Cooperação em Matéria de Adoção\nInternacional, promulgada pelo Decreto n o 3.087, de 21 junho de 1999 , e deseja adotar criança em outro país-parte da\nConvenção. (Redação dada pela Lei nº 13.509, de 2017)\n § 1º O candidato deverá comprovar, mediante documento expedido pela autoridade competente do respectivo domicílio, estar devidamente habilitado à adoção, consoante as leis do seu país, bem como apresentar estudo psicossocial elaborado por agência especializada e credenciada no país de origem.\n § 1 o A adoção internacional de criança ou adolescente brasileiro ou domiciliado no Brasil somente terá lugar quando restar comprovado: (Redação dada pela Lei nº 12.010, de 2009) Vigência\n I - que a colocação em família substituta é a solução adequada ao caso concreto; (Incluída pela Lei nº 12.010, de 2009) Vigência\n I - que a colocação em família adotiva é a solução adequada ao caso concreto; (Redação dada pela Lei nº 13.509, de 2017)\n II - que foram esgotadas todas as possibilidades de colocação da criança ou adolescente em família substituta brasileira, após consulta aos cadastros mencionados no art. 50 desta Lei; (Incluída pela Lei nº 12.010, de 2009) Vigência\n II - que foram esgotadas todas as possibilidades de colocação da criança ou adolescente em família adotiva brasileira, com a comprovação, certificada nos autos, da inexistência de adotantes habilitados residentes no Brasil com perfil compatível com a criança ou adolescente, após consulta aos cadastros mencionados nesta Lei; (Redação dada pela Lei nº 13.509, de 2017)\n III - que, em se tratando de adoção de adolescente, este foi consultado, por meios adequados ao seu estágio de desenvolvimento, e que se encontra preparado para a medida, mediante parecer elaborado por equipe interprofissional, observado o disposto nos §§ 1 o e 2 o do art. 28 desta Lei. (Incluída pela Lei nº 12.010, de 2009) Vigência\n § 2º A autoridade judiciária, de ofício ou a requerimento do Ministério Público, poderá determinar a apresentação do texto pertinente à legislação estrangeira, acompanhado de prova da respectiva vigência.\n § 2 o Os brasileiros residentes no exterior terão preferência aos estrangeiros, nos casos de adoção internacional de criança ou adolescente brasileiro. (Redação dada pela Lei nº 12.010, de 2009) Vigência\n § 3º Os documentos em língua estrangeira serão juntados aos autos, devidamente autenticados pela autoridade consular, observados os tratados e convenções internacionais, e acompanhados da respectiva tradução, por tradutor público juramentado.\n § 3 o A adoção internacional pressupõe a intervenção das Autoridades Centrais Estaduais e Federal em matéria de adoção internacional. (Redação dada pela Lei nº 12.010, de 2009) Vigência\n § 4º Antes de consumada a adoção não será permitida a saída do adotando do território nacional. (Revogado pela\nLei nº 12.010, de 2009) Vigência"}, {"art": "Art. 52", "key": "52", "texto": "Art. 52. A adoção internacional observará o procedimento previsto nos arts. 165 a 170 desta Lei, com as seguintes adaptações: (Redação dada pela Lei nº 12.010, de 2009) Vigência\n\f I - a pessoa ou casal estrangeiro, interessado em adotar criança ou adolescente brasileiro, deverá formular pedido de habilitação à adoção perante a Autoridade Central em matéria de adoção internacional no país de acolhida, assim entendido aquele onde está situada sua residência habitual; (Incluída pela Lei nº 12.010, de 2009) Vigência\n II - se a Autoridade Central do país de acolhida considerar que os solicitantes estão habilitados e aptos para adotar, emitirá um relatório que contenha informações sobre a identidade, a capacidade jurídica e adequação dos solicitantes para adotar, sua situação pessoal, familiar e médica, seu meio social, os motivos que os animam e sua aptidão para assumir uma adoção internacional; (Incluída pela Lei nº 12.010, de 2009) Vigência\n III - a Autoridade Central do país de acolhida enviará o relatório à Autoridade Central Estadual, com cópia para a\nAutoridade Central Federal Brasileira; (Incluída pela Lei nº 12.010, de 2009) Vigência\n IV - o relatório será instruído com toda a documentação necessária, incluindo estudo psicossocial elaborado por equipe interprofissional habilitada e cópia autenticada da legislação pertinente, acompanhada da respectiva prova de vigência; (Incluída pela Lei nº 12.010, de 2009) Vigência\n V - os documentos em língua estrangeira serão devidamente autenticados pela autoridade consular, observados os tratados e convenções internacionais, e acompanhados da respectiva tradução, por tradutor público juramentado;\n(Incluída pela Lei nº 12.010, de 2009) Vigência\n VI - a Autoridade Central Estadual poderá fazer exigências e solicitar complementação sobre o estudo psicossocial do postulante estrangeiro à adoção, já realizado no país de acolhida; (Incluída pela Lei nº 12.010, de 2009) Vigência\n VII - verificada, após estudo realizado pela Autoridade Central Estadual, a compatibilidade da legislação estrangeira com a nacional, além do preenchimento por parte dos postulantes à medida dos requisitos objetivos e subjetivos necessários ao seu deferimento, tanto à luz do que dispõe esta Lei como da legislação do país de acolhida, será expedido laudo de habilitação à adoção internacional, que terá validade por, no máximo, 1 (um) ano; (Incluída pela Lei nº 12.010, de 2009) Vigência\n VIII - de posse do laudo de habilitação, o interessado será autorizado a formalizar pedido de adoção perante o Juízo da Infância e da Juventude do local em que se encontra a criança ou adolescente, conforme indicação efetuada pela\nAutoridade Central Estadual. (Incluída pela Lei nº 12.010, de 2009) Vigência\n § 1 o Se a legislação do país de acolhida assim o autorizar, admite-se que os pedidos de habilitação à adoção internacional sejam intermediados por organismos credenciados. (Incluída pela Lei nº 12.010, de 2009) Vigência\n § 2 o Incumbe à Autoridade Central Federal Brasileira o credenciamento de organismos nacionais e estrangeiros encarregados de intermediar pedidos de habilitação à adoção internacional, com posterior comunicação às Autoridades\nCentrais Estaduais e publicação nos órgãos oficiais de imprensa e em sítio próprio da internet. (Incluído pela Lei nº 12.010, de 2009) Vigência\n § 3 o Somente será admissível o credenciamento de organismos que: (Incluída pela Lei nº 12.010, de 2009)\nVigência\n I - sejam oriundos de países que ratificaram a Convenção de Haia e estejam devidamente credenciados pela\nAutoridade Central do país onde estiverem sediados e no país de acolhida do adotando para atuar em adoção internacional no Brasil; (Incluída pela Lei nº 12.010, de 2009) Vigência\n II - satisfizerem as condições de integridade moral, competência profissional, experiência e responsabilidade exigidas pelos países respectivos e pela Autoridade Central Federal Brasileira; (Incluída pela Lei nº 12.010, de 2009)\nVigência\n III - forem qualificados por seus padrões éticos e sua formação e experiência para atuar na área de adoção internacional; (Incluída pela Lei nº 12.010, de 2009) Vigência\n IV - cumprirem os requisitos exigidos pelo ordenamento jurídico brasileiro e pelas normas estabelecidas pela\nAutoridade Central Federal Brasileira. (Incluída pela Lei nº 12.010, de 2009) Vigência\n § 4 o Os organismos credenciados deverão ainda: (Incluído pela Lei nº 12.010, de 2009) Vigência\n I - perseguir unicamente fins não lucrativos, nas condições e dentro dos limites fixados pelas autoridades competentes do país onde estiverem sediados, do país de acolhida e pela Autoridade Central Federal Brasileira; (Incluída pela Lei nº 12.010, de 2009) Vigência\n II - ser dirigidos e administrados por pessoas qualificadas e de reconhecida idoneidade moral, com comprovada formação ou experiência para atuar na área de adoção internacional, cadastradas pelo Departamento de Polícia Federal e aprovadas pela Autoridade Central Federal Brasileira, mediante publicação de portaria do órgão federal competente;\n(Incluída pela Lei nº 12.010, de 2009) Vigência\n III - estar submetidos à supervisão das autoridades competentes do país onde estiverem sediados e no país de acolhida, inclusive quanto à sua composição, funcionamento e situação financeira; (Incluída pela Lei nº 12.010, de 2009)\n\fVigência\n IV - apresentar à Autoridade Central Federal Brasileira, a cada ano, relatório geral das atividades desenvolvidas, bem como relatório de acompanhamento das adoções internacionais efetuadas no período, cuja cópia será encaminhada ao\nDepartamento de Polícia Federal; (Incluída pela Lei nº 12.010, de 2009) Vigência\n V - enviar relatório pós-adotivo semestral para a Autoridade Central Estadual, com cópia para a Autoridade Central\nFederal Brasileira, pelo período mínimo de 2 (dois) anos. O envio do relatório será mantido até a juntada de cópia autenticada do registro civil, estabelecendo a cidadania do país de acolhida para o adotado; (Incluída pela Lei nº 12.010, de 2009) Vigência\n VI - tomar as medidas necessárias para garantir que os adotantes encaminhem à Autoridade Central Federal\nBrasileira cópia da certidão de registro de nascimento estrangeira e do certificado de nacionalidade tão logo lhes sejam concedidos. (Incluída pela Lei nº 12.010, de 2009) Vigência\n § 5 o A não apresentação dos relatórios referidos no § 4 o deste artigo pelo organismo credenciado poderá acarretar a suspensão de seu credenciamento. (Incluído pela Lei nº 12.010, de 2009) Vigência\n § 6 o O credenciamento de organismo nacional ou estrangeiro encarregado de intermediar pedidos de adoção internacional terá validade de 2 (dois) anos. (Incluído pela Lei nº 12.010, de 2009) Vigência\n § 7 o A renovação do credenciamento poderá ser concedida mediante requerimento protocolado na Autoridade\nCentral Federal Brasileira nos 60 (sessenta) dias anteriores ao término do respectivo prazo de validade. (Incluído pela Lei nº 12.010, de 2009) Vigência\n § 8 o Antes de transitada em julgado a decisão que concedeu a adoção internacional, não será permitida a saída do adotando do território nacional. (Incluído pela Lei nº 12.010, de 2009) Vigência\n § 9 o Transitada em julgado a decisão, a autoridade judiciária determinará a expedição de alvará com autorização de viagem, bem como para obtenção de passaporte, constando, obrigatoriamente, as características da criança ou adolescente adotado, como idade, cor, sexo, eventuais sinais ou traços peculiares, assim como foto recente e a aposição da impressão digital do seu polegar direito, instruindo o documento com cópia autenticada da decisão e certidão de trânsito em julgado. (Incluído pela Lei nº 12.010, de 2009) Vigência\n § 10. A Autoridade Central Federal Brasileira poderá, a qualquer momento, solicitar informações sobre a situação das crianças e adolescentes adotados (Incluído pela Lei nº 12.010, de 2009) Vigência\n § 11. A cobrança de valores por parte dos organismos credenciados, que sejam considerados abusivos pela\nAutoridade Central Federal Brasileira e que não estejam devidamente comprovados, é causa de seu descredenciamento.\n(Incluído pela Lei nº 12.010, de 2009) Vigência\n § 12. Uma mesma pessoa ou seu cônjuge não podem ser representados por mais de uma entidade credenciada para atuar na cooperação em adoção internacional. (Incluído pela Lei nº 12.010, de 2009) Vigência\n § 13. A habilitação de postulante estrangeiro ou domiciliado fora do Brasil terá validade máxima de 1 (um) ano, podendo ser renovada. (Incluído pela Lei nº 12.010, de 2009) Vigência\n § 14. É vedado o contato direto de representantes de organismos de adoção, nacionais ou estrangeiros, com dirigentes de programas de acolhimento institucional ou familiar, assim como com crianças e adolescentes em condições de serem adotados, sem a devida autorização judicial. (Incluído pela Lei nº 12.010, de 2009) Vigência\n § 15. A Autoridade Central Federal Brasileira poderá limitar ou suspender a concessão de novos credenciamentos sempre que julgar necessário, mediante ato administrativo fundamentado. (Incluído pela Lei nº 12.010, de 2009) Vigência"}, {"art": "Art. 52-A", "key": "52-A", "texto": "Art. 52-A. É vedado, sob pena de responsabilidade e descredenciamento, o repasse de recursos provenientes de organismos estrangeiros encarregados de intermediar pedidos de adoção internacional a organismos nacionais ou a pessoas físicas. (Incluído pela Lei nº 12.010, de 2009) Vigência\n Parágrafo único. Eventuais repasses somente poderão ser efetuados via Fundo dos Direitos da Criança e do\nAdolescente e estarão sujeitos às deliberações do respectivo Conselho de Direitos da Criança e do Adolescente (Incluído pela Lei nº 12.010, de 2009) Vigência"}, {"art": "Art. 52-B", "key": "52-B", "texto": "Art. 52-B. A adoção por brasileiro residente no exterior em país ratificante da Convenção de Haia, cujo processo de adoção tenha sido processado em conformidade com a legislação vigente no país de residência e atendido o disposto na\nAlínea “c” do Artigo 17 da referida Convenção, será automaticamente recepcionada com o reingresso no Brasil. (Incluído pela Lei nº 12.010, de 2009) Vigência\n § 1 o Caso não tenha sido atendido o disposto na Alínea “c” do Artigo 17 da Convenção de Haia, deverá a sentença ser homologada pelo Superior Tribunal de Justiça. (Incluído pela Lei nº 12.010, de 2009) Vigência\n\f § 2 o O pretendente brasileiro residente no exterior em país não ratificante da Convenção de Haia, uma vez reingressado no Brasil, deverá requerer a homologação da sentença estrangeira pelo Superior Tribunal de Justiça.\n(Incluído pela Lei nº 12.010, de 2009) Vigência"}, {"art": "Art. 52-C", "key": "52-C", "texto": "Art. 52-C. Nas adoções internacionais, quando o Brasil for o país de acolhida, a decisão da autoridade competente do país de origem da criança ou do adolescente será conhecida pela Autoridade Central Estadual que tiver processado o pedido de habilitação dos pais adotivos, que comunicará o fato à Autoridade Central Federal e determinará as providências necessárias à expedição do Certificado de Naturalização Provisório. (Incluído pela Lei nº 12.010, de 2009)\nVigência\n § 1 o A Autoridade Central Estadual, ouvido o Ministério Público, somente deixará de reconhecer os efeitos daquela decisão se restar demonstrado que a adoção é manifestamente contrária à ordem pública ou não atende ao interesse superior da criança ou do adolescente. (Incluído pela Lei nº 12.010, de 2009) Vigência\n § 2 o Na hipótese de não reconhecimento da adoção, prevista no § 1 o deste artigo, o Ministério Público deverá imediatamente requerer o que for de direito para resguardar os interesses da criança ou do adolescente, comunicando-se as providências à Autoridade Central Estadual, que fará a comunicação à Autoridade Central Federal Brasileira e à\nAutoridade Central do país de origem. (Incluído pela Lei nº 12.010, de 2009) Vigência"}, {"art": "Art. 52-D", "key": "52-D", "texto": "Art. 52-D. Nas adoções internacionais, quando o Brasil for o país de acolhida e a adoção não tenha sido deferida no país de origem porque a sua legislação a delega ao país de acolhida, ou, ainda, na hipótese de, mesmo com decisão, a criança ou o adolescente ser oriundo de país que não tenha aderido à Convenção referida, o processo de adoção seguirá as regras da adoção nacional. (Incluído pela Lei nº 12.010, de 2009) Vigência\n Capítulo IV\n Do Direito à Educação, à Cultura, ao Esporte e ao Lazer"}, {"art": "Art. 53", "key": "53", "texto": "Art. 53. A criança e o adolescente têm direito à educação, visando ao pleno desenvolvimento de sua pessoa, preparo para o exercício da cidadania e qualificação para o trabalho, assegurando-se-lhes:\n I - igualdade de condições para o acesso e permanência na escola;\n II - direito de ser respeitado por seus educadores;\n III - direito de contestar critérios avaliativos, podendo recorrer às instâncias escolares superiores;\n IV - direito de organização e participação em entidades estudantis;\n V - acesso à escola pública e gratuita próxima de sua residência.\n V - acesso à escola pública e gratuita, próxima de sua residência, garantindo-se vagas no mesmo estabelecimento a irmãos que frequentem a mesma etapa ou ciclo de ensino da educação básica. (Redação dada pela Lei nº 13.845, de 2019)\n Parágrafo único. É direito dos pais ou responsáveis ter ciência do processo pedagógico, bem como participar da definição das propostas educacionais."}, {"art": "Art. 53-A", "key": "53-A", "texto": "Art. 53-A. É dever da instituição de ensino, clubes e agremiações recreativas e de estabelecimentos congêneres assegurar medidas de conscientização, prevenção e enfrentamento ao uso ou dependência de drogas ilícitas.\n(Incluído pela Lei nº 13.840, de 2019)"}, {"art": "Art. 54", "key": "54", "texto": "Art. 54. É dever do Estado assegurar à criança e ao adolescente:\n I - ensino fundamental, obrigatório e gratuito, inclusive para os que a ele não tiveram acesso na idade própria;\n II - progressiva extensão da obrigatoriedade e gratuidade ao ensino médio;\n III - atendimento educacional especializado aos portadores de deficiência, preferencialmente na rede regular de ensino;\n IV - atendimento em creche e pré-escola às crianças de zero a seis anos de idade;\n IV – atendimento em creche e pré-escola às crianças de zero a cinco anos de idade; (Redação dada pela Lei nº 13.306, de 2016)\n V - acesso aos níveis mais elevados do ensino, da pesquisa e da criação artística, segundo a capacidade de cada um;\n\f VI - oferta de ensino noturno regular, adequado às condições do adolescente trabalhador;\n VII - atendimento no ensino fundamental, através de programas suplementares de material didático-escolar, transporte, alimentação e assistência à saúde.\n § 1º O acesso ao ensino obrigatório e gratuito é direito público subjetivo.\n § 2º O não oferecimento do ensino obrigatório pelo poder público ou sua oferta irregular importa responsabilidade da autoridade competente.\n § 3º Compete ao poder público recensear os educandos no ensino fundamental, fazer-lhes a chamada e zelar, junto aos pais ou responsável, pela freqüência à escola."}, {"art": "Art. 55", "key": "55", "texto": "Art. 55. Os pais ou responsável têm a obrigação de matricular seus filhos ou pupilos na rede regular de ensino."}, {"art": "Art. 56", "key": "56", "texto": "Art. 56. Os dirigentes de estabelecimentos de ensino fundamental comunicarão ao Conselho Tutelar os casos de:\n I - maus-tratos envolvendo seus alunos;\n II - reiteração de faltas injustificadas e de evasão escolar, esgotados os recursos escolares;\n III - elevados níveis de repetência.\n IV – negligência, abuso ou abandono na forma prevista nos arts. 4º e 5º desta Lei. (Incluído pela Lei nº 15.240, de 2025)"}, {"art": "Art. 57", "key": "57", "texto": "Art. 57. O poder público estimulará pesquisas, experiências e novas propostas relativas a calendário, seriação, currículo, metodologia, didática e avaliação, com vistas à inserção de crianças e adolescentes excluídos do ensino fundamental obrigatório."}, {"art": "Art. 58", "key": "58", "texto": "Art. 58. No processo educacional, respeitar-se-ão os valores culturais, morais, éticos, artísticos e históricos próprios do contexto social da criança e do adolescente, garantindo-se-lhes a liberdade da criação e o acesso às fontes de cultura. (Redação dada pela Lei nº 15.240, de 2025)"}, {"art": "Art. 59", "key": "59", "texto": "Art. 59. Os municípios, com apoio dos estados e da União, estimularão e facilitarão a destinação de recursos e espaços para programações culturais, esportivas e de lazer voltadas para a infância e a juventude."}, {"art": "Art. 59-A", "key": "59-A", "texto": "Art. 59-A. As instituições sociais públicas ou privadas que desenvolvam atividades com crianças e adolescentes e que recebam recursos públicos deverão exigir e manter certidões de antecedentes criminais de todos os seus colaboradores, as quais deverão ser atualizadas a cada 6 (seis) meses. (Incluído pela Lei nº 14.811, de 2024)\n Parágrafo único. Os estabelecimentos educacionais e similares, públicos ou privados, que desenvolvem atividades com crianças e adolescentes, independentemente de recebimento de recursos públicos, deverão manter fichas cadastrais e certidões de antecedentes criminais atualizadas de todos os seus colaboradores. (Incluído pela\nLei nº 14.811, de 2024)\n Capítulo V\n Do Direito à Profissionalização e à Proteção no Trabalho"}, {"art": "Art. 60", "key": "60", "texto": "Art. 60. É proibido qualquer trabalho a menores de quatorze anos de idade, salvo na condição de aprendiz. (Vide\nConstituição Federal)"}, {"art": "Art. 61", "key": "61", "texto": "Art. 61. A proteção ao trabalho dos adolescentes é regulada por legislação especial, sem prejuízo do disposto nesta Lei."}, {"art": "Art. 62", "key": "62", "texto": "Art. 62. Considera-se aprendizagem a formação técnico-profissional ministrada segundo as diretrizes e bases da legislação de educação em vigor."}, {"art": "Art. 63", "key": "63", "texto": "Art. 63. A formação técnico-profissional obedecerá aos seguintes princípios:\n I - garantia de acesso e freqüência obrigatória ao ensino regular;\n II - atividade compatível com o desenvolvimento do adolescente;\n\f III - horário especial para o exercício das atividades."}, {"art": "Art. 64", "key": "64", "texto": "Art. 64. Ao adolescente até quatorze anos de idade é assegurada bolsa de aprendizagem."}, {"art": "Art. 65", "key": "65", "texto": "Art. 65. Ao adolescente aprendiz, maior de quatorze anos, são assegurados os direitos trabalhistas e previdenciários."}, {"art": "Art. 66", "key": "66", "texto": "Art. 66. Ao adolescente portador de deficiência é assegurado trabalho protegido."}, {"art": "Art. 67", "key": "67", "texto": "Art. 67. Ao adolescente empregado, aprendiz, em regime familiar de trabalho, aluno de escola técnica, assistido em entidade governamental ou não-governamental, é vedado trabalho:\n I - noturno, realizado entre as vinte e duas horas de um dia e as cinco horas do dia seguinte;\n II - perigoso, insalubre ou penoso;\n III - realizado em locais prejudiciais à sua formação e ao seu desenvolvimento físico, psíquico, moral e social;\n IV - realizado em horários e locais que não permitam a freqüência à escola."}, {"art": "Art. 68", "key": "68", "texto": "Art. 68. O programa social que tenha por base o trabalho educativo, sob responsabilidade de entidade governamental ou não-governamental sem fins lucrativos, deverá assegurar ao adolescente que dele participe condições de capacitação para o exercício de atividade regular remunerada.\n § 1º Entende-se por trabalho educativo a atividade laboral em que as exigências pedagógicas relativas ao desenvolvimento pessoal e social do educando prevalecem sobre o aspecto produtivo.\n § 2º A remuneração que o adolescente recebe pelo trabalho efetuado ou a participação na venda dos produtos de seu trabalho não desfigura o caráter educativo."}, {"art": "Art. 69", "key": "69", "texto": "Art. 69. O adolescente tem direito à profissionalização e à proteção no trabalho, observados os seguintes aspectos, entre outros:\n I - respeito à condição peculiar de pessoa em desenvolvimento;\n II - capacitação profissional adequada ao mercado de trabalho.\n Título III\n Da Prevenção\n Capítulo I\n Disposições Gerais"}, {"art": "Art. 70", "key": "70", "texto": "Art. 70. É dever de todos prevenir a ocorrência de ameaça ou violação dos direitos da criança e do adolescente."}, {"art": "Art. 70-A", "key": "70-A", "texto": "Art. 70-A. A União, os Estados, o Distrito Federal e os Municípios deverão atuar de forma articulada na elaboração de políticas públicas e na execução de ações destinadas a coibir o uso de castigo físico ou de tratamento cruel ou degradante e difundir formas não violentas de educação de crianças e de adolescentes, tendo como principais ações:\n(Incluído pela Lei nº 13.010, de 2014)\n I - a promoção de campanhas educativas permanentes para a divulgação do direito da criança e do adolescente de serem educados e cuidados sem o uso de castigo físico ou de tratamento cruel ou degradante e dos instrumentos de proteção aos direitos humanos; (Incluído pela Lei nº 13.010, de 2014)\n II - a integração com os órgãos do Poder Judiciário, do Ministério Público e da Defensoria Pública, com o Conselho\nTutelar, com os Conselhos de Direitos da Criança e do Adolescente e com as entidades não governamentais que atuam na promoção, proteção e defesa dos direitos da criança e do adolescente; (Incluído pela Lei nº 13.010, de 2014)\n II – a integração com os órgãos de segurança pública, do Poder Judiciário, do Ministério Público e da Defensoria\nPública, com o Conselho Tutelar, com os Conselhos de Direitos da Criança e do Adolescente e com as entidades não governamentais que atuam na promoção, na proteção e na defesa dos direitos da criança e do adolescente;\n(Redação dada pela Lei nº 15.280, de 2025)\n III - a formação continuada e a capacitação dos profissionais de saúde, educação e assistência social e dos demais agentes que atuam na promoção, proteção e defesa dos direitos da criança e do adolescente para o desenvolvimento das competências necessárias à prevenção, à identificação de evidências, ao diagnóstico e ao enfrentamento de todas as formas de violência contra a criança e o adolescente; (Incluído pela Lei nº 13.010, de 2014)\n\f IV - o apoio e o incentivo às práticas de resolução pacífica de conflitos que envolvam violência contra a criança e o adolescente; (Incluído pela Lei nº 13.010, de 2014)\n V - a inclusão, nas políticas públicas, de ações que visem a garantir os direitos da criança e do adolescente, desde a atenção pré-natal, e de atividades junto aos pais e responsáveis com o objetivo de promover a informação, a reflexão, o debate e a orientação sobre alternativas ao uso de castigo físico ou de tratamento cruel ou degradante no processo educativo; (Incluído pela Lei nº 13.010, de 2014)\n VI - a promoção de espaços intersetoriais locais para a articulação de ações e a elaboração de planos de atuação conjunta focados nas famílias em situação de violência, com participação de profissionais de saúde, de assistência social e de educação e de órgãos de promoção, proteção e defesa dos direitos da criança e do adolescente. (Incluído pela Lei nº 13.010, de 2014)\n VII - a promoção de estudos e pesquisas, de estatísticas e de outras informações relevantes às consequências e à frequência das formas de violência contra a criança e o adolescente para a sistematização de dados nacionalmente unificados e a avaliação periódica dos resultados das medidas adotadas; (Incluído pela Lei nº 14.344, de 2022)\nVigência\n VIII - o respeito aos valores da dignidade da pessoa humana, de forma a coibir a violência, o tratamento cruel ou degradante e as formas violentas de educação, correção ou disciplina; (Incluído pela Lei nº 14.344, de 2022) Vigência\n IX - a promoção e a realização de campanhas educativas direcionadas ao público escolar e à sociedade em geral e a difusão desta Lei e dos instrumentos de proteção aos direitos humanos das crianças e dos adolescentes, incluídos os canais de denúncia existentes; (Incluído pela Lei nº 14.344, de 2022) Vigência\n IX – a promoção e a realização de campanhas educativas direcionadas ao público escolar, a entidades esportivas, a unidades de saúde, a conselhos tutelares, a organizações da sociedade civil, a centros culturais, a associações comunitárias e outros espaços públicos de convivência e à sociedade em geral, bem como a difusão desta Lei e dos instrumentos de proteção aos direitos humanos das crianças e dos adolescentes, incluídos os canais de denúncia existentes; (Redação dada pela Lei nº 15.280, de 2025)\n X - a celebração de convênios, de protocolos, de ajustes, de termos e de outros instrumentos de promoção de parceria entre órgãos governamentais ou entre estes e entidades não governamentais, com o objetivo de implementar programas de erradicação da violência, de tratamento cruel ou degradante e de formas violentas de educação, correção ou disciplina; (Incluído pela Lei nº 14.344, de 2022) Vigência\n XI - a capacitação permanente das Polícias Civil e Militar, da Guarda Municipal, do Corpo de Bombeiros, dos profissionais nas escolas, dos Conselhos Tutelares e dos profissionais pertencentes aos órgãos e às áreas referidos no inciso II deste caput, para que identifiquem situações em que crianças e adolescentes vivenciam violência e agressões no âmbito familiar ou institucional; (Incluído pela Lei nº 14.344, de 2022) Vigência\n XII - a promoção de programas educacionais que disseminem valores éticos de irrestrito respeito à dignidade da pessoa humana, bem como de programas de fortalecimento da parentalidade positiva, da educação sem castigos físicos e de ações de prevenção e enfrentamento da violência doméstica e familiar contra a criança e o adolescente; (Incluído pela Lei nº 14.344, de 2022) Vigência\n XIII - o destaque, nos currículos escolares de todos os níveis de ensino, dos conteúdos relativos à prevenção, à identificação e à resposta à violência doméstica e familiar. (Incluído pela Lei nº 14.344, de 2022) Vigência\n Parágrafo único. As famílias com crianças e adolescentes com deficiência terão prioridade de atendimento nas ações e políticas públicas de prevenção e proteção. (Incluído pela Lei nº 13.010, de 2014)"}, {"art": "Art. 70-B", "key": "70-B", "texto": "Art. 70-B. As entidades, públicas e privadas, que atuem nas áreas da saúde e da educação, além daquelas às quais se refere o art. 71 desta Lei, entre outras, devem contar, em seus quadros, com pessoas capacitadas a reconhecer e a comunicar ao Conselho Tutelar suspeitas ou casos de crimes praticados contra a criança e o adolescente. (Redação dada pela Lei nº 14.344, de 2022) Vigência\n Parágrafo único. São igualmente responsáveis pela comunicação de que trata este artigo, as pessoas encarregadas, por razão de cargo, função, ofício, ministério, profissão ou ocupação, do cuidado, assistência ou guarda de crianças e adolescentes, punível, na forma deste Estatuto, o injustificado retardamento ou omissão, culposos ou dolosos.\n(Incluído pela Lei nº 13.046, de 2014)"}, {"art": "Art. 71", "key": "71", "texto": "Art. 71. A criança e o adolescente têm direito a informação, cultura, lazer, esportes, diversões, espetáculos e produtos e serviços que respeitem sua condição peculiar de pessoa em desenvolvimento."}, {"art": "Art. 72", "key": "72", "texto": "Art. 72. As obrigações previstas nesta Lei não excluem da prevenção especial outras decorrentes dos princípios por ela adotados."}, {"art": "Art. 73", "key": "73", "texto": "Art. 73. A inobservância das normas de prevenção importará em responsabilidade da pessoa física ou jurídica, nos termos desta Lei.\n Capítulo II\n Da Prevenção Especial\n Seção I\n Da informação, Cultura, Lazer, Esportes, Diversões e Espetáculos"}, {"art": "Art. 74", "key": "74", "texto": "Art. 74. O poder público, através do órgão competente, regulará as diversões e espetáculos públicos, informando sobre a natureza deles, as faixas etárias a que não se recomendem, locais e horários em que sua apresentação se mostre inadequada.\n Parágrafo único. Os responsáveis pelas diversões e espetáculos públicos deverão afixar, em lugar visível e de fácil acesso, à entrada do local de exibição, informação destacada sobre a natureza do espetáculo e a faixa etária especificada no certificado de classificação."}, {"art": "Art. 75", "key": "75", "texto": "Art. 75. Toda criança ou adolescente terá acesso às diversões e espetáculos públicos classificados como adequados à sua faixa etária.\n Parágrafo único. As crianças menores de dez anos somente poderão ingressar e permanecer nos locais de apresentação ou exibição quando acompanhadas dos pais ou responsável."}, {"art": "Art. 76", "key": "76", "texto": "Art. 76. As emissoras de rádio e televisão somente exibirão, no horário recomendado para o público infanto juvenil, programas com finalidades educativas, artísticas, culturais e informativas.\n Parágrafo único. Nenhum espetáculo será apresentado ou anunciado sem aviso de sua classificação, antes de sua transmissão, apresentação ou exibição."}, {"art": "Art. 77", "key": "77", "texto": "Art. 77. Os proprietários, diretores, gerentes e funcionários de empresas que explorem a venda ou aluguel de fitas de programação em vídeo cuidarão para que não haja venda ou locação em desacordo com a classificação atribuída pelo órgão competente.\n Parágrafo único. As fitas a que alude este artigo deverão exibir, no invólucro, informação sobre a natureza da obra e a faixa etária a que se destinam."}, {"art": "Art. 78", "key": "78", "texto": "Art. 78. As revistas e publicações contendo material impróprio ou inadequado a crianças e adolescentes deverão ser comercializadas em embalagem lacrada, com a advertência de seu conteúdo.\n Parágrafo único. As editoras cuidarão para que as capas que contenham mensagens pornográficas ou obscenas sejam protegidas com embalagem opaca."}, {"art": "Art. 79", "key": "79", "texto": "Art. 79. As revistas e publicações destinadas ao público infanto-juvenil não poderão conter ilustrações, fotografias, legendas, crônicas ou anúncios de bebidas alcoólicas, tabaco, armas e munições, e deverão respeitar os valores éticos e sociais da pessoa e da família."}, {"art": "Art. 80", "key": "80", "texto": "Art. 80. Os responsáveis por estabelecimentos que explorem comercialmente bilhar, sinuca ou congênere ou por casas de jogos, assim entendidas as que realizem apostas, ainda que eventualmente, cuidarão para que não seja permitida a entrada e a permanência de crianças e adolescentes no local, afixando aviso para orientação do público.\n Seção II\n Dos Produtos e Serviços"}, {"art": "Art. 81", "key": "81", "texto": "Art. 81. É proibida a venda à criança ou ao adolescente de:\n I - armas, munições e explosivos;\n II - bebidas alcoólicas;\n III - produtos cujos componentes possam causar dependência física ou psíquica ainda que por utilização indevida;\n\f IV - fogos de estampido e de artifício, exceto aqueles que pelo seu reduzido potencial sejam incapazes de provocar qualquer dano físico em caso de utilização indevida;\n V - revistas e publicações a que alude o art. 78;\n VI - bilhetes lotéricos e equivalentes."}, {"art": "Art. 82", "key": "82", "texto": "Art. 82. É proibida a hospedagem de criança ou adolescente em hotel, motel, pensão ou estabelecimento congênere, salvo se autorizado ou acompanhado pelos pais ou responsável.\n Seção III\n Da Autorização para Viajar"}, {"art": "Art. 83", "key": "83", "texto": "Art. 83. Nenhuma criança ou adolescente menor de 16 (dezesseis) anos poderá viajar para fora da comarca onde reside desacompanhado dos pais ou dos responsáveis sem expressa autorização judicial. (Redação dada pela\nLei nº 13.812, de 2019)\n § 1º A autorização não será exigida quando:\n a) tratar-se de comarca contígua à da residência da criança, se na mesma unidade da Federação, ou incluída na mesma região metropolitana;\n a) tratar-se de comarca contígua à da residência da criança ou do adolescente menor de 16 (dezesseis) anos, se na mesma unidade da Federação, ou incluída na mesma região metropolitana; (Redação dada pela Lei nº 13.812, de 2019)\n b) a criança estiver acompanhada:\n b) a criança ou o adolescente menor de 16 (dezesseis) anos estiver acompanhado: (Redação dada pela Lei nº 13.812, de 2019)\n 1) de ascendente ou colateral maior, até o terceiro grau, comprovado documentalmente o parentesco;\n 2) de pessoa maior, expressamente autorizada pelo pai, mãe ou responsável.\n § 2º A autoridade judiciária poderá, a pedido dos pais ou responsável, conceder autorização válida por dois anos."}, {"art": "Art. 84", "key": "84", "texto": "Art. 84. Quando se tratar de viagem ao exterior, a autorização é dispensável, se a criança ou adolescente:\n I - estiver acompanhado de ambos os pais ou responsável;\n II - viajar na companhia de um dos pais, autorizado expressamente pelo outro através de documento com firma reconhecida."}, {"art": "Art. 85", "key": "85", "texto": "Art. 85. Sem prévia e expressa autorização judicial, nenhuma criança ou adolescente nascido em território nacional poderá sair do País em companhia de estrangeiro residente ou domiciliado no exterior.\n Parte Especial\n Título I\n Da Política de Atendimento\n Capítulo I\n Disposições Gerais"}, {"art": "Art. 86", "key": "86", "texto": "Art. 86. A política de atendimento dos direitos da criança e do adolescente far-se-á através de um conjunto articulado de ações governamentais e não-governamentais, da União, dos estados, do Distrito Federal e dos municípios."}, {"art": "Art. 87", "key": "87", "texto": "Art. 87. São linhas de ação da política de atendimento:\n I - políticas sociais básicas;\n\f II - políticas e programas de assistência social, em caráter supletivo, para aqueles que deles necessitem\n II - serviços, programas, projetos e benefícios de assistência social de garantia de proteção social e de prevenção e redução de violações de direitos, seus agravamentos ou reincidências; (Redação dada pela Lei nº 13.257, de 2016)\n III - serviços especiais de prevenção e atendimento médico e psicossocial às vítimas de negligência, maus-tratos, exploração, abuso, crueldade e opressão;\n III – serviços especiais de prevenção e atendimento médico e psicossocial às vítimas de negligência, maus- tratos, exploração, abuso, crueldade e opressão e às crianças e aos adolescentes que tiverem qualquer dos pais ou responsáveis vitimado por grave violência ou preso em regime fechado; (Redação dada pela Lei nº 14.987, de 2024) Vigência\n IV - serviço de identificação e localização de pais, responsável, crianças e adolescentes desaparecidos;\n V - proteção jurídico-social por entidades de defesa dos direitos da criança e do adolescente.\n VI - políticas e programas destinados a prevenir ou abreviar o período de afastamento do convívio familiar e a garantir o efetivo exercício do direito à convivência familiar de crianças e adolescentes; (Incluído pela Lei nº 12.010, de 2009) Vigência\n VII - campanhas de estímulo ao acolhimento sob forma de guarda de crianças e adolescentes afastados do convívio familiar e à adoção, especificamente inter-racial, de crianças maiores ou de adolescentes, com necessidades específicas de saúde ou com deficiências e de grupos de irmãos. (Incluído pela Lei nº 12.010, de 2009) Vigência\n Parágrafo único. A linha de ação da política de atendimento a que se refere o inciso IV do caput deste artigo será executada em cooperação com o Cadastro Nacional de Pessoas Desaparecidas, criado pela Lei nº 13.812, de 16 de março de 2019, com o Cadastro Nacional de Crianças e Adolescentes Desaparecidos, criado pela Lei nº 12.127, de 17 de dezembro de 2009, e com os demais cadastros, sejam eles nacionais, estaduais ou municipais. (Incluído pela Lei nº 14.548, de 2023)"}, {"art": "Art. 88",
