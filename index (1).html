er a remissão;\n III - representar à autoridade judiciária para aplicação de medida sócio-educativa."}, {"art": "Art. 181", "key": "181", "texto": "Art. 181. Promovido o arquivamento dos autos ou concedida a remissão pelo representante do Ministério Público, mediante termo fundamentado, que conterá o resumo dos fatos, os autos serão conclusos à autoridade judiciária para homologação.\n § 1º Homologado o arquivamento ou a remissão, a autoridade judiciária determinará, conforme o caso, o cumprimento da medida.\n § 2º Discordando, a autoridade judiciária fará remessa dos autos ao Procurador-Geral de Justiça, mediante despacho fundamentado, e este oferecerá representação, designará outro membro do Ministério Público para apresentá- la, ou ratificará o arquivamento ou a remissão, que só então estará a autoridade judiciária obrigada a homologar."}, {"art": "Art. 182", "key": "182", "texto": "Art. 182. Se, por qualquer razão, o representante do Ministério Público não promover o arquivamento ou conceder a remissão, oferecerá representação à autoridade judiciária, propondo a instauração de procedimento para aplicação da medida sócio-educativa que se afigurar a mais adequada.\n § 1º A representação será oferecida por petição, que conterá o breve resumo dos fatos e a classificação do ato infracional e, quando necessário, o rol de testemunhas, podendo ser deduzida oralmente, em sessão diária instalada pela autoridade judiciária.\n § 2º A representação independe de prova pré-constituída da autoria e materialidade."}, {"art": "Art. 183", "key": "183", "texto": "Art. 183. O prazo máximo e improrrogável para a conclusão do procedimento, estando o adolescente internado provisoriamente, será de quarenta e cinco dias."}, {"art": "Art. 184", "key": "184", "texto": "Art. 184. Oferecida a representação, a autoridade judiciária designará audiência de apresentação do adolescente, decidindo, desde logo, sobre a decretação ou manutenção da internação, observado o disposto no art. 108 e parágrafo.\n\f § 1º O adolescente e seus pais ou responsável serão cientificados do teor da representação, e notificados a comparecer à audiência, acompanhados de advogado.\n § 2º Se os pais ou responsável não forem localizados, a autoridade judiciária dará curador especial ao adolescente.\n § 3º Não sendo localizado o adolescente, a autoridade judiciária expedirá mandado de busca e apreensão, determinando o sobrestamento do feito, até a efetiva apresentação.\n § 4º Estando o adolescente internado, será requisitada a sua apresentação, sem prejuízo da notificação dos pais ou responsável."}, {"art": "Art. 185", "key": "185", "texto": "Art. 185. A internação, decretada ou mantida pela autoridade judiciária, não poderá ser cumprida em estabelecimento prisional.\n § 1º Inexistindo na comarca entidade com as características definidas no art. 123, o adolescente deverá ser imediatamente transferido para a localidade mais próxima.\n § 2º Sendo impossível a pronta transferência, o adolescente aguardará sua remoção em repartição policial, desde que em seção isolada dos adultos e com instalações apropriadas, não podendo ultrapassar o prazo máximo de cinco dias, sob pena de responsabilidade."}, {"art": "Art. 186", "key": "186", "texto": "Art. 186. Comparecendo o adolescente, seus pais ou responsável, a autoridade judiciária procederá à oitiva dos mesmos, podendo solicitar opinião de profissional qualificado.\n § 1º Se a autoridade judiciária entender adequada a remissão, ouvirá o representante do Ministério Público, proferindo decisão.\n § 2º Sendo o fato grave, passível de aplicação de medida de internação ou colocação em regime de semi-liberdade, a autoridade judiciária, verificando que o adolescente não possui advogado constituído, nomeará defensor, designando, desde logo, audiência em continuação, podendo determinar a realização de diligências e estudo do caso.\n § 3º O advogado constituído ou o defensor nomeado, no prazo de três dias contado da audiência de apresentação, oferecerá defesa prévia e rol de testemunhas.\n § 4º Na audiência em continuação, ouvidas as testemunhas arroladas na representação e na defesa prévia, cumpridas as diligências e juntado o relatório da equipe interprofissional, será dada a palavra ao representante do\nMinistério Público e ao defensor, sucessivamente, pelo tempo de vinte minutos para cada um, prorrogável por mais dez, a critério da autoridade judiciária, que em seguida proferirá decisão."}, {"art": "Art. 187", "key": "187", "texto": "Art. 187. Se o adolescente, devidamente notificado, não comparecer, injustificadamente à audiência de apresentação, a autoridade judiciária designará nova data, determinando sua condução coercitiva."}, {"art": "Art. 188", "key": "188", "texto": "Art. 188. A remissão, como forma de extinção ou suspensão do processo, poderá ser aplicada em qualquer fase do procedimento, antes da sentença."}, {"art": "Art. 189", "key": "189", "texto": "Art. 189. A autoridade judiciária não aplicará qualquer medida, desde que reconheça na sentença:\n I - estar provada a inexistência do fato;\n II - não haver prova da existência do fato;\n III - não constituir o fato ato infracional;\n IV - não existir prova de ter o adolescente concorrido para o ato infracional.\n Parágrafo único. Na hipótese deste artigo, estando o adolescente internado, será imediatamente colocado em liberdade."}, {"art": "Art. 190", "key": "190", "texto": "Art. 190. A intimação da sentença que aplicar medida de internação ou regime de semi-liberdade será feita:\n I - ao adolescente e ao seu defensor;\n II - quando não for encontrado o adolescente, a seus pais ou responsável, sem prejuízo do defensor.\n § 1º Sendo outra a medida aplicada, a intimação far-se-á unicamente na pessoa do defensor.\n § 2º Recaindo a intimação na pessoa do adolescente, deverá este manifestar se deseja ou não recorrer da sentença.\n\f Seção V-A\n (Incluído pela Lei nº 13.441, de 2017)\n Da Infiltração de Agentes de Polícia para a Investigação de Crimes contra a Dignidade Sexual de Criança e de\n Adolescente”"}, {"art": "Art. 190-A", "key": "190-A", "texto": "Art. 190-A. A infiltração de agentes de polícia na internet com o fim de investigar os crimes previstos nos arts. 240 , 241 , 241-A , 241-B , 241-C e 241-D desta Lei e nos arts. 154-A , 217-A , 218 , 218-A e 218-B do Decreto-Lei nº 2.848, de 7 de dezembro de 1940 (Código Penal) , obedecerá às seguintes regras: (Incluído pela Lei nº 13.441, de 2017)\n I – será precedida de autorização judicial devidamente circunstanciada e fundamentada, que estabelecerá os limites da infiltração para obtenção de prova, ouvido o Ministério Público; (Incluído pela Lei nº 13.441, de 2017)\n II – dar-se-á mediante requerimento do Ministério Público ou representação de delegado de polícia e conterá a demonstração de sua necessidade, o alcance das tarefas dos policiais, os nomes ou apelidos das pessoas investigadas e, quando possível, os dados de conexão ou cadastrais que permitam a identificação dessas pessoas; (Incluído pela Lei nº 13.441, de 2017)\n III – não poderá exceder o prazo de 90 (noventa) dias, sem prejuízo de eventuais renovações, desde que o total não exceda a 720 (setecentos e vinte) dias e seja demonstrada sua efetiva necessidade, a critério da autoridade judicial.\n(Incluído pela Lei nº 13.441, de 2017)\n § 1 º A autoridade judicial e o Ministério Público poderão requisitar relatórios parciais da operação de infiltração antes do término do prazo de que trata o inciso II do § 1 º deste artigo. (Incluído pela Lei nº 13.441, de 2017)\n § 2 º Para efeitos do disposto no inciso I do § 1 º deste artigo, consideram-se: (Incluído pela Lei nº 13.441, de 2017)\n I – dados de conexão: informações referentes a hora, data, início, término, duração, endereço de Protocolo de\nInternet (IP) utilizado e terminal de origem da conexão; (Incluído pela Lei nº 13.441, de 2017)\n II – dados cadastrais: informações referentes a nome e endereço de assinante ou de usuário registrado ou autenticado para a conexão a quem endereço de IP, identificação de usuário ou código de acesso tenha sido atribuído no momento da conexão.\n § 3 º A infiltração de agentes de polícia na internet não será admitida se a prova puder ser obtida por outros meios.\n(Incluído pela Lei nº 13.441, de 2017)"}, {"art": "Art. 190-B", "key": "190-B", "texto": "Art. 190-B. As informações da operação de infiltração serão encaminhadas diretamente ao juiz responsável pela autorização da medida, que zelará por seu sigilo. (Incluído pela Lei nº 13.441, de 2017)\n Parágrafo único. Antes da conclusão da operação, o acesso aos autos será reservado ao juiz, ao Ministério Público e ao delegado de polícia responsável pela operação, com o objetivo de garantir o sigilo das investigações. (Incluído pela\nLei nº 13.441, de 2017)"}, {"art": "Art. 190-C", "key": "190-C", "texto": "Art. 190-C. Não comete crime o policial que oculta a sua identidade para, por meio da internet, colher indícios de autoria e materialidade dos crimes previstos nos arts. 240 , 241 , 241-A , 241-B , 241-C e 241-D desta Lei e nos arts. 154-A\n, 217-A , 218 , 218-A e 218-B do Decreto-Lei nº 2.848, de 7 de dezembro de 1940 (Código Penal) . (Incluído pela Lei nº 13.441, de 2017)\n Parágrafo único. O agente policial infiltrado que deixar de observar a estrita finalidade da investigação responderá pelos excessos praticados. (Incluído pela Lei nº 13.441, de 2017)"}, {"art": "Art. 190-D", "key": "190-D", "texto": "Art. 190-D. Os órgãos de registro e cadastro público poderão incluir nos bancos de dados próprios, mediante procedimento sigiloso e requisição da autoridade judicial, as informações necessárias à efetividade da identidade fictícia criada. (Incluído pela Lei nº 13.441, de 2017)\n Parágrafo único. O procedimento sigiloso de que trata esta Seção será numerado e tombado em livro específico.\n(Incluído pela Lei nº 13.441, de 2017)"}, {"art": "Art. 190-E", "key": "190-E", "texto": "Art. 190-E. Concluída a investigação, todos os atos eletrônicos praticados durante a operação deverão ser registrados, gravados, armazenados e encaminhados ao juiz e ao Ministério Público, juntamente com relatório circunstanciado. (Incluído pela Lei nº 13.441, de 2017)\n Parágrafo único. Os atos eletrônicos registrados citados no caput deste artigo serão reunidos em autos apartados e apensados ao processo criminal juntamente com o inquérito policial, assegurando-se a preservação da identidade do agente policial infiltrado e a intimidade das crianças e dos adolescentes envolvidos. (Incluído pela Lei nº 13.441, de 2017)\n Seção VI\n Da Apuração de Irregularidades em Entidade de Atendimento"}, {"art": "Art. 191", "key": "191", "texto": "Art. 191. O procedimento de apuração de irregularidades em entidade governamental e não-governamental terá início mediante portaria da autoridade judiciária ou representação do Ministério Público ou do Conselho Tutelar, onde conste, necessariamente, resumo dos fatos.\n Parágrafo único. Havendo motivo grave, poderá a autoridade judiciária, ouvido o Ministério Público, decretar liminarmente o afastamento provisório do dirigente da entidade, mediante decisão fundamentada."}, {"art": "Art. 192", "key": "192", "texto": "Art. 192. O dirigente da entidade será citado para, no prazo de dez dias, oferecer resposta escrita, podendo juntar documentos e indicar as provas a produzir."}, {"art": "Art. 193", "key": "193", "texto": "Art. 193. Apresentada ou não a resposta, e sendo necessário, a autoridade judiciária designará audiência de instrução e julgamento, intimando as partes.\n § 1º Salvo manifestação em audiência, as partes e o Ministério Público terão cinco dias para oferecer alegações finais, decidindo a autoridade judiciária em igual prazo.\n § 2º Em se tratando de afastamento provisório ou definitivo de dirigente de entidade governamental, a autoridade judiciária oficiará à autoridade administrativa imediatamente superior ao afastado, marcando prazo para a substituição.\n § 3º Antes de aplicar qualquer das medidas, a autoridade judiciária poderá fixar prazo para a remoção das irregularidades verificadas. Satisfeitas as exigências, o processo será extinto, sem julgamento de mérito.\n § 4º A multa e a advertência serão impostas ao dirigente da entidade ou programa de atendimento.\n Seção VII\n Da Apuração de Infração Administrativa às Normas de Proteção à Criança e ao Adolescente"}, {"art": "Art. 194", "key": "194", "texto": "Art. 194. O procedimento para imposição de penalidade administrativa por infração às normas de proteção à criança e ao adolescente terá início por representação do Ministério Público, ou do Conselho Tutelar, ou auto de infração elaborado por servidor efetivo ou voluntário credenciado, e assinado por duas testemunhas, se possível.\n § 1º No procedimento iniciado com o auto de infração, poderão ser usadas fórmulas impressas, especificando-se a natureza e as circunstâncias da infração.\n § 2º Sempre que possível, à verificação da infração seguir-se-á a lavratura do auto, certificando-se, em caso contrário, dos motivos do retardamento."}, {"art": "Art. 195", "key": "195", "texto": "Art. 195. O requerido terá prazo de dez dias para apresentação de defesa, contado da data da intimação, que será feita:\n I - pelo autuante, no próprio auto, quando este for lavrado na presença do requerido;\n II - por oficial de justiça ou funcionário legalmente habilitado, que entregará cópia do auto ou da representação ao requerido, ou a seu representante legal, lavrando certidão;\n III - por via postal, com aviso de recebimento, se não for encontrado o requerido ou seu representante legal;\n IV - por edital, com prazo de trinta dias, se incerto ou não sabido o paradeiro do requerido ou de seu representante legal."}, {"art": "Art. 196", "key": "196", "texto": "Art. 196. Não sendo apresentada a defesa no prazo legal, a autoridade judiciária dará vista dos autos do Ministério\nPúblico, por cinco dias, decidindo em igual prazo."}, {"art": "Art. 197", "key": "197", "texto": "Art. 197. Apresentada a defesa, a autoridade judiciária procederá na conformidade do artigo anterior, ou, sendo necessário, designará audiência de instrução e julgamento. (Incluído pela Lei nº 12.010, de 2009) Vigência\n Parágrafo único. Colhida a prova oral, manifestar-se-ão sucessivamente o Ministério Público e o procurador do requerido, pelo tempo de vinte minutos para cada um, prorrogável por mais dez, a critério da autoridade judiciária, que em seguida proferirá sentença.\n Seção VIII\n (Incluída pela Lei nº 12.010, de 2009) Vigência\n Da Habilitação de Pretendentes à Adoção"}, {"art": "Art. 197-A", "key": "197-A", "texto": "Art. 197-A. Os postulantes à adoção, domiciliados no Brasil, apresentarão petição inicial na qual conste: (Incluído pela Lei nº 12.010, de 2009) Vigência\n\f I - qualificação completa; (Incluído pela Lei nº 12.010, de 2009) Vigência\n II - dados familiares; (Incluído pela Lei nº 12.010, de 2009) Vigência\n III - cópias autenticadas de certidão de nascimento ou casamento, ou declaração relativa ao período de união estável; (Incluído pela Lei nº 12.010, de 2009) Vigência\n IV - cópias da cédula de identidade e inscrição no Cadastro de Pessoas Físicas; (Incluído pela Lei nº 12.010, de 2009) Vigência\n V - comprovante de renda e domicílio; (Incluído pela Lei nº 12.010, de 2009) Vigência\n VI - atestados de sanidade física e mental (Incluído pela Lei nº 12.010, de 2009) Vigência\n VII - certidão de antecedentes criminais; (Incluído pela Lei nº 12.010, de 2009) Vigência\n VIII - certidão negativa de distribuição cível. (Incluído pela Lei nº 12.010, de 2009) Vigência"}, {"art": "Art. 197-B", "key": "197-B", "texto": "Art. 197-B. A autoridade judiciária, no prazo de 48 (quarenta e oito) horas, dará vista dos autos ao Ministério\nPúblico, que no prazo de 5 (cinco) dias poderá: (Incluído pela Lei nº 12.010, de 2009) Vigência\n I - apresentar quesitos a serem respondidos pela equipe interprofissional encarregada de elaborar o estudo técnico a que se refere o art. 197-C desta Lei; (Incluído pela Lei nº 12.010, de 2009) Vigência\n II - requerer a designação de audiência para oitiva dos postulantes em juízo e testemunhas; (Incluído pela Lei nº 12.010, de 2009) Vigência\n III - requerer a juntada de documentos complementares e a realização de outras diligências que entender necessárias. (Incluído pela Lei nº 12.010, de 2009) Vigência"}, {"art": "Art. 197-C", "key": "197-C", "texto": "Art. 197-C. Intervirá no feito, obrigatoriamente, equipe interprofissional a serviço da Justiça da Infância e da\nJuventude, que deverá elaborar estudo psicossocial, que conterá subsídios que permitam aferir a capacidade e o preparo dos postulantes para o exercício de uma paternidade ou maternidade responsável, à luz dos requisitos e princípios desta\nLei. (Incluído pela Lei nº 12.010, de 2009) Vigência\n § 1 o É obrigatória a participação dos postulantes em programa oferecido pela Justiça da Infância e da Juventude preferencialmente com apoio dos técnicos responsáveis pela execução da política municipal de garantia do direito à convivência familiar, que inclua preparação psicológica, orientação e estímulo à adoção inter-racial, de crianças maiores ou de adolescentes, com necessidades específicas de saúde ou com deficiências e de grupos de irmãos. (Incluído pela\nLei nº 12.010, de 2009) Vigência\n § 1 o É obrigatória a participação dos postulantes em programa oferecido pela Justiça da Infância e da Juventude, preferencialmente com apoio dos técnicos responsáveis pela execução da política municipal de garantia do direito à convivência familiar e dos grupos de apoio à adoção devidamente habilitados perante a Justiça da Infância e da\nJuventude, que inclua preparação psicológica, orientação e estímulo à adoção inter-racial, de crianças ou de adolescentes com deficiência, com doenças crônicas ou com necessidades específicas de saúde, e de grupos de irmãos.\n(Redação dada pela Lei nº 13.509, de 2017)\n § 2 o Sempre que possível e recomendável, a etapa obrigatória da preparação referida no § 1 o deste artigo incluirá o contato com crianças e adolescentes em regime de acolhimento familiar ou institucional em condições de serem adotados, a ser realizado sob a orientação, supervisão e avaliação da equipe técnica da Justiça da Infância e da\nJuventude, com o apoio dos técnicos responsáveis pelo programa de acolhimento familiar ou institucional e pela execução da política municipal de garantia do direito à convivência familiar. (Incluído pela Lei nº 12.010, de 2009)\nVigência\n § 2 o Sempre que possível e recomendável, a etapa obrigatória da preparação referida no § 1 o deste artigo incluirá o contato com crianças e adolescentes em regime de acolhimento familiar ou institucional, a ser realizado sob orientação, supervisão e avaliação da equipe técnica da Justiça da Infância e da Juventude e dos grupos de apoio à adoção, com apoio dos técnicos responsáveis pelo programa de acolhimento familiar e institucional e pela execução da política municipal de garantia do direito à convivência familiar. (Redação dada pela Lei nº 13.509, de 2017)\n § 3 o É recomendável que as crianças e os adolescentes acolhidos institucionalmente ou por família acolhedora sejam preparados por equipe interprofissional antes da inclusão em família adotiva. (Incluído pela Lei nº 13.509, de 2017)"}, {"art": "Art. 197-D", "key": "197-D", "texto": "Art. 197-D. Certificada nos autos a conclusão da participação no programa referido no art. 197-C desta Lei, a autoridade judiciária, no prazo de 48 (quarenta e oito) horas, decidirá acerca das diligências requeridas pelo Ministério\nPúblico e determinará a juntada do estudo psicossocial, designando, conforme o caso, audiência de instrução e julgamento. (Incluído pela Lei nº 12.010, de 2009) Vigência\n\f Parágrafo único. Caso não sejam requeridas diligências, ou sendo essas indeferidas, a autoridade judiciária determinará a juntada do estudo psicossocial, abrindo a seguir vista dos autos ao Ministério Público, por 5 (cinco) dias, decidindo em igual prazo. (Incluído pela Lei nº 12.010, de 2009) Vigência"}, {"art": "Art. 197-E", "key": "197-E", "texto": "Art. 197-E. Deferida a habilitação, o postulante será inscrito nos cadastros referidos no art. 50 desta Lei, sendo a sua convocação para a adoção feita de acordo com ordem cronológica de habilitação e conforme a disponibilidade de crianças ou adolescentes adotáveis. (Incluído pela Lei nº 12.010, de 2009) Vigência\n § 1 o A ordem cronológica das habilitações somente poderá deixar de ser observada pela autoridade judiciária nas hipóteses previstas no § 13 do art. 50 desta Lei, quando comprovado ser essa a melhor solução no interesse do adotando. (Incluído pela Lei nº 12.010, de 2009) Vigência\n § 2 o A recusa sistemática na adoção das crianças ou adolescentes indicados importará na reavaliação da habilitação concedida. (Incluído pela Lei nº 12.010, de 2009) Vigência\n § 2 o A habilitação à adoção deverá ser renovada no mínimo trienalmente mediante avaliação por equipe interprofissional. (Redação dada pela Lei nº 13.509, de 2017)\n § 3 o Quando o adotante candidatar-se a uma nova adoção, será dispensável a renovação da habilitação, bastando a avaliação por equipe interprofissional. (Incluído pela Lei nº 13.509, de 2017)\n § 4 o Após 3 (três) recusas injustificadas, pelo habilitado, à adoção de crianças ou adolescentes indicados dentro do perfil escolhido, haverá reavaliação da habilitação concedida. (Incluído pela Lei nº 13.509, de 2017)\n § 5 o A desistência do pretendente em relação à guarda para fins de adoção ou a devolução da criança ou do adolescente depois do trânsito em julgado da sentença de adoção importará na sua exclusão dos cadastros de adoção e na vedação de renovação da habilitação, salvo decisão judicial fundamentada, sem prejuízo das demais sanções previstas na legislação vigente. (Incluído pela Lei nº 13.509, de 2017)"}, {"art": "Art. 197-F", "key": "197-F", "texto": "Art. 197-F. O prazo máximo para conclusão da habilitação à adoção será de 120 (cento e vinte) dias, prorrogável por igual período, mediante decisão fundamentada da autoridade judiciária. (Incluído pela Lei nº 13.509, de 2017)\n Capítulo IV\n Dos Recursos"}, {"art": "Art. 198", "key": "198", "texto": "Art. 198. Nos procedimentos afetos à Justiça da Infância e da Juventude, inclusive os relativos à execução das medidas socioeducativas, adotar-se-á o sistema recursal da Lei n o 5.869, de 11 de janeiro de 1973 (Código de Processo\nCivil) , com as seguintes adaptações: (Redação dada pela Lei nº 12.594, de 2012) (Vide)\n I - os recursos serão interpostos independentemente de preparo;\n II - em todos os recursos, salvo o de agravo de instrumento e de embargos de declaração, o prazo para interpor e para responder será sempre de dez dias;\n II - em todos os recursos, salvo nos embargos de declaração, o prazo para o Ministério Público e para a defesa será sempre de 10 (dez) dias; (Redação dada pela Lei nº 12.594, de 2012) (Vide)\n III - os recursos terão preferência de julgamento e dispensarão revisor;\n IV - o agravado será intimado para, no prazo de cinco dias, oferecer resposta e indicar as peças a serem trasladadas; (Revogado pela Lei nº 12.010, de 2009) Vigência\n V - será de quarenta e oito horas o prazo para a extração, a conferência e o conserto do traslado; (Revogado pela\nLei nº 12.010, de 2009) Vigência\n VI - a apelação será recebida em seu efeito devolutivo. Será também conferido efeito suspensivo quando interposta contra sentença que deferir a adoção por estrangeiro e, a juízo da autoridade judiciária, sempre que houver perigo de dano irreparável ou de difícil reparação; (Revogado pela Lei nº 12.010, de 2009) Vigência\n VII - antes de determinar a remessa dos autos à superior instância, no caso de apelação, ou do instrumento, no caso de agravo, a autoridade judiciária proferirá despacho fundamentado, mantendo ou reformando a decisão, no prazo de cinco dias;\n VIII - mantida a decisão apelada ou agravada, o escrivão remeterá os autos ou o instrumento à superior instância dentro de vinte e quatro horas, independentemente de novo pedido do recorrente; se a reformar, a remessa dos autos\n\fdependerá de pedido expresso da parte interessada ou do Ministério Público, no prazo de cinco dias, contados da intimação."}, {"art": "Art. 199", "key": "199", "texto": "Art. 199. Contra as decisões proferidas com base no art. 149 caberá recurso de apelação."}, {"art": "Art. 199-A", "key": "199-A", "texto": "Art. 199-A. A sentença que deferir a adoção produz efeito desde logo, embora sujeita a apelação, que será recebida exclusivamente no efeito devolutivo, salvo se se tratar de adoção internacional ou se houver perigo de dano irreparável ou de difícil reparação ao adotando. (Incluído pela Lei nº 12.010, de 2009) Vigência"}, {"art": "Art. 199-B", "key": "199-B", "texto": "Art. 199-B. A sentença que destituir ambos ou qualquer dos genitores do poder familiar fica sujeita a apelação, que deverá ser recebida apenas no efeito devolutivo. (Incluído pela Lei nº 12.010, de 2009) Vigência"}, {"art": "Art. 199-C", "key": "199-C", "texto": "Art. 199-C. Os recursos nos procedimentos de adoção e de destituição de poder familiar, em face da relevância das questões, serão processados com prioridade absoluta, devendo ser imediatamente distribuídos, ficando vedado que aguardem, em qualquer situação, oportuna distribuição, e serão colocados em mesa para julgamento sem revisão e com parecer urgente do Ministério Público. (Incluído pela Lei nº 12.010, de 2009) Vigência"}, {"art": "Art. 199-D", "key": "199-D", "texto": "Art. 199-D. O relator deverá colocar o processo em mesa para julgamento no prazo máximo de 60 (sessenta) dias, contado da sua conclusão. (Incluído pela Lei nº 12.010, de 2009) Vigência\n Parágrafo único. O Ministério Público será intimado da data do julgamento e poderá na sessão, se entender necessário, apresentar oralmente seu parecer. (Incluído pela Lei nº 12.010, de 2009) Vigência"}, {"art": "Art. 199-E", "key": "199-E", "texto": "Art. 199-E. O Ministério Público poderá requerer a instauração de procedimento para apuração de responsabilidades se constatar o descumprimento das providências e do prazo previstos nos artigos anteriores. (Incluído pela Lei nº 12.010, de 2009) Vigência\n Capítulo V\n Do Ministério Público"}, {"art": "Art. 200", "key": "200", "texto": "Art. 200. As funções do Ministério Público previstas nesta Lei serão exercidas nos termos da respectiva lei orgânica."}, {"art": "Art. 201", "key": "201", "texto": "Art. 201. Compete ao Ministério Público:\n I - conceder a remissão como forma de exclusão do processo;\n II - promover e acompanhar os procedimentos relativos às infrações atribuídas a adolescentes;\n III - promover e acompanhar as ações de alimentos e os procedimentos de suspensão e destituição do pátrio poder poder familiar , nomeação e remoção de tutores, curadores e guardiães, bem como oficiar em todos os demais procedimentos da competência da Justiça da Infância e da Juventude; (Expressão substituída pela Lei nº 12.010, de 2009) Vigência\n IV - promover, de ofício ou por solicitação dos interessados, a especialização e a inscrição de hipoteca legal e a prestação de contas dos tutores, curadores e quaisquer administradores de bens de crianças e adolescentes nas hipóteses do art. 98;\n V - promover o inquérito civil e a ação civil pública para a proteção dos interesses individuais, difusos ou coletivos relativos à infância e à adolescência, inclusive os definidos no art. 220, § 3º inciso II, da Constituição Federal ;\n VI - instaurar procedimentos administrativos e, para instruí-los:\n a) expedir notificações para colher depoimentos ou esclarecimentos e, em caso de não comparecimento injustificado, requisitar condução coercitiva, inclusive pela polícia civil ou militar;\n b) requisitar informações, exames, perícias e documentos de autoridades municipais, estaduais e federais, da administração direta ou indireta, bem como promover inspeções e diligências investigatórias;\n c) requisitar informações e documentos a particulares e instituições privadas;\n VII - instaurar sindicâncias, requisitar diligências investigatórias e determinar a instauração de inquérito policial, para apuração de ilícitos ou infrações às normas de proteção à infância e à juventude;\n VIII - zelar pelo efetivo respeito aos direitos e garantias legais assegurados às crianças e adolescentes, promovendo as medidas judiciais e extrajudiciais cabíveis;\n\f IX - impetrar mandado de segurança, de injunção e habeas corpus, em qualquer juízo, instância ou tribunal, na defesa dos interesses sociais e individuais indisponíveis afetos à criança e ao adolescente;\n X - representar ao juízo visando à aplicação de penalidade por infrações cometidas contra as normas de proteção à infância e à juventude, sem prejuízo da promoção da responsabilidade civil e penal do infrator, quando cabível;\n XI - inspecionar as entidades públicas e particulares de atendimento e os programas de que trata esta Lei, adotando de pronto as medidas administrativas ou judiciais necessárias à remoção de irregularidades porventura verificadas;\n XII - requisitar força policial, bem como a colaboração dos serviços médicos, hospitalares, educacionais e de assistência social, públicos ou privados, para o desempenho de suas atribuições.\n XIII - intervir, quando não for parte, nas causas cíveis e criminais decorrentes de violência doméstica e familiar contra a criança e o adolescente. (Incluído pela Lei nº 14.344, de 2022) Vigência\n § 1º A legitimação do Ministério Público para as ações cíveis previstas neste artigo não impede a de terceiros, nas mesmas hipóteses, segundo dispuserem a Constituição e esta Lei.\n § 2º As atribuições constantes deste artigo não excluem outras, desde que compatíveis com a finalidade do\nMinistério Público.\n § 3º O representante do Ministério Público, no exercício de suas funções, terá livre acesso a todo local onde se encontre criança ou adolescente.\n § 4º O representante do Ministério Público será responsável pelo uso indevido das informações e documentos que requisitar, nas hipóteses legais de sigilo.\n § 5º Para o exercício da atribuição de que trata o inciso VIII deste artigo, poderá o representante do Ministério\nPúblico:\n a) reduzir a termo as declarações do reclamante, instaurando o competente procedimento, sob sua presidência;\n b) entender-se diretamente com a pessoa ou autoridade reclamada, em dia, local e horário previamente notificados ou acertados;\n c) efetuar recomendações visando à melhoria dos serviços públicos e de relevância pública afetos à criança e ao adolescente, fixando prazo razoável para sua perfeita adequação."}, {"art": "Art. 202", "key": "202", "texto": "Art. 202. Nos processos e procedimentos em que não for parte, atuará obrigatoriamente o Ministério Público na defesa dos direitos e interesses de que cuida esta Lei, hipótese em que terá vista dos autos depois das partes, podendo juntar documentos e requerer diligências, usando os recursos cabíveis."}, {"art": "Art. 203", "key": "203", "texto": "Art. 203. A intimação do Ministério Público, em qualquer caso, será feita pessoalmente."}, {"art": "Art. 204", "key": "204", "texto": "Art. 204. A falta de intervenção do Ministério Público acarreta a nulidade do feito, que será declarada de ofício pelo juiz ou a requerimento de qualquer interessado."}, {"art": "Art. 205", "key": "205", "texto": "Art. 205. As manifestações processuais do representante do Ministério Público deverão ser fundamentadas.\n Capítulo VI\n Do Advogado"}, {"art": "Art. 206", "key": "206", "texto": "Art. 206. A criança ou o adolescente, seus pais ou responsável, e qualquer pessoa que tenha legítimo interesse na solução da lide poderão intervir nos procedimentos de que trata esta Lei, através de advogado, o qual será intimado para todos os atos, pessoalmente ou por publicação oficial, respeitado o segredo de justiça.\n Parágrafo único. Será prestada assistência judiciária integral e gratuita àqueles que dela necessitarem."}, {"art": "Art. 207", "key": "207", "texto": "Art. 207. Nenhum adolescente a quem se atribua a prática de ato infracional, ainda que ausente ou foragido, será processado sem defensor.\n § 1º Se o adolescente não tiver defensor, ser-lhe-á nomeado pelo juiz, ressalvado o direito de, a todo tempo, constituir outro de sua preferência.\n § 2º A ausência do defensor não determinará o adiamento de nenhum ato do processo, devendo o juiz nomear substituto, ainda que provisoriamente, ou para o só efeito do ato.\n\f § 3º Será dispensada a outorga de mandato, quando se tratar de defensor nomeado ou, sido constituído, tiver sido indicado por ocasião de ato formal com a presença da autoridade judiciária.\n Capítulo VII\n Da Proteção Judicial dos Interesses Individuais, Difusos e Coletivos"}, {"art": "Art. 208", "key": "208", "texto": "Art. 208. Regem-se pelas disposições desta Lei as ações de responsabilidade por ofensa aos direitos assegurados\nà criança e ao adolescente, referentes ao não oferecimento ou oferta irregular:\n I - do ensino obrigatório;\n II - de atendimento educacional especializado aos portadores de deficiência;\n III - de atendimento em creche e pré-escola às crianças de zero a seis anos de idade;\n III – de atendimento em creche e pré-escola às crianças de zero a cinco anos de idade; (Redação dada pela Lei nº 13.306, de 2016)\n IV - de ensino noturno regular, adequado às condições do educando;\n V - de programas suplementares de oferta de material didático-escolar, transporte e assistência à saúde do educando do ensino fundamental;\n VI - de serviço de assistência social visando à proteção à família, à maternidade, à infância e à adolescência, bem como ao amparo às crianças e adolescentes que dele necessitem;\n VII - de acesso às ações e serviços de saúde;\n VIII - de escolarização e profissionalização dos adolescentes privados de liberdade.\n IX - de ações, serviços e programas de orientação, apoio e promoção social de famílias e destinados ao pleno exercício do direito à convivência familiar por crianças e adolescentes. (Incluído pela Lei nº 12.010, de 2009) Vigência\n X - de programas de atendimento para a execução das medidas socioeducativas e aplicação de medidas de proteção. (Incluído pela Lei nº 12.594, de 2012) (Vide)\n XI - de políticas e programas integrados de atendimento à criança e ao adolescente vítima ou testemunha de violência. (Incluído pela Lei nº 13.431, de 2017) (Vigência)\n Parágrafo único. As hipóteses previstas neste artigo não excluem da proteção judicial outros interesses individuais, difusos ou coletivos, próprios da infância e da adolescência, protegidos pela Constituição e pela lei.\n § 1 o As hipóteses previstas neste artigo não excluem da proteção judicial outros interesses individuais, difusos ou coletivos, próprios da infância e da adolescência, protegidos pela Constituição e pela Lei. (Renumerado do Parágrafo único pela Lei nº 11.259, de 2005)\n § 2 o A investigação do desaparecimento de crianças ou adolescentes será realizada imediatamente após notificação aos órgãos competentes, que deverão comunicar o fato aos portos, aeroportos, Polícia Rodoviária e companhias de transporte interestaduais e internacionais, fornecendo-lhes todos os dados necessários à identificação do desaparecido. (Incluído pela Lei nº 11.259, de 2005)\n § 3º A notificação a que se refere o § 2º deste artigo será imediatamente comunicada ao Cadastro Nacional de\nPessoas Desaparecidas e ao Cadastro Nacional de Crianças e Adolescentes Desaparecidos, que deverão ser prontamente atualizados a cada nova informação. (Incluído pela Lei nº 14.548, de 2023)"}, {"art": "Art. 209", "key": "209", "texto": "Art. 209. As ações previstas neste Capítulo serão propostas no foro do local onde ocorreu ou deva ocorrer a ação ou omissão, cujo juízo terá competência absoluta para processar a causa, ressalvadas a competência da Justiça Federal e a competência originária dos tribunais superiores."}, {"art": "Art. 210", "key": "210", "texto": "Art. 210. Para as ações cíveis fundadas em interesses coletivos ou difusos, consideram-se legitimados concorrentemente:\n I - o Ministério Público;\n II - a União, os estados, os municípios, o Distrito Federal e os territórios;\n\f III - as associações legalmente constituídas há pelo menos um ano e que incluam entre seus fins institucionais a defesa dos interesses e direitos protegidos por esta Lei, dispensada a autorização da assembléia, se houver prévia autorização estatutária.\n § 1º Admitir-se-á litisconsórcio facultativo entre os Ministérios Públicos da União e dos estados na defesa dos interesses e direitos de que cuida esta Lei.\n § 2º Em caso de desistência ou abandono da ação por associação legitimada, o Ministério Público ou outro legitimado poderá assumir a titularidade ativa."}, {"art": "Art. 211", "key": "211", "texto": "Art. 211. Os órgãos públicos legitimados poderão tomar dos interessados compromisso de ajustamento de sua conduta às exigências legais, o qual terá eficácia de título executivo extrajudicial."}, {"art": "Art. 212", "key": "212", "texto": "Art. 212. Para defesa dos direitos e interesses protegidos por esta Lei, são admissíveis todas as espécies de ações pertinentes.\n § 1º Aplicam-se às ações previstas neste Capítulo as normas do Código de Processo Civil.\n § 2º Contra atos ilegais ou abusivos de autoridade pública ou agente de pessoa jurídica no exercício de atribuições do poder público, que lesem direito líquido e certo previsto nesta Lei, caberá ação mandamental, que se regerá pelas normas da lei do mandado de segurança."}, {"art": "Art. 213", "key": "213", "texto": "Art. 213 ..................................................................\n Parágrafo único. Se a ofendida é menor de catorze anos:\n Pena - reclusão de quatro a dez anos.\n 5)"}, {"art": "Art. 214", "key": "214", "texto": "Art. 214...................................................................\n Parágrafo único. Se o ofendido é menor de catorze anos:\n Pena - reclusão de três a nove anos.»"}, {"art": "Art. 215", "key": "215", "texto": "Art. 215. O juiz poderá conferir efeito suspensivo aos recursos, para evitar dano irreparável à parte."}, {"art": "Art. 216", "key": "216", "texto": "Art. 216. Transitada em julgado a sentença que impuser condenação ao poder público, o juiz determinará a remessa de peças à autoridade competente, para apuração da responsabilidade civil e administrativa do agente a que se atribua a ação ou omissão."}, {"art": "Art. 217", "key": "217", "texto": "Art. 217. Decorridos sessenta dias do trânsito em julgado da sentença condenatória sem que a associação autora lhe promova a execução, deverá fazê-lo o Ministério Público, facultada igual iniciativa aos demais legitimados."}, {"art": "Art. 218", "key": "218", "texto": "Art. 218. O juiz condenará a associação autora a pagar ao réu os honorários advocatícios arbitrados na conformidade do § 4º do art. 20 da Lei n.º 5.869, de 11 de janeiro de 1973 (Código de Processo Civil) , quando reconhecer que a pretensão é manifestamente infundada.\n Parágrafo único. Em caso de litigância de má-fé, a associação autora e os diretores responsáveis pela propositura da ação serão solidariamente condenados ao décuplo das custas, sem prejuízo de responsabilidade por perdas e danos."}, {"art": "Art. 219", "key": "219", "texto": "Art. 219. Nas ações de que trata este Capítulo, não haverá adiantamento de custas, emolumentos, honorários periciais e quaisquer outras despesas."}, {"art": "Art. 220", "key": "220", "texto": "Art. 220. Qualquer pessoa poderá e o servidor público deverá provocar a iniciativa do Ministério Público, prestando- lhe informações sobre fatos que constituam objeto de ação civil, e indicando-lhe os elementos de convicção."}, {"art": "Art. 221", "key": "221", "texto": "Art. 221. Se, no exercício de suas funções, os juízos e tribunais tiverem conhecimento de fatos que possam ensejar a propositura de ação civil, remeterão peças ao Ministério Público para as providências cabíveis."}, {"art": "Art. 222", "key": "222", "texto": "Art. 222. Para instruir a petição inicial, o interessado poderá requerer às autoridades competentes as certidões e informações que julgar necessárias, que serão fornecidas no prazo de quinze dias."}, {"art": "Art. 223", "key": "223", "texto": "Art. 223. O Ministério Público poderá instaurar, sob sua presidência, inquérito civil, ou requisitar, de qualquer pessoa, organismo público ou particular, certidões, informações, exames ou perícias, no prazo que assinalar, o qual não poderá ser inferior a dez dias úteis.\n § 1º Se o órgão do Ministério Público, esgotadas todas as diligências, se convencer da inexistência de fundamento para a propositura da ação cível, promoverá o arquivamento dos autos do inquérito civil ou das peças informativas, fazendo-o fundamentadamente.\n § 2º Os autos do inquérito civil ou as peças de informação arquivados serão remetidos, sob pena de se incorrer em falta grave, no prazo de três dias, ao Conselho Superior do Ministério Público.\n § 3º Até que seja homologada ou rejeitada a promoção de arquivamento, em sessão do Conselho Superior do\nMinistério público, poderão as associações legitimadas apresentar razões escritas ou documentos, que serão juntados aos autos do inquérito ou anexados às peças de informação.\n § 4º A promoção de arquivamento será submetida a exame e deliberação do Conselho Superior do Ministério\nPúblico, conforme dispuser o seu regimento.\n § 5º Deixando o Conselho Superior de homologar a promoção de arquivamento, designará, desde logo, outro órgão do Ministério Público para o ajuizamento da ação."}, {"art": "Art. 224", "key": "224", "texto": "Art. 224. Aplicam-se subsidiariamente, no que couber, as disposições da Lei n.º 7.347, de 24 de julho de 1985 .\n Título VII\n Dos Crimes e Das Infrações Administrativas\n Capítulo I\n Dos Crimes\n Seção I\n Disposições Gerais"}, {"art": "Art. 225", "key": "225", "texto": "Art. 225. Este Capítulo dispõe sobre crimes praticados contra a criança e o adolescente, por ação ou omissão, sem prejuízo do disposto na legislação penal."}, {"art": "Art. 226", "key": "226", "texto": "Art. 226. Aplicam-se aos crimes definidos nesta Lei as normas da Parte Geral do Código Penal e, quanto ao processo, as pertinentes ao Código de Processo Penal.\n § 1º Aos crimes cometidos contra a criança e o adolescente, independentemente da pena prevista, não se aplica a\nLei nº 9.099, de 26 de setembro de 1995. (Incluído pela Lei nº 14.344, de 2022) Vigência\n § 2º Nos casos de violência doméstica e familiar contra a criança e o adolescente, é vedada a aplicação de penas de cesta básica ou de outras de prestação pecuniária, bem como a substituição de pena que implique o pagamento isolado de multa. (Incluído pela Lei nº 14.344, de 2022) Vigência"}, {"art": "Art. 227", "key": "227", "texto": "Art. 227. Os crimes definidos nesta Lei são de ação pública incondicionada."}, {"art": "Art. 227-A", "key": "227-A", "texto": "Art. 227-A Os efeitos da condenação prevista no inciso I do caput do art. 92 do Decreto-Lei nº 2.848, de 7 de dezembro de 1940 (Código Penal), para os crimes previstos nesta Lei, praticados por servidores públicos com abuso de autoridade, são condicionados à ocorrência de reincidência. (Incluído pela Lei nº 13.869. de 2019)\n Parágrafo único. A perda do cargo, do mandato ou da função, nesse caso, independerá da pena aplicada na reincidência. (Incluído pela Lei nº 13.869. de 2019)\n Seção II\n Dos Crimes em Espécie"}, {"art": "Art. 228", "key": "228", "texto": "Art. 228. Deixar o encarregado de serviço ou o dirigente de estabelecimento de atenção à saúde de gestante de manter registro das atividades desenvolvidas, na forma e prazo referidos no art. 10 desta Lei, bem como de fornecer à parturiente ou a seu responsável, por ocasião da alta médica, declaração de nascimento, onde constem as intercorrências do parto e do desenvolvimento do neonato:\n Pena - detenção de seis meses a dois anos.\n Parágrafo único. Se o crime é culposo:\n Pena - detenção de dois a seis meses, ou multa."}, {"art": "Art. 229", "key": "229", "texto": "Art. 229. Deixar o médico, enfermeiro ou dirigente de estabelecimento de atenção à saúde de gestante de identificar corretamente o neonato e a parturiente, por ocasião do parto, bem como deixar de proceder aos exames referidos no art. 10 desta Lei:\n Pena - detenção de seis meses a dois anos.\n Parágrafo único. Se o crime é culposo:\n Pena - detenção de dois a seis meses, ou multa."}, {"art": "Art. 230", "key": "230", "texto": "Art. 230. Privar a criança ou o adolescente de sua liberdade, procedendo à sua apreensão sem estar em flagrante de ato infracional ou inexistindo ordem escrita da autoridade judiciária competente:\n Pena - detenção de seis meses a dois anos.\n Parágrafo único. Incide na mesma pena aquele que procede à apreensão sem observância das formalidades legais.\n § 1º Incide na mesma pena aquele que procede à apreensão sem observância das formalidades legais. (Incluído pela Lei nº 15.163, de 2025)\n § 2º Ao crime previsto neste artigo não se aplica a Lei nº 9.099, de 26 de setembro de 1995. (Incluído pela Lei nº 15.163, de 2025)"}, {"art": "Art. 231", "key": "231", "texto": "Art. 231. Deixar a autoridade policial responsável pela apreensão de criança ou adolescente de fazer imediata comunicação à autoridade judiciária competente e à família do apreendido ou à pessoa por ele indicada:\n Pena - detenção de seis meses a dois anos."}, {"art": "Art. 232", "key": "232", "texto": "Art. 232. Submeter criança ou adolescente sob sua autoridade, guarda ou vigilância a vexame ou a constrangimento:\n Pena - detenção de seis meses a dois anos."}, {"art": "Art. 233", "key": "233", "texto": "Art. 233. Submeter criança ou adolescente sob sua autoridade, guarda ou vigilância a tortura: (Revogado pela Lei nº 9.455, de 7.4.1997\n Pena - reclusão de um a cinco anos. (Revogado pela Lei nº 9.455, de 7.4.1997 :\n § 1º Se resultar lesão corporal grave: (Revogado pela Lei nº 9.455, de 7.4.1997 :\n Pena - reclusão de dois a oito anos. (Revogado pela Lei nº 9.455, de 7.4.1997 :\n § 2º Se resultar lesão corporal gravíssima: (Revogado pela Lei nº 9.455, de 7.4.1997 :\n Pena - reclusão de quatro a doze anos. (Revogado pela Lei nº 9.455, de 7.4.1997 :\n § 3º Se resultar morte: (Revogado pela Lei nº 9.455, de 7.4.1997 :\n Pena - reclusão de quinze a trinta anos. (Revogado pela Lei nº 9.455, de 7.4.1997 :"}, {"art": "Art. 234", "key": "234", "texto": "Art. 234. Deixar a autoridade competente, sem justa causa, de ordenar a imediata liberação de criança ou adolescente, tão logo tenha conhecimento da ilegalidade da apreensão:\n Pena - detenção de seis meses a dois anos."}, {"art": "Art. 235", "key": "235", "texto": "Art. 235. Descumprir, injustificadamente, prazo fixado nesta Lei em benefício de adolescente privado de liberdade:\n Pena - detenção de seis meses a dois anos."}, {"art": "Art. 236", "key": "236", "texto": "Art. 236. Impedir ou embaraçar a ação de autoridade judiciária, membro do Conselho Tutelar ou representante do\nMinistério Público no exercício de função prevista nesta Lei:\n Pena - detenção de seis meses a dois anos."}, {"art": "Art. 237", "key": "237", "texto": "Art. 237. Subtrair criança ou adolescente ao poder de quem o tem sob sua guarda em virtude de lei ou ordem judicial, com o fim de colocação em lar substituto:\n Pena - reclusão de dois a seis anos, e multa."}, {"art": "Art. 238", "key": "238", "texto": "Art. 238. Prometer ou efetivar a entrega de filho ou pupilo a terceiro, mediante paga ou recompensa:\n Pena - reclusão de um a quatro anos, e multa.\n Parágrafo único. Incide nas mesmas penas quem oferece ou efetiva a paga ou recompensa."}, {"art": "Art. 239", "key": "239", "texto": "Art. 239. Promover ou auxiliar a efetivação de ato destinado ao envio de criança ou adolescente para o exterior com inobservância das formalidades legais ou com o fito de obter lucro:\n Pena - reclusão de quatro a seis anos, e multa.\n Parágrafo único. Se há emprego de violência, grave ameaça ou fraude: (Incluído pela Lei nº 10.764, de 12.11.2003)\n Pena - reclusão, de 6 (seis) a 8 (oito) anos, além da pena correspondente à violência."}, {"art": "Art. 240", "key": "240", "texto": "Art. 240. Produzir, reproduzir, dirigir, fotografar, filmar ou registrar, por qualquer meio, cena de sexo explícito ou pornográfica, envolvendo criança ou adolescente: (Redação dada pela Lei nº 11.829, de 2008)\n Pena – reclusão, de 4 (quatro) a 8 (oito) anos, e multa. (Redação dada pela Lei nº 11.829, de 2008)\n § 1 o Incorre nas mesmas penas quem agencia, facilita, recruta, coage, ou de qualquer modo intermedeia a participação de criança ou adolescente nas cenas referidas no caput deste artigo, ou ainda quem com esses contracena.\n(Redação dada pela Lei nº 11.829, de 2008)\n § 1º Incorre nas mesmas penas quem: (Redação dada pela Lei nº 14.811, de 2024)\n I - agencia, facilita, recruta, coage ou de qualquer modo intermedeia a participação de criança ou adolescente nas cenas referidas no caput deste artigo, ou ainda quem com esses contracena; (Incluído pela Lei nº 14.811, de 2024)\n II - exibe, transmite, auxilia ou facilita a exibição ou transmissão, em tempo real, pela internet, por aplicativos, por meio de dispositivo informático ou qualquer meio ou ambiente digital, de cena de sexo explícito ou pornográfica com a participação de criança ou adolescente. (Incluído pela Lei nº 14.811, de 2024)\n § 2 o Aumenta-se a pena de 1/3 (um terço) se o agente comete o crime: (Redação dada pela Lei nº 11.829, de 2008)\n I – no exercício de cargo ou função pública ou a pretexto de exercê-la; (Redação dada pela Lei nº 11.829, de 2008)\n II – prevalecendo-se de relações domésticas, de coabitação ou de hospitalidade; ou (Redação dada pela Lei nº 11.829, de 2008)\n III – prevalecendo-se de relações de parentesco consangüíneo ou afim até o terceiro grau, ou por adoção, de tutor, curador, preceptor, empregador da vítima ou de quem, a qualquer outro título, tenha autoridade sobre ela, ou com seu consentimento. (Incluído pela Lei nº 11.829, de 2008)"}, {"art": "Art. 241", "key": "241", "texto": "Art. 241. Vender ou expor à venda fotografia, vídeo ou outro registro que contenha cena de sexo explícito ou pornográfica envolvendo criança ou adolescente: (Redação dada pela Lei nº 11.829, de 2008)\n Pena – reclusão, de 4 (quatro) a 8 (oito) anos, e multa. (Redação dada pela Lei nº 11.829, de 2008)"}, {"art": "Art. 241-A", "key": "241-A", "texto": "Art. 241-A. Oferecer, trocar, disponibilizar, transmitir, distribuir, publicar ou divulgar por qualquer meio, inclusive por meio de sistema de informática ou telemático, fotografia, vídeo ou outro registro que contenha cena de sexo explícito ou pornográfica envolvendo criança ou adolescente: (Incluído pela Lei nº 11.829, de 2008)\n Pena – reclusão, de 3 (três) a 6 (seis) anos, e multa. (Incluído pela Lei nº 11.829, de 2008)\n § 1 o Nas mesmas penas incorre quem: (Incluído pela Lei nº 11.829, de 2008)\n I – assegura os meios ou serviços para o armazenamento das fotografias, cenas ou imagens de que trata o caput deste artigo; (Incluído pela Lei nº 11.829, de 2008)\n II – assegura, por qualquer meio, o acesso por rede de computadores às fotografias, cenas ou imagens de que trata o caput deste artigo. (Incluído pela Lei nº 11.829, de 2008)\n § 2 o As condutas tipificadas nos incisos I e II do § 1 o deste artigo são puníveis quando o responsável legal pela prestação do serviço, oficialmente notificado, deixa de desabilitar o acesso ao conteúdo ilícito de que trata o caput deste artigo. (Incluído pela Lei nº 11.829, de 2008)"}, {"art": "Art. 241-B", "key": "241-B", "texto": "Art. 241-B. Adquirir, possuir ou armazenar, por qualquer meio, fotografia, vídeo ou outra forma de registro que contenha cena de sexo explícito ou pornográfica envolvendo criança ou adolescente: (Incluído pela Lei nº 11.829, de 2008)\n Pena – reclusão, de 1 (um) a 4 (quatro) anos, e multa. (Incluído pela Lei nº 11.829, de 2008)\n § 1 o A pena é diminuída de 1 (um) a 2/3 (dois terços) se de pequena quantidade o material a que se refere o caput deste artigo. (Incluído pela Lei nº 11.829, de 2008)\n § 2 o Não há crime se a posse ou o armazenamento tem a finalidade de comunicar às autoridades competentes a ocorrência das condutas descritas nos arts. 240, 241, 241-A e 241-C desta Lei, quando a comunicação for feita por:\n(Incluído pela Lei nº 11.829, de 2008)\n I – agente público no exercício de suas funções; (Incluído pela Lei nº 11.829, de 2008)\n II – membro de entidade, legalmente constituída, que inclua, entre suas finalidades institucionais, o recebimento, o processamento e o encaminhamento de notícia dos crimes referidos neste parágrafo; (Incluído pela Lei nº 11.829, de 2008)\n III – representante legal e funcionários responsáveis de provedor de acesso ou serviço prestado por meio de rede de computadores, até o recebimento do material relativo à notícia feita à autoridade policial, ao Ministério Público ou ao\nPoder Judiciário. (Incluído pela Lei nº 11.829, de 2008)\n § 3 o As pessoas referidas no § 2 o deste artigo deverão manter sob sigilo o material ilícito referido. (Incluído pela\nLei nº 11.829, de 2008)"}, {"art": "Art. 241-C", "key": "241-C", "texto": "Art. 241-C. Simular a participação de criança ou adolescente em cena de sexo explícito ou pornográfica por meio de adulteração, montagem ou modificação de fotografia, vídeo ou qualquer outra forma de representação visual: (Incluído pela Lei nº 11.829, de 2008)\n Pena – reclusão, de 1 (um) a 3 (três) anos, e multa. (Incluído pela Lei nº 11.829, de 2008)\n Parágrafo único. Incorre nas mesmas penas quem vende, expõe à venda, disponibiliza, distribui, publica ou divulga por qualquer meio, adquire, possui ou armazena o material produzido na forma do caput deste artigo. (Incluído pela Lei nº\n\f11.829, de 2008)"}, {"art": "Art. 241-D", "key": "241-D", "texto": "Art. 241-D. Aliciar, assediar, instigar ou constranger, por qualquer meio de comunicação, criança, com o fim de com ela praticar ato libidinoso: (Incluído pela Lei nº 11.829, de 2008)\n Pena – reclusão, de 1 (um) a 3 (três) anos, e multa. (Incluído pela Lei nº 11.829, de 2008)\n Parágrafo único. Nas mesmas penas incorre quem: (Incluído pela Lei nº 11.829, de 2008)\n I – facilita ou induz o acesso à criança de material contendo cena de sexo explícito ou pornográfica com o fim de com ela praticar ato libidinoso; (Incluído pela Lei nº 11.829, de 2008)\n II – pratica as condutas descritas no caput deste artigo com o fim de induzir criança a se exibir de forma pornográfica ou sexualmente explícita. (Incluído pela Lei nº 11.829, de 2008)"}, {"art": "Art. 241-E", "key": "241-E", "texto": "Art. 241-E. Para efeito dos crimes previstos nesta Lei, a expressão “cena de sexo explícito ou pornográfica” compreende qualquer situação que envolva criança ou adolescente em atividades sexuais explícitas, reais ou simuladas, ou exibição dos órgãos genitais de uma criança ou adolescente para fins primordialmente sexuais. (Incluído pela Lei nº 11.829, de 2008)"}, {"art": "Art. 242", "key": "242", "texto": "Art. 242. Vender, fornecer ainda que gratuitamente ou entregar, de qualquer forma, a criança ou adolescente arma, munição ou explosivo:\n Pena - detenção de seis meses a dois anos, e multa.\n Pena - reclusão, de 3 (três) a 6 (seis) anos. (Redação dada pela Lei nº 10.764, de 12.11.2003)"}, {"art": "Art. 243", "key": "243", "texto": "Art. 243. Vender, fornecer, servir, ministrar ou entregar, ainda que gratuitamente, de qualquer forma, a criança ou a adolescente, bebida alcoólica ou, sem justa causa, outros produtos cujos componentes possam causar dependência física ou psíquica: (Redação dada pela Lei nº 13.106, de 2015)\n Pena - detenção de 2 (dois) a 4 (quatro) anos, e multa, se o fato não constitui crime mais grave. (Redação dada pela\nLei nº 13.106, de 2015)\n Parágrafo único. A pena será aumentada de 1/3 (um terço) até a metade se a criança ou o adolescente utilizar ou consumir o produto. (Incluído pela Lei nº 15.234, de 2025)"}, {"art": "Art. 244", "key": "244", "texto": "Art. 244. Vender, fornecer ainda que gratuitamente ou entregar, de qualquer forma, a criança ou adolescente fogos de estampido ou de artifício, exceto aqueles que, pelo seu reduzido potencial, sejam incapazes de provocar qualquer dano físico em caso de utilização indevida:\n Pena - detenção de seis meses a dois anos, e multa."}, {"art": "Art. 244-A", "key": "244-A", "texto": "Art. 244-A. Submeter criança ou adolescente, como tais definidos no caput do art. 2 o desta Lei, à prostituição ou à exploração sexual: (Incluído pela Lei nº 9.975, de 23.6.2000)\n Pena - reclusão de quatro a dez anos, e multa.\n Pena – reclusão de quatro a dez anos e multa, além da perda de bens e valores utilizados na prática criminosa em favor do Fundo dos Direitos da Criança e do Adolescente da unidade da Federação (Estado ou Distrito Federal) em que foi cometido o crime, ressalvado o direito de terceiro de boa-fé. (Redação dada pela Lei nº 13.440, de 2017)\n § 1 o Incorrem nas mesmas penas o proprietário, o gerente ou o responsável pelo local em que se verifique a submissão de criança ou adolescente às práticas referidas no caput deste artigo. (Incluído pela Lei nº 9.975, de 23.6.2000)\n § 2 o Constitui efeito obrigatório da condenação a cassação da licença de localização e de funcionamento do estabelecimento. (Incluído pela Lei nº 9.975, de 23.6.2000)"}, {"art": "Art. 244-B", "key": "244-B", "texto": "Art. 244-B. Corromper ou facilitar a corrupção de menor de 18 (dezoito) anos, com ele praticando infração penal ou induzindo-o a praticá-la: (Incluído pela Lei nº 12.015, de 2009)\n Pena - reclusão, de 1 (um) a 4 (quatro) anos. (Incluído pela Lei nº 12.015, de 2009)\n\f § 1 o Incorre nas penas previstas no caput deste artigo quem pratica as condutas ali tipificadas utilizando-se de quaisquer meios eletrônicos, inclusive salas de bate-papo da internet. (Incluído pela Lei nº 12.015, de 2009)\n § 2 o As penas previstas no caput deste artigo são aumentadas de um terço no caso de a infração cometida ou induzida estar incluída no rol do art. 1 o da Lei n o 8.072, de 25 de julho de 1990 . (Incluído pela Lei nº 12.015, de 2009)"}, {"art": "Art. 244-C", "key": "244-C", "texto": "Art. 244-C. Deixar o pai, a mãe ou o responsável legal, de forma dolosa, de comunicar à autoridade pública o desaparecimento de criança ou adolescente: (Incluído pela Lei nº 14.811, de 2024)\n Pena - reclusão, de 2 (dois) a 4 (quatro) anos, e multa. (Incluído pela Lei nº 14.811, de 2024)\n Capítulo II\n Das Infrações Administrativas"}, {"art": "Art. 245", "key": "245", "texto": "Art. 245. Deixar o médico, professor ou responsável por estabelecimento de atenção à saúde e de ensino fundamental, pré-escola ou creche, de comunicar à autoridade competente os casos de que tenha conhecimento, envolvendo suspeita ou confirmação de maus-tratos contra criança ou adolescente:\n Pena - multa de três a vinte salários de referência, aplicando-se o dobro em caso de reincidência."}, {"art": "Art. 246", "key": "246", "texto": "Art. 246. Impedir o responsável ou funcionário de entidade de atendimento o exercício dos direitos constantes nos incisos II, III, VII, VIII e XI do art. 124 desta Lei:\n Pena - multa de três a vinte salários de referência, aplicando-se o dobro em caso de reincidência."}, {"art": "Art. 247", "key": "247", "texto": "Art. 247. Divulgar, total ou parcialmente, sem autorização devida, por qualquer meio de comunicação, nome, ato ou documento de procedimento policial, administrativo ou judicial relativo a criança ou adolescente a que se atribua ato infracional:\n Pena - multa de três a vinte salários de referência, aplicando-se o dobro em caso de reincidência.\n § 1º Incorre na mesma pena quem exibe, total ou parcialmente, fotografia de criança ou adolescente envolvido em ato infracional, ou qualquer ilustração que lhe diga respeito ou se refira a atos que lhe sejam atribuídos, de forma a permitir sua identificação, direta ou indiretamente.\n § 1º Incorre na mesma pena quem exibe ou transmite imagem, vídeo ou corrente de vídeo de criança ou adolescente envolvido em ato infracional ou em outro ato ilícito que lhe seja atribuído, de forma a permitir sua identificação. (Redação dada pela Lei nº 14.811, de 2024)\n § 2º Se o fato for praticado por órgão de imprensa ou emissora de rádio ou televisão, além da pena prevista neste artigo, a autoridade judiciária poderá determinar a apreensão da publicação ou a suspensão da programação da emissora até por dois dias, bem como da publicação do periódico até por dois números. (Expressão declarada inconstitucional pela\nADIN 869)."}, {"art": "Art. 248", "key": "248", "texto": "Art. 248. Deixar de apresentar à autoridade judiciária de seu domicílio, no prazo de cinco dias, com o fim de regularizar a guarda, adolescente trazido de outra comarca para a prestação de serviço doméstico, mesmo que autorizado pelos pais ou responsável: (Vide Lei nº 13.431, de 2017) (Vigência) (Revogado pela Lei nº 13.431, de 2017)\n(Vigência)\n Pena - multa de três a vinte salários de referência, aplicando-se o dobro em caso de reincidência, independentemente das despesas de retorno do adolescente, se for o caso. (Revogado pela Lei nº 13.431, de 2017)\n(Vigência)"}, {"art": "Art. 249", "key": "249", "texto": "Art. 249. Descumprir, dolosa ou culposamente, os deveres inerentes ao pátrio poder poder familiar ou decorrente de tutela ou guarda, bem assim determinação da autoridade judiciária ou Conselho Tutelar: (Expressão substituída pela\nLei nº 12.010, de 2009) Vigência\n Pena - multa de três a vinte salários de referência, aplicando-se o dobro em caso de reincidência."}, {"art": "Art. 250", "key": "250", "texto": "Art. 250. Hospedar criança ou adolescente desacompanhado dos pais ou responsável, ou sem autorização escrita desses ou da autoridade judiciária, em hotel, pensão, motel ou congênere: (Redação dada pela Lei nº 12.038, de 2009).\n\f Pena – multa. (Redação dada pela Lei nº 12.038, de 2009).\n § 1 º Em caso de reincidência, sem prejuízo da pena de multa, a autoridade judiciária poderá determinar o fechamento do estabelecimento por até 15 (quinze) dias. (Incluído pela Lei nº 12.038, de 2009).\n § 2 º Se comprovada a reincidência em período inferior a 30 (trinta) dias, o estabelecimento será definitivamente fechado e terá sua licença cassada. (Incluído pela Lei nº 12.038, de 2009)."}, {"art": "Art. 251", "key": "251", "texto": "Art. 251. Transportar criança ou adolescente, por qualquer meio, com inobservância do disposto nos arts. 83, 84 e 85 desta Lei:\n Pena - multa de três a vinte salários de referência, aplicando-se o dobro em caso de reincidência."}, {"art": "Art. 252", "key": "252", "texto": "Art. 252. Deixar o responsável por diversão ou espetáculo público de afixar, em lugar visível e de fácil acesso, à entrada do local de exibição, informação destacada sobre a natureza da diversão ou espetáculo e a faixa etária especificada no certificado de classificação:\n Pena - multa de três a vinte salários de referência, aplicando-se o dobro em caso de reincidência."}, {"art": "Art. 253", "key": "253", "texto": "Art. 253. Anunciar peças teatrais, filmes ou quaisquer representações ou espetáculos, sem indicar os limites de idade a que não se recomendem:\n Pena - multa de três a vinte salários de referência, duplicada em caso de reincidência, aplicável, separadamente, à casa de espetáculo e aos órgãos de divulgação ou publicidade."}, {"art": "Art. 254", "key": "254", "texto": "Art. 254. Transmitir, através de rádio ou televisão, espetáculo em horário diverso do autorizado ou sem aviso de sua classificação: (Expressão declarada inconstitucional pela ADI 2.404).\n Pena - multa de vinte a cem salários de referência; duplicada em caso de reincidência a autoridade judiciária poderá determinar a suspensão da programação da emissora por até dois dias."}, {"art": "Art. 255", "key": "255", "texto": "Art. 255. Exibir filme, trailer, peça, amostra ou congênere classificado pelo órgão competente como inadequado às crianças ou adolescentes admitidos ao espetáculo:\n Pena - multa de vinte a cem salários de referência; na reincidência, a autoridade poderá determinar a suspensão do espetáculo ou o fechamento do estabelecimento por até quinze dias."}, {"art": "Art. 256", "key": "256", "texto": "Art. 256. Vender ou locar a criança ou adolescente fita de programação em vídeo, em desacordo com a classificação atribuída pelo órgão competente:\n Pena - multa de três a vinte salários de referência; em caso de reincidência, a autoridade judiciária poderá determinar o fechamento do estabelecimento por até quinze dias."}, {"art": "Art. 257", "key": "257", "texto": "Art. 257. Descumprir obrigação constante dos arts. 78 e 79 desta Lei:\n Pena - multa de três a vinte salários de referência, duplicando-se a pena em caso de reincidência, sem prejuízo de apreensão da revista ou publicação."}, {"art": "Art. 258", "key": "258", "texto": "Art. 258. Deixar o responsável pelo estabelecimento ou o empresário de observar o que dispõe esta Lei sobre o acesso de criança ou adolescente aos locais de diversão, ou sobre sua participação no espetáculo:\n Pena - multa de três a vinte salários de referência; em caso de reincidência, a autoridade judiciária poderá determinar o fechamento do estabelecimento por até quinze dias."}, {"art": "Art. 258-A", "key": "258-A", "texto": "Art. 258-A. Deixar a autoridade competente de providenciar a instalação e operacionalização dos cadastros previstos no art. 50 e no § 11 do art. 101 desta Lei: (Incluído pela Lei nº 12.010, de 2009) Vigência\n Pena - multa de R$ 1.000,00 (mil reais) a R$ 3.000,00 (três mil reais). (Incluído pela Lei nº 12.010, de 2009) Vigência\n Parágrafo único. Incorre nas mesmas penas a autoridade que deixa de efetuar o cadastramento de crianças e de adolescentes em condições de serem adotadas, de pessoas ou casais habilitados à adoção e de crianças e adolescentes em regime de acolhimento institucional ou familiar. (Incluído pela Lei nº 12.010, de 2009) Vigência"}, {"art": "Art. 258-B", "key": "258-B", "texto": "Art. 258-B. Deixar o médico, enfermeiro ou dirigente de estabelecimento de atenção à saúde de gestante de efetuar imediato encaminhamento à autoridade judiciária de caso de que tenha conhecimento de mãe ou gestante interessada em entregar seu filho para adoção: (Incluído pela Lei nº 12.010, de 2009) Vigência\n Pena - multa de R$ 1.000,00 (mil reais) a R$ 3.000,00 (três mil reais). (Incluído pela Lei nº 12.010, de 2009) Vigência\n\f Parágrafo único. Incorre na mesma pena o funcionário de programa oficial ou comunitário destinado à garantia do direito à convivência familiar que deixa de efetuar a comunicação referida no caput deste artigo. (Incluído pela Lei nº 12.010, de 2009) Vigência"}, {"art": "Art. 258-C", "key": "258-C", "texto": "Art. 258-C. Descumprir a proibição estabelecida no inciso II do art. 81: (Redação dada pela Lei nº 13.106, de 2015)\n Pena - multa de R$ 3.000,00 (três mil reais) a R$ 10.000,00 (dez mil reais); (Redação dada pela Lei nº 13.106, de 2015)\n Medida Administrativa - interdição do estabelecimento comercial até o recolhimento da multa aplicada. (Redação dada pela Lei nº 13.106, de 2015)\n Disposições Finais e Transitórias"}, {"art": "Art. 259", "key": "259", "texto": "Art. 259. A União, no prazo de noventa dias contados da publicação deste Estatuto, elaborará projeto de lei dispondo sobre a criação ou adaptação de seus órgãos às diretrizes da política de atendimento fixadas no art. 88 e ao que estabelece o Título V do Livro II.\n Parágrafo único. Compete aos estados e municípios promoverem a adaptação de seus órgãos e programas às diretrizes e princípios estabelecidos nesta Lei."}, {"art": "Art. 260", "key": "260", "texto": "Art. 260. Os contribuintes poderão efetuar doações aos Fundos dos Direitos da Criança e do Adolescente nacional, distrital, estaduais ou municipais, devidamente comprovadas, sendo essas integralmente deduzidas do imposto de renda, obedecidos os seguintes limites: (Redação dada pela Lei nº 12.594, de 2012) (Vide)\n I - 1% (um por cento) do imposto sobre a renda devido apurado pelas pessoas jurídicas tributadas com base no lucro real; e (Redação dada pela Lei nº 12.594, de 2012) (Vide)\n II - 6% (seis por cento) do imposto sobre a renda apurado pelas pessoas físicas na Declaração de Ajuste Anual, observado o disposto no art. 22 da Lei n o 9.532, de 10 de dezembro de 1997 . (Redação dada pela Lei nº 12.594, de 2012) (Vide)\n § 1º - As deduções a que se refere este artigo não estão sujeitas a outros limites estabelecidos na legislação do imposto de renda, nem excluem ou reduzem outros benefícios ou abatimentos e deduções em vigor, de maneira especial as doações a entidades de utilidade pública. (Revogado pela Lei nº 9.532, de 1997) (Produção de efeito)\n § 1 o -A. Na definição das prioridades a serem atendidas com os recursos captados pelos Fundos Nacional,\nEstaduais e Municipais dos Direitos da Criança e do Adolescente, serão consideradas as disposições do Plano Nacional de Promoção, Proteção e Defesa dos Direitos de Crianças e Adolescentes à Convivência Familiar, bem como as regras e princípios relativos à garantia do direito à convivência familiar previstos nesta Lei. (Incluído pela Lei nº 12.010, de 2009)\nVigência\n § 1 o -A. Na definição das prioridades a serem atendidas com os recursos captados pelos fundos nacional, estaduais e municipais dos direitos da criança e do adolescente, serão consideradas as disposições do Plano Nacional de Promoção, Proteção e Defesa do Direito de Crianças e Adolescentes à Convivência Familiar e Comunitária e as do\nPlano Nacional pela Primeira Infância. (Redação dada dada pela Lei nº 13.257, de 2016)\n § 2º Os Conselhos Municipais, Estaduais e Nacional dos Direitos da Criança e do Adolescente fixarão critérios de utilização, através de planos de aplicação das doações subsidiadas e demais receitas, aplicando necessariamente percentual para incentivo ao acolhimento, sob a forma de guarda, de criança ou adolescente, órfãos ou abandonado, na forma do disposto no art. 227, § 3º, VI, da Constituição Federal .\n § 2 o Os conselhos nacional, estaduais e municipais dos direitos da criança e do adolescente fixarão critérios de utilização, por meio de planos de aplicação, das dotações subsidiadas e demais receitas, aplicando necessariamente percentual para incentivo ao acolhimento, sob a forma de guarda, de crianças e adolescentes e para programas de atenção integral à primeira infância em áreas de maior carência socioeconômica e em situações de calamidade.\n(Redação dada dada pela Lei nº 13.257, de 2016)\n\f § 2º-A. O contribuinte poderá indicar o projeto que receberá a destinação de recursos, entre os projetos aprovados por conselho dos direitos da criança e do adolescente. (Incluído pela Lei nº 14.692, de 2023)\n § 2º-B. É facultado aos conselhos chancelar projetos ou banco de projetos, por meio de regulamentação própria, observadas as seguintes regras: (Incluído pela Lei nº 14.692, de 2023)\n I - a chancela deverá ser entendida como a autorização para captação de recursos por meio dos Fundos dos\nDireitos da Criança e do Adolescente com a finalidade de viabilizar a execução dos projetos aprovados pelos conselhos; (Incluído pela Lei nº 14.692, de 2023)\n II - os projetos deverão garantir os direitos fundamentais e humanos das crianças e dos adolescentes; (Incluído pela Lei nº 14.692, de 2023)\n III - a captação de recursos por meio do Fundo dos Direitos da Criança e do Adolescente deverá ser realizada pela instituição proponente para o financiamento do respectivo projeto; (Incluído pela Lei nº 14.692, de 2023)\n IV - os recursos captados serão repassados para a instituição proponente mediante formalização de instrumento de repasse de recursos, conforme a legislação vigente; (Incluído pela Lei nº 14.692, de 2023)\n V - os conselhos deverão fixar percentual de retenção dos recursos captados, em cada chancela, que serão destinados ao Fundo dos Direitos da Criança e do Adolescente; (Incluído pela Lei nº 14.692, de 2023)\n VI - o tempo de duração entre a aprovação do projeto e a captação dos recursos deverá ser de 2 (dois) anos e poderá ser prorrogado por igual período; (Incluído pela Lei nº 14.692, de 2023)\n VII - a chancela do projeto não deverá obrigar seu financiamento pelo Fundo dos Direitos da Criança e do\nAdolescente, caso não tenha sido captado valor suficiente. (Incluído pela Lei nº 14.692, de 2023)\n § 3º O Departamento da Receita Federal, do Ministério da Economia, Fazenda e Planejamento, regulamentará a comprovação das doações feitas aos fundos, nos termos deste artigo. (Incluído pela Lei nº 8.242, de 12.10.1991)\n § 4º O Ministério Público determinará em cada comarca a forma de fiscalização da aplicação, pelo Fundo\nMunicipal dos Direitos da Criança e do Adolescente, dos incentivos fiscais referidos neste artigo. (Incluído pela Lei nº 8.242, de 12.10.1991)\n § 5 o A destinação de recursos provenientes dos fundos mencionados neste artigo não desobriga os Entes\nFederados à previsão, no orçamento dos respectivos órgãos encarregados da execução das políticas públicas de assistência social, educação e saúde, dos recursos necessários à implementação das ações, serviços e programas de atendimento a crianças, adolescentes e famílias, em respeito ao princípio da prioridade absoluta estabelecido pelo caput do art. 227 da Constituição Federal e pelo caput e parágrafo único do art. 4 o desta Lei. (Incluído pela Lei nº 12.010, de 2009) Vigência\n § 5 o Observado o disposto no § 4 o do art. 3 o da Lei n o 9.249, de 26 de dezembro de 1995 , a dedução de que trata o inciso I do caput : (Redação dada pela Lei nº 12.594, de 2012) (Vide)\n I - será considerada isoladamente, não se submetendo a limite em conjunto com outras deduções do imposto; e\n(Incluído pela Lei nº 12.594, de 2012) (Vide)\n II - não poderá ser computada como despesa operacional na apuração do lucro real. (Incluído pela Lei nº 12.594, de 2012) (Vide)"}, {"art": "Art. 260-A", "key": "260-A", "texto": "Art. 260-A. A partir do exercício de 2010, ano-calendário de 2009, a pessoa física poderá optar pela doação de que trata o inciso II do caput do art. 260 diretamente em sua Declaração de Ajuste Anual. (Incluído pela Lei nº 12.594, de 2012) (Vide)\n § 1 o A doação de que trata o caput poderá ser deduzida até os seguintes percentuais aplicados sobre o imposto apurado na declaração: (Incluído pela Lei nº 12.594, de 2012) (Vide)\n I - (VETADO); (Incluído pela Lei nº 12.594, de 2012) (Vide)\n II - (VETADO); (Incluído pela Lei nº 12.594, de 2012) (Vide)\n III - 3% (três por cento) a partir do exercício de 2012. (Incluído pela Lei nº 12.594, de 2012) (Vide)\n § 2 o A dedução de que trata o caput : (Incluído pela Lei nº 12.594, de 2012) (Vide)\n\f I - está sujeita ao limite de 6% (seis por cento) do imposto sobre a renda apurado na declaração de que trata o inciso II do caput do art. 260; (Incluído pela Lei nº 12.594, de 2012) (Vide)\n II - não se aplica à pessoa física que: (Incluído pela Lei nº 12.594, de 2012) (Vide)\n a) utilizar o desconto simplificado; (Incluído pela Lei nº 12.594, de 2012) (Vide)\n b) apresentar declaração em formulário; ou (Incluído pela Lei nº 12.594, de 2012) (Vide)\n c) entregar a declaração fora do prazo; (Incluído pela Lei nº 12.594, de 2012) (Vide)\n III - só se aplica às doações em espécie; e (Incluído pela Lei nº 12.594, de 2012) (Vide)\n IV - não exclui ou reduz outros benefícios ou deduções em vigor. (Incluído pela Lei nº 12.594, de 2012) (Vide)\n § 3 o O pagamento da doação deve ser efetuado até a data de vencimento da primeira quota ou quota única do imposto, observadas instruções específicas da Secretaria da Receita Federal do Brasil. (Incluído pela Lei nº 12.594, de 2012) (Vide)\n § 4 o O não pagamento da doação no prazo estabelecido no § 3 o implica a glosa definitiva desta parcela de dedução, ficando a pessoa física obrigada ao recolhimento da diferença de imposto devido apurado na Declaração de\nAjuste Anual com os acréscimos legais previstos na legislação. (Incluído pela Lei nº 12.594, de 2012) (Vide)\n § 5 o A pessoa física poderá deduzir do imposto apurado na Declaração de Ajuste Anual as doações feitas, no respectivo ano-calendário, aos fundos controlados pelos Conselhos dos Direitos da Criança e do Adolescente municipais, distrital, estaduais e nacional concomitantemente com a opção de que trata o caput , respeitado o limite previsto no inciso II do art. 260. (Incluído pela Lei nº 12.594, de 2012) (Vide)"}, {"art": "Art. 260-B", "key": "260-B", "texto": "Art. 260-B. A doação de que trata o inciso I do art. 260 poderá ser deduzida: (Incluído pela Lei nº 12.594, de 2012)\n(Vide)\n I - do imposto devido no trimestre, para as pessoas jurídicas que apuram o imposto trimestralmente; e (Incluído pela Lei nº 12.594, de 2012) (Vide)\n II - do imposto devido mensalmente e no ajuste anual, para as pessoas jurídicas que apuram o imposto anualmente. (Incluído pela Lei nº 12.594, de 2012) (Vide)\n Parágrafo único. A doação deverá ser efetuada dentro do período a que se refere a apuração do imposto. (Incluído pela Lei nº 12.594, de 2012) (Vide)"}, {"art": "Art. 260-C", "key": "260-C", "texto": "Art. 260-C. As doações de que trata o art. 260 desta Lei podem ser efetuadas em espécie ou em bens. (Incluído pela Lei nº 12.594, de 2012) (Vide)\n Parágrafo único. As doações efetuadas em espécie devem ser depositadas em conta específica, em instituição financeira pública, vinculadas aos respectivos fundos de que trata o art. 260. (Incluído pela Lei nº 12.594, de 2012) (Vide)"}, {"art": "Art. 260-D", "key": "260-D", "texto": "Art. 260-D. Os órgãos responsáveis pela administração das contas dos Fundos dos Direitos da Criança e do\nAdolescente nacional, estaduais, distrital e municipais devem emitir recibo em favor do doador, assinado por pessoa competente e pelo presidente do Conselho correspondente, especificando: (Incluído pela Lei nº 12.594, de 2012) (Vide)\n I - número de ordem; (Incluído pela Lei nº 12.594, de 2012) (Vide)\n II - nome, Cadastro Nacional da Pessoa Jurídica (CNPJ) e endereço do emitente; (Incluído pela Lei nº 12.594, de 2012) (Vide)\n III - nome, CNPJ ou Cadastro de Pessoas Físicas (CPF) do doador; (Incluído pela Lei nº 12.594, de 2012) (Vide)\n IV - data da doação e valor efetivamente recebido; e (Incluído pela Lei nº 12.594, de 2012) (Vide)\n V - ano-calendário a que se refere a doação. (Incluído pela Lei nº 12.594, de 2012) (Vide)\n § 1 o O comprovante de que trata o caput deste artigo pode ser emitido anualmente, desde que discrimine os valores doados mês a mês. (Incluído pela Lei nº 12.594, de 2012) (Vide)\n § 2 o No caso de doação em bens, o comprovante deve conter a identificação dos bens, mediante descrição em campo próprio ou em relação anexa ao comprovante, informando também se houve avaliação, o nome, CPF ou CNPJ e\n\fendereço dos avaliadores. (Incluído pela Lei nº 12.594, de 2012) (Vide)"}, {"art": "Art. 260-E", "key": "260-E", "texto": "Art. 260-E. Na hipótese da doação em bens, o doador deverá: (Incluído pela Lei nº 12.594, de 2012) (Vide)\n I - comprovar a propriedade dos bens, mediante documentação hábil; (Incluído pela Lei nº 12.594, de 2012) (Vide)\n II - baixar os bens doados na declaração de bens e direitos, quando se tratar de pessoa física, e na escrituração, no caso de pessoa jurídica; e (Incluído pela Lei nº 12.594, de 2012) (Vide)\n III - considerar como valor dos bens doados: (Incluído pela Lei nº 12.594, de 2012) (Vide)\n a) para as pessoas físicas, o valor constante da última declaração do imposto de renda, desde que não exceda o valor de mercado; (Incluído pela Lei nº 12.594, de 2012) (Vide)\n b) para as
