 "key": "88", "texto": "Art. 88. São diretrizes da política de atendimento:\n I - municipalização do atendimento;\n II - criação de conselhos municipais, estaduais e nacional dos direitos da criança e do adolescente, órgãos deliberativos e controladores das ações em todos os níveis, assegurada a participação popular paritária por meio de organizações representativas, segundo leis federal, estaduais e municipais;\n III - criação e manutenção de programas específicos, observada a descentralização político-administrativa;\n IV - manutenção de fundos nacional, estaduais e municipais vinculados aos respectivos conselhos dos direitos da criança e do adolescente;\n V - integração operacional de órgãos do Judiciário, Ministério Público, Defensoria, Segurança Pública e Assistência\nSocial, preferencialmente em um mesmo local, para efeito de agilização do atendimento inicial a adolescente a quem se atribua autoria de ato infracional;\n VI - mobilização da opinião pública no sentido da indispensável participação dos diversos segmentos da sociedade.\n VI - integração operacional de órgãos do Judiciário, Ministério Público, Defensoria, Conselho Tutelar e encarregados da execução das políticas sociais básicas e de assistência social, para efeito de agilização do atendimento de crianças e de adolescentes inseridos em programas de acolhimento familiar ou institucional, com vista na sua rápida reintegração à família de origem ou, se tal solução se mostrar comprovadamente inviável, sua colocação em família substituta, em quaisquer das modalidades previstas no art. 28 desta Lei; (Redação dada pela Lei nº 12.010, de 2009) Vigência\n VII - mobilização da opinião pública para a indispensável participação dos diversos segmentos da sociedade.\n(Incluído pela Lei nº 12.010, de 2009) Vigência\n VIII - especialização e formação continuada dos profissionais que trabalham nas diferentes áreas da atenção à primeira infância, incluindo os conhecimentos sobre direitos da criança e sobre desenvolvimento infantil; (Incluído pela\nLei nº 13.257, de 2016)\n IX - formação profissional com abrangência dos diversos direitos da criança e do adolescente que favoreça a intersetorialidade no atendimento da criança e do adolescente e seu desenvolvimento integral; (Incluído pela Lei nº 13.257, de 2016)\n\f X - realização e divulgação de pesquisas sobre desenvolvimento infantil e sobre prevenção da violência. (Incluído pela Lei nº 13.257, de 2016)"}, {"art": "Art. 89", "key": "89", "texto": "Art. 89. A função de membro dos Conselhos dos Direitos da Criança e do Adolescente nacional, estaduais, distrital e municipais é considerada de interesse público relevante e não será remunerada. (Redação dada pela Lei nº 15.426, de 2026)\n Parágrafo único. Lei de cada ente da Federação disporá, respeitadas as disposições previstas no parágrafo único do art. 89-A desta Lei, sobre a perda da função de membro do respectivo Conselho dos Direitos da Criança e do\nAdolescente. (Incluído pela Lei nº 15.426, de 2026)"}, {"art": "Art. 89-A", "key": "89-A", "texto": "Art. 89-A. São deveres fundamentais dos membros dos Conselhos dos Direitos da Criança e do Adolescente nacional, estaduais, distrital e municipais: (Incluído pela Lei nº 15.426, de 2026)\n I – promover a defesa dos direitos das crianças e dos adolescentes; (Incluído pela Lei nº 15.426, de 2026)\n II – respeitar e cumprir a Constituição Federal, as leis e as demais normas estabelecidas; (Incluído pela Lei nº 15.426, de 2026)\n III – zelar pelo prestígio, pelo aprimoramento e pela valorização do respectivo Conselho, bem como pela preservação de suas prerrogativas; (Incluído pela Lei nº 15.426, de 2026)\n IV – exercer a função de membro de Conselho com dignidade e respeito aos princípios e às normas que regem a administração pública e com boa-fé, probidade, zelo e eficiência para produzir os resultados esperados pela sociedade; (Incluído pela Lei nº 15.426, de 2026)\n V – apresentar-se ao respectivo Conselho e participar das sessões, das reuniões e dos demais compromissos nos termos da lei ou do regimento aplicável; (Incluído pela Lei nº 15.426, de 2026)\n VI – examinar e avaliar todos os assuntos, questões, projetos e expedientes submetidos a sua apreciação e voto sob a ótica do interesse público; (Incluído pela Lei nº 15.426, de 2026)\n VII – tratar com respeito os demais membros do respectivo Conselho, os agentes e servidores públicos e as demais pessoas com as quais mantenham contato no exercício da função; (Incluído pela Lei nº 15.426, de 2026)\n VIII – prestar contas do exercício da função de membro de Conselho à sociedade e aos Poderes, órgãos e entidades públicos na forma da lei, disponibilizando as informações necessárias ao acompanhamento, ao controle e à fiscalização pertinentes; (Incluído pela Lei nº 15.426, de 2026)\n IX – (VETADO). (Incluído pela Lei nº 15.426, de 2026)\n Parágrafo único. (VETADO). (Incluído pela Lei nº 15.426, de 2026)\n Capítulo II\n Das Entidades de Atendimento\n Seção I\n Disposições Gerais"}, {"art": "Art. 90", "key": "90", "texto": "Art. 90. As entidades de atendimento são responsáveis pela manutenção das próprias unidades, assim como pelo planejamento e execução de programas de proteção e sócio-educativos destinados a crianças e adolescentes, em regime de: (Vide)\n I - orientação e apoio sócio-familiar;\n II - apoio sócio-educativo em meio aberto;\n III - colocação familiar;\n I V - abrigo;\n IV - acolhimento institucional; (Redação dada pela Lei nº 12.010, de 2009) Vigência\n\f V - liberdade assistida;\n V - prestação de serviços à comunidade; (Redação dada pela Lei nº 12.594, de 2012) (Vide)\n VI - semi-liberdade;\n VI - liberdade assistida; (Redação dada pela Lei nº 12.594, de 2012) (Vide)\n VII - internação.\n VII - semiliberdade; e (Redação dada pela Lei nº 12.594, de 2012) (Vide)\n VIII - internação. (Incluído pela Lei nº 12.594, de 2012) (Vide)\n Parágrafo único. As entidades governamentais e não-governamentais deverão proceder à inscrição de seus programas, especificando os regimes de atendimento, na forma definida neste artigo, junto ao Conselho Municipal dos\nDireitos da Criança e do Adolescente, o qual manterá registro das inscrições e de suas alterações, do que fará comunicação ao Conselho Tutelar e à autoridade judiciária.\n § 1 o As entidades governamentais e não governamentais deverão proceder à inscrição de seus programas, especificando os regimes de atendimento, na forma definida neste artigo, no Conselho Municipal dos Direitos da Criança e do Adolescente, o qual manterá registro das inscrições e de suas alterações, do que fará comunicação ao Conselho\nTutelar e à autoridade judiciária. (Incluído pela Lei nº 12.010, de 2009) Vigência\n § 2 o Os recursos destinados à implementação e manutenção dos programas relacionados neste artigo serão previstos nas dotações orçamentárias dos órgãos públicos encarregados das áreas de Educação, Saúde e Assistência\nSocial, dentre outros, observando-se o princípio da prioridade absoluta à criança e ao adolescente preconizado pelo caput do art. 227 da Constituição Federal e pelo caput e parágrafo único do art. 4 o desta Lei. (Incluído pela Lei nº 12.010, de 2009) Vigência\n § 3 o Os programas em execução serão reavaliados pelo Conselho Municipal dos Direitos da Criança e do\nAdolescente, no máximo, a cada 2 (dois) anos, constituindo-se critérios para renovação da autorização de funcionamento: (Incluído pela Lei nº 12.010, de 2009) Vigência\n I - o efetivo respeito às regras e princípios desta Lei, bem como às resoluções relativas à modalidade de atendimento prestado expedidas pelos Conselhos de Direitos da Criança e do Adolescente, em todos os níveis; (Incluído pela Lei nº 12.010, de 2009) Vigência\n II - a qualidade e eficiência do trabalho desenvolvido, atestadas pelo Conselho Tutelar, pelo Ministério Público e pela\nJustiça da Infância e da Juventude; (Incluído pela Lei nº 12.010, de 2009) Vigência\n III - em se tratando de programas de acolhimento institucional ou familiar, serão considerados os índices de sucesso na reintegração familiar ou de adaptação à família substituta, conforme o caso. (Incluído pela Lei nº 12.010, de 2009) Vigência"}, {"art": "Art. 91", "key": "91", "texto": "Art. 91. As entidades não-governamentais somente poderão funcionar depois de registradas no Conselho\nMunicipal dos Direitos da Criança e do Adolescente, o qual comunicará o registro ao Conselho Tutelar e à autoridade judiciária da respectiva localidade.\n Parágrafo único. Será negado o registro à entidade que:\n § 1 o Será negado o registro à entidade que: (Incluído pela Lei nº 12.010, de 2009) Vigência\n a) não ofereça instalações físicas em condições adequadas de habitabilidade, higiene, salubridade e segurança;\n b) não apresente plano de trabalho compatível com os princípios desta Lei;\n c) esteja irregularmente constituída;\n d) tenha em seus quadros pessoas inidôneas.\n e) não se adequar ou deixar de cumprir as resoluções e deliberações relativas à modalidade de atendimento prestado expedidas pelos Conselhos de Direitos da Criança e do Adolescente, em todos os níveis. (Incluída pela Lei nº 12.010, de 2009) Vigência\n § 2 o O registro terá validade máxima de 4 (quatro) anos, cabendo ao Conselho Municipal dos Direitos da Criança e do Adolescente, periodicamente, reavaliar o cabimento de sua renovação, observado o disposto no § 1 o deste artigo.\n(Incluído pela Lei nº 12.010, de 2009) Vigência"}, {"art": "Art. 92", "key": "92", "texto": "Art. 92. As entidades que desenvolvam programas de acolhimento familiar ou institucional deverão adotar os seguintes princípios: (Redação dada pela Lei nº 12.010, de 2009) Vigência\n I - preservação dos vínculos familiares;\n I - preservação dos vínculos familiares e promoção da reintegração familiar; (Redação dada pela Lei nº 12.010, de 2009) Vigência\n II - integração em família substituta, quando esgotados os recursos de manutenção na família natural ou extensa;\n(Redação dada pela Lei nº 12.010, de 2009) Vigência\n II - integração em família substituta, quando esgotados os recursos de manutenção na família de origem;\n III - atendimento personalizado e em pequenos grupos;\n IV - desenvolvimento de atividades em regime de co-educação;\n V - não desmembramento de grupos de irmãos;\n VI - evitar, sempre que possível, a transferência para outras entidades de crianças e adolescentes abrigados;\n VII - participação na vida da comunidade local;\n VIII - preparação gradativa para o desligamento;\n IX - participação de pessoas da comunidade no processo educativo.\n Parágrafo único. O dirigente de entidade de abrigo e equiparado ao guardião, para todos os efeitos de direito.\n § 1 o O dirigente de entidade que desenvolve programa de acolhimento institucional é equiparado ao guardião, para todos os efeitos de direito. (Incluído pela Lei nº 12.010, de 2009) Vigência\n § 2 o Os dirigentes de entidades que desenvolvem programas de acolhimento familiar ou institucional remeterão à autoridade judiciária, no máximo a cada 6 (seis) meses, relatório circunstanciado acerca da situação de cada criança ou adolescente acolhido e sua família, para fins da reavaliação prevista no § 1 o do art. 19 desta Lei. (Incluído pela Lei nº 12.010, de 2009) Vigência\n § 3 o Os entes federados, por intermédio dos Poderes Executivo e Judiciário, promoverão conjuntamente a permanente qualificação dos profissionais que atuam direta ou indiretamente em programas de acolhimento institucional e destinados à colocação familiar de crianças e adolescentes, incluindo membros do Poder Judiciário, Ministério Público e Conselho Tutelar. (Incluído pela Lei nº 12.010, de 2009) Vigência\n § 4 o Salvo determinação em contrário da autoridade judiciária competente, as entidades que desenvolvem programas de acolhimento familiar ou institucional, se necessário com o auxílio do Conselho Tutelar e dos órgãos de assistência social, estimularão o contato da criança ou adolescente com seus pais e parentes, em cumprimento ao disposto nos incisos I e VIII do caput deste artigo. (Incluído pela Lei nº 12.010, de 2009) Vigência\n § 5 o As entidades que desenvolvem programas de acolhimento familiar ou institucional somente poderão receber recursos públicos se comprovado o atendimento dos princípios, exigências e finalidades desta Lei. (Incluído pela Lei nº 12.010, de 2009) Vigência\n § 6 o O descumprimento das disposições desta Lei pelo dirigente de entidade que desenvolva programas de acolhimento familiar ou institucional é causa de sua destituição, sem prejuízo da apuração de sua responsabilidade administrativa, civil e criminal. (Incluído pela Lei nº 12.010, de 2009) Vigência\n § 7 o Quando se tratar de criança de 0 (zero) a 3 (três) anos em acolhimento institucional, dar-se-á especial atenção\nà atuação de educadores de referência estáveis e qualitativamente significativos, às rotinas específicas e ao atendimento das necessidades básicas, incluindo as de afeto como prioritárias. (Incluído pela Lei nº 13.257, de 2016)"}, {"art": "Art. 93", "key": "93", "texto": "Art. 93. As entidades que mantenham programa de acolhimento institucional poderão, em caráter excepcional e de urgência, acolher crianças e adolescentes sem prévia determinação da autoridade competente, fazendo comunicação\n\fdo fato em até 24 (vinte e quatro) horas ao Juiz da Infância e da Juventude, sob pena de responsabilidade. (Redação dada pela Lei nº 12.010, de 2009) Vigência\n Parágrafo único. Recebida a comunicação, a autoridade judiciária, ouvido o Ministério Público e se necessário com o apoio do Conselho Tutelar local, tomará as medidas necessárias para promover a imediata reintegração familiar da criança ou do adolescente ou, se por qualquer razão não for isso possível ou recomendável, para seu encaminhamento a programa de acolhimento familiar, institucional ou a família substituta, observado o disposto no § 2 o do art. 101 desta\nLei. (Incluído pela Lei nº 12.010, de 2009) Vigência"}, {"art": "Art. 94", "key": "94", "texto": "Art. 94. As entidades que desenvolvem programas de internação têm as seguintes obrigações, entre outras:\n I - observar os direitos e garantias de que são titulares os adolescentes;\n II - não restringir nenhum direito que não tenha sido objeto de restrição na decisão de internação;\n III - oferecer atendimento personalizado, em pequenas unidades e grupos reduzidos;\n IV - preservar a identidade e oferecer ambiente de respeito e dignidade ao adolescente;\n V - diligenciar no sentido do restabelecimento e da preservação dos vínculos familiares;\n VI - comunicar à autoridade judiciária, periodicamente, os casos em que se mostre inviável ou impossível o reatamento dos vínculos familiares;\n VII - oferecer instalações físicas em condições adequadas de habitabilidade, higiene, salubridade e segurança e os objetos necessários à higiene pessoal;\n VIII - oferecer vestuário e alimentação suficientes e adequados à faixa etária dos adolescentes atendidos;\n IX - oferecer cuidados médicos, psicológicos, odontológicos e farmacêuticos;\n X - propiciar escolarização e profissionalização;\n XI - propiciar atividades culturais, esportivas e de lazer;\n XII - propiciar assistência religiosa àqueles que desejarem, de acordo com suas crenças;\n XIII - proceder a estudo social e pessoal de cada caso;\n XIV - reavaliar periodicamente cada caso, com intervalo máximo de seis meses, dando ciência dos resultados à autoridade competente;\n XV - informar, periodicamente, o adolescente internado sobre sua situação processual;\n XVI - comunicar às autoridades competentes todos os casos de adolescentes portadores de moléstias infecto- contagiosas;\n XVII - fornecer comprovante de depósito dos pertences dos adolescentes;\n XVIII - manter programas destinados ao apoio e acompanhamento de egressos;\n XIX - providenciar os documentos necessários ao exercício da cidadania àqueles que não os tiverem;\n XX - manter arquivo de anotações onde constem data e circunstâncias do atendimento, nome do adolescente, seus pais ou responsável, parentes, endereços, sexo, idade, acompanhamento da sua formação, relação de seus pertences e demais dados que possibilitem sua identificação e a individualização do atendimento.\n § 1º Aplicam-se, no que couber, as obrigações constantes deste artigo às entidades que mantêm programa de abrigo.\n § 1 o Aplicam-se, no que couber, as obrigações constantes deste artigo às entidades que mantêm programas de acolhimento institucional e familiar. (Redação dada pela Lei nº 12.010, de 2009) Vigência\n § 2º No cumprimento das obrigações a que alude este artigo as entidades utilizarão preferencialmente os recursos da comunidade."}, {"art": "Art. 94-A", "key": "94-A", "texto": "Art. 94-A. As entidades, públicas ou privadas, que abriguem ou recepcionem crianças e adolescentes, ainda que em caráter temporário, devem ter, em seus quadros, profissionais capacitados a reconhecer e reportar ao Conselho\nTutelar suspeitas ou ocorrências de maus-tratos. (Incluído pela Lei nº 13.046, de 2014)\n Seção II\n Da Fiscalização das Entidades"}, {"art": "Art. 95", "key": "95", "texto": "Art. 95. As entidades governamentais e não-governamentais referidas no art. 90 serão fiscalizadas pelo Judiciário, pelo Ministério Público e pelos Conselhos Tutelares."}, {"art": "Art. 96", "key": "96", "texto": "Art. 96. Os planos de aplicação e as prestações de contas serão apresentados ao estado ou ao município, conforme a origem das dotações orçamentárias."}, {"art": "Art. 97", "key": "97", "texto": "Art. 97. São medidas aplicáveis às entidades de atendimento que descumprirem obrigação constante do art. 94, sem prejuízo da responsabilidade civil e criminal de seus dirigentes ou prepostos:\n I - às entidades governamentais:\n a) advertência;\n b) afastamento provisório de seus dirigentes;\n c) afastamento definitivo de seus dirigentes;\n d) fechamento de unidade ou interdição de programa.\n II - às entidades não-governamentais:\n a) advertência;\n b) suspensão total ou parcial do repasse de verbas públicas;\n c) interdição de unidades ou suspensão de programa;\n d) cassação do registro.\n Parágrafo único. Em caso de reiteradas infrações cometidas por entidades de atendimento, que coloquem em risco os direitos assegurados nesta Lei, deverá ser o fato comunicado ao Ministério Público ou representado perante autoridade judiciária competente para as providências cabíveis, inclusive suspensão das atividades ou dissolução da entidade.\n § 1 o Em caso de reiteradas infrações cometidas por entidades de atendimento, que coloquem em risco os direitos assegurados nesta Lei, deverá ser o fato comunicado ao Ministério Público ou representado perante autoridade judiciária competente para as providências cabíveis, inclusive suspensão das atividades ou dissolução da entidade. (Redação dada pela Lei nº 12.010, de 2009) Vigência\n § 2 o As pessoas jurídicas de direito público e as organizações não governamentais responderão pelos danos que seus agentes causarem às crianças e aos adolescentes, caracterizado o descumprimento dos princípios norteadores das atividades de proteção específica. (Redação dada pela Lei nº 12.010, de 2009) Vigência\n Título II\n Das Medidas de Proteção\n Capítulo I\n Disposições Gerais"}, {"art": "Art. 98", "key": "98", "texto": "Art. 98. As medidas de proteção à criança e ao adolescente são aplicáveis sempre que os direitos reconhecidos nesta Lei forem ameaçados ou violados:\n I - por ação ou omissão da sociedade ou do Estado;\n II - por falta, omissão ou abuso dos pais ou responsável;\n III - em razão de sua conduta.\n\f Capítulo II\n Das Medidas Específicas de Proteção"}, {"art": "Art. 99", "key": "99", "texto": "Art. 99. As medidas previstas neste Capítulo poderão ser aplicadas isolada ou cumulativamente, bem como substituídas a qualquer tempo."}, {"art": "Art. 100", "key": "100", "texto": "Art. 100. Na aplicação das medidas levar-se-ão em conta as necessidades pedagógicas, preferindo-se aquelas que visem ao fortalecimento dos vínculos familiares e comunitários.\n Parágrafo único. São também princípios que regem a aplicação das medidas: (Incluído pela Lei nº 12.010, de 2009)\nVigência\n I - condição da criança e do adolescente como sujeitos de direitos: crianças e adolescentes são os titulares dos direitos previstos nesta e em outras Leis, bem como na Constituição Federal; (Incluído pela Lei nº 12.010, de 2009)\nVigência\n II - proteção integral e prioritária: a interpretação e aplicação de toda e qualquer norma contida nesta Lei deve ser voltada à proteção integral e prioritária dos direitos de que crianças e adolescentes são titulares; (Incluído pela Lei nº 12.010, de 2009) Vigência\n III - responsabilidade primária e solidária do poder público: a plena efetivação dos direitos assegurados a crianças e a adolescentes por esta Lei e pela Constituição Federal, salvo nos casos por esta expressamente ressalvados, é de responsabilidade primária e solidária das 3 (três) esferas de governo, sem prejuízo da municipalização do atendimento e da possibilidade da execução de programas por entidades não governamentais; (Incluído pela Lei nº 12.010, de 2009)\nVigência\n IV - interesse superior da criança e do adolescente: a intervenção deve atender prioritariamente aos interesses e direitos da criança e do adolescente, sem prejuízo da consideração que for devida a outros interesses legítimos no âmbito da pluralidade dos interesses presentes no caso concreto; (Incluído pela Lei nº 12.010, de 2009) Vigência\n V - privacidade: a promoção dos direitos e proteção da criança e do adolescente deve ser efetuada no respeito pela intimidade, direito à imagem e reserva da sua vida privada; (Incluído pela Lei nº 12.010, de 2009) Vigência\n VI - intervenção precoce: a intervenção das autoridades competentes deve ser efetuada logo que a situação de perigo seja conhecida; (Incluído pela Lei nº 12.010, de 2009) Vigência\n VII - intervenção mínima: a intervenção deve ser exercida exclusivamente pelas autoridades e instituições cuja ação seja indispensável à efetiva promoção dos direitos e à proteção da criança e do adolescente; (Incluído pela Lei nº 12.010, de 2009) Vigência\n VIII - proporcionalidade e atualidade: a intervenção deve ser a necessária e adequada à situação de perigo em que a criança ou o adolescente se encontram no momento em que a decisão é tomada; (Incluído pela Lei nº 12.010, de 2009)\nVigência\n IX - responsabilidade parental: a intervenção deve ser efetuada de modo que os pais assumam os seus deveres para com a criança e o adolescente; (Incluído pela Lei nº 12.010, de 2009) Vigência\n X - prevalência da família: na promoção de direitos e na proteção da criança e do adolescente deve ser dada prevalência às medidas que os mantenham ou reintegrem na sua família natural ou extensa ou, se isto não for possível, que promovam a sua integração em família substituta; (Incluído pela Lei nº 12.010, de 2009) Vigência\n X - prevalência da família: na promoção de direitos e na proteção da criança e do adolescente deve ser dada prevalência às medidas que os mantenham ou reintegrem na sua família natural ou extensa ou, se isso não for possível, que promovam a sua integração em família adotiva; (Redação dada pela Lei nº 13.509, de 2017)\n XI - obrigatoriedade da informação: a criança e o adolescente, respeitado seu estágio de desenvolvimento e capacidade de compreensão, seus pais ou responsável devem ser informados dos seus direitos, dos motivos que determinaram a intervenção e da forma como esta se processa; (Incluído pela Lei nº 12.010, de 2009) Vigência\n XII - oitiva obrigatória e participação: a criança e o adolescente, em separado ou na companhia dos pais, de responsável ou de pessoa por si indicada, bem como os seus pais ou responsável, têm direito a ser ouvidos e a participar nos atos e na definição da medida de promoção dos direitos e de proteção, sendo sua opinião devidamente considerada pela autoridade judiciária competente, observado o disposto nos §§ 1 o e 2 o do art. 28 desta Lei. (Incluído pela Lei nº 12.010, de 2009) Vigência"}, {"art": "Art. 101", "key": "101", "texto": "Art. 101. Verificada qualquer das hipóteses previstas no art. 98, a autoridade competente poderá determinar, dentre outras, as seguintes medidas:\n I - encaminhamento aos pais ou responsável, mediante termo de responsabilidade;\n\f II - orientação, apoio e acompanhamento temporários;\n III - matrícula e freqüência obrigatórias em estabelecimento oficial de ensino fundamental;\n IV - inclusão em programa comunitário ou oficial de auxílio à família, à criança e ao adolescente;\n IV - inclusão em serviços e programas oficiais ou comunitários de proteção, apoio e promoção da família, da criança e do adolescente; (Redação dada pela Lei nº 13.257, de 2016)\n V - requisição de tratamento médico, psicológico ou psiquiátrico, em regime hospitalar ou ambulatorial;\n V – requisição de tratamento médico, psicológico ou psiquiátrico, em regime hospitalar ou ambulatorial, extensivo às famílias, se for o caso, especialmente em caso de vitimização em crime contra a dignidade sexual;\n(Redação dada pela Lei nº 15.280, de 2025)\n VI - inclusão em programa oficial ou comunitário de auxílio, orientação e tratamento a alcoólatras e toxicômanos;\n VII - abrigo em entidade;\n VII - acolhimento institucional; (Redação dada pela Lei nº 12.010, de 2009) Vigência\n VIII - colocação em família substituta.\n VIII - inclusão em programa de acolhimento familiar; (Redação dada pela Lei nº 12.010, de 2009) Vigência\n IX - colocação em família substituta. (Incluído pela Lei nº 12.010, de 2009) Vigência\n Parágrafo único. O abrigo é medida provisória e excepcional, utilizável como forma de transição para a colocação em família substituta, não implicando privação de liberdade.\n § 1 o O acolhimento institucional e o acolhimento familiar são medidas provisórias e excepcionais, utilizáveis como forma de transição para reintegração familiar ou, não sendo esta possível, para colocação em família substituta, não implicando privação de liberdade. (Incluído pela Lei nº 12.010, de 2009) Vigência\n § 2 o Sem prejuízo da tomada de medidas emergenciais para proteção de vítimas de violência ou abuso sexual e das providências a que alude o art. 130 desta Lei, o afastamento da criança ou adolescente do convívio familiar é de competência exclusiva da autoridade judiciária e importará na deflagração, a pedido do Ministério Público ou de quem tenha legítimo interesse, de procedimento judicial contencioso, no qual se garanta aos pais ou ao responsável legal o exercício do contraditório e da ampla defesa. (Incluído pela Lei nº 12.010, de 2009) Vigência\n § 3 o Crianças e adolescentes somente poderão ser encaminhados às instituições que executam programas de acolhimento institucional, governamentais ou não, por meio de uma Guia de Acolhimento, expedida pela autoridade judiciária, na qual obrigatoriamente constará, dentre outros: (Incluído pela Lei nº 12.010, de 2009) Vigência\n I - sua identificação e a qualificação completa de seus pais ou de seu responsável, se conhecidos; (Incluído pela Lei nº 12.010, de 2009) Vigência\n II - o endereço de residência dos pais ou do responsável, com pontos de referência; (Incluído pela Lei nº 12.010, de 2009) Vigência\n III - os nomes de parentes ou de terceiros interessados em tê-los sob sua guarda; (Incluído pela Lei nº 12.010, de 2009) Vigência\n IV - os motivos da retirada ou da não reintegração ao convívio familiar. (Incluído pela Lei nº 12.010, de 2009)\nVigência\n § 4 o Imediatamente após o acolhimento da criança ou do adolescente, a entidade responsável pelo programa de acolhimento institucional ou familiar elaborará um plano individual de atendimento, visando à reintegração familiar, ressalvada a existência de ordem escrita e fundamentada em contrário de autoridade judiciária competente, caso em que também deverá contemplar sua colocação em família substituta, observadas as regras e princípios desta Lei. (Incluído pela Lei nº 12.010, de 2009) Vigência\n § 5 o O plano individual será elaborado sob a responsabilidade da equipe técnica do respectivo programa de atendimento e levará em consideração a opinião da criança ou do adolescente e a oitiva dos pais ou do responsável.\n(Incluído pela Lei nº 12.010, de 2009) Vigência\n\f § 6 o Constarão do plano individual, dentre outros: (Incluído pela Lei nº 12.010, de 2009) Vigência\n I - os resultados da avaliação interdisciplinar; (Incluído pela Lei nº 12.010, de 2009) Vigência\n II - os compromissos assumidos pelos pais ou responsável; e (Incluído pela Lei nº 12.010, de 2009) Vigência\n III - a previsão das atividades a serem desenvolvidas com a criança ou com o adolescente acolhido e seus pais ou responsável, com vista na reintegração familiar ou, caso seja esta vedada por expressa e fundamentada determinação judicial, as providências a serem tomadas para sua colocação em família substituta, sob direta supervisão da autoridade judiciária. (Incluído pela Lei nº 12.010, de 2009) Vigência\n § 7 o O acolhimento familiar ou institucional ocorrerá no local mais próximo à residência dos pais ou do responsável e, como parte do processo de reintegração familiar, sempre que identificada a necessidade, a família de origem será incluída em programas oficiais de orientação, de apoio e de promoção social, sendo facilitado e estimulado o contato com a criança ou com o adolescente acolhido. (Incluído pela Lei nº 12.010, de 2009) Vigência\n § 8 o Verificada a possibilidade de reintegração familiar, o responsável pelo programa de acolhimento familiar ou institucional fará imediata comunicação à autoridade judiciária, que dará vista ao Ministério Público, pelo prazo de 5\n(cinco) dias, decidindo em igual prazo. (Incluído pela Lei nº 12.010, de 2009) Vigência\n § 9 o Em sendo constatada a impossibilidade de reintegração da criança ou do adolescente à família de origem, após seu encaminhamento a programas oficiais ou comunitários de orientação, apoio e promoção social, será enviado relatório fundamentado ao Ministério Público, no qual conste a descrição pormenorizada das providências tomadas e a expressa recomendação, subscrita pelos técnicos da entidade ou responsáveis pela execução da política municipal de garantia do direito à convivência familiar, para a destituição do poder familiar, ou destituição de tutela ou guarda. (Incluído pela Lei nº 12.010, de 2009) Vigência\n § 10. Recebido o relatório, o Ministério Público terá o prazo de 30 (trinta) dias para o ingresso com a ação de destituição do poder familiar, salvo se entender necessária a realização de estudos complementares ou outras providências que entender indispensáveis ao ajuizamento da demanda. (Incluído pela Lei nº 12.010, de 2009) Vigência\n § 10. Recebido o relatório, o Ministério Público terá o prazo de 15 (quinze) dias para o ingresso com a ação de destituição do poder familiar, salvo se entender necessária a realização de estudos complementares ou de outras providências indispensáveis ao ajuizamento da demanda. (Redação dada pela Lei nº 13.509, de 2017)\n § 11. A autoridade judiciária manterá, em cada comarca ou foro regional, um cadastro contendo informações atualizadas sobre as crianças e adolescentes em regime de acolhimento familiar e institucional sob sua responsabilidade, com informações pormenorizadas sobre a situação jurídica de cada um, bem como as providências tomadas para sua reintegração familiar ou colocação em família substituta, em qualquer das modalidades previstas no art. 28 desta Lei. (Incluído pela Lei nº 12.010, de 2009) Vigência\n § 12. Terão acesso ao cadastro o Ministério Público, o Conselho Tutelar, o órgão gestor da Assistência Social e os\nConselhos Municipais dos Direitos da Criança e do Adolescente e da Assistência Social, aos quais incumbe deliberar sobre a implementação de políticas públicas que permitam reduzir o número de crianças e adolescentes afastados do convívio familiar e abreviar o período de permanência em programa de acolhimento. (Incluído pela Lei nº 12.010, de 2009) Vigência"}, {"art": "Art. 102", "key": "102", "texto": "Art. 102 ....................................................................\n 6º) a perda e a suspensão do pátrio poder. \""}, {"art": "Art. 103", "key": "103", "texto": "Art. 103. Considera-se ato infracional a conduta descrita como crime ou contravenção penal."}, {"art": "Art. 104", "key": "104", "texto": "Art. 104. São penalmente inimputáveis os menores de dezoito anos, sujeitos às medidas previstas nesta Lei.\n Parágrafo único. Para os efeitos desta Lei, deve ser considerada a idade do adolescente à data do fato."}, {"art": "Art. 105", "key": "105", "texto": "Art. 105. Ao ato infracional praticado por criança corresponderão as medidas previstas no art. 101.\n Capítulo II\n Dos Direitos Individuais"}, {"art": "Art. 106", "key": "106", "texto": "Art. 106. Nenhum adolescente será privado de sua liberdade senão em flagrante de ato infracional ou por ordem escrita e fundamentada da autoridade judiciária competente.\n Parágrafo único. O adolescente tem direito à identificação dos responsáveis pela sua apreensão, devendo ser informado acerca de seus direitos."}, {"art": "Art. 107", "key": "107", "texto": "Art. 107. A apreensão de qualquer adolescente e o local onde se encontra recolhido serão incontinenti comunicados à autoridade judiciária competente e à família do apreendido ou à pessoa por ele indicada.\n Parágrafo único. Examinar-se-á, desde logo e sob pena de responsabilidade, a possibilidade de liberação imediata."}, {"art": "Art. 108", "key": "108", "texto": "Art. 108. A internação, antes da sentença, pode ser determinada pelo prazo máximo de quarenta e cinco dias.\n Parágrafo único. A decisão deverá ser fundamentada e basear-se em indícios suficientes de autoria e materialidade, demonstrada a necessidade imperiosa da medida."}, {"art": "Art. 109", "key": "109", "texto": "Art. 109. O adolescente civilmente identificado não será submetido a identificação compulsória pelos órgãos policiais, de proteção e judiciais, salvo para efeito de confrontação, havendo dúvida fundada.\n Capítulo III\n Das Garantias Processuais"}, {"art": "Art. 110", "key": "110", "texto": "Art. 110. Nenhum adolescente será privado de sua liberdade sem o devido processo legal."}, {"art": "Art. 111", "key": "111", "texto": "Art. 111. São asseguradas ao adolescente, entre outras, as seguintes garantias:\n I - pleno e formal conhecimento da atribuição de ato infracional, mediante citação ou meio equivalente;\n II - igualdade na relação processual, podendo confrontar-se com vítimas e testemunhas e produzir todas as provas necessárias à sua defesa;\n III - defesa técnica por advogado;\n IV - assistência judiciária gratuita e integral aos necessitados, na forma da lei;\n V - direito de ser ouvido pessoalmente pela autoridade competente;\n VI - direito de solicitar a presença de seus pais ou responsável em qualquer fase do procedimento.\n Capítulo IV\n\f Das Medidas Sócio-Educativas\n Seção I\n Disposições Gerais"}, {"art": "Art. 112", "key": "112", "texto": "Art. 112. Verificada a prática de ato infracional, a autoridade competente poderá aplicar ao adolescente as seguintes medidas:\n I - advertência;\n II - obrigação de reparar o dano;\n III - prestação de serviços à comunidade;\n IV - liberdade assistida;\n V - inserção em regime de semi-liberdade;\n VI - internação em estabelecimento educacional;\n VII - qualquer uma das previstas no art. 101, I a VI.\n § 1º A medida aplicada ao adolescente levará em conta a sua capacidade de cumpri-la, as circunstâncias e a gravidade da infração.\n § 2º Em hipótese alguma e sob pretexto algum, será admitida a prestação de trabalho forçado.\n § 3º Os adolescentes portadores de doença ou deficiência mental receberão tratamento individual e especializado, em local adequado às suas condições."}, {"art": "Art. 113", "key": "113", "texto": "Art. 113. Aplica-se a este Capítulo o disposto nos arts. 99 e 100."}, {"art": "Art. 114", "key": "114", "texto": "Art. 114. A imposição das medidas previstas nos incisos II a VI do art. 112 pressupõe a existência de provas suficientes da autoria e da materialidade da infração, ressalvada a hipótese de remissão, nos termos do art. 127.\n Parágrafo único. A advertência poderá ser aplicada sempre que houver prova da materialidade e indícios suficientes da autoria.\n Seção II\n Da Advertência"}, {"art": "Art. 115", "key": "115", "texto": "Art. 115. A advertência consistirá em admoestação verbal, que será reduzida a termo e assinada.\n Seção III\n Da Obrigação de Reparar o Dano"}, {"art": "Art. 116", "key": "116", "texto": "Art. 116. Em se tratando de ato infracional com reflexos patrimoniais, a autoridade poderá determinar, se for o caso, que o adolescente restitua a coisa, promova o ressarcimento do dano, ou, por outra forma, compense o prejuízo da vítima.\n Parágrafo único. Havendo manifesta impossibilidade, a medida poderá ser substituída por outra adequada.\n Seção IV\n Da Prestação de Serviços à Comunidade"}, {"art": "Art. 117", "key": "117", "texto": "Art. 117. A prestação de serviços comunitários consiste na realização de tarefas gratuitas de interesse geral, por período não excedente a seis meses, junto a entidades assistenciais, hospitais, escolas e outros estabelecimentos congêneres, bem como em programas comunitários ou governamentais.\n Parágrafo único. As tarefas serão atribuídas conforme as aptidões do adolescente, devendo ser cumpridas durante jornada máxima de oito horas semanais, aos sábados, domingos e feriados ou em dias úteis, de modo a não prejudicar a freqüência à escola ou à jornada normal de trabalho.\n\f Seção V\n Da Liberdade Assistida"}, {"art": "Art. 118", "key": "118", "texto": "Art. 118. A liberdade assistida será adotada sempre que se afigurar a medida mais adequada para o fim de acompanhar, auxiliar e orientar o adolescente.\n § 1º A autoridade designará pessoa capacitada para acompanhar o caso, a qual poderá ser recomendada por entidade ou programa de atendimento.\n § 2º A liberdade assistida será fixada pelo prazo mínimo de seis meses, podendo a qualquer tempo ser prorrogada, revogada ou substituída por outra medida, ouvido o orientador, o Ministério Público e o defensor."}, {"art": "Art. 119", "key": "119", "texto": "Art. 119. Incumbe ao orientador, com o apoio e a supervisão da autoridade competente, a realização dos seguintes encargos, entre outros:\n I - promover socialmente o adolescente e sua família, fornecendo-lhes orientação e inserindo-os, se necessário, em programa oficial ou comunitário de auxílio e assistência social;\n II - supervisionar a freqüência e o aproveitamento escolar do adolescente, promovendo, inclusive, sua matrícula;\n III - diligenciar no sentido da profissionalização do adolescente e de sua inserção no mercado de trabalho;\n IV - apresentar relatório do caso.\n Seção VI\n Do Regime de Semi-liberdade"}, {"art": "Art. 120", "key": "120", "texto": "Art. 120. O regime de semi-liberdade pode ser determinado desde o início, ou como forma de transição para o meio aberto, possibilitada a realização de atividades externas, independentemente de autorização judicial.\n § 1º São obrigatórias a escolarização e a profissionalização, devendo, sempre que possível, ser utilizados os recursos existentes na comunidade.\n § 2º A medida não comporta prazo determinado aplicando-se, no que couber, as disposições relativas à internação.\n Seção VII\n Da Internação"}, {"art": "Art. 121", "key": "121", "texto": "Art. 121 ............................................................\n § 4º No homicídio culposo, a pena é aumentada de um terço, se o crime resulta de\n inobservância de regra técnica de profissão, arte ou ofício, ou se o agente deixa de prestar\n imediato socorro à vítima, não procura diminuir as conseqüências do seu ato, ou foge para\n evitar prisão em flagrante. Sendo doloso o homicídio, a pena é aumentada de um terço, se o\n crime é praticado contra pessoa menor de catorze anos.\n 2)"}, {"art": "Art. 122", "key": "122", "texto": "Art. 122. A medida de internação só poderá ser aplicada quando:\n I - tratar-se de ato infracional cometido mediante grave ameaça ou violência a pessoa;\n II - por reiteração no cometimento de outras infrações graves;\n\f III - por descumprimento reiterado e injustificável da medida anteriormente imposta.\n § 1º O prazo de internação na hipótese do inciso III deste artigo não poderá ser superior a três meses.\n § 1 o O prazo de internação na hipótese do inciso III deste artigo não poderá ser superior a 3 (três) meses, devendo ser decretada judicialmente após o devido processo legal. (Redação dada pela Lei nº 12.594, de 2012) (Vide)\n § 2º. Em nenhuma hipótese será aplicada a internação, havendo outra medida adequada."}, {"art": "Art. 123", "key": "123", "texto": "Art. 123. A internação deverá ser cumprida em entidade exclusiva para adolescentes, em local distinto daquele destinado ao abrigo, obedecida rigorosa separação por critérios de idade, compleição física e gravidade da infração.\n Parágrafo único. Durante o período de internação, inclusive provisória, serão obrigatórias atividades pedagógicas."}, {"art": "Art. 124", "key": "124", "texto": "Art. 124. São direitos do adolescente privado de liberdade, entre outros, os seguintes:\n I - entrevistar-se pessoalmente com o representante do Ministério Público;\n II - peticionar diretamente a qualquer autoridade;\n III - avistar-se reservadamente com seu defensor;\n IV - ser informado de sua situação processual, sempre que solicitada;\n V - ser tratado com respeito e dignidade;\n VI - permanecer internado na mesma localidade ou naquela mais próxima ao domicílio de seus pais ou responsável;\n VII - receber visitas, ao menos, semanalmente;\n VIII - corresponder-se com seus familiares e amigos;\n IX - ter acesso aos objetos necessários à higiene e asseio pessoal;\n X - habitar alojamento em condições adequadas de higiene e salubridade;\n XI - receber escolarização e profissionalização;\n XII - realizar atividades culturais, esportivas e de lazer:\n XIII - ter acesso aos meios de comunicação social;\n XIV - receber assistência religiosa, segundo a sua crença, e desde que assim o deseje;\n XV - manter a posse de seus objetos pessoais e dispor de local seguro para guardá-los, recebendo comprovante daqueles porventura depositados em poder da entidade;\n XVI - receber, quando de sua desinternação, os documentos pessoais indispensáveis à vida em sociedade.\n § 1º Em nenhum caso haverá incomunicabilidade.\n § 2º A autoridade judiciária poderá suspender temporariamente a visita, inclusive de pais ou responsável, se existirem motivos sérios e fundados de sua prejudicialidade aos interesses do adolescente."}, {"art": "Art. 125", "key": "125", "texto": "Art. 125. É dever do Estado zelar pela integridade física e mental dos internos, cabendo-lhe adotar as medidas adequadas de contenção e segurança.\n Capítulo V\n Da Remissão"}, {"art": "Art. 126", "key": "126", "texto": "Art. 126. Antes de iniciado o procedimento judicial para apuração de ato infracional, o representante do Ministério\nPúblico poderá conceder a remissão, como forma de exclusão do processo, atendendo às circunstâncias e conseqüências do fato, ao contexto social, bem como à personalidade do adolescente e sua maior ou menor participação no ato infracional.\n\f Parágrafo único. Iniciado o procedimento, a concessão da remissão pela autoridade judiciária importará na suspensão ou extinção do processo."}, {"art": "Art. 127", "key": "127", "texto": "Art. 127. A remissão não implica necessariamente o reconhecimento ou comprovação da responsabilidade, nem prevalece para efeito de antecedentes, podendo incluir eventualmente a aplicação de qualquer das medidas previstas em lei, exceto a colocação em regime de semi-liberdade e a internação."}, {"art": "Art. 128", "key": "128", "texto": "Art. 128. A medida aplicada por força da remissão poderá ser revista judicialmente, a qualquer tempo, mediante pedido expresso do adolescente ou de seu representante legal, ou do Ministério Público.\n Título IV\n Das Medidas Pertinentes aos Pais ou Responsável"}, {"art": "Art. 129", "key": "129", "texto": "Art. 129 ...............................................................\n § 7º Aumenta-se a pena de um terço, se ocorrer qualquer das hipóteses do art. 121, § 4º.\n § 8º Aplica-se à lesão culposa o disposto no § 5º do art. 121.\n 3)"}, {"art": "Art. 130", "key": "130", "texto": "Art. 130. Verificada a hipótese de maus-tratos, negligência, opressão ou abuso sexual impostos pelos pais ou responsável, a autoridade judiciária poderá determinar, como medida cautelar, o afastamento do agressor da moradia comum. (Redação dada pela Lei nº 15.240, de 2025)\n Parágrafo único. Da medida cautelar constará, ainda, a fixação provisória dos alimentos de que necessitem a criança ou o adolescente dependentes do agressor. (Incluído pela Lei nº 12.415, de 2011)\n Título V\n Do Conselho Tutelar\n Capítulo I\n Disposições Gerais"}, {"art": "Art. 131", "key": "131", "texto": "Art. 131. O Conselho Tutelar é órgão permanente e autônomo, não jurisdicional, encarregado pela sociedade de zelar pelo cumprimento dos direitos da criança e do adolescente, definidos nesta Lei."}, {"art": "Art. 132", "key": "132", "texto": "Art. 132. Em cada Município e em cada Região Administrativa do Distrito Federal haverá, no mínimo, 1 (um)\nConselho Tutelar como órgão integrante da administração pública local, composto de 5 (cinco) membros, escolhidos pela população local para mandato de 4 (quatro) anos, permitida recondução por novos processos de escolha.\n(Redação dada pela Lei nº 13.824, de 2019)"}, {"art": "Art. 133", "key": "133", "texto": "Art. 133. Para a candidatura a membro do Conselho Tutelar, serão exigidos os seguintes requisitos:\n I - reconhecida idoneidade moral;\n II - idade superior a vinte e um anos;\n III - residir no município."}, {"art": "Art. 134", "key": "134", "texto": "Art. 134. Lei municipal ou distrital disporá sobre o local, dia e horário de funcionamento do Conselho Tutelar, inclusive quanto à remuneração dos respectivos membros, aos quais é assegurado o direito a: (Redação dada pela Lei nº 12.696, de 2012)\n I - cobertura previdenciária; (Incluído pela Lei nº 12.696, de 2012)\n II - gozo de férias anuais remuneradas, acrescidas de 1/3 (um terço) do valor da remuneração mensal; (Incluído pela Lei nº 12.696, de 2012)\n III - licença-maternidade; (Incluído pela Lei nº 12.696, de 2012)\n IV - licença-paternidade; (Incluído pela Lei nº 12.696, de 2012)\n V - gratificação natalina. (Incluído pela Lei nº 12.696, de 2012)\n Parágrafo único. Constará da lei orçamentária municipal previsão dos recursos necessários ao funcionamento do\nConselho Tutelar.\n Parágrafo único. Constará da lei orçamentária municipal e da do Distrito Federal previsão dos recursos necessários ao funcionamento do Conselho Tutelar e à remuneração e formação continuada dos conselheiros tutelares.\n(Redação dada pela Lei nº 12.696, de 2012)"}, {"art": "Art. 135", "key": "135", "texto": "Art. 135. O exercício efetivo da função de conselheiro constituirá serviço público relevante e estabelecerá presunção de idoneidade moral. (Redação dada pela Lei nº 12.696, de 2012)\n Capítulo II\n Das Atribuições do Conselho"}, {"art": "Art. 136", "key": "136", "texto": "Art. 136.................................................................\n § 3º Aumenta-se a pena de um terço, se o crime é praticado contra pessoa menor de\n catorze anos.\n 4)"}, {"art": "Art. 137", "key": "137", "texto": "Art. 137. As decisões do Conselho Tutelar somente poderão ser revistas pela autoridade judiciária a pedido de quem tenha legítimo interesse.\n Capítulo III\n Da Competência"}, {"art": "Art. 138", "key": "138", "texto": "Art. 138. Aplica-se ao Conselho Tutelar a regra de competência constante do art. 147.\n Capítulo IV\n Da Escolha dos Conselheiros"}, {"art": "Art. 139", "key": "139", "texto": "Art. 139. O processo para a escolha dos membros do Conselho Tutelar será estabelecido em lei municipal e realizado sob a responsabilidade do Conselho Municipal dos Direitos da Criança e do Adolescente, e a fiscalização do\nMinistério Público. (Redação dada pela Lei nº 8.242, de 12.10.1991)\n § 1 o O processo de escolha dos membros do Conselho Tutelar ocorrerá em data unificada em todo o território nacional a cada 4 (quatro) anos, no primeiro domingo do mês de outubro do ano subsequente ao da eleição presidencial.\n(Incluído pela Lei nº 12.696, de 2012)\n § 2 o A posse dos conselheiros tutelares ocorrerá no dia 10 de janeiro do ano subsequente ao processo de escolha.\n(Incluído pela Lei nº 12.696, de 2012)\n § 3 o No processo de escolha dos membros do Conselho Tutelar, é vedado ao candidato doar, oferecer, prometer ou entregar ao eleitor bem ou vantagem pessoal de qualquer natureza, inclusive brindes de pequeno valor. (Incluído pela Lei nº 12.696, de 2012)\n Capítulo V\n Dos Impedimentos"}, {"art": "Art. 140", "key": "140", "texto": "Art. 140. São impedidos de servir no mesmo Conselho marido e mulher, ascendentes e descendentes, sogro e genro ou nora, irmãos, cunhados, durante o cunhadio, tio e sobrinho, padrasto ou madrasta e enteado.\n Parágrafo único. Estende-se o impedimento do conselheiro, na forma deste artigo, em relação à autoridade judiciária e ao representante do Ministério Público com atuação na Justiça da Infância e da Juventude, em exercício na comarca, foro regional ou distrital.\n Título VI\n Do Acesso à Justiça\n Capítulo I\n Disposições Gerais"}, {"art": "Art. 141", "key": "141", "texto": "Art. 141. É garantido o acesso de toda criança ou adolescente à Defensoria Pública, ao Ministério Público e ao\nPoder Judiciário, por qualquer de seus órgãos.\n § 1º. A assistência judiciária gratuita será prestada aos que dela necessitarem, através de defensor público ou advogado nomeado.\n § 2º As ações judiciais da competência da Justiça da Infância e da Juventude são isentas de custas e emolumentos, ressalvada a hipótese de litigância de má-fé."}, {"art": "Art. 142", "key": "142", "texto": "Art. 142. Os menores de dezesseis anos serão representados e os maiores de dezesseis e menores de vinte e um anos assistidos por seus pais, tutores ou curadores, na forma da legislação civil ou processual.\n Parágrafo único. A autoridade judiciária dará curador especial à criança ou adolescente, sempre que os interesses destes colidirem com os de seus pais ou responsável, ou quando carecer de representação ou assistência legal ainda que\n\feventual."}, {"art": "Art. 143", "key": "143", "texto": "Art. 143. E vedada a divulgação de atos judiciais, policiais e administrativos que digam respeito a crianças e adolescentes a que se atribua autoria de ato infracional.\n Parágrafo único. Qualquer notícia a respeito do fato não poderá identificar a criança ou adolescente, vedando-se fotografia, referência a nome, apelido, filiação, parentesco e residência.\n Parágrafo único. Qualquer notícia a respeito do fato não poderá identificar a criança ou adolescente, vedando-se fotografia, referência a nome, apelido, filiação, parentesco, residência e, inclusive, iniciais do nome e sobrenome.\n(Redação dada pela Lei nº 10.764, de 12.11.2003)"}, {"art": "Art. 144", "key": "144", "texto": "Art. 144. A expedição de cópia ou certidão de atos a que se refere o artigo anterior somente será deferida pela autoridade judiciária competente, se demonstrado o interesse e justificada a finalidade.\n Capítulo II\n Da Justiça da Infância e da Juventude\n Seção I\n Disposições Gerais"}, {"art": "Art. 145", "key": "145", "texto": "Art. 145. Os estados e o Distrito Federal poderão criar varas especializadas e exclusivas da infância e da juventude, cabendo ao Poder Judiciário estabelecer sua proporcionalidade por número de habitantes, dotá-las de infra-estrutura e dispor sobre o atendimento, inclusive em plantões.\n Seção II\n Do Juiz"}, {"art": "Art. 146", "key": "146", "texto": "Art. 146. A autoridade a que se refere esta Lei é o Juiz da Infância e da Juventude, ou o juiz que exerce essa função, na forma da lei de organização judiciária local."}, {"art": "Art. 147", "key": "147", "texto": "Art. 147. A competência será determinada:\n I - pelo domicílio dos pais ou responsável;\n II - pelo lugar onde se encontre a criança ou adolescente, à falta dos pais ou responsável.\n § 1º. Nos casos de ato infracional, será competente a autoridade do lugar da ação ou omissão, observadas as regras de conexão, continência e prevenção.\n § 2º A execução das medidas poderá ser delegada à autoridade competente da residência dos pais ou responsável, ou do local onde sediar-se a entidade que abrigar a criança ou adolescente.\n § 3º Em caso de infração cometida através de transmissão simultânea de rádio ou televisão, que atinja mais de uma comarca, será competente, para aplicação da penalidade, a autoridade judiciária do local da sede estadual da emissora ou rede, tendo a sentença eficácia para todas as transmissoras ou retransmissoras do respectivo estado."}, {"art": "Art. 148", "key": "148", "texto": "Art. 148. A Justiça da Infância e da Juventude é competente para:\n I - conhecer de representações promovidas pelo Ministério Público, para apuração de ato infracional atribuído a adolescente, aplicando as medidas cabíveis;\n II - conceder a remissão, como forma de suspensão ou extinção do processo;\n III - conhecer de pedidos de adoção e seus incidentes;\n IV - conhecer de ações civis fundadas em interesses individuais, difusos ou coletivos afetos à criança e ao adolescente, observado o disposto no art. 209;\n V - conhecer de ações decorrentes de irregularidades em entidades de atendimento, aplicando as medidas cabíveis;\n VI - aplicar penalidades administrativas nos casos de infrações contra norma de proteção à criança ou adolescente;\n VII - conhecer de casos encaminhados pelo Conselho Tutelar, aplicando as medidas cabíveis.\n\f Parágrafo único. Quando se tratar de criança ou adolescente nas hipóteses do art. 98, é também competente a\nJustiça da Infância e da Juventude para o fim de:\n a) conhecer de pedidos de guarda e tutela;\n b) conhecer de ações de destituição do pátrio poder poder familiar , perda ou modificação da tutela ou guarda;\n(Expressão substituída pela Lei nº 12.010, de 2009) Vigência\n c) suprir a capacidade ou o consentimento para o casamento;\n d) conhecer de pedidos baseados em discordância paterna ou materna, em relação ao exercício do pátrio poder poder familiar ; (Expressão substituída pela Lei nº 12.010, de 2009) Vigência\n e) conceder a emancipação, nos termos da lei civil, quando faltarem os pais;\n f) designar curador especial em casos de apresentação de queixa ou representação, ou de outros procedimentos judiciais ou extrajudiciais em que haja interesses de criança ou adolescente;\n g) conhecer de ações de alimentos;\n h) determinar o cancelamento, a retificação e o suprimento dos registros de nascimento e óbito."}, {"art": "Art. 149", "key": "149", "texto": "Art. 149. Compete à autoridade judiciária disciplinar, através de portaria, ou autorizar, mediante alvará:\n I - a entrada e permanência de criança ou adolescente, desacompanhado dos pais ou responsável, em:\n a) estádio, ginásio e campo desportivo;\n b) bailes ou promoções dançantes;\n c) boate ou congêneres;\n d) casa que explore comercialmente diversões eletrônicas;\n e) estúdios cinematográficos, de teatro, rádio e televisão.\n II - a participação de criança e adolescente em:\n a) espetáculos públicos e seus ensaios;\n b) certames de beleza.\n § 1º Para os fins do disposto neste artigo, a autoridade judiciária levará em conta, dentre outros fatores:\n a) os princípios desta Lei;\n b) as peculiaridades locais;\n c) a existência de instalações adequadas;\n d) o tipo de freqüência habitual ao local;\n e) a adequação do ambiente a eventual participação ou freqüência de crianças e adolescentes;\n f) a natureza do espetáculo.\n § 2º As medidas adotadas na conformidade deste artigo deverão ser fundamentadas, caso a caso, vedadas as determinações de caráter geral.\n Seção III\n Dos Serviços Auxiliares"}, {"art": "Art. 150", "key": "150", "texto": "Art. 150. Cabe ao Poder Judiciário, na elaboração de sua proposta orçamentária, prever recursos para manutenção de equipe interprofissional, destinada a assessorar a Justiça da Infância e da Juventude."}, {"art": "Art. 151", "key": "151", "texto": "Art. 151. Compete à equipe interprofissional dentre outras atribuições que lhe forem reservadas pela legislação local, fornecer subsídios por escrito, mediante laudos, ou verbalmente, na audiência, e bem assim desenvolver trabalhos de aconselhamento, orientação, encaminhamento, prevenção e outros, tudo sob a imediata subordinação à autoridade judiciária, assegurada a livre manifestação do ponto de vista técnico.\n Parágrafo único. Na ausência ou insuficiência de servidores públicos integrantes do Poder Judiciário responsáveis pela realização dos estudos psicossociais ou de quaisquer outras espécies de avaliações técnicas exigidas por esta Lei ou por determinação judicial, a autoridade judiciária poderá proceder à nomeação de perito, nos termos do art. 156 da Lei no 13.105, de 16 de março de 2015 (Código de Processo Civil) . (Incluído pela Lei nº 13.509, de 2017)\n Capítulo III\n Dos Procedimentos\n Seção I\n Disposições Gerais"}, {"art": "Art. 152", "key": "152", "texto": "Art. 152. Aos procedimentos regulados nesta Lei aplicam-se subsidiariamente as normas gerais previstas na legislação processual pertinente.\n Parágrafo único. É assegurada, sob pena de responsabilidade, prioridade absoluta na tramitação dos processos e procedimentos previstos nesta Lei, assim como na execução dos atos e diligências judiciais a eles referentes. (Incluído pela Lei nº 12.010, de 2009) Vigência\n § 1º É assegurada, sob pena de responsabilidade, prioridade absoluta na tramitação dos processos e procedimentos previstos nesta Lei, assim como na execução dos atos e diligências judiciais a eles referentes. (Incluído pela Lei nº 12.010, de 2009) Vigência\n § 2º Os prazos estabelecidos nesta Lei e aplicáveis aos seus procedimentos são contados em dias corridos, excluído o dia do começo e incluído o dia do vencimento, vedado o prazo em dobro para a Fazenda Pública e o Ministério\nPúblico. (Incluído pela Lei nº 13.509, de 2017)"}, {"art": "Art. 153", "key": "153", "texto": "Art. 153. Se a medida judicial a ser adotada não corresponder a procedimento previsto nesta ou em outra lei, a autoridade judiciária poderá investigar os fatos e ordenar de ofício as providências necessárias, ouvido o Ministério\nPúblico.\n Parágrafo único. O disposto neste artigo não se aplica para o fim de afastamento da criança ou do adolescente de sua família de origem e em outros procedimentos necessariamente contenciosos. (Incluído pela Lei nº 12.010, de 2009)\nVigência"}, {"art": "Art. 154", "key": "154", "texto": "Art. 154. Aplica-se às multas o disposto no art. 214.\n Seção II\n Da Perda e da Suspensão do Pátrio Poder Poder Familiar\n (Expressão substituída pela Lei nº 12.010, de 2009) Vigência"}, {"art": "Art. 155", "key": "155", "texto": "Art. 155. O procedimento para a perda ou a suspensão do pátrio poder poder familiar terá início por provocação do\nMinistério Público ou de quem tenha legítimo interesse. (Expressão substituída pela Lei nº 12.010, de 2009) Vigência"}, {"art": "Art. 156", "key": "156", "texto": "Art. 156. A petição inicial indicará:\n I - a autoridade judiciária a que for dirigida;\n II - o nome, o estado civil, a profissão e a residência do requerente e do requerido, dispensada a qualificação em se tratando de pedido formulado por representante do Ministério Público;\n III - a exposição sumária do fato e o pedido;\n IV - as provas que serão produzidas, oferecendo, desde logo, o rol de testemunhas e documentos."}, {"art": "Art. 157", "key": "157", "texto": "Art. 157. Havendo motivo grave, poderá a autoridade judiciária, ouvido o Ministério Público, decretar a suspensão do pátrio poder poder familiar , liminar ou incidentalmente, até o julgamento definitivo da causa, ficando a criança ou adolescente confiado a pessoa idônea, mediante termo de responsabilidade. (Expressão substituída pela Lei nº 12.010, de 2009) Vigência\n\f § 1 o Recebida a petição inicial, a autoridade judiciária determinará, concomitantemente ao despacho de citação e independentemente de requerimento do interessado, a realização de estudo social ou perícia por equipe interprofissional ou multidisciplinar para comprovar a presença de uma das causas de suspensão ou destituição do poder familiar, ressalvado o disposto no § 10 do art. 101 desta Lei, e observada a Lei n o 13.431, de 4 de abril de 2017 . (Incluído pela\nLei nº 13.509, de 2017)\n § 2 o Em sendo os pais oriundos de comunidades indígenas, é ainda obrigatória a intervenção, junto à equipe interprofissional ou multidisciplinar referida no § 1 o deste artigo, de representantes do órgão federal responsável pela política indigenista, observado o disposto no § 6 o do art. 28 desta Lei. (Incluído pela Lei nº 13.509, de 2017)\n § 3º A concessão da liminar será, preferencialmente, precedida de entrevista da criança ou do adolescente perante equipe multidisciplinar e de oitiva da outra parte, nos termos da Lei nº 13.431, de 4 de abril de 2017. (Incluído pela Lei nº 14.340, de 2022)\n § 4º Se houver indícios de ato de violação de direitos de criança ou de adolescente, o juiz comunicará o fato ao\nMinistério Público e encaminhará os documentos pertinentes. (Incluído pela Lei nº 14.340, de 2022)"}, {"art": "Art. 158", "key": "158", "texto": "Art. 158. O requerido será citado para, no prazo de dez dias, oferecer resposta escrita, indicando as provas a serem produzidas e oferecendo desde logo o rol de testemunhas e documentos.\n Parágrafo único. Deverão ser esgotados todos os meios para a citação pessoal.\n § 1 o A citação será pessoal, salvo se esgotados todos os meios para sua realização. (Incluído pela Lei nº 12.962, de 2014)\n § 2 o O requerido privado de liberdade deverá ser citado pessoalmente. (Incluído pela Lei nº 12.962, de 2014)\n § 3 o Quando, por 2 (duas) vezes, o oficial de justiça houver procurado o citando em seu domicílio ou residência sem o encontrar, deverá, havendo suspeita de ocultação, informar qualquer pessoa da família ou, em sua falta, qualquer vizinho do dia útil em que voltará a fim de efetuar a citação, na hora que designar, nos termos do art. 252 e seguintes da\nLei n o 13.105, de 16 de março de 2015 (Código de Processo Civil) . (Incluído pela Lei nº 13.509, de 2017)\n § 4 o Na hipótese de os genitores encontrarem-se em local incerto ou não sabido, serão citados por edital no prazo de 10 (dez) dias, em publicação única, dispensado o envio de ofícios para a localização. (Incluído pela Lei nº 13.509, de 2017)"}, {"art": "Art. 159", "key": "159", "texto": "Art. 159. Se o requerido não tiver possibilidade de constituir advogado, sem prejuízo do próprio sustento e de sua família, poderá requerer, em cartório, que lhe seja nomeado dativo, ao qual incumbirá a apresentação de resposta, contando-se o prazo a partir da intimação do despacho de nomeação.\n Parágrafo único. Na hipótese de requerido privado de liberdade, o oficial de justiça deverá perguntar, no momento da citação pessoal, se deseja que lhe seja nomeado defensor. (Incluído pela Lei nº 12.962, de 2014)"}, {"art": "Art. 160", "key": "160", "texto": "Art. 160. Sendo necessário, a autoridade judiciária requisitará de qualquer repartição ou órgão público a apresentação de documento que interesse à causa, de ofício ou a requerimento das partes ou do Ministério Público."}, {"art": "Art. 161", "key": "161", "texto": "Art. 161. Se não for contestado o pedido e tiver sido concluído o estudo social ou a perícia realizada por equipe interprofissional ou multidisciplinar, a autoridade judiciária dará vista dos autos ao Ministério Público, por 5 (cinco) dias, salvo quando este for o requerente, e decidirá em igual prazo. (Redação dada pela Lei nº 13.509, de 2017)\n § 1º Havendo necessidade, a autoridade judiciária poderá determinar a realização de estudo social ou perícia por equipe interprofissional, bem como a oitiva de testemunhas.\n § 1 o A autoridade judiciária, de ofício ou a requerimento das partes ou do Ministério Público, determinará a realização de estudo social ou perícia por equipe interprofissional ou multidisciplinar, bem como a oitiva de testemunhas que comprovem a presença de uma das causas de suspensão ou destituição do poder familiar previstas nos arts. 1.637 e 1.638 da Lei n o 10.406, de 10 de janeiro de 2002 - Código Civil, ou no art. 24 desta Lei . (Redação dada pela Lei nº 12.010, de 2009) Vigência\n § 1º A autoridade judiciária, de ofício ou a requerimento das partes ou do Ministério Público, determinará a oitiva de testemunhas que comprovem a presença de uma das causas de suspensão ou destituição do poder familiar previstas\n\fnos arts. 1.637 e 1.638 da Lei n o 10.406, de 10 de janeiro de 2002 (Código Civil) , ou no art. 24 desta Lei. (Redação dada pela Lei nº 13.509, de 2017)\n § 2º Se o pedido importar em modificação de guarda, será obrigatória, desde que possível e razoável, a oitiva da criança ou adolescente.\n § 2 o Em sendo os pais oriundos de comunidades indígenas, é ainda obrigatória a intervenção, junto à equipe profissional ou multidisciplinar referida no § 1 o deste artigo, de representantes do órgão federal responsável pela política indigenista, observado o disposto no § 6 o do art. 28 desta Lei. (Redação dada pela Lei nº 12.010, de 2009) Vigência\n § 2 o (Revogado) . (Redação dada pela Lei nº 13.509, de 2017)\n § 3 o Se o pedido importar em modificação de guarda, será obrigatória, desde que possível e razoável, a oitiva da criança ou adolescente, respeitado seu estágio de desenvolvimento e grau de compreensão sobre as implicações da medida. (Incluído pela Lei nº 12.010, de 2009) Vigência\n § 4 o É obrigatória a oitiva dos pais sempre que esses forem identificados e estiverem em local conhecido. (Incluído pela Lei nº 12.010, de 2009) Vigência\n § 4º É obrigatória a oitiva dos pais sempre que eles forem identificados e estiverem em local conhecido, ressalvados os casos de não comparecimento perante a Justiça quando devidamente citados. (Redação dada pela Lei nº 13.509, de 2017)\n § 5 o Se o pai ou a mãe estiverem privados de liberdade, a autoridade judicial requisitará sua apresentação para a oitiva. (Incluído pela Lei nº 12.962, de 2014)"}, {"art": "Art. 162", "key": "162", "texto": "Art. 162. Apresentada a resposta, a autoridade judiciária dará vista dos autos ao Ministério Público, por cinco dias, salvo quando este for o requerente, designando, desde logo, audiência de instrução e julgamento.\n § 1º A requerimento de qualquer das partes, do Ministério Público, ou de ofício, a autoridade judiciária poderá determinar a realização de estudo social ou, se possível, de perícia por equipe interprofissional.\n § 1º (Revogado) . (Redação dada pela Lei nº 13.509, de 2017)\n § 2º Na audiência, presentes as partes e o Ministério Público, serão ouvidas as testemunhas, colhendo-se oralmente o parecer técnico, salvo quando apresentado por escrito, manifestando-se sucessivamente o requerente, o requerido e o Ministério Público, pelo tempo de vinte minutos cada um, prorrogável por mais dez. A decisão será proferida na audiência, podendo a autoridade judiciária, excepcionalmente, designar data para sua leitura no prazo máximo de cinco dias.\n § 2 o Na audiência, presentes as partes e o Ministério Público, serão ouvidas as testemunhas, colhendo-se oralmente o parecer técnico, salvo quando apresentado por escrito, manifestando-se sucessivamente o requerente, o requerido e o Ministério Público, pelo tempo de 20 (vinte) minutos cada um, prorrogável por mais 10 (dez) minutos.\n(Redação dada pela Lei nº 13.509, de 2017)\n § 3 o A decisão será proferida na audiência, podendo a autoridade judiciária, excepcionalmente, designar data para sua leitura no prazo máximo de 5 (cinco) dias. (Incluído pela Lei nº 13.509, de 2017)\n § 4 o Quando o procedimento de destituição de poder familiar for iniciado pelo Ministério Público, não haverá necessidade de nomeação de curador especial em favor da criança ou adolescente. (Incluído pela Lei nº 13.509, de 2017)"}, {"art": "Art. 163", "key": "163", "texto": "Art. 163. O prazo máximo para conclusão do procedimento será de 120 (cento e vinte) dias, e caberá ao juiz, no caso de notória inviabilidade de manutenção do poder familiar, dirigir esforços para preparar a criança ou o adolescente com vistas à colocação em família substituta. (Redação dada pela Lei nº 13.509, de 2017)\n Parágrafo único. A sentença que decretar a perda ou a suspensão do poder familiar será averbada à margem do registro de nascimento da criança ou do adolescente. (Incluído pela Lei nº 12.010, de 2009) Vigência\n Seção III\n Da Destituição da Tutela"}, {"art": "Art. 164", "key": "164", "texto": "Art. 164. Na destituição da tutela, observar-se-á o procedimento para a remoção de tutor previsto na lei processual civil e, no que couber, o disposto na seção anterior.\n Seção IV\n Da Colocação em Família Substituta"}, {"art": "Art. 165", "key": "165", "texto": "Art. 165. São requisitos para a concessão de pedidos de colocação em família substituta:\n I - qualificação completa do requerente e de seu eventual cônjuge, ou companheiro, com expressa anuência deste;\n II - indicação de eventual parentesco do requerente e de seu cônjuge, ou companheiro, com a criança ou adolescente, especificando se tem ou não parente vivo;\n III - qualificação completa da criança ou adolescente e de seus pais, se conhecidos;\n IV - indicação do cartório onde foi inscrito nascimento, anexando, se possível, uma cópia da respectiva certidão;\n V - declaração sobre a existência de bens, direitos ou rendimentos relativos à criança ou ao adolescente.\n Parágrafo único. Em se tratando de adoção, observar-se-ão também os requisitos específicos."}, {"art": "Art. 166", "key": "166", "texto": "Art. 166. Se os pais forem falecidos, tiverem sido destituídos ou suspensos do poder familiar, ou houverem aderido expressamente ao pedido de colocação em família substituta, este poderá ser formulado diretamente em cartório, em petição assinada pelos próprios requerentes, dispensada a assistência de advogado. (Redação dada pela Lei nº 12.010, de 2009) Vigência\n § 1 o Na hipótese de concordância dos pais, esses serão ouvidos pela autoridade judiciária e pelo representante do\nMinistério Público, tomando-se por termo as declarações. (Incluído pela Lei nº 12.010, de 2009) Vigência\n § 1 o Na hipótese de concordância dos pais, o juiz: (Redação dada pela Lei nº 13.509, de 2017)\n I - na presença do Ministério Público, ouvirá as partes, devidamente assistidas por advogado ou por defensor público, para verificar sua concordância com a adoção, no prazo máximo de 10 (dez) dias, contado da data do protocolo da petição ou da entrega da criança em juízo, tomando por termo as declarações; e (Incluído pela Lei nº 13.509, de 2017)\n II - declarará a extinção do poder familiar. (Incluído pela Lei nº 13.509, de 2017)\n § 2 o O consentimento dos titulares do poder familiar será precedido de orientações e esclarecimentos prestados pela equipe interprofissional da Justiça da Infância e da Juventude, em especial, no caso de adoção, sobre a irrevogabilidade da medida. (Incluído pela Lei nº 12.010, de 2009) Vigência\n § 3 o O consentimento dos titulares do poder familiar será colhido pela autoridade judiciária competente em audiência, presente o Ministério Público, garantida a livre manifestação de vontade e esgotados os esforços para manutenção da criança ou do adolescente na família natural ou extensa. (Incluído pela Lei nº 12.010, de 2009) Vigência\n § 3 o São garantidos a livre manifestação de vontade dos detentores do poder familiar e o direito ao sigilo das informações. (Redação dada pela Lei nº 13.509, de 2017)\n § 4 o O consentimento prestado por escrito não terá validade se não for ratificado na audiência a que se refere o § 3 o\n deste artigo. (Incluído pela Lei nº 12.010, de 2009) Vigência\n § 4 o O consentimento prestado por escrito não terá validade se não for ratificado na audiência a que se refere o § 1 o\n deste artigo. (Redação dada pela Lei nº 13.509, de 2017)\n § 5 o O consentimento é retratável até a data da publicação da sentença constitutiva da adoção. (Incluído pela Lei nº 12.010, de 2009) Vigência\n § 5 o O consentimento é retratável até a data da realização da audiência especificada no § 1 o deste artigo, e os pais podem exercer o arrependimento no prazo de 10 (dez) dias, contado da data de prolação da sentença de extinção do\n\fpoder familiar. (Redação dada pela Lei nº 13.509, de 2017)\n § 6 o O consentimento somente terá valor se for dado após o nascimento da criança. (Incluído pela Lei nº 12.010, de 2009) Vigência\n § 7 o A família substituta receberá a devida orientação por intermédio de equipe técnica interprofissional a serviço do Poder Judiciário, preferencialmente com apoio dos técnicos responsáveis pela execução da política municipal de garantia do direito à convivência familiar. (Incluído pela Lei nº 12.010, de 2009) Vigência\n § 7 o A família natural e a família substituta receberão a devida orientação por intermédio de equipe técnica interprofissional a serviço da Justiça da Infância e da Juventude, preferencialmente com apoio dos técnicos responsáveis pela execução da política municipal de garantia do direito à convivência familiar. (Redação dada pela Lei nº 13.509, de 2017)"}, {"art": "Art. 167", "key": "167", "texto": "Art. 167. A autoridade judiciária, de ofício ou a requerimento das partes ou do Ministério Público, determinará a realização de estudo social ou, se possível, perícia por equipe interprofissional, decidindo sobre a concessão de guarda provisória, bem como, no caso de adoção, sobre o estágio de convivência.\n Parágrafo único. Deferida a concessão da guarda provisória ou do estágio de convivência, a criança ou o adolescente será entregue ao interessado, mediante termo de responsabilidade. (Incluído pela Lei nº 12.010, de 2009)\nVigência"}, {"art": "Art. 168", "key": "168", "texto": "Art. 168. Apresentado o relatório social ou o laudo pericial, e ouvida, sempre que possível, a criança ou o adolescente, dar-se-á vista dos autos ao Ministério Público, pelo prazo de cinco dias, decidindo a autoridade judiciária em igual prazo."}, {"art": "Art. 169", "key": "169", "texto": "Art. 169. Nas hipóteses em que a destituição da tutela, a perda ou a suspensão do pátrio poder poder familiar constituir pressuposto lógico da medida principal de colocação em família substituta, será observado o procedimento contraditório previsto nas Seções II e III deste Capítulo. (Expressão substituída pela Lei nº 12.010, de 2009) Vigência\n Parágrafo único. A perda ou a modificação da guarda poderá ser decretada nos mesmos autos do procedimento, observado o disposto no art. 35."}, {"art": "Art. 170", "key": "170", "texto": "Art. 170. Concedida a guarda ou a tutela, observar-se-á o disposto no art. 32, e, quanto à adoção, o contido no art. 47.\n Parágrafo único. A colocação de criança ou adolescente sob a guarda de pessoa inscrita em programa de acolhimento familiar será comunicada pela autoridade judiciária à entidade por este responsável no prazo máximo de 5\n(cinco) dias. (Incluído pela Lei nº 12.010, de 2009) Vigência\n Seção V\n Da Apuração de Ato Infracional Atribuído a Adolescente"}, {"art": "Art. 171", "key": "171", "texto": "Art. 171. O adolescente apreendido por força de ordem judicial será, desde logo, encaminhado à autoridade judiciária."}, {"art": "Art. 172", "key": "172", "texto": "Art. 172. O adolescente apreendido em flagrante de ato infracional será, desde logo, encaminhado à autoridade policial competente.\n Parágrafo único. Havendo repartição policial especializada para atendimento de adolescente e em se tratando de ato infracional praticado em co-autoria com maior, prevalecerá a atribuição da repartição especializada, que, após as providências necessárias e conforme o caso, encaminhará o adulto à repartição policial própria."}, {"art": "Art. 173", "key": "173", "texto": "Art. 173. Em caso de flagrante de ato infracional cometido mediante violência ou grave ameaça a pessoa, a autoridade policial, sem prejuízo do disposto nos arts. 106, parágrafo único, e 107, deverá:\n I - lavrar auto de apreensão, ouvidos as testemunhas e o adolescente;\n II - apreender o produto e os instrumentos da infração;\n III - requisitar os exames ou perícias necessários à comprovação da materialidade e autoria da infração.\n Parágrafo único. Nas demais hipóteses de flagrante, a lavratura do auto poderá ser substituída por boletim de ocorrência circunstanciada."}, {"art": "Art. 174", "key": "174", "texto": "Art. 174. Comparecendo qualquer dos pais ou responsável, o adolescente será prontamente liberado pela autoridade policial, sob termo de compromisso e responsabilidade de sua apresentação ao representante do Ministério\n\fPúblico, no mesmo dia ou, sendo impossível, no primeiro dia útil imediato, exceto quando, pela gravidade do ato infracional e sua repercussão social, deva o adolescente permanecer sob internação para garantia de sua segurança pessoal ou manutenção da ordem pública."}, {"art": "Art. 175", "key": "175", "texto": "Art. 175. Em caso de não liberação, a autoridade policial encaminhará, desde logo, o adolescente ao representante do Ministério Público, juntamente com cópia do auto de apreensão ou boletim de ocorrência.\n § 1º Sendo impossível a apresentação imediata, a autoridade policial encaminhará o adolescente à entidade de atendimento, que fará a apresentação ao representante do Ministério Público no prazo de vinte e quatro horas.\n § 2º Nas localidades onde não houver entidade de atendimento, a apresentação far-se-á pela autoridade policial. À falta de repartição policial especializada, o adolescente aguardará a apresentação em dependência separada da destinada a maiores, não podendo, em qualquer hipótese, exceder o prazo referido no parágrafo anterior."}, {"art": "Art. 176", "key": "176", "texto": "Art. 176. Sendo o adolescente liberado, a autoridade policial encaminhará imediatamente ao representante do\nMinistério Público cópia do auto de apreensão ou boletim de ocorrência."}, {"art": "Art. 177", "key": "177", "texto": "Art. 177. Se, afastada a hipótese de flagrante, houver indícios de participação de adolescente na prática de ato infracional, a autoridade policial encaminhará ao representante do Ministério Público relatório das investigações e demais documentos."}, {"art": "Art. 178", "key": "178", "texto": "Art. 178. O adolescente a quem se atribua autoria de ato infracional não poderá ser conduzido ou transportado em compartimento fechado de veículo policial, em condições atentatórias à sua dignidade, ou que impliquem risco à sua integridade física ou mental, sob pena de responsabilidade."}, {"art": "Art. 179", "key": "179", "texto": "Art. 179. Apresentado o adolescente, o representante do Ministério Público, no mesmo dia e à vista do auto de apreensão, boletim de ocorrência ou relatório policial, devidamente autuados pelo cartório judicial e com informação sobre os antecedentes do adolescente, procederá imediata e informalmente à sua oitiva e, em sendo possível, de seus pais ou responsável, vítima e testemunhas.\n Parágrafo único. Em caso de não apresentação, o representante do Ministério Público notificará os pais ou responsável para apresentação do adolescente, podendo requisitar o concurso das polícias civil e militar."}, {"art": "Art. 180", "key": "180", "texto": "Art. 180. Adotadas as providências a que alude o artigo anterior, o representante do Ministério Público poderá:\n I - promover o arquivamento dos autos;\n II - conced
