m curso especializado e em curso de treinamento de prática veicular em situação de risco, nos termos da normatização do CONTRAN.\n Parágrafo único. A participação em curso especializado previsto no inciso IV independe da observância do disposto no inciso III. (Incluído pela Lei nº 12.619, de 2012) (Vigência)\n § 2o (VETADO). (Incluído pela Lei nº 13.154, de 2015)"}, {"art": "Art. 145-A", "key": "145-A", "texto": "Art. 145-A. Além do disposto no art. 145, para conduzir ambulâncias, o candidato deverá comprovar treinamento especializado e reciclagem em cursos específicos a cada 5 (cinco) anos, nos termos da normatização do Contran.\n(Incluído pela Lei nº 12.998, de 2014)"}, {"art": "Art. 146", "key": "146", "texto": "Art. 146. Para conduzir veículos de outra categoria o condutor deverá realizar exames complementares exigidos para habilitação na categoria pretendida."}, {"art": "Art. 147", "key": "147", "texto": "Art. 147. O candidato à habilitação deverá submeter-se a exames realizados pelo órgão executivo de trânsito, na ordem descrita a seguir, e os exames de aptidão física e mental e a avaliação psicológica deverão ser realizados por médicos e psicólogos peritos examinadores, respectivamente, com titulação de especialista em medicina do tráfego e em psicologia do trânsito, conferida pelo respectivo conselho profissional, conforme regulamentação do Contran:\n (Redação dada pela Lei nº 14.071, de 2020) (Vigência) (Parte promulgada pelo Congresso Nacional) (Vide Lei nº 14.071, de 2020)\n I - de aptidão física e mental;\n II - (VETADO)\n III - escrito, sobre legislação de trânsito;\n IV - de noções de primeiros socorros, conforme regulamentação do CONTRAN;\n V - de direção veicular, realizado na via pública, em veículo da categoria para a qual estiver habilitando-se.\n § 1º Os resultados dos exames e a identificação dos respectivos examinadores serão registrados no RENACH.\n(Renumerado do parágrafo único, pela Lei nº 9.602, de 1998)\n § 1º-A.\n I-\n\f II -\n § 2º O exame de aptidão física e mental, a ser realizado no local de residência ou domicílio do examinado, será preliminar e renovável com a seguinte periodicidade: (Redação dada pela Lei nº 14.071, de 2020) (Vigência)\n I - a cada 10 (dez) anos, para condutores com idade inferior a 50 (cinquenta) anos; (Incluído pela Lei nº 14.071, de 2020) (Vigência)\n II - a cada 5 (cinco) anos, para condutores com idade igual ou superior a 50 (cinquenta) anos e inferior a 70\n(setenta) anos; (Incluído pela Lei nº 14.071, de 2020) (Vigência)\n III - a cada 3 (três) anos, para condutores com idade igual ou superior a 70 (setenta) anos. (Incluído pela Lei nº 14.071, de 2020) (Vigência)\n § 3o O exame previsto no § 2o incluirá avaliação psicológica preliminar e complementar sempre que a ele se submeter o condutor que exerce atividade remunerada ao veículo, incluindo-se esta avaliação para os demais candidatos apenas no exame referente à primeira habilitação. (Redação dada pela Lei nº 10.350, de 2001)\n § 4º Quando houver indícios de deficiência física ou mental, ou de progressividade de doença que possa diminuir a capacidade para conduzir o veículo, os prazos previstos nos incisos I, II e III do § 2º deste artigo poderão ser diminuídos por proposta do perito examinador. (Redação dada pela Lei nº 14.071, de 2020) (Vigência)\n § 5o O condutor que exerce atividade remunerada ao veículo terá essa informação incluída na sua Carteira Nacional de Habilitação, conforme especificações do Conselho Nacional de Trânsito – Contran. (Incluído pela Lei nº 10.350, de 2001)\n § 6º (Revogado pela Lei nº 15.428, de 2026)\n § 7º (Revogado pela Lei nº 15.428, de 2026)"}, {"art": "Art. 147-A", "key": "147-A", "texto": "Art. 147-A. Ao candidato com deficiência auditiva é assegurada acessibilidade de comunicação, mediante emprego de tecnologias assistivas ou de ajudas técnicas em todas as etapas do processo de habilitação. (Incluído pela Lei nº 13.146, de 2015) (Vigência)\n § 1o O material didático audiovisual utilizado em aulas teóricas dos cursos que precedem os exames previstos no art. 147 desta Lei deve ser acessível, por meio de subtitulação com legenda oculta associada à tradução simultânea em\nLibras. (Incluído pela Lei nº 13.146, de 2015) (Vigência)\n § 2o É assegurado também ao candidato com deficiência auditiva requerer, no ato de sua inscrição, os serviços de intérprete da Libras, para acompanhamento em aulas práticas e teóricas. (Incluído pela Lei nº 13.146, de 2015)\n(Vigência)"}, {"art": "Art. 148", "key": "148", "texto": "Art. 148. Os exames de habilitação, exceto os de direção veicular, poderão ser aplicados por entidades públicas ou privadas credenciadas pelo órgão executivo de trânsito dos Estados e do Distrito Federal, de acordo com as normas estabelecidas pelo CONTRAN.\n § 1º A formação de condutores deverá incluir, obrigatoriamente, curso de direção defensiva e de conceitos básicos de proteção ao meio ambiente relacionados com o trânsito.\n § 2º Ao candidato aprovado será conferida Permissão para Dirigir, com validade de um ano.\n § 3º A Carteira Nacional de Habilitação será conferida ao condutor no término de um ano, desde que o mesmo não tenha cometido nenhuma infração de natureza grave ou gravíssima ou seja reincidente em infração média.\n § 4º A não obtenção da Carteira Nacional de Habilitação, tendo em vista a incapacidade de atendimento do disposto no parágrafo anterior, obriga o candidato a reiniciar todo o processo de habilitação.\n § 5º O Conselho Nacional de Trânsito - CONTRAN poderá dispensar os tripulantes de aeronaves que apresentarem o cartão de saúde expedido pelas Forças Armadas ou pelo Departamento de Aeronáutica Civil, respectivamente, da prestação do exame de aptidão física e mental. (Incluído pela Lei nº 9.602, de 1998)\n § 6º Os exames de aptidão física e mental e a avaliação psicológica serão realizados, respectivamente, por médicos e psicólogos peritos examinadores, autorizados pelo órgão máximo executivo de trânsito da União, com titulação de especialista em medicina do tráfego e em psicologia do trânsito conferida pelo respectivo conselho profissional, nos termos de regulação do Contran. (Incluído pela Lei nº 15.428, de 2026)\n\f § 7º Os valores correspondentes à realização dos exames de aptidão física e mental e da avaliação psicológica observarão preço público fixado pelo órgão máximo executivo de trânsito da União, conforme regulamentação do\nContran, e serão atualizados anualmente pelo Índice Nacional de Preços ao Consumidor Amplo (IPCA) ou por outro índice oficial que venha a substituí-lo. (Incluído pela Lei nº 15.428, de 2026)"}, {"art": "Art. 148-A", "key": "148-A", "texto": "Art. 148-A. Os condutores das categorias C, D e E deverão comprovar resultado negativo em exame toxicológico para a obtenção e a renovação da Carteira Nacional de Habilitação. (Redação dada pela Lei nº 14.071, de 2020)\n(Vigência) (Vide Lei nº 14.599, de 2023)\n § 1o O exame de que trata este artigo buscará aferir o consumo de substâncias psicoativas que, comprovadamente, comprometam a capacidade de direção e deverá ter janela de detecção mínima de 90 (noventa) dias, nos termos das normas do Contran. (Incluído pela Lei nº 13.103, de 2015) (Vigência)\n § 2º Além da realização do exame previsto no caput deste artigo, os condutores das categorias C, D e E com idade inferior a 70 (setenta) anos serão submetidos a novo exame a cada período de 2 (dois) anos e 6 (seis) meses, a partir da obtenção ou renovação da Carteira Nacional de Habilitação, independentemente da validade dos demais exames de que trata o inciso I do caput do art. 147 deste Código. (Redação dada pela Lei nº 14.071, de 2020) (Vigência)\n § 3º (Revogado). (Redação dada pela Lei nº 14.071, de 2020) (Vigência)\n § 4º É garantido o direito de contraprova e de recurso administrativo, sem efeito suspensivo, no caso de resultado positivo para os exames de que trata este artigo, nos termos das normas do Contran. (Redação dada pela Lei nº 14.071, de 2020) (Vigência)\n § 5º O resultado positivo no exame previsto no § 2º deste artigo acarretará ao condutor: (Redação dada pela\nLei nº 14.599, de 2023)\n I - (VETADO); e (Incluído pela Lei nº 14.599, de 2023)\n II - a suspensão do direito de dirigir pelo período de 3 (três) meses, condicionado o levantamento da suspensão\nà inclusão no Renach de resultado negativo em novo exame, vedada a aplicação de outras penalidades, ainda que acessórias. (Incluído pela Lei nº 14.599, de 2023)\n § 6o O resultado do exame somente será divulgado para o interessado e não poderá ser utilizado para fins estranhos ao disposto neste artigo ou no § 6o do art. 168 da Consolidação das Leis do Trabalho - CLT, aprovada pelo\nDecreto-Lei no 5.452, de 1o de maio de 1943. (Incluído pela Lei nº 13.103, de 2015) (Vigência)\n § 7º O exame será realizado, em regime de livre concorrência, pelos laboratórios credenciados pelo órgão máximo executivo de trânsito da União, nos termos das normas do Contran, vedado aos entes públicos: (Redação dada pela Lei nº 14.440, de 2022)\n I - fixar preços para os exames; (Incluído pela Lei nº 13.103, de 2015) (Vigência)\n II - limitar o número de empresas ou o número de locais em que a atividade pode ser exercida; e (Incluído pela\nLei nº 13.103, de 2015) (Vigência)\n III - estabelecer regras de exclusividade territorial. (Incluído pela Lei nº 13.103, de 2015) (Vigência)\n § 8º A não realização do exame previsto neste artigo acarretará ao condutor: (Incluído pela Lei nº 14.599, de 2023)\n I - nos casos de que trata o caput deste artigo, o impedimento de obter ou de renovar a Carteira Nacional de\nHabilitação até que seja realizado o exame com resultado negativo e a aplicação das sanções previstas no art. 165-B deste Código; e (Incluído pela Lei nº 14.599, de 2023)\n II - no caso do § 2º, a aplicação das sanções previstas no § 5º deste artigo e nos arts. 165-B e 165-D deste\nCódigo, conforme a irregularidade verificada. (Incluído pela Lei nº 14.599, de 2023)\n § 9º Compete ao órgão máximo executivo de trânsito da União comunicar aos condutores, por meio do sistema de notificação eletrônica de que trata o art. 282-A deste Código, o vencimento do prazo para a realização do exame com 30 (trinta) dias de antecedência, bem como as penalidades decorrentes da sua não realização. (Incluído pela\nLei nº 14.599, de 2023)\n § 10. A exigência de comprovação de resultado negativo em exame toxicológico, prevista no caput deste artigo, aplica-se também como condição para a obtenção da primeira habilitação - permissão para dirigir - por condutores das categorias A e B. (Incluído pela Lei nº 15.153, de 2025) Vigência\n § 11. As clínicas médicas onde forem realizados os exames de aptidão física e mental poderão agregar às suas instalações, em ambiente físico próprio e segregado, a atividade de posto de coleta laboratorial devidamente contratada\n\fpor laboratório credenciado pelo órgão máximo executivo de trânsito da União para a realização do exame toxicológico previsto no caput deste artigo. (Incluído pela Lei nº 15.153, de 2025) Vigência"}, {"art": "Art. 149", "key": "149", "texto": "Art. 149. (VETADO)"}, {"art": "Art. 150", "key": "150", "texto": "Art. 150. Ao renovar os exames previstos no artigo anterior, o condutor que não tenha curso de direção defensiva e primeiros socorros deverá a eles ser submetido, conforme normatização do CONTRAN.\n Parágrafo único. A empresa que utiliza condutores contratados para operar a sua frota de veículos é obrigada a fornecer curso de direção defensiva, primeiros socorros e outros conforme normatização do CONTRAN."}, {"art": "Art. 151", "key": "151", "texto": "Art. 151. (Revogado pela Lei nº 14.071, de 2020) (Vigência)"}, {"art": "Art. 152", "key": "152", "texto": "Art. 152. O exame de direção veicular será realizado perante comissão integrada por 3 (três) membros designados pelo dirigente do órgão executivo local de trânsito. (Redação dada pela Lei nº 13.281, de 2016) (Vigência)\n § 1º Na comissão de exame de direção veicular, pelo menos um membro deverá ser habilitado na categoria igual ou superior à pretendida pelo candidato.\n § 2º Os militares das Forças Armadas e os policiais e bombeiros dos órgãos de segurança pública da União, dos\nEstados e do Distrito Federal que possuírem curso de formação de condutor ministrado em suas corporações serão dispensados, para a concessão do documento de habilitação, dos exames aos quais se houverem submetido com aprovação naquele curso, desde que neles sejam observadas as normas estabelecidas pelo Contran. (Redação dada pela Lei nº 13.281, de 2016) (Vigência)\n § 3º O militar, o policial ou o bombeiro militar interessado na dispensa de que trata o § 2º instruirá seu requerimento com ofício do comandante, chefe ou diretor da unidade administrativa onde prestar serviço, do qual constarão o número do registro de identificação, naturalidade, nome, filiação, idade e categoria em que se habilitou a conduzir, acompanhado de cópia das atas dos exames prestados. (Redação dada pela Lei nº 13.281, de 2016) (Vigência)\n § 4º (VETADO)"}, {"art": "Art. 153", "key": "153", "texto": "Art. 153. O candidato habilitado terá em seu prontuário a identificação de seus instrutores e examinadores, que serão passíveis de punição conforme regulamentação a ser estabelecida pelo CONTRAN.\n Parágrafo único. As penalidades aplicadas aos instrutores e examinadores serão de advertência, suspensão e cancelamento da autorização para o exercício da atividade, conforme a falta cometida."}, {"art": "Art. 154", "key": "154", "texto": "Art. 154. Os veículos destinados à formação de condutores serão identificados por uma faixa amarela, de vinte centímetros de largura, pintada ao longo da carroçaria, à meia altura, com a inscrição AUTO-ESCOLA na cor preta.\n § 1º No veículo eventualmente utilizado para aprendizagem, quando autorizado para servir a esse fim, deverá ser afixada ao longo de sua carroçaria, à meia altura, faixa branca removível, de vinte centímetros de largura, com a inscrição AUTO-ESCOLA na cor preta. (Incluído pela Lei nº 14.921, de 2024)\n § 2º As idades máximas dos veículos destinados à formação de condutores nas categorias de habilitação de que trata o art. 143, não computado o ano de fabricação, serão de: (Incluído pela Lei nº 14.921, de 2024)\n I - 8 (oito) anos, para a categoria A; (Incluído pela Lei nº 14.921, de 2024)\n II - 12 (doze) anos, para a categoria B; (Incluído pela Lei nº 14.921, de 2024)\n III - 20 (vinte) anos, para as categorias C, D e E. (Incluído pela Lei nº 14.921, de 2024)"}, {"art": "Art. 155", "key": "155", "texto": "Art. 155. A formação de condutor de veículo automotor será realizada por instrutor autorizado pelo órgão executivo de trânsito dos Estados ou do Distrito Federal, pertencente ou não à entidade credenciada. (Redação dada pela Lei nº 14.599, de 2023)\n Parágrafo único. Ao aprendiz será expedida autorização para aprendizagem, de acordo com a regulamentação do\nCONTRAN, após aprovação nos exames de aptidão física, mental, de primeiros socorros e sobre legislação de trânsito. (Incluído pela Lei nº 9.602, de 1998)"}, {"art": "Art. 156", "key": "156", "texto": "Art. 156. O CONTRAN regulamentará o credenciamento para prestação de serviço pelas auto-escolas e outras entidades destinadas à formação de condutores e às exigências necessárias para o exercício das atividades de instrutor e examinador."}, {"art": "Art. 157", "key": "157", "texto": "Art. 157. (VETADO)"}, {"art": "Art. 158", "key": "158", "texto": "Art. 158. A aprendizagem só poderá realizar-se:\n I - nos termos, horários e locais estabelecidos pelo órgão executivo de trânsito;\n II - acompanhado o aprendiz por instrutor autorizado.\n § 1º Além do aprendiz e do instrutor, o veículo utilizado na aprendizagem poderá conduzir apenas mais um acompanhante. (Renumerado do parágrafo único pela Lei nº 12.217, de 2010).\n § 2o (Revogado pela Lei nº 14.071, de 2020) (Vigência)"}, {"art": "Art. 159", "key": "159", "texto": "Art. 159. A Carteira Nacional de Habilitação: (Redação dada pela Lei nº 15.428, de 2026)\n I - poderá ser emitida em meio físico ou digital, a critério do candidato ou do condutor; (Incluído pela Lei nº 15.428, de 2026)\n II - deverá conter fotografia, nome, número de inscrição no Cadastro de Pessoas Físicas (CPF) e demais requisitos estabelecidos pelo Contran; e (Incluído pela Lei nº 15.428, de 2026)\n III - terá fé pública e equivalerá a documento de identidade no território nacional. (Incluído pela Lei nº 15.428, de 2026)\n § 1º É obrigatório o porte da Permissão para Dirigir ou da Carteira Nacional de Habilitação quando o condutor estiver à direção do veículo.\n § 1º-A O porte do documento de habilitação será dispensado quando, no momento da fiscalização, for possível ter acesso ao sistema informatizado para verificar se o condutor está habilitado. (Incluído pela Lei nº 14.071, de 2020)\n(Vigência)\n § 2º (VETADO)\n § 3º A emissão de nova via da Carteira Nacional de Habilitação será regulamentada pelo CONTRAN.\n § 4º (VETADO)\n § 5º A Carteira Nacional de Habilitação e a Permissão para Dirigir somente terão validade para a condução de veículo quando apresentada em original.\n § 6º A identificação da Carteira Nacional de Habilitação expedida e a da autoridade expedidora serão registradas no RENACH.\n § 7º A cada condutor corresponderá um único registro no RENACH, agregando-se neste todas as informações.\n § 8º A renovação da validade da Carteira Nacional de Habilitação ou a emissão de uma nova via somente será realizada após quitação de débitos constantes do prontuário do condutor.\n § 9º (VETADO)\n § 10. A validade da Carteira Nacional de Habilitação está condicionada ao prazo de vigência do exame de aptidão física e mental. (Incluído pela Lei nº 9.602, de 1998)\n § 11. (Revogado). (Redação dada pela Lei nº 14.071, de 2020) (Vigência)\n § 12. Os órgãos ou entidades executivos de trânsito dos Estados e do Distrito Federal enviarão por meio eletrônico, com 30 (trinta) dias de antecedência, aviso de vencimento da validade da Carteira Nacional de Habilitação a todos os condutores cadastrados no Renach com endereço na respectiva unidade da Federação. (Incluído pela Lei nº 14.071, de 2020) (Vigência)"}, {"art": "Art. 160", "key": "160", "texto": "Art. 160. O condutor condenado por delito de trânsito deverá ser submetido a novos exames para que possa voltar a dirigir, de acordo com as normas estabelecidas pelo CONTRAN, independentemente do reconhecimento da prescrição, em face da pena concretizada na sentença.\n § 1º Em caso de sinistro grave, o condutor nele envolvido poderá ser submetido aos exames exigidos neste artigo, a juízo da autoridade executiva estadual de trânsito, assegurada ampla defesa ao condutor. (Redação dada pela Lei nº 14.599, de 2023)\n § 2º No caso do parágrafo anterior, a autoridade executiva estadual de trânsito poderá apreender o documento de habilitação do condutor até a sua aprovação nos exames realizados.\n Í\n\f CAPÍTULO XV\n DAS INFRAÇÕES"}, {"art": "Art. 161", "key": "161", "texto": "Art. 161. Constitui infração de trânsito a inobservância de qualquer preceito deste Código ou da legislação complementar, e o infrator sujeita-se às penalidades e às medidas administrativas indicadas em cada artigo deste\nCapítulo e às punições previstas no Capítulo XIX deste Código. (Redação dada pela Lei nº 14.071, de 2020)\n(Vigência)\n Parágrafo único. (Revogado). (Redação dada pela Lei nº 14.071, de 2020) (Vigência)"}, {"art": "Art. 162", "key": "162", "texto": "Art. 162. Dirigir veículo:\n I - sem possuir Carteira Nacional de Habilitação, Permissão para Dirigir ou Autorização para Conduzir\nCiclomotor: (Redação dada pela Lei nº 13.281, de 2016) (Vigência)\n Infração - gravíssima; (Redação dada pela Lei nº 13.281, de 2016) (Vigência)\n Penalidade - multa (três vezes); (Redação dada pela Lei nº 13.281, de 2016) (Vigência)\n Medida administrativa - retenção do veículo até a apresentação de condutor habilitado; (Incluído pela Lei nº 13.281, de 2016) (Vigência)\n II - com Carteira Nacional de Habilitação, Permissão para Dirigir ou Autorização para Conduzir Ciclomotor cassada ou com suspensão do direito de dirigir: (Redação dada pela Lei nº 13.281, de 2016) (Vigência)\n Infração - gravíssima; (Redação dada pela Lei nº 13.281, de 2016) (Vigência)\n Penalidade - multa (três vezes); (Redação dada pela Lei nº 13.281, de 2016) (Vigência)\n Medida administrativa - recolhimento do documento de habilitação e retenção do veículo até a apresentação de condutor habilitado; (Incluído pela Lei nº 13.281, de 2016) (Vigência)\n III - com Carteira Nacional de Habilitação ou Permissão para Dirigir de categoria diferente da do veículo que esteja conduzindo: (Redação dada pela Lei nº 13.281, de 2016) (Vigência)\n Infração - gravíssima; (Redação dada pela Lei nº 13.281, de 2016) (Vigência)\n Penalidade - multa (duas vezes); (Redação dada pela Lei nº 13.281, de 2016) (Vigência)\n Medida administrativa - retenção do veículo até a apresentação de condutor habilitado; (Redação dada pela Lei nº 13.281, de 2016) (Vigência)\n IV - (VETADO)\n V - com Carteira Nacional de Habilitação vencida há mais de 30 (trinta) dias: (Redação dada pela Lei nº 14.440, de 2022)\n Infração - gravíssima; (Redação dada pela Lei nº 14.440, de 2022)\n Penalidade - multa; (Redação dada pela Lei nº 14.440, de 2022)\n Medida administrativa - retenção do veículo até a apresentação de condutor habilitado; (Redação dada pela\nLei nº 14.440, de 2022)\n VI - sem usar lentes corretoras de visão, aparelho auxiliar de audição, de prótese física ou as adaptações do veículo impostas por ocasião da concessão ou da renovação da licença para conduzir:\n Infração - gravíssima;\n Penalidade - multa;\n Medida administrativa - retenção do veículo até o saneamento da irregularidade ou apresentação de condutor habilitado.\n VII - sem possuir os cursos especializados ou específicos obrigatórios: (Incluído dada pela Lei nº 14.440, de 2022)\n Infração - gravíssima; (Incluído dada pela Lei nº 14.440, de 2022)\n\f Penalidade - multa; (Incluído dada pela Lei nº 14.440, de 2022)\n Medida administrativa - retenção do veículo até a apresentação de condutor habilitado. (Incluído dad"}, {"art": "Art. 163", "key": "163", "texto": "Art. 163. Entregar a direção do veículo a pessoa nas condições previstas no artigo anterior:\n Infração - as mesmas previstas no artigo anterior;\n Penalidade - as mesmas previstas no artigo anterior;\n Medida administrativa - a mesma prevista no inciso III do artigo anterior."}, {"art": "Art. 164", "key": "164", "texto": "Art. 164. Permitir que pessoa nas condições referidas nos incisos do art. 162 tome posse do veículo automotor e passe a conduzi-lo na via:\n Infração - as mesmas previstas nos incisos do art. 162;\n Penalidade - as mesmas previstas no art. 162;\n Medida administrativa - a mesma prevista no inciso III do art. 162."}, {"art": "Art. 165", "key": "165", "texto": "Art. 165. Dirigir sob a influência de álcool ou de qualquer outra substância psicoativa que determine dependência: (Redação dada pela Lei nº 11.705, de 2008)\n Infração - gravíssima; (Redação dada pela Lei nº 11.705, de 2008)\n Penalidade - multa (dez vezes) e suspensão do direito de dirigir por 12 (doze) meses. (Redação dada pela Lei nº 12.760, de 2012)\n Medida administrativa - recolhimento do documento de habilitação e retenção do veículo, observado o disposto no § 4o do art. 270 da Lei no 9.503, de 23 de setembro de 1997 - do Código de Trânsito Brasileiro. (Redação dada pela Lei nº 12.760, de 2012)\n Parágrafo único. Aplica-se em dobro a multa prevista no caput em caso de reincidência no período de até 12 (doze) meses. (Redação dada pela Lei nº 12.760, de 2012)"}, {"art": "Art. 165-A", "key": "165-A", "texto": "Art. 165-A. Recusar-se a ser submetido a teste, exame clínico, perícia ou outro procedimento que permita certificar influência de álcool ou outra substância psicoativa, na forma estabelecida pelo art. 277: (Incluído pela Lei nº 13.281, de 2016) (Vigência)\n Infração - gravíssima; (Incluído pela Lei nº 13.281, de 2016) (Vigência)\n Penalidade - multa (dez vezes) e suspensão do direito de dirigir por 12 (doze) meses; (Incluído pela Lei nº 13.281, de 2016) (Vigência)\n Medida administrativa - recolhimento do documento de habilitação e retenção do veículo, observado o disposto no § 4º do art. 270. (Incluído pela Lei nº 13.281, de 2016) (Vigência)\n Parágrafo único. Aplica-se em dobro a multa prevista no caput em caso de reincidência no período de até 12 (doze) meses (Incluído pela Lei nº 13.281, de 2016) (Vigência)"}, {"art": "Art. 165-B", "key": "165-B", "texto": "Art. 165-B. Dirigir veículo sem realizar o exame toxicológico previsto no art. 148-A deste Código: (Redação dada pela Lei nº 14.599, de 2023) Produção de efeitos\n Infração - gravíssima; (Incluído pela Lei nº 14.071, de 2020) (Vigência)\n Penalidade - multa (cinco vezes) e, em caso de reincidência no período de até 12 (doze) meses, multa (dez vezes) e suspensão do direito de dirigir. (Redação dada pela Lei nº 14.599, de 2023) Produção de efeitos\n Parágrafo único. No caso de não cumprimento do disposto no § 2º do art. 148-A deste Código, configurar-se-á a infração quando o condutor dirigir veículo após o trigésimo dia do vencimento do prazo estabelecido. (Redação dada pela Lei nº 14.599, de 2023) Produção de efeitos"}, {"art": "Art. 165-C", "key": "165-C", "texto": "Art. 165-C. Dirigir veículo tendo obtido resultado positivo no exame toxicológico previsto no caput do art. 148-A deste Código: (Incluído pela Lei nº 14.599, de 2023) Produção de efeitos\n\f Infração - gravíssima; (Incluído pela Lei nº 14.599, de 2023) Produção de efeitos\n Penalidade - multa (cinco vezes) e, em caso de reincidência no período de até 12 (doze) meses, multa (dez vezes) e suspensão do direito de dirigir. (Incluído pela Lei nº 14.599, de 2023) Produção de efeitos"}, {"art": "Art. 165-D", "key": "165-D", "texto": "Art. 165-D. Deixar de realizar o exame toxicológico previsto no § 2º do art. 148-A deste Código, após 30 (trinta) dias do vencimento do prazo estabelecido: (Incluído pela Lei nº 14.599, de 2023) Produção de efeitos\n Infração - gravíssima; (Incluído pela Lei nº 14.599, de 2023) Produção de efeitos\n Penalidade - multa (cinco vezes). (Incluído pela Lei nº 14.599, de 2023) Produção de efeitos\n Parágrafo único. A competência para aplicação da penalidade de que trata este artigo será do órgão ou entidade executivos de trânsito de registro da Carteira Nacional de Habilitação do infrator. (Incluído pela Lei nº 14.599, de 2023) Produção de efeitos"}, {"art": "Art. 166", "key": "166", "texto": "Art. 166. Confiar ou entregar a direção de veículo a pessoa que, mesmo habilitada, por seu estado físico ou psíquico, não estiver em condições de dirigi-lo com segurança:\n Infração - gravíssima;\n Penalidade - multa."}, {"art": "Art. 167", "key": "167", "texto": "Art. 167. Deixar o condutor ou passageiro de usar o cinto de segurança, conforme previsto no art. 65:\n Infração - grave;\n Penalidade - multa;\n Medida administrativa - retenção do veículo até colocação do cinto pelo infrator."}, {"art": "Art. 168", "key": "168", "texto": "Art. 168. Transportar crianças em veículo automotor sem observância das normas de segurança especiais estabelecidas neste Código:\n Infração - gravíssima;\n Penalidade - multa;\n Medida administrativa - retenção do veículo até que a irregularidade seja sanada."}, {"art": "Art. 169", "key": "169", "texto": "Art. 169. Dirigir sem atenção ou sem os cuidados indispensáveis à segurança:\n Infração - leve;\n Penalidade - multa."}, {"art": "Art. 170", "key": "170", "texto": "Art. 170. Dirigir ameaçando os pedestres que estejam atravessando a via pública, ou os demais veículos:\n Infração - gravíssima;\n Penalidade - multa e suspensão do direito de dirigir;\n Medida administrativa - retenção do veículo e recolhimento do documento de habilitação."}, {"art": "Art. 171", "key": "171", "texto": "Art. 171. Usar o veículo para arremessar, sobre os pedestres ou veículos, água ou detritos:\n Infração - média;\n Penalidade - multa."}, {"art": "Art. 172", "key": "172", "texto": "Art. 172. Atirar do veículo ou abandonar na via objetos ou substâncias:\n Infração - média;\n Penalidade - multa."}, {"art": "Art. 173", "key": "173", "texto": "Art. 173. Disputar corrida: (Redação dada pela Lei nº 12.971, de 2014) (Vigência)\n\f Infração - gravíssima;\n Penalidade - multa (dez vezes), suspensão do direito de dirigir e apreensão do veículo; (Redação dada pela Lei nº 12.971, de 2014) (Vigência)\n Medida administrativa - recolhimento do documento de habilitação e remoção do veículo.\n Parágrafo único. Aplica-se em dobro a multa prevista no caput em caso de reincidência no período de 12 (doze) meses da infração anterior. (Incluído pela Lei nº 12.971, de 2014) (Vigência)"}, {"art": "Art. 174", "key": "174", "texto": "Art. 174. Promover, na via, competição, eventos organizados, exibição e demonstração de perícia em manobra de veículo, ou deles participar, como condutor, sem permissão da autoridade de trânsito com circunscrição sobre a via:\n(Redação dada pela Lei nº 12.971, de 2014) (Vigência)\n Infração - gravíssima;\n Penalidade - multa (dez vezes), suspensão do direito de dirigir e apreensão do veículo; (Redação dada pela Lei nº 12.971, de 2014) (Vigência)\n Medida administrativa - recolhimento do documento de habilitação e remoção do veículo.\n § 1o As penalidades são aplicáveis aos promotores e aos condutores participantes. (Incluído pela Lei nº 12.971, de 2014) (Vigência)\n § 2o Aplica-se em dobro a multa prevista no caput em caso de reincidência no período de 12 (doze) meses da infração anterior. Incluído pela Lei nº 12.971, de 2014) (Vigência)"}, {"art": "Art. 175", "key": "175", "texto": "Art. 175. Utilizar-se de veículo para demonstrar ou exibir manobra perigosa, mediante arrancada brusca, derrapagem ou frenagem com deslizamento ou arrastamento de pneus: (Redação dada pela Lei nº 12.971, de 2014) (Vigência)\n Infração - gravíssima;\n Penalidade - multa (dez vezes), suspensão do direito de dirigir e apreensão do veículo; (Redação dada pela Lei nº 12.971, de 2014) (Vigência)\n Medida administrativa - recolhimento do documento de habilitação e remoção do veículo.\n Parágrafo único. Aplica-se em dobro a multa prevista no caput em caso de reincidência no período de 12 (doze) meses da infração anterior. (Incluído pela Lei nº 12.971, de 2014) (Vigência)"}, {"art": "Art. 176", "key": "176", "texto": "Art. 176. Deixar o condutor envolvido em sinistro com vítima: (Redação dada pela Lei nº 14.599, de 2023)\n I - de prestar ou providenciar socorro à vítima, podendo fazê-lo;\n II - de adotar providências, podendo fazê-lo, no sentido de evitar perigo para o trânsito no local;\n III - de preservar o local, de forma a facilitar os trabalhos da polícia e da perícia;\n IV - de adotar providências para remover o veículo do local, quando determinadas por policial ou agente da autoridade de trânsito;\n V - de identificar-se ao policial e de lhe prestar informações necessárias à confecção do boletim de ocorrência:\n Infração - gravíssima;\n Penalidade - multa (cinco vezes) e suspensão do direito de dirigir;\n Medida administrativa - recolhimento do documento de habilitação."}, {"art": "Art. 177", "key": "177", "texto": "Art. 177. Deixar o condutor de prestar socorro à vítima de sinistro de trânsito quando solicitado pela autoridade e seus agentes: (Redação dada pela Lei nº 14.599, de 2023)\n Infração - grave;\n Penalidade - multa."}, {"art": "Art. 178", "key": "178", "texto": "Art. 178. Deixar o condutor envolvido em sinistro sem vítima de adotar providências para remover o veículo do local, quando necessária tal medida para assegurar a segurança e a fluidez do trânsito: (Redação dada pela Lei nº 14.599, de 2023)\n Infração - média;\n Penalidade - multa."}, {"art": "Art. 179", "key": "179", "texto": "Art. 179. Fazer ou deixar que se faça reparo em veículo na via pública, salvo nos casos de impedimento absoluto de sua remoção e em que o veículo esteja devidamente sinalizado:\n I - em pista de rolamento de rodovias e vias de trânsito rápido:\n Infração - grave;\n Penalidade - multa;\n Medida administrativa - remoção do veículo;\n II - nas demais vias:\n Infração - leve;\n Penalidade - multa."}, {"art": "Art. 180", "key": "180", "texto": "Art. 180. Ter seu veículo imobilizado na via por falta de combustível:\n Infração - média;\n Penalidade - multa;\n Medida administrativa - remoção do veículo."}, {"art": "Art. 181", "key": "181", "texto": "Art. 181. Estacionar o veículo:\n I - nas esquinas e a menos de cinco metros do bordo do alinhamento da via transversal:\n Infração - média;\n Penalidade - multa;\n Medida administrativa - remoção do veículo;\n II - afastado da guia da calçada (meio-fio) de cinqüenta centímetros a um metro:\n Infração - leve;\n Penalidade - multa;\n Medida administrativa - remoção do veículo;\n III - afastado da guia da calçada (meio-fio) a mais de um metro:\n Infração - grave;\n Penalidade - multa;\n Medida administrativa - remoção do veículo;\n IV - em desacordo com as posições estabelecidas neste Código:\n Infração - média;\n Penalidade - multa;\n Medida administrativa - remoção do veículo;\n\f V - na pista de rolamento das estradas, das rodovias, das vias de trânsito rápido e das vias dotadas de acostamento:\n Infração - gravíssima;\n Penalidade - multa;\n Medida administrativa - remoção do veículo;\n VI - junto ou sobre hidrantes de incêndio, registro de água ou tampas de poços de visita de galerias subterrâneas, desde que devidamente identificados, conforme especificação do CONTRAN:\n Infração - média;\n Penalidade - multa;\n Medida administrativa - remoção do veículo;\n VII - nos acostamentos, salvo motivo de força maior:\n Infração - leve;\n Penalidade - multa;\n Medida administrativa - remoção do veículo;\n VIII - no passeio ou sobre faixa destinada a pedestre, sobre ciclovia ou ciclofaixa, bem como nas ilhas, refúgios, ao lado ou sobre canteiros centrais, divisores de pista de rolamento, marcas de canalização, gramados ou jardim público:\n Infração - grave;\n Penalidade - multa;\n Medida administrativa - remoção do veículo;\n IX - onde houver guia de calçada (meio-fio) rebaixada destinada à entrada ou saída de veículos:\n Infração - média;\n Penalidade - multa;\n Medida administrativa - remoção do veículo;\n X - impedindo a movimentação de outro veículo:\n Infração - média;\n Penalidade - multa;\n Medida administrativa - remoção do veículo;\n XI - ao lado de outro veículo em fila dupla:\n Infração - grave;\n Penalidade - multa;\n Medida administrativa - remoção do veículo;\n XII - na área de cruzamento de vias, prejudicando a circulação de veículos e pedestres:\n Infração - grave;\n Penalidade - multa;\n Medida administrativa - remoção do veículo;\n\f XIII - onde houver sinalização horizontal delimitadora de ponto de embarque ou desembarque de passageiros de transporte coletivo ou, na inexistência desta sinalização, no intervalo compreendido entre dez metros antes e depois do marco do ponto:\n Infração - média;\n Penalidade - multa;\n Medida administrativa - remoção do veículo;\n XIV - nos viadutos, pontes e túneis:\n Infração - grave;\n Penalidade - multa;\n Medida administrativa - remoção do veículo;\n XV - na contramão de direção:\n Infração - média;\n Penalidade - multa;\n XVI - em aclive ou declive, não estando devidamente freado e sem calço de segurança, quando se tratar de veículo com peso bruto total superior a três mil e quinhentos quilogramas:\n Infração - grave;\n Penalidade - multa;\n Medida administrativa - remoção do veículo;\n XVII - em desacordo com as condições regulamentadas especificamente pela sinalização (placa - Estacionamento\nRegulamentado):\n Infração - grave; (Redação dada pela Lei nº 13.146, de 2015) (Vigência)\n Penalidade - multa;\n Medida administrativa - remoção do veículo;\n XVIII - em locais e horários proibidos especificamente pela sinalização (placa - Proibido Estacionar):\n Infração - média;\n Penalidade - multa;\n Medida administrativa - remoção do veículo;\n XIX - em locais e horários de estacionamento e parada proibidos pela sinalização (placa - Proibido Parar e\nEstacionar):\n Infração - grave;\n Penalidade - multa;\n Medida administrativa - remoção do veículo.\n XX - nas vagas reservadas às pessoas com deficiência ou idosos, sem credencial que comprove tal condição:\n(Incluído pela Lei nº 13.281, de 2016) (Vigência)\n Infração - gravíssima; (Incluído pela Lei nº 13.281, de 2016) (Vigência)\n Penalidade - multa; (Incluído pela Lei nº 13.281, de 2016) (Vigência)\n Medida administrativa - remoção do veículo. (Incluído pela Lei nº 13.281, de 2016) (Vigência)\n\f § 1º Nos casos previstos neste artigo, a autoridade de trânsito aplicará a penalidade preferencialmente após a remoção do veículo.\n § 2º No caso previsto no inciso XVI é proibido abandonar o calço de segurança na via."}, {"art": "Art. 182", "key": "182", "texto": "Art. 182. Parar o veículo:\n I - nas esquinas e a menos de cinco metros do bordo do alinhamento da via transversal:\n Infração - média;\n Penalidade - multa;\n II - afastado da guia da calçada (meio-fio) de cinqüenta centímetros a um metro:\n Infração - leve;\n Penalidade - multa;\n III - afastado da guia da calçada (meio-fio) a mais de um metro:\n Infração - média;\n Penalidade - multa;\n IV - em desacordo com as posições estabelecidas neste Código:\n Infração - leve;\n Penalidade - multa;\n V - na pista de rolamento das estradas, das rodovias, das vias de trânsito rápido e das demais vias dotadas de acostamento:\n Infração - grave;\n Penalidade - multa;\n VI - no passeio ou sobre faixa destinada a pedestres, nas ilhas, refúgios, canteiros centrais e divisores de pista de rolamento e marcas de canalização:\n Infração - leve;\n Penalidade - multa;\n VII - na área de cruzamento de vias, prejudicando a circulação de veículos e pedestres:\n Infração - média;\n Penalidade - multa;\n VIII - nos viadutos, pontes e túneis:\n Infração - média;\n Penalidade - multa;\n IX - na contramão de direção:\n Infração - média;\n Penalidade - multa;\n X - em local e horário proibidos especificamente pela sinalização (placa - Proibido Parar):\n Infração - média;\n\f Penalidade - multa.\n XI - sobre ciclovia ou ciclofaixa: (Incluído pela Lei nº 14.071, de 2020) (Vigência)\n Infração - grave; (Incluído pela Lei nº 14.071, de 2020) (Vigência)\n Penalidade - multa. (Incluído pela Lei nº 14.071, de 2020) (Vigência)"}, {"art": "Art. 183", "key": "183", "texto": "Art. 183. Parar o veículo sobre a faixa de pedestres na mudança de sinal luminoso:\n Infração - média;\n Penalidade - multa."}, {"art": "Art. 184", "key": "184", "texto": "Art. 184. Transitar com o veículo:\n I - na faixa ou pista da direita, regulamentada como de circulação exclusiva para determinado tipo de veículo, exceto para acesso a imóveis lindeiros ou conversões à direita:\n Infração - leve;\n Penalidade - multa;\n II - na faixa ou pista da esquerda regulamentada como de circulação exclusiva para determinado tipo de veículo:\n Infração - grave;\n Penalidade - multa.\n III - na faixa ou via de trânsito exclusivo, regulamentada com circulação destinada aos veículos de transporte público coletivo de passageiros, salvo casos de força maior e com autorização do poder público competente: (Incluído pela\nLei nº 13.154, de 2015)\n Infração - gravíssima; (Incluído pela Lei nº 13.154, de 2015)\n Penalidade - multa e apreensão do veículo; (Incluído pela Lei nº 13.154, de 2015)\n Medida Administrativa - remoção do veículo. (Incluído pela Lei nº 13.154, de 2015)"}, {"art": "Art. 185", "key": "185", "texto": "Art. 185. Quando o veículo estiver em movimento, deixar de conservá-lo:\n I - na faixa a ele destinada pela sinalização de regulamentação, exceto em situações de emergência;\n II - nas faixas da direita, os veículos lentos e de maior porte:\n Infração - média;\n Penalidade - multa."}, {"art": "Art. 186", "key": "186", "texto": "Art. 186. Transitar pela contramão de direção em:\n I - vias com duplo sentido de circulação, exceto para ultrapassar outro veículo e apenas pelo tempo necessário, respeitada a preferência do veículo que transitar em sentido contrário:\n Infração - grave;\n Penalidade - multa;\n II - vias com sinalização de regulamentação de sentido único de circulação:\n Infração - gravíssima;\n Penalidade - multa."}, {"art": "Art. 187", "key": "187", "texto": "Art. 187. Transitar em locais e horários não permitidos pela regulamentação estabelecida pela autoridade competente:\n\f I - para todos os tipos de veículos:\n Infração - média;\n Penalidade - multa;\n II - (Revogado pela Lei nº 9.602, de 1998)"}, {"art": "Art. 188", "key": "188", "texto": "Art. 188. Transitar ao lado de outro veículo, interrompendo ou perturbando o trânsito:\n Infração - média;\n Penalidade - multa."}, {"art": "Art. 189", "key": "189", "texto": "Art. 189. Deixar de dar passagem aos veículos precedidos de batedores, de socorro de incêndio e salvamento, de polícia, de operação e fiscalização de trânsito e às ambulâncias, quando em serviço de urgência e devidamente identificados por dispositivos regulamentados de alarme sonoro e iluminação intermitente: (Redação dada pela Lei nº 14.440, de 2022)\n Infração - gravíssima;\n Penalidade - multa."}, {"art": "Art. 190", "key": "190", "texto": "Art. 190. Seguir veículo em serviço de urgência, estando este com prioridade de passagem devidamente identificada por dispositivos regulamentares de alarme sonoro e iluminação intermitente: (Redação dada pela Lei nº 14.440, de 2022)\n Infração - grave;\n Penalidade - multa."}, {"art": "Art. 191", "key": "191", "texto": "Art. 191. Forçar passagem entre veículos que, transitando em sentidos opostos, estejam na iminência de passar um pelo outro ao realizar operação de ultrapassagem:\n Infração - gravíssima;\n Penalidade - multa (dez vezes) e suspensão do direito de dirigir. (Redação dada pela Lei nº 12.971, de 2014)\n(Vigência)\n Parágrafo único. Aplica-se em dobro a multa prevista no caput em caso de reincidência no período de até 12 (doze) meses da infração anterior. (Incluído pela Lei nº 12.971, de 2014) (Vigência)"}, {"art": "Art. 192", "key": "192", "texto": "Art. 192. Deixar de guardar distância de segurança lateral e frontal entre o seu veículo e os demais, bem como em relação ao bordo da pista, considerando-se, no momento, a velocidade, as condições climáticas do local da circulação e do veículo:\n Infração - grave;\n Penalidade - multa."}, {"art": "Art. 193", "key": "193", "texto": "Art. 193. Transitar com o veículo em calçadas, passeios, passarelas, ciclovias, ciclofaixas, ilhas, refúgios, ajardinamentos, canteiros centrais e divisores de pista de rolamento, acostamentos, marcas de canalização, gramados e jardins públicos:\n Infração - gravíssima;\n Penalidade - multa (três vezes)."}, {"art": "Art. 194", "key": "194", "texto": "Art. 194. Transitar em marcha à ré, salvo na distância necessária a pequenas manobras e de forma a não causar riscos à segurança:\n Infração - grave;\n Penalidade - multa."}, {"art": "Art. 195", "key": "195", "texto": "Art. 195. Desobedecer às ordens emanadas da autoridade competente de trânsito ou de seus agentes:\n\f Infração - grave;\n Penalidade - multa."}, {"art": "Art. 196", "key": "196", "texto": "Art. 196. Deixar de indicar com antecedência, mediante gesto regulamentar de braço ou luz indicadora de direção do veículo, o início da marcha, a realização da manobra de parar o veículo, a mudança de direção ou de faixa de circulação:\n Infração - grave;\n Penalidade - multa."}, {"art": "Art. 197", "key": "197", "texto": "Art. 197. Deixar de deslocar, com antecedência, o veículo para a faixa mais à esquerda ou mais à direita, dentro da respectiva mão de direção, quando for manobrar para um desses lados:\n Infração - média;\n Penalidade - multa."}, {"art": "Art. 198", "key": "198", "texto": "Art. 198. Deixar de dar passagem pela esquerda, quando solicitado:\n Infração - média;\n Penalidade - multa."}, {"art": "Art. 199", "key": "199", "texto": "Art. 199. Ultrapassar pela direita, salvo quando o veículo da frente estiver colocado na faixa apropriada e der sinal de que vai entrar à esquerda:\n Infração - média;\n Penalidade - multa."}, {"art": "Art. 200", "key": "200", "texto": "Art. 200. Ultrapassar pela direita veículo de transporte coletivo ou de escolares, parado para embarque ou desembarque de passageiros, salvo quando houver refúgio de segurança para o pedestre:\n Infração - gravíssima;\n Penalidade - multa."}, {"art": "Art. 201", "key": "201", "texto": "Art. 201. Deixar de guardar a distância lateral de um metro e cinqüenta centímetros ao passar ou ultrapassar bicicleta:\n Infração - média;\n Penalidade - multa."}, {"art": "Art. 202", "key": "202", "texto": "Art. 202. Ultrapassar outro veículo:\n I - pelo acostamento;\n II - em interseções e passagens de nível;\n Infração - gravíssima; (Redação dada pela Lei nº 12.971, de 2014) (Vigência)\n Penalidade - multa (cinco vezes). (Redação dada pela Lei nº 12.971, de 2014) (Vigência)"}, {"art": "Art. 203", "key": "203", "texto": "Art. 203. Ultrapassar pela contramão outro veículo:\n I - nas curvas, aclives e declives, sem visibilidade suficiente;\n II - nas faixas de pedestre;\n III - nas pontes, viadutos ou túneis;\n IV - parado em fila junto a sinais luminosos, porteiras, cancelas, cruzamentos ou qualquer outro impedimento à livre circulação;\n\f V - onde houver marcação viária longitudinal de divisão de fluxos opostos do tipo linha dupla contínua ou simples contínua amarela:\n Infração - gravíssima; (Redação dada pela Lei nº 12.971, de 2014) (Vigência)\n Penalidade - multa (cinco vezes). (Redação dada pela Lei nº 12.971, de 2014) (Vigência)\n Parágrafo único. Aplica-se em dobro a multa prevista no caput em caso de reincidência no período de até 12 (doze) meses da infração anterior. (Incluído pela Lei nº 12.971, de 2014) (Vigência)"}, {"art": "Art. 204", "key": "204", "texto": "Art. 204. Deixar de parar o veículo no acostamento à direita, para aguardar a oportunidade de cruzar a pista ou entrar à esquerda, onde não houver local apropriado para operação de retorno:\n Infração - grave;\n Penalidade - multa."}, {"art": "Art. 205", "key": "205", "texto": "Art. 205. Ultrapassar veículo em movimento que integre cortejo, préstito, desfile e formações militares, salvo com autorização da autoridade de trânsito ou de seus agentes:\n Infração - leve;\n Penalidade - multa."}, {"art": "Art. 206", "key": "206", "texto": "Art. 206. Executar operação de retorno:\n I - em locais proibidos pela sinalização;\n II - nas curvas, aclives, declives, pontes, viadutos e túneis;\n III - passando por cima de calçada, passeio, ilhas, ajardinamento ou canteiros de divisões de pista de rolamento, refúgios e faixas de pedestres e nas de veículos não motorizados;\n IV - nas interseções, entrando na contramão de direção da via transversal;\n V - com prejuízo da livre circulação ou da segurança, ainda que em locais permitidos:\n Infração - gravíssima;\n Penalidade - multa."}, {"art": "Art. 207", "key": "207", "texto": "Art. 207. Executar operação de conversão à direita ou à esquerda em locais proibidos pela sinalização:\n Infração - grave;\n Penalidade - multa."}, {"art": "Art. 208", "key": "208", "texto": "Art. 208. Avançar o sinal vermelho do semáforo ou o de parada obrigatória, exceto onde houver sinalização que permita a livre conversão à direita prevista no art. 44-A deste Código: (Redação dada pela Lei nº 14.071, de 2020)\n(Vigência)\n Infração - gravíssima;\n Penalidade - multa."}, {"art": "Art. 209", "key": "209", "texto": "Art. 209. Transpor, sem autorização, bloqueio viário com ou sem sinalização ou dispositivos auxiliares, ou deixar de adentrar as áreas destinadas à pesagem de veículos: (Redação dada pela Lei nº 14.157, de 2021)\n Infração - grave;\n Penalidade - multa."}, {"art": "Art. 209-A", "key": "209-A", "texto": "Art. 209-A. Evadir-se da cobrança pelo uso de rodovias e vias urbanas para não efetuar o seu pagamento, ou deixar de efetuá-lo na forma estabelecida: (Incluído pela Lei nº 14.157, de 2021)\n Infração – grave;\n Penalidade – multa."}, {"art": "Art. 210", "key": "210", "texto": "Art. 210. Transpor, sem autorização, bloqueio viário policial:\n Infração - gravíssima;\n Penalidade - multa, apreensão do veículo e suspensão do direito de dirigir;\n Medida administrativa - remoção do veículo e recolhimento do documento de habilitação."}, {"art": "Art. 211", "key": "211", "texto": "Art. 211. Ultrapassar veículos em fila, parados em razão de sinal luminoso, cancela, bloqueio viário parcial ou qualquer outro obstáculo, com exceção dos veículos não motorizados:\n Infração - grave;\n Penalidade - multa.\n Parágrafo único. (VETADO). (Incluído pela Lei nº 14.071, de 2020) (Vigência)"}, {"art": "Art. 212", "key": "212", "texto": "Art. 212. Deixar de parar o veículo antes de transpor linha férrea:\n Infração - gravíssima;\n Penalidade - multa."}, {"art": "Art. 213", "key": "213", "texto": "Art. 213. Deixar de parar o veículo sempre que a respectiva marcha for interceptada:\n I - por agrupamento de pessoas, como préstitos, passeatas, desfiles e outros:\n Infração - gravíssima;\n Penalidade - multa.\n II - por agrupamento de veículos, como cortejos, formações militares e outros:\n Infração - grave;\n Penalidade - multa."}, {"art": "Art. 214", "key": "214", "texto": "Art. 214. Deixar de dar preferência de passagem a pedestre e a veículo não motorizado:\n I - que se encontre na faixa a ele destinada;\n II - que não haja concluído a travessia mesmo que ocorra sinal verde para o veículo;\n III - portadores de deficiência física, crianças, idosos e gestantes:\n Infração - gravíssima;\n Penalidade - multa.\n IV - quando houver iniciado a travessia mesmo que não haja sinalização a ele destinada;\n V - que esteja atravessando a via transversal para onde se dirige o veículo:\n Infração - grave;\n Penalidade - multa."}, {"art": "Art. 215", "key": "215", "texto": "Art. 215. Deixar de dar preferência de passagem:\n I - em interseção não sinalizada:\n a) a veículo que estiver circulando por rodovia ou rotatória;\n b) a veículo que vier da direita;\n II - nas interseções com sinalização de regulamentação de Dê a Preferência:\n\f Infração - grave;\n Penalidade - multa."}, {"art": "Art. 216", "key": "216", "texto": "Art. 216. Entrar ou sair de áreas lindeiras sem estar adequadamente posicionado para ingresso na via e sem as precauções com a segurança de pedestres e de outros veículos:\n Infração - média;\n Penalidade - multa."}, {"art": "Art. 217", "key": "217", "texto": "Art. 217. Entrar ou sair de fila de veículos estacionados sem dar preferência de passagem a pedestres e a outros veículos:\n Infração - média;\n Penalidade - multa."}, {"art": "Art. 218", "key": "218", "texto": "Art. 218. Transitar em velocidade superior à máxima permitida para o local, medida por instrumento ou equipamento hábil, em rodovias, vias de trânsito rápido, vias arteriais e demais vias: (Redação dada pela Lei nº 11.334, de 2006) (Vide ADI nº 3951)\n I - quando a velocidade for superior à máxima em até 20% (vinte por cento): (Redação dada pela Lei nº 11.334, de 2006)\n Infração - média; (Redação dada pela Lei nº 11.334, de 2006)\n Penalidade - multa; (Redação dada pela Lei nº 11.334, de 2006)\n II - quando a velocidade for superior à máxima em mais de 20% (vinte por cento) até 50% (cinqüenta por cento):\n(Redação dada pela Lei nº 11.334, de 2006)\n Infração - grave; (Redação dada pela Lei nº 11.334, de 2006)\n Penalidade - multa; (Redação dada pela Lei nº 11.334, de 2006)\n III - quando a velocidade for superior à máxima em mais de 50% (cinqüenta por cento): (Incluído pela Lei nº 11.334, de 2006)\n Infração - gravíssima; (Redação dada pela Lei nº 14.071, de 2020)\n Penalidade - multa (três vezes) e suspensão do direito de dirigir. (Redação dada pela Lei nº 14.071, de 2020)\n(Vigência)"}, {"art": "Art. 219", "key": "219", "texto": "Art. 219. Transitar com o veículo em velocidade inferior à metade da velocidade máxima estabelecida para a via, retardando ou obstruindo o trânsito, a menos que as condições de tráfego e meteorológicas não o permitam, salvo se estiver na faixa da direita:\n Infração - média;\n Penalidade - multa."}, {"art": "Art. 220", "key": "220", "texto": "Art. 220. Deixar de reduzir a velocidade do veículo de forma compatível com a segurança do trânsito:\n I - quando se aproximar de passeatas, aglomerações, cortejos, préstitos e desfiles:\n Infração - gravíssima;\n Penalidade - multa;\n II - nos locais onde o trânsito esteja sendo controlado pelo agente da autoridade de trânsito, mediante sinais sonoros ou gestos;\n III - ao aproximar-se da guia da calçada (meio-fio) ou acostamento;\n IV - ao aproximar-se de ou passar por interseção não sinalizada;\n\f V - nas vias rurais cuja faixa de domínio não esteja cercada;\n VI - nos trechos em curva de pequeno raio;\n VII - ao aproximar-se de locais sinalizados com advertência de obras ou trabalhadores na pista;\n VIII - sob chuva, neblina, cerração ou ventos fortes;\n IX - quando houver má visibilidade;\n X - quando o pavimento se apresentar escorregadio, defeituoso ou avariado;\n XI - à aproximação de animais na pista;\n XII - em declive;\n Infração - grave; (Incluído pela Lei nº 14.071, de 2020) (Vigência)\n Penalidade - multa; (Incluído pela Lei nº 14.071, de 2020) (Vigência)\n XIII - ao ultrapassar ciclista:\n Infração - gravíssima; (Redação dada pela Lei nº 14.071, de 2020) (Vigência)\n Penalidade - multa; (Redação dada pela Lei nº 14.071, de 2020) (Vigência)\n XIV - nas proximidades de escolas, hospitais, estações de embarque e desembarque de passageiros ou onde haja intensa movimentação de pedestres:\n Infração - gravíssima;\n Penalidade - multa."}, {"art": "Art. 221", "key": "221", "texto": "Art. 221. Portar no veículo placas de identificação em desacordo com as especificações e modelos estabelecidos pelo CONTRAN:\n Infração - média;\n Penalidade - multa;\n Medida administrativa - retenção do veículo para regularização e apreensão das placas irregulares.\n Parágrafo único. Incide na mesma penalidade aquele que confecciona, distribui ou coloca, em veículo próprio ou de terceiros, placas de identificação não autorizadas pela regulamentação."}, {"art": "Art. 222", "key": "222", "texto": "Art. 222. Deixar de manter ligado, nas situações de atendimento de emergência, o sistema de iluminação intermitente dos veículos de polícia, de socorro de incêndio e salvamento, de fiscalização de trânsito e das ambulâncias, ainda que parados: (Redação dada pela Lei nº 14.440, de 2022)\n Infração - média;\n Penalidade - multa."}, {"art": "Art. 223", "key": "223", "texto": "Art. 223. Transitar com o farol desregulado ou com o facho de luz alta de forma a perturbar a visão de outro condutor:\n Infração - grave;\n Penalidade - multa;\n Medida administrativa - retenção do veículo para regularização."}, {"art": "Art. 224", "key": "224", "texto": "Art. 224. Fazer uso do facho de luz alta dos faróis em vias providas de iluminação pública:\n Infração - leve;\n Penalidade - multa."}, {"art": "Art. 225", "key": "225", "texto": "Art. 225. Deixar de sinalizar a via, de forma a prevenir os demais condutores e, à noite, não manter acesas as luzes externas ou omitir-se quanto a providências necessárias para tornar visível o local, quando:\n I - tiver de remover o veículo da pista de rolamento ou permanecer no acostamento;\n II - a carga for derramada sobre a via e não puder ser retirada imediatamente:\n Infração - grave;\n Penalidade - multa."}, {"art": "Art. 226", "key": "226", "texto": "Art. 226. Deixar de retirar todo e qualquer objeto que tenha sido utilizado para sinalização temporária da via:\n Infração - média;\n Penalidade - multa."}, {"art": "Art. 227", "key": "227", "texto": "Art. 227. Usar buzina:\n I - em situação que não a de simples toque breve como advertência ao pedestre ou a condutores de outros veículos;\n II - prolongada e sucessivamente a qualquer pretexto;\n III - entre as vinte e duas e as seis horas;\n IV - em locais e horários proibidos pela sinalização;\n V - em desacordo com os padrões e freqüências estabelecidas pelo CONTRAN:\n Infração - leve;\n Penalidade - multa."}, {"art": "Art. 228", "key": "228", "texto": "Art. 228. Usar no veículo equipamento com som em volume ou freqüência que não sejam autorizados pelo\nCONTRAN:\n Infração - grave;\n Penalidade - multa;\n Medida administrativa - retenção do veículo para regularização."}, {"art": "Art. 229", "key": "229", "texto": "Art. 229. Usar indevidamente no veículo aparelho de alarme ou que produza sons e ruído que perturbem o sossego público, em desacordo com normas fixadas pelo CONTRAN:\n Infração - média;\n Penalidade - multa e apreensão do veículo;\n Medida administrativa - remoção do veículo."}, {"art": "Art. 230", "key": "230", "texto": "Art. 230. Conduzir o veículo:\n I - com o lacre, a inscrição do chassi, o selo, a placa ou qualquer outro elemento de identificação do veículo violado ou falsificado;\n II - transportando passageiros em compartimento de carga, salvo por motivo de força maior, com permissão da autoridade competente e na forma estabelecida pelo CONTRAN;\n III - com dispositivo anti-radar;\n IV - sem qualquer uma das placas de identificação;\n V - que não esteja registrado e devidamente licenciado;\n VI - com qualquer uma das placas de identificação sem condições de legibilidade e visibilidade:\n\f Infração - gravíssima;\n Penalidade - multa e apreensão do veículo;\n Medida administrativa - remoção do veículo;\n VII - com a cor ou característica alterada;\n VIII - sem ter sido submetido à inspeção de segurança veicular, quando obrigatória;\n IX - sem equipamento obrigatório ou estando este ineficiente ou inoperante;\n X - com equipamento obrigatório em desacordo com o estabelecido pelo CONTRAN;\n XI - com descarga livre ou silenciador de motor de explosão defeituoso, deficiente ou inoperante;\n XII - com equipamento ou acessório proibido;\n XIII - com o equipamento do sistema de iluminação e de sinalização alterados;\n XIV - com registrador instantâneo inalterável de velocidade e tempo viciado ou defeituoso, quando houver exigência desse aparelho;\n XV - com inscrições, adesivos, legendas e símbolos de caráter publicitário afixados ou pintados no pára-brisa e em toda a extensão da parte traseira do veículo, excetuadas as hipóteses previstas neste Código;\n XVI - com vidros total ou parcialmente cobertos por películas refletivas ou não, painéis decorativos ou pinturas;\n XVII - com cortinas ou persianas fechadas, não autorizadas pela legislação;\n XVIII - em mau estado de conservação, comprometendo a segurança, ou reprovado na avaliação de inspeção de segurança e de emissão de poluentes e ruído, prevista no art. 104;\n XIX - sem acionar o limpador de pára-brisa sob chuva:\n Infração - grave;\n Penalidade - multa;\n Medida administrativa - retenção do veículo para regularização;\n XX - sem portar a autorização para condução de escolares, na forma estabelecida no art. 136:\n Infração – gravíssima; (Redação dada pela Lei nº 13.855, de 2019) (Vigência)\n Penalidade – multa (cinco vezes); (Redação dada pela Lei nº 13.855, de 2019) (Vigência)\n Medida administrativa – remoção do veículo; (Incluído pela Lei nº 13.855, de 2019) (Vigência)\n XXI - de carga, com falta de inscrição da tara e demais inscrições previstas neste Código;\n XXII - com defeito no sistema de iluminação, de sinalização ou com lâmpadas queimadas:\n Infração - média;\n Penalidade - multa.\n\f XXIII - em desacordo com as condições estabelecidas no art. 67-C, relativamente ao tempo de permanência do condutor ao volante e aos intervalos para descanso, quando se tratar de veículo de transporte de carga ou coletivo de passageiros: (Redação dada pela Lei nº 13.103, de 2015) (Vigência)\n Infração - média; (Redação dada pela Lei nº 13.103, de 2015) (Vigência)\n Penalidade - multa; (Redação dada pela Lei nº 13.103, de 2015) (Vigência)\n Medida administrativa - retenção do veículo para cumprimento do tempo de descanso aplicável. (Redação dada pela Lei nº 13.103, de 2015) (Vigência)\n XXIV- (VETADO). (Incluído pela Lei nº 12.619, de 2012) (Vigência)\n § 1o Se o condutor cometeu infração igual nos últimos 12 (doze) meses, será convertida, automaticamente, a penalidade disposta no inciso XXIII em infração grave. (Incluído pela Lei nº 13.103, de 2015) (Vigência)\n § 2o Em se tratando de condutor estrangeiro, a liberação do veículo fica condicionada ao pagamento ou ao depósito, judicial ou administrativo, da multa. (Incluído pela Lei nº 13.103, de 2015) (Vigência)"}, {"art": "Art. 231", "key": "231", "texto": "Art. 231. Transitar com o veículo:\n I - danificando a via, suas instalações e equipamentos;\n II - derramando, lançando ou arrastando sobre a via:\n a) carga que esteja transportando;\n b) combustível ou lubrificante que esteja utilizando;\n c) qualquer objeto que possa acarretar risco de sinistro: (Redação dada pela Lei nº 14.599, de 2023)\n Infração - gravíssima;\n Penalidade - multa;\n Medida administrativa - retenção do veículo para regularização;\n III - produzindo fumaça, gases ou partículas em níveis superiores aos fixados pelo CONTRAN;\n IV - com suas dimensões ou de sua carga superiores aos limites estabelecidos legalmente ou pela sinalização, sem autorização:\n Infração - grave;\n Penalidade - multa;\n Medida administrativa - retenção do veículo para regularização;\n V - com excesso de peso, admitido percentual de tolerância quando aferido por equipamento, na forma a ser estabelecida pelo CONTRAN:\n Infração - média;\n Penalidade - multa acrescida a cada duzentos quilogramas ou fração de excesso de peso apurado, constante na seguinte tabela:\n a) até 600 kg (seiscentos quilogramas) - R$ 5,32 (cinco reais e trinta e dois centavos); (Redação dada pela Lei nº 13.281, de 2016) (Vigência)\n b) de 601 (seiscentos e um) a 800 kg (oitocentos quilogramas) - R$ 10,64 (dez reais e sessenta e quatro centavos); (Redação dada pela Lei nº 13.281, de 2016) (Vigência)\n c) de 801 (oitocentos e um) a 1.000 kg (mil quilogramas) - R$ 21,28 (vinte e um reais e vinte e oito centavos);\n(Redação dada pela Lei nº 13.281, de 2016) (Vigência)\n d) de 1.001 (mil e um) a 3.000 kg (três mil quilogramas) - R$ 31,92 (trinta e um reais e noventa e dois centavos);\n(Redação dada pela Lei nº 13.281, de 2016) (Vigência)\n\f e) de 3.001 (três mil e um) a 5.000 kg (cinco mil quilogramas) - R$ 42,56 (quarenta e dois reais e cinquenta e seis centavos); (Redação dada pela Lei nº 13.281, de 2016) (Vigência)\n f) acima de 5.001 kg (cinco mil e um quilogramas) - R$ 53,20 (cinquenta e três reais e vinte centavos);\n(Redação dada pela Lei nº 13.281, de 2016) (Vigência)\n Medida administrativa - retenção do veículo e transbordo da carga excedente;\n VI - em desacordo com a autorização especial, expedida pela autoridade competente para transitar com dimensões excedentes, ou quando a mesma estiver vencida:\n Infração - grave;\n Penalidade - multa e apreensão do veículo;\n Medida administrativa - remoção do veículo;\n VII - com lotação excedente;\n VIII - efetuando transporte remunerado de pessoas ou bens, quando não for licenciado para esse fim, salvo casos de força maior ou com permissão da autoridade competente:\n Infração – gravíssima; (Redação dada pela Lei nº 13.855, de 2019) (Vigência)\n Penalidade – multa; (Redação dada pela Lei nº 13.855, de 2019) (Vigência)\n Medida administrativa – remoção do veículo; (Redação dada pela Lei nº 13.855, de 2019) (Vigência)\n IX - desligado ou desengrenado, em declive:\n Infração - média;\n Penalidade - multa;\n Medida administrativa - retenção do veículo;\n X - excedendo a capacidade máxima de tração:\n Infração - de média a gravíssima, a depender da relação entre o excesso de peso apurado e a capacidade máxima de tração, a ser regulamentada pelo CONTRAN;\n Penalidade - multa;\n Medida Administrativa - retenção do veículo e transbordo de carga excedente.\n Parágrafo único. Sem prejuízo das multas previstas nos incisos V e X, o veículo que transitar com excesso de peso ou excedendo à capacidade máxima de tração, não computado o percentual tolerado na forma do disposto na legislação, somente poderá continuar viagem após descarregar o que exceder, segundo critérios estabelecidos na referida legislação complementar."}, {"art": "Art. 232", "key": "232", "texto": "Art. 232. Conduzir veículo sem os documentos de porte obrigatório referidos neste Código:\n Infração - leve;\n Penalidade - multa;\n Medida administrativa - retenção do veículo até a apresentação do documento."}, {"art": "Art. 233", "key": "233", "texto": "Art. 233. Deixar de efetuar o registro de veículo no prazo de trinta dias, junto ao órgão executivo de trânsito, ocorridas as hipóteses previstas no art. 123:\n Infração - média; (Redação dada pela Lei nº 14.071, de 2020) (Vigência)\n Penalidade - multa; (Redação dada pela Lei nº 14.071, de 2020) (Vigência)\n Medida administrativa - remoção do veículo. (Redação dada pela Lei nº 14.071, de 2020) (Vigência)"}, {"art": "Art. 233-A", "key": "233-A", "texto": "Art. 233-A. (VETADO). (Incluído pela Lei nº 14.071, de 2020) (Vigência)"}, {"art": "Art. 234", "key": "234", "texto": "Art. 234. Falsificar ou adulterar documento de habilitação e de identificação do veículo:\n Infração - gravíssima;\n Penalidade - multa e apreensão do veículo;\n Medida administrativa - remoção do veículo."}, {"art": "Art. 235", "key": "235", "texto": "Art. 235. Conduzir pessoas, animais ou carga nas partes externas do veículo, salvo nos casos devidamente autorizados:\n Infração - grave;\n Penalidade - multa;\n Medida administrativa - retenção do veículo para transbordo."}, {"art": "Art. 236", "key": "236", "texto": "Art. 236. Rebocar outro veículo com cabo flexível ou corda, salvo em casos de emergência:\n Infração - média;\n Penalidade - multa."}, {"art": "Art. 237", "key": "237", "texto": "Art. 237. Transitar com o veículo em desacordo com as especificações, e com falta de inscrição e simbologia necessárias à sua identificação, quando exigidas pela legislação:\n Infração - grave;\n Penalidade - multa;\n Medida administrativa - retenção do veículo para regularização."}, {"art": "Art. 238", "key": "238", "texto": "Art. 238. Recusar-se a entregar à autoridade de trânsito ou a seus agentes, mediante recibo, os documentos de habilitação, de registro, de licenciamento de veículo e outros exigidos por lei, para averiguação de sua autenticidade:\n Infração - gravíssima;\n Penalidade - multa e apreensão do veículo;\n Medida administrativa - remoção do veículo."}, {"art": "Art. 239", "key": "239", "texto": "Art. 239. Retirar do local veículo legalmente retido para regularização, sem permissão da autoridade competente ou de seus agentes:\n Infração - gravíssima;\n Penalidade - multa e apreensão do veículo;\n Medida administrativa - remoção do veículo."}, {"art": "Art. 240", "key": "240", "texto": "Art. 240. Deixar o responsável de promover a baixa do registro de veículo irrecuperável ou definitivamente desmontado:\n Infração - grave;\n Penalidade - multa;\n Medida administrativa - Recolhimento do Certificado de Registro e do Certificado de Licenciamento Anual."}, {"art": "Art. 241", "key": "241", "texto": "Art. 241. Deixar de atualizar o cadastro de registro do veículo ou de habilitação do condutor:\n Infração - leve;\n Penalidade - multa."}, {"art": "Art. 242", "key": "242", "texto": "Art. 242. Fazer falsa declaração de domicílio para fins de registro, licenciamento ou habilitação:\n Infração - gravíssima;\n Penalidade - multa."}, {"art": "Art. 242-A", "key": "242-A", "texto": "Art. 242-A. (VETADO). (Incluído pela Lei Complementar nº 207, de 2024)"}, {"art": "Art. 243", "key": "243", "texto": "Art. 243. Deixar a empresa seguradora de comunicar ao órgão executivo de trânsito competente a ocorrência de perda total do veículo e de lhe devolver as respectivas placas e documentos:\n Infração - grave;\n Penalidade - multa;\n Medida administrativa - Recolhimento das placas e dos documentos."}, {"art": "Art. 244", "key": "244", "texto": "Art. 244. Conduzir motocicleta, motoneta ou ciclomotor: (Redação dada pela Lei nº 14.071, de 2020) (Vigência)\n I - sem usar capacete de segurança ou vestuário de acordo com as normas e as especificações aprovadas pelo\nContran; (Redação dada pela Lei nº 14.071, de 2020) (Vigência)\n II - transportando passageiro sem o capacete de segurança, na forma estabelecida no inciso anterior, ou fora do assento suplementar colocado atrás do condutor ou em carro lateral;\n III - fazendo malabarismo ou equilibrando-se apenas em uma roda;\n IV - (revogado); (Redação dada pela Lei nº 14.071, de 2020) (Vigência)\n V - transportando criança menor de 10 (dez) anos de idade ou que não tenha, nas circunstâncias, condições de cuidar da própria segurança: (Redação dada pela Lei nº 14.071, de 2020) (Vigência)\n Infração - gravíssima; (Redação dada pela Lei nº 14.071, de 2020) (Vigência)\n Penalidade - multa e suspensão do direito de dirigir; (Redação dada pela Lei nº 14.071, de 2020) (Vigência)\n Medida administrativa - retenção do veículo até regularização e recolhimento do documento de habilitação;\n(Redação dada pela Lei nº 14.071, de 2020) (Vigência)\n VI - rebocando outro veículo;\n VII - sem segurar o guidom com ambas as mãos, salvo eventualmente para indicação de manobras;\n VIII – transportando carga incompatível com suas especificações ou em desacordo com o previsto no § 2o do art. 139-A desta Lei; (Incluído pela Lei nº 12.009, de 2009)\n IX – efetuando transporte remunerado de mercadorias em desacordo com o previsto no art. 139-A desta Lei ou com as normas que regem a atividade profissional dos mototaxistas: (Incluído pela Lei nº 12.009, de 2009)\n Infração – grave; (Incluído pela Lei nº 12.009, de 2009)\n Penalidade – multa; (Incluído pela Lei nº 12.009, de 2009)\n Medida administrativa – apreensão do veículo para regularização. (Incluído pela Lei nº 12.009, de 2009)\n X - com a utilização de capacete de segurança sem viseira ou óculos de proteção ou com viseira ou óculos\n de proteção em desacordo com a regulamentação do Contran; (Incluído pela Lei nº 14.071, de 2020)\n (Vigência)\n XI - transportando passageiro com o capacete de segurança utilizado na forma prevista no inciso X do\n caput deste artigo: (Incluído pela Lei nº 14.071, de 2020) (Vigência)\n Infração - média; (Incluído pela Lei nº 14.071, de 2020) (Vigência)\n Penalidade - multa; (Incluído pela Lei nº 14.071, de 2020) (Vigência)\n Medida administrativa - retenção do veículo até regularização; (Incluído pela Lei nº 14.071, de 2020)\n (Vigência)\n\f XII – (VETADO). (Incluído pela Lei nº 14.071, de 2020) (Vigência)\n § 1º Para ciclos aplica-se o disposto nos incisos III, VII e VIII, além de:\n a) conduzir passageiro fora da garupa ou do assento especial a ele destinado;\n b) transitar em vias de trânsito rápido ou rodovias, salvo onde houver acostamento ou faixas de rolamento próprias;\n c) transportar crianças que não tenham, nas circunstâncias, condições de cuidar de sua própria segurança.\n § 2º Aplica-se aos ciclomotores o disposto na alínea b do parágrafo anterior:\n Infração - média;\n Penalidade - multa.\n § 3o A restrição imposta pelo inciso VI do caput deste artigo não se aplica às motocicletas e motonetas que tracionem semi-reboques especialmente projetados para esse fim e devidamente homologados pelo órgão competente. (Incluído pela Lei nº 10.517, de 2002)"}, {"art": "Art. 245", "key": "245", "texto": "Art. 245. Utilizar a via para depósito de mercadorias, materiais ou equipamentos, sem autorização do órgão ou entidade de trânsito com circunscrição sobre a via:\n Infração - grave;\n Penalidade - multa;\n Medida administrativa - remoção da mercadoria ou do material.\n Parágrafo único. A penalidade e a medida administrativa incidirão sobre a pessoa física ou jurídica responsável."}, {"art": "Art. 246", "key": "246", "texto": "Art. 246. Deixar de sinalizar qualquer obstáculo à livre circulação, à segurança de veículo e pedestres, tanto no leito da via terrestre como na calçada, ou obstaculizar a via indevidamente:\n Infração - gravíssima;\n Penalidade - multa, agravada em até cinco vezes, a critério da autoridade de trânsito, conforme o risco à segurança.\n Parágrafo único. A penalidade será aplicada à pessoa física ou jurídica responsável pela obstrução, devendo a autoridade com circunscrição sobre a via providenciar a sinalização de emergência, às expensas do responsável, ou, se possível, promover a desobstrução."}, {"art": "Art. 247", "key": "247", "texto": "Art. 247. Deixar de conduzir pelo bordo da pista de rolamento, em fila única, os veículos de tração ou propulsão humana e os de tração animal, sempre que não houver acostamento ou faixa a eles destinados:\n Infração - média;\n Penalidade - multa."}, {"art": "Art. 248", "key": "248", "texto": "Art. 248. Transportar em veículo destinado ao transporte de passageiros carga excedente em desacordo com o estabelecido no art. 109:\n Infração - grave;\n Penalidade - multa;\n Medida administrativa - retenção para o transbordo."}, {"art": "Art. 249", "key": "249", "texto": "Art. 249. Deixar de manter acesas, à noite, as luzes de posição, quando o veículo estiver parado, para fins de embarque ou desembarque de passageiros e carga ou descarga de mercadorias:\n Infração - média;\n Penalidade - multa."}, {"art": "Art. 250", "key": "250", "texto": "Art. 250. Quando o veículo estiver em movimento:\n I - deixar de manter acesa a luz baixa:\n a) durante a noite;\n b) de dia, em túneis e sob chuva, neblina ou cerração; (Redação dada pela Lei nº 14.071, de 2020) (Vigência)\n c) de dia, no caso de veículos de transporte coletivo de passageiros em circulação em faixas ou pistas a eles destinadas; (Redação dada pela Lei nº 14.071, de 2020) (Vigência)\n d) de dia, no caso de motocicletas, motonetas e ciclomotores; (Redação dada pela Lei nº 14.071, de 2020)\n(Vigência)\n e) de dia, em rodovias de pista simples situadas fora dos perímetros urbanos, no caso de veículos desprovidos de luzes de rodagem diurna; (Incluído pela Lei nº 14.071, de 2020) (Vigência)\n II - (revogado); (Redação dada pela Lei nº 14.071, de 2020) (Vigência)\n III - deixar de manter a placa traseira iluminada, à noite;\n Infração - média;\n Penalidade - multa.\n IV - deixar o veículo de transporte público coletivo de passageiros ou de escolares de manter a porta fechada:\n(Incluído pela Lei nº 14.440, de 2022)\n Infração - gravíssima; (Incluído pela Lei nº 14.440, de 2022)\n Penalidade - multa; (Incluído pela Lei nº 14.440, de 2022)\n Medida administrativa - retenção do veículo até a regularização. (Incluído pela Lei nº 14.440, de 2022)"}, {"art": "Art. 251", "key": "251", "texto": "Art. 251. Utilizar as luzes do veículo:\n I - o pisca-alerta, exceto em imobilizações ou situações de emergência;\n II - baixa e alta de forma intermitente, exceto nas seguintes situações:\n a) a curtos intervalos, quando for conveniente advertir a outro condutor que se tem o propósito de ultrapassá-lo;\n b) em imobilizações ou situação de emergência, como advertência, utilizando pisca-alerta;\n c) quando a sinalização de regulamentação da via determinar o uso do pisca-alerta:\n Infração - média;\n Penalidade - multa."}, {"art": "Art. 252", "key": "252", "texto": "Art. 252. Dirigir o veículo:\n I - com o braço do lado de fora;\n II - transportando pessoas, animais ou volume à sua esquerda ou entre os braços e pernas;\n III - com incapacidade física ou mental temporária que comprometa a segurança do trânsito;\n IV - usando calçado que não se firme nos pés ou que comprometa a utilização dos pedais;\n V - com apenas uma das mãos, exceto quando deva fazer sinais regulamentares de braço, mudar a marcha do veículo, ou acionar equipamentos e acessórios do veículo;\n VI - utilizando-se de fones nos ouvidos conectados a aparelhagem sonora ou de telefone celular;\n Infração - média;\n\f Penalidade - multa.\n VII - realizando a cobrança de tarifa com o veículo em movimento: (Incluído pela Lei nº 13.154, de 2015)\n Infração - média; (Incluído pela Lei nº 13.154, de 2015)\n Penalidade - multa. (Incluído pela Lei nº 13.154, de 2015)\n Parágrafo único. A hipótese prevista no inciso V caracterizar-se-á como infração gravíssima no caso de o condutor estar segurando ou manuseando telefone celular. (Incluído pela Lei nº 13.281, de 2016) (Vigência)"}, {"art": "Art. 253", "key": "253", "texto": "Art. 253. Bloquear a via com veículo:\n Infração - gravíssima;\n Penalidade - multa e apreensão do veículo;\n Medida administrativa - remoção do veículo."}, {"art": "Art. 253-A", "key": "253-A", "texto": "Art. 253-A. Usar qualquer veículo para, deliberadamente, interromper, restringir ou perturbar a circulação na via sem autorização do órgão ou entidade de trânsito com circunscrição sobre ela: (Incluído pela Lei nº 13. 281, de 2016)\n Infração - gravíssima; (Incluído pela Lei nº 13.281, de 2016)\n Penalidade - multa (vinte vezes) e suspensão do direito de dirigir por 12 (doze) meses; (Incluído pela Lei nº 13.281, de 2016)\n Medida administrativa - remoção do veículo. (Incluído pela Lei nº 13.281, de 2016)\n § 1º Aplica-se a multa agravada em 60 (sessenta) vezes aos organizadores da conduta prevista no caput.\n(Incluído pela Lei nº 13.281, de 2016)\n § 2º Aplica-se em dobro a multa em caso de reincidência no período de 12 (doze) meses. (Incluído pela Lei nº 13.281, de 2016)\n § 3º As penalidades são aplicáveis a pessoas físicas ou jurídicas que incorram na infração, devendo a autoridade com circunscrição sobre a via restabelecer de imediato, se possível, as condições de normalidade para a circulação na via. (Incluído pela Lei nº 13.281, de 2016)"}, {"art": "Art. 254", "key": "254", "texto": "Art. 254. É proibido ao pedestre:\n I - permanecer ou andar nas pistas de rolamento, exceto para cruzá-las onde for permitido;\n II - cruzar pistas de rolamento nos viadutos, pontes, ou túneis, salvo onde exista permissão;\n III - atravessar a via dentro das áreas de cruzamento, salvo quando houver sinalização para esse fim;\n IV - utilizar-se da via em agrupamentos capazes de perturbar o trânsito, ou para a prática de qualquer folguedo, esporte, desfiles e similares, salvo em casos especiais e com a devida licença da autoridade competente;\n V - andar fora da faixa própria, passarela, passagem aérea ou subterrânea;\n VI - desobedecer à sinalização de trânsito específica;\n Infração - leve;\n Penalidade - multa, em 50% (cinqüenta por cento) do valor da infração de natureza leve.\n VII - (VETADO). (Incluído pela Lei nº 13.281, de 2016)\n § 1º (VETADO). (Incluído pela Lei nº 13.281, de 2016)\n § 2º (VETADO). (Incluído pela Lei nº 13.281, de 2016)\n § 3º (VETADO). (Incluído pela Lei nº 13.281, de 2016)"}, {"art": "Art. 255", "key": "255", "texto": "Art. 255. Conduzir bicicleta em passeios onde não seja permitida a circulação desta, ou de forma agressiva, em desacordo com o disposto no parágrafo único do art. 59:\n Infração - média;\n Penalidade - multa;\n Medida administrativa - remoção da bicicleta, mediante recibo para o pagamento da multa.\n CAPÍTULO XVI\n DAS PENALIDADES"}, {"art": "Art. 256", "key": "256", "texto": "Art. 256. A autoridade de trânsito, na esfera das competências estabelecidas neste Código e dentro de sua circunscrição, deverá aplicar, às infrações nele previstas, as seguintes penalidades:\n I - advertência por escrito;\n II - multa;\n III - suspensão do direito de dirigir;\n IV - (Revogado pela Lei nº 13.281, de 2016) (Vigência)\n V - cassação da Carteira Nacional de Habilitação;\n VI - cassação da Permissão para Dirigir;\n VII - freqüência obrigatória em curso de reciclagem.\n § 1º A aplicação das penalidades previstas neste Código não elide as punições originárias de ilícitos penais decorrentes de crimes de trânsito, conforme disposições de lei.\n § 2
