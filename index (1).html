pessoas jurídicas, o valor contábil dos bens. (Incluído pela Lei nº 12.594, de 2012) (Vide)\n Parágrafo único. O preço obtido em caso de leilão não será considerado na determinação do valor dos bens doados, exceto se o leilão for determinado por autoridade judiciária. (Incluído pela Lei nº 12.594, de 2012) (Vide)"}, {"art": "Art. 260-F", "key": "260-F", "texto": "Art. 260-F. Os documentos a que se referem os arts. 260-D e 260-E devem ser mantidos pelo contribuinte por um prazo de 5 (cinco) anos para fins de comprovação da dedução perante a Receita Federal do Brasil. (Incluído pela Lei nº 12.594, de 2012) (Vide)"}, {"art": "Art. 260-G", "key": "260-G", "texto": "Art. 260-G. Os órgãos responsáveis pela administração das contas dos Fundos dos Direitos da Criança e do\nAdolescente nacional, estaduais, distrital e municipais devem: (Incluído pela Lei nº 12.594, de 2012) (Vide)\n I - manter conta bancária específica destinada exclusivamente a gerir os recursos do Fundo; (Incluído pela Lei nº 12.594, de 2012) (Vide)\n II - manter controle das doações recebidas; e (Incluído pela Lei nº 12.594, de 2012) (Vide)\n III - informar anualmente à Secretaria da Receita Federal do Brasil as doações recebidas mês a mês, identificando os seguintes dados por doador: (Incluído pela Lei nº 12.594, de 2012) (Vide)\n a) nome, CNPJ ou CPF; (Incluído pela Lei nº 12.594, de 2012) (Vide)\n b) valor doado, especificando se a doação foi em espécie ou em bens. (Incluído pela Lei nº 12.594, de 2012) (Vide)"}, {"art": "Art. 260-H", "key": "260-H", "texto": "Art. 260-H. Em caso de descumprimento das obrigações previstas no art. 260-G, a Secretaria da Receita Federal do Brasil dará conhecimento do fato ao Ministério Público. (Incluído pela Lei nº 12.594, de 2012) (Vide)"}, {"art": "Art. 260-I", "key": "260-I", "texto": "Art. 260-I. Os Conselhos dos Direitos da Criança e do Adolescente nacional, estaduais, distrital e municipais divulgarão amplamente à sociedade: (Redação dada pela Lei nº 15.426, de 2026)\n I - o calendário de suas reuniões; (Incluído pela Lei nº 12.594, de 2012) (Vide)\n II - as ações prioritárias para aplicação das políticas de atendimento à criança e ao adolescente; (Incluído pela Lei nº 12.594, de 2012) (Vide)\n III - os requisitos para a apresentação de projetos a serem beneficiados com recursos dos Fundos dos Direitos da\nCriança e do Adolescente nacional, estaduais, distrital ou municipais; (Incluído pela Lei nº 12.594, de 2012) (Vide)\n IV - a relação dos projetos aprovados em cada ano-calendário e o valor dos recursos previstos para implementação das ações, por projeto; (Incluído pela Lei nº 12.594, de 2012) (Vide)\n V - o total dos recursos recebidos e a respectiva destinação, por projeto atendido, inclusive com cadastramento na base de dados do Sistema de Informações sobre a Infância e a Adolescência; e (Incluído pela Lei nº 12.594, de 2012)\n(Vide)\n VI - a avaliação dos resultados dos projetos beneficiados com recursos dos Fundos dos Direitos da Criança e do\nAdolescente nacional, estaduais, distrital e municipais. (Incluído pela Lei nº 12.594, de 2012) (Vide)\n Parágrafo único. As informações de que tratam os incisos IV, V e VI do caput deste artigo deverão compor relatório detalhado acerca das atividades de cada Conselho, a ser obrigatoriamente apresentado e divulgado, no mínimo, em periodicidade semestral. (Incluído pela Lei nº 15.426, de 2026)"}, {"art": "Art. 260-J", "key": "260-J", "texto": "Art. 260-J. O Ministério Público determinará, em cada Comarca, a forma de fiscalização da aplicação dos incentivos fiscais referidos no art. 260 desta Lei. (Incluído pela Lei nº 12.594, de 2012) (Vide)\n Parágrafo único. O descumprimento do disposto nos arts. 260-G e 260-I sujeitará os infratores a responder por ação judicial proposta pelo Ministério Público, que poderá atuar de ofício, a requerimento ou representação de qualquer cidadão. (Incluído pela Lei nº 12.594, de 2012) (Vide)"}, {"art": "Art. 260-K", "key": "260-K", "texto": "Art. 260-K. A Secretaria de Direitos Humanos da Presidência da República (SDH/PR) encaminhará à Secretaria da\nReceita Federal do Brasil, até 31 de outubro de cada ano, arquivo eletrônico contendo a relação atualizada dos Fundos dos Direitos da Criança e do Adolescente nacional, distrital, estaduais e municipais, com a indicação dos respectivos números de inscrição no CNPJ e das contas bancárias específicas mantidas em instituições financeiras públicas, destinadas exclusivamente a gerir os recursos dos Fundos. (Incluído pela Lei nº 12.594, de 2012) (Vide)"}, {"art": "Art. 260-L", "key": "260-L", "texto": "Art. 260-L. A Secretaria da Receita Federal do Brasil expedirá as instruções necessárias à aplicação do disposto nos arts. 260 a 260-K. (Incluído pela Lei nº 12.594, de 2012) (Vide)"}, {"art": "Art. 261", "key": "261", "texto": "Art. 261. A falta dos conselhos municipais dos direitos da criança e do adolescente, os registros, inscrições e alterações a que se referem os arts. 90, parágrafo único, e 91 desta Lei serão efetuados perante a autoridade judiciária da comarca a que pertencer a entidade.\n Parágrafo único. A União fica autorizada a repassar aos estados e municípios, e os estados aos municípios, os recursos referentes aos programas e atividades previstos nesta Lei, tão logo estejam criados os conselhos dos direitos da criança e do adolescente nos seus respectivos níveis."}, {"art": "Art. 262", "key": "262", "texto": "Art. 262. Enquanto não instalados os Conselhos Tutelares, as atribuições a eles conferidas serão exercidas pela autoridade judiciária."}, {"art": "Art. 263", "key": "263", "texto": "Art. 263. O Decreto-Lei n.º 2.848, de 7 de dezembro de 1940 (Código Penal), passa a vigorar com as seguintes alterações:\n 1)"}, {"art": "Art. 264", "key": "264", "texto": "Art. 264. O art. 102 da Lei n.º 6.015, de 31 de dezembro de 1973 , fica acrescido do seguinte item:\n \""}, {"art": "Art. 265", "key": "265", "texto": "Art. 265. A Imprensa Nacional e demais gráficas da União, da administração direta ou indireta, inclusive fundações instituídas e mantidas pelo poder público federal promoverão edição popular do texto integral deste Estatuto, que será posto à disposição das escolas e das entidades de atendimento e de defesa dos direitos da criança e do adolescente."}, {"art": "Art. 265-A", "key": "265-A", "texto": "Art. 265-A. O poder público fará periodicamente ampla divulgação dos direitos da criança e do adolescente nos meios de comunicação social. (Incluído pela Lei nº 13.257, de 2016)\n Parágrafo único. A divulgação a que se refere o caput será veiculada em linguagem clara, compreensível e adequada a crianças e adolescentes, especialmente às crianças com idade inferior a 6 (seis) anos. (Incluído pela Lei nº 13.257, de 2016)"}, {"art": "Art. 266", "key": "266", "texto": "Art. 266. Esta Lei entra em vigor noventa dias após sua publicação.\n Parágrafo único. Durante o período de vacância deverão ser promovidas atividades e campanhas de divulgação e esclarecimentos acerca do disposto nesta Lei."}, {"art": "Art. 267", "key": "267", "texto": "Art. 267. Revogam-se as Leis n.º 4.513, de 1964 , e 6.697, de 10 de outubro de 1979 (Código de Menores), e as demais disposições em contrário.\n Brasília, 13 de julho de 1990; 169º da Independência e 102º da República.\nFERNANDO COLLOR\nBernardo Cabral\nCarlos Chiarelli\nAntônio Magri\nMargarida Procópio\nEste texto não substitui o publicado no DOU 16.7.1990 e retificado em 27.9.1990\n *"}]}, "guardas-municipais": {"meta": {"id": "guardas-municipais", "nome": "Estatuto Geral das Guardas Municipais", "numero": "Lei nº 13.022/2014", "ementa": "Normas gerais para as guardas municipais", "cor": "#0B4F8A", "icone": "🚓", "categoria": "Organização da GCM"}, "artigos": [{"art": "Art. 1", "key": "1", "texto": "Art. 1º Esta Lei institui normas gerais para as guardas municipais, disciplinando o § 8º do art. 144 da\nConstituição Federal."}, {"art": "Art. 2", "key": "2", "texto": "Art. 2º Incumbe às guardas municipais, instituições de caráter civil, uniformizadas e armadas conforme previsto em lei, a função de proteção municipal preventiva, ressalvadas as competências da União, dos Estados e do\nDistrito Federal.\n CAPÍTULO II\n DOS PRINCÍPIOS"}, {"art": "Art. 3", "key": "3", "texto": "Art. 3º São princípios mínimos de atuação das guardas municipais:\n I - proteção dos direitos humanos fundamentais, do exercício da cidadania e das liberdades públicas;\n II - preservação da vida, redução do sofrimento e diminuição das perdas;\n III - patrulhamento preventivo;\n IV - compromisso com a evolução social da comunidade; e\n V - uso progressivo da força.\n CAPÍTULO III\n DAS COMPETÉNCIAS"}, {"art": "Art. 4", "key": "4", "texto": "Art. 4º É competência geral das guardas municipais a proteção de bens, serviços, logradouros públicos municipais e instalações do Município. (Vide ADPF 995)\n Parágrafo único. Os bens mencionados no caput abrangem os de uso comum, os de uso especial e os dominiais."}, {"art": "Art. 5", "key": "5", "texto": "Art. 5º São competências específicas das guardas municipais, respeitadas as competências dos órgãos federais e estaduais:\n I - zelar pelos bens, equipamentos e prédios públicos do Município;\n II - prevenir e inibir, pela presença e vigilância, bem como coibir, infrações penais ou administrativas e atos infracionais que atentem contra os bens, serviços e instalações municipais;\n III - atuar, preventiva e permanentemente, no território do Município, para a proteção sistêmica da população que utiliza os bens, serviços e instalações municipais;\n IV - colaborar, de forma integrada com os órgãos de segurança pública, em ações conjuntas que contribuam com a paz social; Regulamento\n V - colaborar com a pacificação de conflitos que seus integrantes presenciarem, atentando para o respeito aos direitos fundamentais das pessoas;\n\f VI - exercer as competências de trânsito que lhes forem conferidas, nas vias e logradouros municipais, nos termos da Lei nº 9.503, de 23 de setembro de 1997 (Código de Trânsito Brasileiro), ou de forma concorrente, mediante convênio celebrado com órgão de trânsito estadual ou municipal;\n VII - proteger o patrimônio ecológico, histórico, cultural, arquitetônico e ambiental do Município, inclusive adotando medidas educativas e preventivas;\n VIII - cooperar com os demais órgãos de defesa civil em suas atividades;\n IX - interagir com a sociedade civil para discussão de soluções de problemas e projetos locais voltados à melhoria das condições de segurança das comunidades;\n X - estabelecer parcerias com os órgãos estaduais e da União, ou de Municípios vizinhos, por meio da celebração de convênios ou consórcios, com vistas ao desenvolvimento de ações preventivas integradas;\n XI - articular-se com os órgãos municipais de políticas sociais, visando à adoção de ações interdisciplinares de segurança no Município;\n XII - integrar-se com os demais órgãos de poder de polícia administrativa, visando a contribuir para a normatização e a fiscalização das posturas e ordenamento urbano municipal;\n XIII - garantir o atendimento de ocorrências emergenciais, ou prestá-lo direta e imediatamente quando deparar- se com elas; Regulamento\n XIV - encaminhar ao delegado de polícia, diante de flagrante delito, o autor da infração, preservando o local do crime, quando possível e sempre que necessário; Regulamento\n XV - contribuir no estudo de impacto na segurança local, conforme plano diretor municipal, por ocasião da construção de empreendimentos de grande porte;\n XVI - desenvolver ações de prevenção primária à violência, isoladamente ou em conjunto com os demais órgãos da própria municipalidade, de outros Municípios ou das esferas estadual e federal;\n XVII - auxiliar na segurança de grandes eventos e na proteção de autoridades e dignatários; e\n XVIII - atuar mediante ações preventivas na segurança escolar, zelando pelo entorno e participando de ações educativas com o corpo discente e docente das unidades de ensino municipal, de forma a colaborar com a implantação da cultura de paz na comunidade local.\n Parágrafo único. No exercício de suas competências, a guarda municipal poderá colaborar ou atuar conjuntamente com órgãos de segurança pública da União, dos Estados e do Distrito Federal ou de congêneres de\nMunicípios vizinhos e, nas hipóteses previstas nos incisos XIII e XIV deste artigo, diante do comparecimento de órgão descrito nos incisos do caput do art. 144 da Constituição Federal , deverá a guarda municipal prestar todo o apoio à continuidade do atendimento. Regulamento\n CAPÍTULO IV\n DA CRIAÇÃO"}, {"art": "Art. 6", "key": "6", "texto": "Art. 6º O Município pode criar, por lei, sua guarda municipal.\n Parágrafo único. A guarda municipal é subordinada ao chefe do Poder Executivo municipal."}, {"art": "Art. 7", "key": "7", "texto": "Art. 7º As guardas municipais não poderão ter efetivo superior a:\n I - 0,4% (quatro décimos por cento) da população, em Municípios com até 50.000 (cinquenta mil) habitantes;\n II - 0,3% (três décimos por cento) da população, em Municípios com mais de 50.000 (cinquenta mil) e menos de 500.000 (quinhentos mil) habitantes, desde que o efetivo não seja inferior ao disposto no inciso I;\n III - 0,2% (dois décimos por cento) da população, em Municípios com mais de 500.000 (quinhentos mil) habitantes, desde que o efetivo não seja inferior ao disposto no inciso II.\n Parágrafo único. Se houver redução da população referida em censo ou estimativa oficial da Fundação Instituto\nBrasileiro de Geografia e Estatística (IBGE), é garantida a preservação do efetivo existente, o qual deverá ser ajustado\nà variação populacional, nos termos de lei municipal."}, {"art": "Art. 8", "key": "8", "texto": "Art. 8º Municípios limítrofes podem, mediante consórcio público, utilizar, reciprocamente, os serviços da guarda municipal de maneira compartilhada."}, {"art": "Art. 9", "key": "9", "texto": "Art. 9º A guarda municipal é formada por servidores públicos integrantes de carreira única e plano de cargos e salários, conforme disposto em lei municipal.\n CAPÍTULO V\n DAS EXIGÊNCIAS PARA INVESTIDURA"}, {"art": "Art. 10", "key": "10", "texto": "Art. 10. São requisitos básicos para investidura em cargo público na guarda municipal:\n I - nacionalidade brasileira;\n II - gozo dos direitos políticos;\n III - quitação com as obrigações militares e eleitorais;\n IV - nível médio completo de escolaridade;\n V - idade mínima de 18 (dezoito) anos;\n VI - aptidão física, mental e psicológica; e\n VII - idoneidade moral comprovada por investigação social e certidões expedidas perante o Poder Judiciário estadual, federal e distrital.\n Parágrafo único. Outros requisitos poderão ser estabelecidos em lei municipal.\n CAPÍTULO VI\n DA CAPACITAÇÃO"}, {"art": "Art. 11", "key": "11", "texto": "Art. 11. O exercício das atribuições dos cargos da guarda municipal requer capacitação específica, com matriz curricular compatível com suas atividades.\n Parágrafo único. Para fins do disposto no caput , poderá ser adaptada a matriz curricular nacional para formação em segurança pública, elaborada pela Secretaria Nacional de Segurança Pública (Senasp) do Ministério da\nJustiça."}, {"art": "Art. 12", "key": "12", "texto": "Art. 12. É facultada ao Município a criação de órgão de formação, treinamento e aperfeiçoamento dos integrantes da guarda municipal, tendo como princípios norteadores os mencionados no art. 3º .\n § 1º Os Municípios poderão firmar convênios ou consorciar-se, visando ao atendimento do disposto no caput deste artigo.\n § 2º O Estado poderá, mediante convênio com os Municípios interessados, manter órgão de formação e aperfeiçoamento centralizado, em cujo conselho gestor seja assegurada a participação dos Municípios conveniados.\n § 3º O órgão referido no § 2º não pode ser o mesmo destinado a formação, treinamento ou aperfeiçoamento de forças militares.\n CAPÍTULO VII\n DO CONTROLE"}, {"art": "Art. 13", "key": "13", "texto": "Art. 13. O funcionamento das guardas municipais será acompanhado por órgãos próprios, permanentes, autônomos e com atribuições de fiscalização, investigação e auditoria, mediante:\n I - controle interno, exercido por corregedoria, naquelas com efetivo superior a 50 (cinquenta) servidores da guarda e em todas as que utilizam arma de fogo, para apurar as infrações disciplinares atribuídas aos integrantes de seu quadro; e\n II - controle externo, exercido por ouvidoria, independente em relação à direção da respectiva guarda, qualquer que seja o número de servidores da guarda municipal, para receber, examinar e encaminhar reclamações, sugestões, elogios e denúncias acerca da conduta de seus dirigentes e integrantes e das atividades do órgão, propor soluções, oferecer recomendações e informar os resultados aos interessados, garantindo-lhes orientação, informação e resposta.\n § 1º O Poder Executivo municipal poderá criar órgão colegiado para exercer o controle social das atividades de segurança do Município, analisar a alocação e aplicação dos recursos públicos e monitorar os objetivos e metas da\n\fpolítica municipal de segurança e, posteriormente, a adequação e eventual necessidade de adaptação das medidas adotadas face aos resultados obtidos.\n § 2º Os corregedores e ouvidores terão mandato cuja perda será decidida pela maioria absoluta da Câmara\nMunicipal, fundada em razão relevante e específica prevista em lei municipal."}, {"art": "Art. 14", "key": "14", "texto": "Art. 14. Para efeito do disposto no inciso I do caput do art. 13, a guarda municipal terá código de conduta próprio, conforme dispuser lei municipal.\n Parágrafo único. As guardas municipais não podem ficar sujeitas a regulamentos disciplinares de natureza militar.\n CAPÍTULO VIII\n DAS PRERROGATIVAS"}, {"art": "Art. 15", "key": "15", "texto": "Art. 15. Os cargos em comissão das guardas municipais deverão ser providos por membros efetivos do quadro de carreira do órgão ou entidade.\n § 1º Nos primeiros 4 (quatro) anos de funcionamento, a guarda municipal poderá ser dirigida por profissional estranho a seus quadros, preferencialmente com experiência ou formação na área de segurança ou defesa social, atendido o disposto no caput .\n § 2º Para ocupação dos cargos em todos os níveis da carreira da guarda municipal, deverá ser observado o percentual mínimo para o sexo feminino, definido em lei municipal.\n § 3º Deverá ser garantida a progressão funcional da carreira em todos os níveis."}, {"art": "Art. 16", "key": "16", "texto": "Art. 16. Aos guardas municipais é autorizado o porte de arma de fogo, conforme previsto em lei.\n Parágrafo único. Suspende-se o direito ao porte de arma de fogo em razão de restrição médica, decisão judicial ou justificativa da adoção da medida pelo respectivo dirigente."}, {"art": "Art. 17", "key": "17", "texto": "Art. 17. A Agência Nacional de Telecomunicações (Anatel) destinará linha telefônica de número 153 e faixa exclusiva de frequência de rádio aos Municípios que possuam guarda municipal."}, {"art": "Art. 18", "key": "18", "texto": "Art. 18. É assegurado ao guarda municipal o recolhimento à cela, isoladamente dos demais presos, quando sujeito à prisão antes de condenação definitiva.\n CAPÍTULO IX\n DAS VEDAÇÕES"}, {"art": "Art. 19", "key": "19", "texto": "Art. 19. A estrutura hierárquica da guarda municipal não pode utilizar denominação idêntica à das forças militares, quanto aos postos e graduações, títulos, uniformes, distintivos e condecorações.\n CAPÍTULO X\n DA REPRESENTATIVIDADE"}, {"art": "Art. 20", "key": "20", "texto": "Art. 20. É reconhecida a representatividade das guardas municipais no Conselho Nacional de Segurança\nPública, no Conselho Nacional das Guardas Municipais e, no interesse dos Municípios, no Conselho Nacional de\nSecretários e Gestores Municipais de Segurança Pública.\n CAPÍTULO XI\n DISPOSIÇÕES DIVERSAS E TRANSITÓRIAS"}, {"art": "Art. 21", "key": "21", "texto": "Art. 21. As guardas municipais utilizarão uniforme e equipamentos padronizados, preferencialmente, na cor azul-marinho."}, {"art": "Art. 22", "key": "22", "texto": "Art. 22. Aplica-se esta Lei a todas as guardas municipais existentes na data de sua publicação, a cujas disposições devem adaptar-se no prazo de 2 (dois) anos.\n Parágrafo único. É assegurada a utilização de outras denominações consagradas pelo uso, como guarda civil, guarda civil municipal, guarda metropolitana e guarda civil metropolitana."}, {"art": "Art. 23", "key": "23", "texto": "Art. 23. Esta Lei entra em vigor na data de sua publicação.\n\f Brasília, 8 de agosto de 2014; 193º da Independência e 126º da República.\nDILMA ROUSSEFF\nJosé Eduardo Cardozo\nMiriam Belchior\nGilberto Magalhães Occhi\nEste texto não substitui o publicado no DOU de 11.8.2014 - Edição extra\n *"}]}, "ctb": {"meta": {"id": "ctb", "nome": "Código de Trânsito Brasileiro", "numero": "Lei nº 9.503/1997", "ementa": "Institui o Código de Trânsito Brasileiro", "cor": "#8A5A0B", "icone": "🚦", "categoria": "Trânsito"}, "artigos": [{"art": "Art. 1", "key": "1", "texto": "Art. 1º O trânsito de qualquer natureza nas vias terrestres do território nacional, abertas à circulação, rege-se por este Código.\n § 1º Considera-se trânsito a utilização das vias por pessoas, veículos e animais, isolados ou em grupos, conduzidos ou não, para fins de circulação, parada, estacionamento e operação de carga ou descarga.\n § 2º O trânsito, em condições seguras, é um direito de todos e dever dos órgãos e entidades componentes do\nSistema Nacional de Trânsito, a estes cabendo, no âmbito das respectivas competências, adotar as medidas destinadas a assegurar esse direito.\n § 3º Os órgãos e entidades componentes do Sistema Nacional de Trânsito respondem, no âmbito das respectivas competências, objetivamente, por danos causados aos cidadãos em virtude de ação, omissão ou erro na execução e manutenção de programas, projetos e serviços que garantam o exercício do direito do trânsito seguro.\n § 4º (VETADO)\n § 5º Os órgãos e entidades de trânsito pertencentes ao Sistema Nacional de Trânsito darão prioridade em suas ações à defesa da vida, nela incluída a preservação da saúde e do meio-ambiente."}, {"art": "Art. 2", "key": "2", "texto": "Art. 2º São vias terrestres urbanas e rurais as ruas, as avenidas, os logradouros, os caminhos, as passagens, as estradas e as rodovias, que terão seu uso regulamentado pelo órgão ou entidade com circunscrição sobre elas, de acordo com as peculiaridades locais e as circunstâncias especiais.\n Parágrafo único. Para os efeitos deste Código, são consideradas vias terrestres as praias abertas à circulação pública, as vias internas pertencentes aos condomínios constituídos por unidades autônomas e as vias e áreas de estacionamento de estabelecimentos privados de uso coletivo. (Redação dada pela Lei nº 13.146, de 2015)\n(Vigência)"}, {"art": "Art. 3", "key": "3", "texto": "Art. 3º As disposições deste Código são aplicáveis a qualquer veículo, bem como aos proprietários, condutores dos veículos nacionais ou estrangeiros e às pessoas nele expressamente mencionadas."}, {"art": "Art. 4", "key": "4", "texto": "Art. 4º Os conceitos e definições estabelecidos para os efeitos deste Código são os constantes do Anexo I.\n CAPÍTULO II\n DO SISTEMA NACIONAL DE TRÂNSITO\n Seção I\n Disposições Gerais"}, {"art": "Art. 5", "key": "5", "texto": "Art. 5º O Sistema Nacional de Trânsito é o conjunto de órgãos e entidades da União, dos Estados, do Distrito\nFederal e dos Municípios que tem por finalidade o exercício das atividades de planejamento, administração, normatização, pesquisa, registro e licenciamento de veículos, formação, habilitação e reciclagem de condutores, educação, engenharia, operação do sistema viário, policiamento, fiscalização, julgamento de infrações e de recursos e aplicação de penalidades."}, {"art": "Art. 6", "key": "6", "texto": "Art. 6º São objetivos básicos do Sistema Nacional de Trânsito:\n\f I - estabelecer diretrizes da Política Nacional de Trânsito, com vistas à segurança, à fluidez, ao conforto, à defesa ambiental e à educação para o trânsito, e fiscalizar seu cumprimento;\n II - fixar, mediante normas e procedimentos, a padronização de critérios técnicos, financeiros e administrativos para a execução das atividades de trânsito;\n III - estabelecer a sistemática de fluxos permanentes de informações entre os seus diversos órgãos e entidades, a fim de facilitar o processo decisório e a integração do Sistema.\n Seção II\n Da Composição e da Competência do Sistema Nacional de Trânsito"}, {"art": "Art. 7", "key": "7", "texto": "Art. 7o-A. A autoridade portuária ou a entidade concessionária de porto organizado poderá celebrar convênios com os órgãos previstos no art. 7o, com a interveniência dos Municípios e Estados, juridicamente interessados, para o fim específico de facilitar a autuação por descumprimento da legislação de trânsito. (Incluído pela Lei nº 12.058, de 2009)\n § 1o O convênio valerá para toda a área física do porto organizado, inclusive, nas áreas dos terminais alfandegados, nas estações de transbordo, nas instalações portuárias públicas de pequeno porte e nos respectivos estacionamentos ou vias de trânsito internas. (Incluído pela Lei nº 12.058, de 2009)\n § 2o (VETADO) (Incluído pela Lei nº 12.058, de 2009)\n § 3o (VETADO) (Incluído pela Lei nº 12.058, de 2009)"}, {"art": "Art. 8", "key": "8", "texto": "Art. 8º Os Estados, o Distrito Federal e os Municípios organizarão os respectivos órgãos e entidades executivos de trânsito e executivos rodoviários, estabelecendo os limites circunscricionais de suas atuações."}, {"art": "Art. 9", "key": "9", "texto": "Art. 9º O Presidente da República designará o ministério ou órgão da Presidência responsável pela coordenação máxima do Sistema Nacional de Trânsito, ao qual estará vinculado o CONTRAN e subordinado o órgão máximo executivo de trânsito da União."}, {"art": "Art. 10", "key": "10", "texto": "Art. 10. O Contran, com sede no Distrito Federal, é composto dos Ministros de Estado responsáveis pelas seguintes áreas de competência: (Redação dada pela Lei nº 14.599, de 2023)\n I - (VETADO)\n II - (VETADO)\n II-A - (revogado); (Redação dada pela Lei nº 14.599, de 2023)\n III - ciência, tecnologia e inovações; (Redação dada pela Lei nº 14.599, de 2023)\n IV - educação; (Redação dada pela Lei nº 14.599, de 2023)\n V - defesa; (Redação dada pela Lei nº 14.599, de 2023)\n VI - meio ambiente; (Redação dada pela Lei nº 14.599, de 2023)\n\f VII - (revogado); (Redação dada pela Lei nº 14.071, de 2020) (Vigência)\n VIII - (VETADO)\n IX - (VETADO)\n X - (VETADO)\n XI - (VETADO)\n XII - (VETADO)\n XIII - (VETADO)\n XIV - (VETADO)\n XV - (VETADO)\n XVI - (VETADO)\n XVII - (VETADO)\n XVIII - (VETADO)\n XIX - (VETADO)\n XX - (revogado); (Redação dada pela Lei nº 14.071, de 2020) (Vigência)\n XXI - (VETADO)\n XXII - saúde; (Redação dada pela Lei nº 14.599, de 2023)\n XXIII - justiça; (Redação dada pela Lei nº 14.599, de 2023)\n XXIV - relações exteriores; (Redação dada pela Lei nº 14.599, de 2023)\n XXV - (revogado); (Redação dada pela Lei nº 14.071, de 2020) (Vigência)\n XXVI - indústria e comércio; (Redação dada pela Lei nº 14.599, de 2023)\n XXVII - agropecuária; (Redação dada pela Lei nº 14.599, de 2023)\n XXVIII - transportes terrestres; (Incluído pela Lei nº 14.599, de 2023)\n XXIX - segurança pública; (Incluído pela Lei nº 14.599, de 2023)\n XXX - mobilidade urbana. (Incluído pela Lei nº 14.599, de 2023)\n § 1º (VETADO)\n § 2º (VETADO)\n § 3º (VETADO)\n § 3º-A. O Contran será presidido pelo Ministro de Estado ao qual estiver subordinado o órgão máximo executivo de trânsito da União. (Incluído pela Lei nº 14.599, de 2023)\n § 4º Os Ministros de Estado poderão fazer-se representar por servidores de nível hierárquico igual ou superior ao\nCargo Comissionado Executivo (CCE) nível 17, ou por oficial-general, na hipótese de tratar-se de militar. (Redação dada pela Lei nº 14.599, de 2023)\n\f § 5º Compete ao dirigente do órgão máximo executivo de trânsito da União atuar como Secretário-Executivo do\nContran. (Redação dada pela Lei nº 14.071, de 2020) (Vigência)\n § 6º O quórum de votação e de aprovação no Contran é o de maioria absoluta. (Redação dada pela Lei nº 14.071, de 2020) (Vigência)"}, {"art": "Art. 10-A", "key": "10-A", "texto": "Art. 10-A. Poderão ser convidados a participar de reuniões do Contran, sem direito a voto, representantes de órgãos e entidades setoriais responsáveis ou impactados pelas propostas ou matérias em exame. (Redação dada pela Lei nº 14.071, de 2020) (Vigência)"}, {"art": "Art. 11", "key": "11", "texto": "Art. 11. (VETADO)"}, {"art": "Art. 12", "key": "12", "texto": "Art. 12. Compete ao CONTRAN:\n I - estabelecer as normas regulamentares referidas neste Código e as diretrizes da Política Nacional de Trânsito;\n II - coordenar os órgãos do Sistema Nacional de Trânsito, objetivando a integração de suas atividades;\n III - (VETADO)\n IV - criar Câmaras Temáticas;\n V - estabelecer seu regimento interno e as diretrizes para o funcionamento dos CETRAN e CONTRANDIFE;\n VI - estabelecer as diretrizes do regimento das JARI;\n VII - zelar pela uniformidade e cumprimento das normas contidas neste Código e nas resoluções complementares;\n VIII - estabelecer e normatizar os procedimentos para o enquadramento das condutas expressamente referidas neste Código, para a fiscalização e a aplicação das medidas administrativas e das penalidades por infrações e para a arrecadação das multas aplicadas e o repasse dos valores arrecadados; (Redação dada pela Lei nº 14.071, de 2020) (Vigência)\n IX - responder às consultas que lhe forem formuladas, relativas à aplicação da legislação de trânsito;\n X - normatizar os procedimentos sobre a aprendizagem, habilitação, expedição de documentos de condutores, e registro e licenciamento de veículos;\n XI - aprovar, complementar ou alterar os dispositivos de sinalização e os dispositivos e equipamentos de trânsito;\n XII - (revogado); (Redação dada pela Lei nº 14.071, de 2020) (Vigência)\n XIII - avocar, para análise e soluções, processos sobre conflitos de competência ou circunscrição, ou, quando necessário, unificar as decisões administrativas; e\n XIV - dirimir conflitos sobre circunscrição e competência de trânsito no âmbito da União, dos Estados e do Distrito\nFederal.\n XV - normatizar o processo de formação do candidato à obtenção da Carteira Nacional de Habilitação, estabelecendo seu conteúdo didático-pedagógico, carga horária, avaliações, exames, execução e fiscalização.\n(Incluído pela Lei nº 13.281, de 2016) (Vigência)\n § 1º As propostas de normas regulamentares de que trata o inciso I do caput deste artigo serão submetidas a prévia consulta pública, por meio da rede mundial de computadores, pelo período mínimo de 30 (trinta) dias, antes do exame da matéria pelo Contran. (Incluído pela Lei nº 14.071, de 2020) (Vigência)\n § 2º As contribuições recebidas na consulta pública de que trata o § 1º deste artigo ficarão à disposição do público pelo prazo de 2 (dois) anos, contado da data de encerramento da consulta pública. (Incluído pela Lei nº 14.071, de 2020) (Vigência)\n § 3º Em caso de urgência e de relevante interesse público, o presidente do Contran poderá editar deliberação, ad referendum do Plenário, para fins do disposto no inciso I do caput deste artigo. (Redação dada pela Lei nº 14.599, de 2023)\n § 4º A deliberação de que trata o § 3º deste artigo: (Redação dada pela Lei nº 14.599, de 2023)\n\f I - na hipótese de não ser aprovada pelo Plenário do Contran no prazo de 120 (cento e vinte) dias, perderá sua eficácia, com manutenção dos efeitos dela decorrentes; e (Incluído pela Lei nº 14.599, de 2023)\n II - não está sujeita ao disposto nos §§ 1º e 2º deste artigo, vedada sua reedição. (Incluído pela Lei nº 14.599, de 2023)\n § 5º Norma do Contran poderá dispor sobre o uso de sinalização horizontal ou vertical que utilize técnicas de estímulos comportamentais para a redução de sinistros de trânsito. (Redação dada pela Lei nº 14.599, de 2023)"}, {"art": "Art. 13", "key": "13", "texto": "Art. 13. As Câmaras Temáticas, órgãos técnicos vinculados ao CONTRAN, são integradas por especialistas e têm como objetivo estudar e oferecer sugestões e embasamento técnico sobre assuntos específicos para decisões daquele colegiado.\n § 1º Cada Câmara é constituída por especialistas representantes de órgãos e entidades executivos da União, dos\nEstados, ou do Distrito Federal e dos Municípios, em igual número, pertencentes ao Sistema Nacional de Trânsito, além de especialistas representantes dos diversos segmentos da sociedade relacionados com o trânsito, todos indicados segundo regimento específico definido pelo CONTRAN e designados pelo ministro ou dirigente coordenador máximo do Sistema Nacional de Trânsito.\n § 2º Os segmentos da sociedade, relacionados no parágrafo anterior, serão representados por pessoa jurídica e devem atender aos requisitos estabelecidos pelo CONTRAN.\n § 3º A coordenação das Câmaras Temáticas será exercida por representantes do órgão máximo executivo de trânsito da União ou dos Ministérios representados no Contran, conforme definido no ato de criação de cada Câmara\nTemática. (Redação dada pela Lei nº 14.071, de 2020) (Vigência)\n § 4º (VETADO)\n I - (VETADO)\n II - (VETADO)\n III - (VETADO)\n IV - (VETADO)"}, {"art": "Art. 14", "key": "14", "texto": "Art. 14. Compete aos Conselhos Estaduais de Trânsito - CETRAN e ao Conselho de Trânsito do Distrito Federal -\nCONTRANDIFE:\n I - cumprir e fazer cumprir a legislação e as normas de trânsito, no âmbito das respectivas atribuições;\n II - elaborar normas no âmbito das respectivas competências;\n III - responder a consultas relativas à aplicação da legislação e dos procedimentos normativos de trânsito;\n IV - estimular e orientar a execução de campanhas educativas de trânsito;\n V - julgar os recursos interpostos contra decisões:\n a) das JARI;\n b) dos órgãos e entidades executivos estaduais, nos casos de inaptidão permanente constatados nos exames de aptidão física, mental ou psicológica;\n VI - indicar um representante para compor a comissão examinadora de candidatos portadores de deficiência física à habilitação para conduzir veículos automotores;\n VII - (VETADO)\n VIII - acompanhar e coordenar as atividades de administração, educação, engenharia, fiscalização, policiamento ostensivo de trânsito, formação de condutores, registro e licenciamento de veículos, articulando os órgãos do Sistema no Estado, reportando-se ao CONTRAN;\n IX - dirimir conflitos sobre circunscrição e competência de trânsito no âmbito dos Municípios; e\n X - informar o CONTRAN sobre o cumprimento das exigências definidas nos §§ 1º e 2º do art. 333.\n\f XI - designar, em caso de recursos deferidos e na hipótese de reavaliação dos exames, junta especial de saúde para examinar os candidatos à habilitação para conduzir veículos automotores. (Incluído pela Lei nº 9.602, de 1998)\n Parágrafo único. Dos casos previstos no inciso V, julgados pelo órgão, não cabe recurso na esfera administrativa."}, {"art": "Art. 15", "key": "15", "texto": "Art. 15. Os presidentes dos CETRAN e do CONTRANDIFE são nomeados pelos Governadores dos Estados e do\nDistrito Federal, respectivamente, e deverão ter reconhecida experiência em matéria de trânsito.\n § 1º Os membros dos CETRAN e do CONTRANDIFE são nomeados pelos Governadores dos Estados e do Distrito\nFederal, respectivamente.\n § 2º Os membros do CETRAN e do CONTRANDIFE deverão ser pessoas de reconhecida experiência em trânsito.\n § 3º O mandato dos membros do CETRAN e do CONTRANDIFE é de dois anos, admitida a recondução."}, {"art": "Art. 16", "key": "16", "texto": "Art. 16. Junto a cada órgão ou entidade executivos de trânsito ou rodoviário funcionarão Juntas Administrativas de Recursos de Infrações - JARI, órgãos colegiados responsáveis pelo julgamento dos recursos interpostos contra penalidades por eles impostas.\n Parágrafo único. As JARI têm regimento próprio, observado o disposto no inciso VI do art. 12, e apoio administrativo e financeiro do órgão ou entidade junto ao qual funcionem."}, {"art": "Art. 17", "key": "17", "texto": "Art. 17. Compete às JARI:\n I - julgar os recursos interpostos pelos infratores;\n II - solicitar aos órgãos e entidades executivos de trânsito e executivos rodoviários informações complementares relativas aos recursos, objetivando uma melhor análise da situação recorrida;\n III - encaminhar aos órgãos e entidades executivos de trânsito e executivos rodoviários informações sobre problemas observados nas autuações e apontados em recursos, e que se repitam sistematicamente."}, {"art": "Art. 18", "key": "18", "texto": "Art. 18. (VETADO)"}, {"art": "Art. 19", "key": "19", "texto": "Art. 19. Compete ao órgão máximo executivo de trânsito da União:\n I - cumprir e fazer cumprir a legislação de trânsito e a execução das normas e diretrizes estabelecidas pelo\nCONTRAN, no âmbito de suas atribuições;\n II - proceder à supervisão, à coordenação, à correição dos órgãos delegados, ao controle e à fiscalização da execução da Política Nacional de Trânsito e do Programa Nacional de Trânsito;\n III - articular-se com os órgãos dos Sistemas Nacionais de Trânsito, de Transporte e de Segurança Pública, objetivando o combate à violência no trânsito, promovendo, coordenando e executando o controle de ações para a preservação do ordenamento e da segurança do trânsito;\n IV - apurar, prevenir e reprimir a prática de atos de improbidade contra a fé pública, o patrimônio, ou a administração pública ou privada, referentes à segurança do trânsito;\n V - supervisionar a implantação de projetos e programas relacionados com a engenharia, educação, administração, policiamento e fiscalização do trânsito e outros, visando à uniformidade de procedimento;\n VI - estabelecer procedimentos sobre a aprendizagem e habilitação de condutores de veículos, a expedição de documentos de condutores, de registro e licenciamento de veículos;\n VII - expedir a Permissão para Dirigir, a Carteira Nacional de Habilitação, os Certificados de Registro e o de\nLicenciamento Anual mediante delegação aos órgãos executivos dos Estados e do Distrito Federal;\n VIII - organizar e manter o Registro Nacional de Carteiras de Habilitação - RENACH;\n IX - organizar e manter o Registro Nacional de Veículos Automotores - RENAVAM;\n X - organizar a estatística geral de trânsito no território nacional, definindo os dados a serem fornecidos pelos demais órgãos e promover sua divulgação;\n XI - estabelecer modelo padrão de coleta de informações sobre as ocorrências de sinistros de trânsito e as estatísticas de trânsito; (Redação dada pela Lei nº 14.599, de 2023)\n\f XII - administrar fundo de âmbito nacional destinado à segurança e à educação de trânsito;\n XIII - coordenar a administração do registro das infrações de trânsito, da pontuação e das penalidades aplicadas no prontuário do infrator, da arrecadação de multas e do repasse de que trata o § 1º do art. 320; (Redação dada pela Lei nº 13.281, de 2016) (Vigência)\n XIV - fornecer aos órgãos e entidades do Sistema Nacional de Trânsito informações sobre registros de veículos e de condutores, mantendo o fluxo permanente de informações com os demais órgãos do Sistema;\n XV - promover, em conjunto com os órgãos competentes do Ministério da Educação, de acordo com as diretrizes do Contran, a elaboração e a implementação de programas de educação de trânsito nos estabelecimentos de ensino; (Redação dada pela Lei nº 14.599, de 2023)\n XVI - elaborar e distribuir conteúdos programáticos para a educação de trânsito;\n XVII - promover a divulgação de trabalhos técnicos sobre o trânsito;\n XVIII - elaborar, juntamente com os demais órgãos e entidades do Sistema Nacional de Trânsito, e submeter à aprovação do CONTRAN, a complementação ou alteração da sinalização e dos dispositivos e equipamentos de trânsito;\n XIX - organizar, elaborar, complementar e alterar os manuais e normas de projetos de implementação da sinalização, dos dispositivos e equipamentos de trânsito aprovados pelo CONTRAN;\n XX – expedir a permissão internacional para conduzir veículo e o certificado de passagem nas alfândegas mediante delegação aos órgãos executivos dos Estados e do Distrito Federal ou a entidade habilitada para esse fim pelo poder público federal; (Redação dada pela lei nº 13.258, de 2016)\n XXI - promover a realização periódica de reuniões regionais e congressos nacionais de trânsito, bem como propor a representação do Brasil em congressos ou reuniões internacionais;\n XXII - propor acordos de cooperação com organismos internacionais, com vistas ao aperfeiçoamento das ações inerentes à segurança e educação de trânsito;\n XXIII - elaborar projetos e programas de formação, treinamento e especialização do pessoal encarregado da execução das atividades de engenharia, educação, policiamento ostensivo, fiscalização, operação e administração de trânsito, propondo medidas que estimulem a pesquisa científica e o ensino técnico-profissional de interesse do trânsito, e promovendo a sua realização;\n XXIV - opinar sobre assuntos relacionados ao trânsito interestadual e internacional;\n XXV - elaborar e submeter à aprovação do CONTRAN as normas e requisitos de segurança veicular para fabricação e montagem de veículos, consoante sua destinação;\n XXVI - estabelecer procedimentos para a concessão do código marca-modelo dos veículos para efeito de registro, emplacamento e licenciamento;\n XXVII - instruir os recursos interpostos das decisões do CONTRAN, ao ministro ou dirigente coordenador máximo do Sistema Nacional de Trânsito;\n XXVIII - estudar os casos omissos na legislação de trânsito e submetê-los, com proposta de solução, ao\nMinistério ou órgão coordenador máximo do Sistema Nacional de Trânsito;\n XXIX - prestar suporte técnico, jurídico, administrativo e financeiro ao CONTRAN.\n XXX - organizar e manter o Registro Nacional de Infrações de Trânsito (Renainf). (Incluído pela Lei nº 13.281, de 2016) (Vigência)\n XXXI - organizar, manter e atualizar o Registro Nacional Positivo de Condutores (RNPC). (Incluído pela Lei nº 14.071, de 2020) (Vigência)\n XXXII - organizar e manter o Registro Nacional de Sinistros e Estatísticas de Trânsito (Renaest). (Incluído pela\nLei nº 14.599, de 2023)\n § 1º Comprovada, por meio de sindicância, a deficiência técnica ou administrativa ou a prática constante de atos de improbidade contra a fé pública, contra o patrimônio ou contra a administração pública, o órgão executivo de trânsito da União, mediante aprovação do CONTRAN, assumirá diretamente ou por delegação, a execução total ou\n\fparcial das atividades do órgão executivo de trânsito estadual que tenha motivado a investigação, até que as irregularidades sejam sanadas.\n § 2º O regimento interno do órgão executivo de trânsito da União disporá sobre sua estrutura organizacional e seu funcionamento.\n § 3º Os órgãos e entidades executivos de trânsito e executivos rodoviários da União, dos Estados, do Distrito\nFederal e dos Municípios fornecerão, obrigatoriamente, mês a mês, os dados estatísticos para os fins previstos no inciso X.\n § 4º (VETADO). (Incluído pela Lei nº 13.281, de 2016) (Vigência)\n § 5º As informações constantes do Renach e do Renavam deverão ser disponibilizadas na internet para consulta, pelo motorista habilitado, dos dados de sua habilitação, e, pelo proprietário de veículo, dos dados de veículo de sua propriedade. (Incluído pela Lei nº 14.861, de 2024) Vigência"}, {"art": "Art. 20", "key": "20", "texto": "Art. 20. Compete à Polícia Rodoviária Federal, no âmbito das rodovias e estradas federais:\n I - cumprir e fazer cumprir a legislação e as normas de trânsito, no âmbito de suas atribuições;\n II - realizar o patrulhamento ostensivo, executando operações relacionadas com a segurança pública, com o objetivo de preservar a ordem, incolumidade das pessoas, o patrimônio da União e o de terceiros;\n III - executar a fiscalização de trânsito, aplicar as penalidades de advertência por escrito e multa e as medidas administrativas cabíveis, com a notificação dos infratores e a arrecadação das multas aplicadas e dos valores provenientes de estadia e remoção de veículos, objetos e animais e de escolta de veículos de cargas superdimensionadas ou perigosas; (Redação dada pela Lei nº 14.071, de 2020) (Vigência)\n IV - efetuar levantamento dos locais de sinistros de trânsito e dos serviços de atendimento, socorro e salvamento de vítimas; (Redação dada pela Lei nº 14.599, de 2023)\n V - credenciar os serviços de escolta, fiscalizar e adotar medidas de segurança relativas aos serviços de remoção de veículos, escolta e transporte de carga indivisível;\n VI - assegurar a livre circulação nas rodovias federais, podendo solicitar ao órgão rodoviário a adoção de medidas emergenciais, e zelar pelo cumprimento das normas legais relativas ao direito de vizinhança, promovendo a interdição de construções e instalações não autorizadas;\n VII - coletar dados estatísticos e elaborar estudos sobre sinistros de trânsito e suas causas, adotando ou indicando medidas operacionais preventivas e encaminhando-os ao órgão rodoviário federal; (Redação dada pela\nLei nº 14.599, de 2023)\n VIII - implementar as medidas da Política Nacional de Segurança e Educação de Trânsito;\n IX - promover e participar de projetos e programas de educação e segurança, de acordo com as diretrizes estabelecidas pelo CONTRAN;\n X - integrar-se a outros órgãos e entidades do Sistema Nacional de Trânsito para fins de arrecadação e compensação de multas impostas na área de sua competência, com vistas à unificação do licenciamento, à simplificação e à celeridade das transferências de veículos e de prontuários de condutores de uma para outra unidade da Federação;\n XI - fiscalizar o nível de emissão de poluentes e ruído produzidos pelos veículos automotores ou pela sua carga, de acordo com o estabelecido no art. 66, além de dar apoio, quando solicitado, às ações específicas dos órgãos ambientais.\n XII - aplicar a penalidade de suspensão do direito de dirigir, quando prevista de forma específica para a infração cometida, e comunicar a aplicação da penalidade ao órgão máximo executivo de trânsito da União. (Incluído pela Lei nº 14.071, de 2020) (Vigência)\n XIII - realizar perícia administrativa nos locais de sinistros de trânsito. (Redação dada pela Lei nº 14.599, de 2023)"}, {"art": "Art. 21", "key": "21", "texto": "Art. 21. Compete aos órgãos e entidades executivos rodoviários da União, dos Estados, do Distrito Federal e dos\nMunicípios, no âmbito de sua circunscrição:\n I - cumprir e fazer cumprir a legislação e as normas de trânsito, no âmbito de suas atribuições;\n\f II - planejar, projetar, regulamentar e operar o trânsito de veículos, de pedestres e de animais, e promover o desenvolvimento da circulação e da segurança de ciclistas;\n III - implantar, manter e operar o sistema de sinalização, os dispositivos e os equipamentos de controle viário;\n IV - coletar dados e elaborar estudos sobre os sinistros de trânsito e suas causas; (Redação dada pela Lei nº 14.599, de 2023)\n V - estabelecer, em conjunto com os órgãos de policiamento ostensivo de trânsito, as respectivas diretrizes para o policiamento ostensivo de trânsito;\n VI - executar a fiscalização de trânsito, autuar, aplicar as penalidades de advertência, por escrito, e ainda as multas e medidas administrativas cabíveis, notificando os infratores e arrecadando as multas que aplicar;\n VII - arrecadar valores provenientes de estada e remoção de veículos e objetos, e escolta de veículos de cargas superdimensionadas ou perigosas;\n VIII - fiscalizar, autuar, aplicar as penalidades e medidas administrativas cabíveis, relativas a infrações por excesso de peso, dimensões e lotação dos veículos, bem como notificar e arrecadar as multas que aplicar;\n IX - fiscalizar o cumprimento da norma contida no art. 95, aplicando as penalidades e arrecadando as multas nele previstas;\n X - implementar as medidas da Política Nacional de Trânsito e do Programa Nacional de Trânsito;\n XI - promover e participar de projetos e programas de educação e segurança, de acordo com as diretrizes estabelecidas pelo CONTRAN;\n XII - integrar-se a outros órgãos e entidades do Sistema Nacional de Trânsito para fins de arrecadação e compensação de multas impostas na área de sua competência, com vistas à unificação do licenciamento, à simplificação e à celeridade das transferências de veículos e de prontuários de condutores de uma para outra unidade da Federação;\n XIII - fiscalizar o nível de emissão de poluentes e ruído produzidos pelos veículos automotores ou pela sua carga, de acordo com o estabelecido no art. 66, além de dar apoio às ações específicas dos órgãos ambientais locais, quando solicitado;\n XIV - vistoriar veículos que necessitem de autorização especial para transitar e estabelecer os requisitos técnicos a serem observados para a circulação desses veículos.\n XV - aplicar a penalidade de suspensão do direito de dirigir, quando prevista de forma específica para a infração cometida, e comunicar a aplicação da penalidade ao órgão máximo executivo de trânsito da União. (Incluído pela Lei nº 14.071, de 2020) (Vigência)\n Parágrafo único. (VETADO)"}, {"art": "Art. 22", "key": "22", "texto": "Art. 22. Compete aos órgãos ou entidades executivos de trânsito dos Estados e do Distrito Federal, no âmbito de sua circunscrição:\n I - cumprir e fazer cumprir a legislação e as normas de trânsito, no âmbito das respectivas atribuições;\n II - realizar, fiscalizar e controlar o processo de formação, de aperfeiçoamento, de reciclagem e de suspensão de condutores e expedir e cassar Licença de Aprendizagem, Permissão para Dirigir e Carteira Nacional de Habilitação, mediante delegação do órgão máximo executivo de trânsito da União; (Redação dada pela Lei nº 14.071, de 2020)\n(Vigência)\n III - vistoriar, inspecionar as condições de segurança veicular, registrar, emplacar e licenciar veículos, com a expedição dos Certificados de Registro de Veículo e de Licenciamento Anual, mediante delegação do órgão máximo executivo de trânsito da União; (Redação dada pela Lei nº 14.071, de 2020) (Vigência)\n IV - estabelecer, em conjunto com as Polícias Militares, as diretrizes para o policiamento ostensivo de trânsito;\n V - executar a fiscalização de trânsito, autuar e aplicar as medidas administrativas cabíveis pelas infrações previstas neste Código, excetuadas aquelas de competência privativa dos órgãos e entidades executivos de trânsito dos Municípios previstas no § 4º do art. 24 deste Código, no exercício regular do poder de polícia de trânsito;\n(Redação dada pela Lei nº 14.599, de 2023)\n\f VI - aplicar as penalidades por infrações previstas neste Código, excetuadas aquelas de competência privativa dos órgãos e entidades executivos de trânsito dos Municípios previstas no § 4º do art. 24 deste Código, notificando os infratores e arrecadando as multas que aplicar; (Redação dada pela Lei nº 14.599, de 2023)\n VII - arrecadar valores provenientes de estada e remoção de veículos e objetos;\n VIII - comunicar ao órgão executivo de trânsito da União a suspensão e a cassação do direito de dirigir e o recolhimento da Carteira Nacional de Habilitação;\n IX - coletar dados estatísticos e elaborar estudos sobre sinistros de trânsito e suas causas; (Redação dada pela Lei nº 14.599, de 2023)\n X - credenciar órgãos ou entidades para a execução de atividades previstas na legislação de trânsito, na forma estabelecida em norma do CONTRAN;\n XI - implementar as medidas da Política Nacional de Trânsito e do Programa Nacional de Trânsito;\n XII - promover e participar de projetos e programas de educação e segurança de trânsito de acordo com as diretrizes estabelecidas pelo CONTRAN;\n XIII - integrar-se a outros órgãos e entidades do Sistema Nacional de Trânsito para fins de arrecadação e compensação de multas impostas na área de sua competência, com vistas à unificação do licenciamento, à simplificação e à celeridade das transferências de veículos e de prontuários de condutores de uma para outra unidade da Federação;\n XIV - fornecer, aos órgãos e entidades executivos de trânsito e executivos rodoviários municipais, os dados cadastrais dos veículos registrados e dos condutores habilitados, para fins de imposição e notificação de penalidades e de arrecadação de multas nas áreas de suas competências;\n XV - fiscalizar o nível de emissão de poluentes e ruído produzidos pelos veículos automotores ou pela sua carga, de acordo com o estabelecido no art. 66, além de dar apoio, quando solicitado, às ações específicas dos órgãos ambientais locais;\n XVI - articular-se com os demais órgãos do Sistema Nacional de Trânsito no Estado, sob coordenação do respectivo CETRAN.\n XVII - criar, implantar e manter escolas públicas de trânsito, destinadas à educação de crianças, adolescentes, jovens e adultos, por meio de aulas teóricas e práticas sobre legislação, sinalização e comportamento no trânsito.\n(Redação dada pela Lei nº 14.440, de 2022)\n § 1º. As competências descritas no inciso II do caput deste artigo relativas ao processo de suspensão de condutores serão exercidas quando: (Incluído pela Lei nº 14.599, de 2023)\n I - o condutor atingir o limite de pontos estabelecido no inciso I do art. 261 deste Código; (Incluído pela Lei nº 14.599, de 2023)\n II - a infração previr a penalidade de suspensão do direito de dirigir de forma específica e a autuação tiver sido efetuada pelo próprio órgão executivo estadual de trânsito. (Incluído pela Lei nº 14.599, de 2023)\n § 2º Compete privativamente aos órgãos ou entidades executivos de trânsito dos Estados e do Distrito Federal executar a fiscalização de trânsito, autuar e aplicar as medidas administrativas e penalidades previstas nos arts. 165-\nD, 233, 240, 241, 242 e 243 e no § 5º do art. 330 deste Código. (Incluído pela Lei nº 14.599, de 2023)"}, {"art": "Art. 23", "key": "23", "texto": "Art. 23. Compete às Polícias Militares dos Estados e do Distrito Federal:\n I - (VETADO)\n II - (VETADO)\n III - executar a fiscalização de trânsito, quando e conforme convênio firmado, como agente do órgão ou entidade executivos de trânsito ou executivos rodoviários, concomitantemente com os demais agentes credenciados;\n IV - (VETADO)\n V - (VETADO)\n VI - (VETADO)\n\f VII - (VETADO)\n VIII - (VETADO). (Incluído pela Lei nº 14.599, de 2023)\n Parágrafo único. (VETADO)"}, {"art": "Art. 24", "key": "24", "texto": "Art. 24. Compete aos órgãos e entidades executivos de trânsito dos Municípios, no âmbito de sua circunscrição: (Redação dada pela Lei nº 13.154, de 2015)\n I - cumprir e fazer cumprir a legislação e as normas de trânsito, no âmbito de suas atribuições;\n II - planejar, projetar, regulamentar e operar o trânsito de veículos, de pedestres e de animais e promover o desenvolvimento, temporário ou definitivo, da circulação, da segurança e das áreas de proteção de ciclistas; (Redação dada pela Lei nº 14.071, de 2020) (Vigência)\n III - implantar, manter e operar o sistema de sinalização, os dispositivos e os equipamentos de controle viário;\n IV - coletar dados estatísticos e elaborar estudos sobre os sinistros de trânsito e suas causas; (Redação dada pela Lei nº 14.599, de 2023)\n V - estabelecer, em conjunto com os órgãos de polícia ostensiva de trânsito, as diretrizes para o policiamento ostensivo de trânsito;\n VI - executar a fiscalização de trânsito em vias terrestres, edificações de uso público e edificações privadas de uso coletivo, autuar e aplicar as penalidades de advertência por escrito e multa e as medidas administrativas cabíveis pelas infrações previstas neste Código, excetuadas aquelas de competência privativa dos órgãos ou entidades executivos de trânsito dos Estados e do Distrito Federal previstas no § 2º do art. 22 deste Código, notificando os infratores e arrecadando as multas que aplicar; (Redação dada pela Lei nº 14.599, de 2023)\n VII - (revogado); (Redação dada pela Lei nº 14.599, de 2023)\n VIII - (revogado); (Redação dada pela Lei nº 14.599, de 2023)\n IX - fiscalizar o cumprimento da norma contida no art. 95, aplicando as penalidades e arrecadando as multas nele previstas;\n X - implantar, manter e operar sistema de estacionamento rotativo pago nas vias;\n XI - arrecadar valores provenientes de estada e remoção de veículos e objetos, e escolta de veículos de cargas superdimensionadas ou perigosas;\n XII - credenciar os serviços de escolta, fiscalizar e adotar medidas de segurança relativas aos serviços de remoção de veículos, escolta e transporte de carga indivisível;\n XIII - integrar-se a outros órgãos e entidades do Sistema Nacional de Trânsito para fins de arrecadação e compensação de multas impostas na área de sua competência, com vistas à unificação do licenciamento, à simplificação e à celeridade das transferências de veículos e de prontuários dos condutores de uma para outra unidade da Federação;\n XIV - implantar as medidas da Política Nacional de Trânsito e do Programa Nacional de Trânsito;\n XV - promover e participar de projetos e programas de educação e segurança de trânsito de acordo com as diretrizes estabelecidas pelo CONTRAN;\n XVI - planejar e implantar medidas para redução da circulação de veículos e reorientação do tráfego, com o objetivo de diminuir a emissão global de poluentes;\n XVII - registrar e licenciar, na forma da legislação, veículos de tração e propulsão humana e de tração animal, fiscalizando, autuando, aplicando penalidades e arrecadando multas decorrentes de infrações; (Redação dada pela\nLei nº 13.154, de 2015)\n XVIII - conceder autorização para conduzir veículos de propulsão humana e de tração animal;\n XIX - articular-se com os demais órgãos do Sistema Nacional de Trânsito no Estado, sob coordenação do respectivo CETRAN;\n XX - fiscalizar o nível de emissão de poluentes e ruído produzidos pelos veículos automotores ou pela sua carga, de acordo com o estabelecido no art. 66, além de dar apoio às ações específicas de órgão ambiental local, quando\n\fsolicitado;\n XXI - vistoriar veículos que necessitem de autorização especial para transitar e estabelecer os requisitos técnicos a serem observados para a circulação desses veículos.\n XXII - aplicar a penalidade de suspensão do direito de dirigir, quando prevista de forma específica para a infração cometida, e comunicar a aplicação da penalidade ao órgão máximo executivo de trânsito da União; (Incluído dada pela\nLei nº 14.071, de 2020) (Vigência)\n XXIII - criar, implantar e manter escolas públicas de trânsito, destinadas à educação de crianças, adolescentes, jovens e adultos, por meio de aulas teóricas e práticas sobre legislação, sinalização e comportamento no trânsito.\n(Redação dada pela Lei nº 14.440, de 2022)\n § 1º As competências relativas a órgão ou entidade municipal serão exercidas no Distrito Federal por seu órgão ou entidade executivos de trânsito.\n § 2º Para exercer as competências estabelecidas neste artigo, os Municípios deverão integrar-se ao Sistema\nNacional de Trânsito, por meio de órgão ou entidade executivos de trânsito ou diretamente por meio da prefeitura municipal, conforme previsto no art. 333 deste Código. (Redação dada pela Lei nº 14.071, de 2020) (Vigência)\n § 3º O exercício das atribuições previstas no inciso VI do caput deste artigo no âmbito de edificações privadas de uso coletivo somente se aplica para infrações de uso de vagas reservadas em estacionamentos. (Incluído pela\nLei nº 14.599, de 2023)\n § 4º Compete privativamente aos órgãos e entidades executivos de trânsito dos Municípios, no âmbito de sua circunscrição, executar a fiscalização de trânsito, autuar e aplicar as medidas administrativas e penalidades previstas nos arts. 95, 181, 182, 183, 218 e 219, nos incisos V e X do caput do art. 231 e nos arts. 245, 246 e 279-A deste\nCódigo. (Incluído pela Lei nº 14.599, de 2023)"}, {"art": "Art. 24-A", "key": "24-A", "texto": "Art. 24-A. Compete concorrentemente aos órgãos e entidades executivos de trânsito dos Estados, do Distrito\nFederal e dos Municípios executar a fiscalização de trânsito, autuar e aplicar as medidas administrativas e penalidades previstas neste Código, observado o disposto no § 2º do art. 22 e no § 4º do art. 24 deste Código. (Incluído pela\nLei nº 14.599, de 2023)\n Parágrafo único. As competências privativas previstas no § 2º do art. 22 e no § 4º do art. 24 podem ser delegadas por meio do convênio de que trata o art. 25 deste Código. (Incluído pela Lei nº 14.599, de 2023)"}, {"art": "Art. 25", "key": "25", "texto": "Art. 25. Os órgãos e entidades executivos do Sistema Nacional de Trânsito poderão celebrar convênio delegando as atividades previstas neste Código, com vistas à maior eficiência e à segurança para os usuários da via.\n § 1º. Os órgãos e entidades de trânsito poderão prestar serviços de capacitação técnica, assessoria e monitoramento das atividades relativas ao trânsito durante prazo a ser estabelecido entre as partes, com ressarcimento dos custos apropriados. (Redação dada pela Lei nº 14.071, de 2020) (Vigência)\n § 2º Quando não houver órgão ou entidade executivos de trânsito no respectivo Município, o convênio de que trata o caput deste artigo poderá ser celebrado diretamente pela prefeitura municipal com órgão ou entidade que integre o\nSistema Nacional de Trânsito, permitido, inclusive, o consórcio com outro ente federativo. (Incluído pela Lei nº 14.071, de 2020) (Vigência)"}, {"art": "Art. 25-A", "key": "25-A", "texto": "Art. 25-A. Os agentes dos órgãos policiais da Câmara dos Deputados e do Senado Federal, a que se referem o inciso IV do caput do art. 51 e o inciso XIII do caput do art. 52 da Constituição Federal , respectivamente, mediante convênio com o órgão ou entidade de trânsito com circunscrição sobre a via, poderão lavrar auto de infração de trânsito e remetê-lo ao órgão competente, nos casos em que a infração cometida nas adjacências do Congresso Nacional ou nos locais sob sua responsabilidade comprometer objetivamente os serviços ou colocar em risco a incolumidade das pessoas ou o patrimônio das respectivas Casas Legislativas. (Incluído pela Lei nº 14.071, de 2020) (Vigência)\n Parágrafo único. Para atuarem na fiscalização de trânsito, os agentes mencionados no caput deste artigo deverão receber treinamento específico para o exercício das atividades, conforme regulamentação do Contran. (Incluído pela Lei nº 14.071, de 2020) (Vigência)\n CAPÍTULO III\n DAS NORMAS GERAIS DE CIRCULAÇÃO E CONDUTA"}, {"art": "Art. 26", "key": "26", "texto": "Art. 26. Os usuários das vias terrestres devem:\n I - abster-se de todo ato que possa constituir perigo ou obstáculo para o trânsito de veículos, de pessoas ou de animais, ou ainda causar danos a propriedades públicas ou privadas;\n\f II - abster-se de obstruir o trânsito ou torná-lo perigoso, atirando, depositando ou abandonando na via objetos ou substâncias, ou nela criando qualquer outro obstáculo."}, {"art": "Art. 27", "key": "27", "texto": "Art. 27. Antes de colocar o veículo em circulação nas vias públicas, o condutor deverá verificar a existência e as boas condições de funcionamento dos equipamentos de uso obrigatório, bem como assegurar-se da existência de combustível suficiente para chegar ao local de destino."}, {"art": "Art. 28", "key": "28", "texto": "Art. 28. O condutor deverá, a todo momento, ter domínio de seu veículo, dirigindo-o com atenção e cuidados indispensáveis à segurança do trânsito."}, {"art": "Art. 29", "key": "29", "texto": "Art. 29. O trânsito de veículos nas vias terrestres abertas à circulação obedecerá às seguintes normas:\n I - a circulação far-se-á pelo lado direito da via, admitindo-se as exceções devidamente sinalizadas;\n II - o condutor deverá guardar distância de segurança lateral e frontal entre o seu e os demais veículos, bem como em relação ao bordo da pista, considerando-se, no momento, a velocidade e as condições do local, da circulação, do veículo e as condições climáticas;\n III - quando veículos, transitando por fluxos que se cruzem, se aproximarem de local não sinalizado, terá preferência de passagem:\n a) no caso de apenas um fluxo ser proveniente de rodovia, aquele que estiver circulando por ela;\n b) no caso de rotatória, aquele que estiver circulando por ela;\n c) nos demais casos, o que vier pela direita do condutor;\n IV - quando uma pista de rolamento comportar várias faixas de circulação no mesmo sentido, são as da direita destinadas ao deslocamento dos veículos mais lentos e de maior porte, quando não houver faixa especial a eles destinada, e as da esquerda, destinadas à ultrapassagem e ao deslocamento dos veículos de maior velocidade;\n V - o trânsito de veículos sobre passeios, calçadas e nos acostamentos, só poderá ocorrer para que se adentre ou se saia dos imóveis ou áreas especiais de estacionamento;\n VI - os veículos precedidos de batedores terão prioridade de passagem, respeitadas as demais normas de circulação;\n VII - os veículos destinados a socorro de incêndio e salvamento, os de polícia, os de fiscalização e operação de trânsito e as ambulâncias, além de prioridade no trânsito, gozam de livre circulação, estacionamento e parada, quando em serviço de urgência, de policiamento ostensivo ou de preservação da ordem pública, observadas as seguintes disposições: (Redação dada pela Lei nº 14.071, de 2020) (Vigência)\n a) quando os dispositivos regulamentares de alarme sonoro e iluminação intermitente estiverem acionados, indicando a proximidade dos veículos, todos os condutores deverão deixar livre a passagem pela faixa da esquerda, indo para a direita da via e parando, se necessário; (Redação dada pela Lei nº 14.071, de 2020) (Vigência)\n b) os pedestres, ao ouvirem o alarme sonoro ou avistarem a luz intermitente, deverão aguardar no passeio e somente atravessar a via quando o veículo já tiver passado pelo local; (Redação dada pela Lei nº 14.071, de 2020) (Vigência)\n c) o uso de dispositivos de alarme sonoro e de iluminação intermitente somente poderá ocorrer por ocasião da efetiva prestação de serviço de urgência; (Redação dada pela Lei nº 14.440, de 2022)\n d) a prioridade de passagem na via e no cruzamento deverá se dar com velocidade reduzida e com os devidos cuidados de segurança, obedecidas as demais normas deste Código;\n e) as prerrogativas de livre circulação e de parada serão aplicadas somente quando os veículos estiverem identificados por dispositivos regulamentares de alarme sonoro e iluminação intermitente; (Incluído pela Lei nº 14.071, de 2020) (Vigência)\n f) a prerrogativa de livre estacionamento será aplicada somente quando os veículos estiverem identificados por dispositivos regulamentares de iluminação intermitente; (Incluído pela Lei nº 14.071, de 2020) (Vigência)\n VIII - os veículos prestadores de serviços de utilidade pública, quando em atendimento na via, gozam de livre parada e estacionamento no local da prestação de serviço, desde que devidamente sinalizados, devendo estar identificados na forma estabelecida pelo CONTRAN;\n IX - a ultrapassagem de outro veículo em movimento deverá ser feita pela esquerda, obedecida a sinalização regulamentar e as demais normas estabelecidas neste Código, exceto quando o veículo a ser ultrapassado estiver\n\fsinalizando o propósito de entrar à esquerda;\n X - todo condutor deverá, antes de efetuar uma ultrapassagem, certificar-se de que:\n a) nenhum condutor que venha atrás haja começado uma manobra para ultrapassá-lo;\n b) quem o precede na mesma faixa de trânsito não haja indicado o propósito de ultrapassar um terceiro;\n c) a faixa de trânsito que vai tomar esteja livre numa extensão suficiente para que sua manobra não ponha em perigo ou obstrua o trânsito que venha em sentido contrário;\n XI - todo condutor ao efetuar a ultrapassagem deverá:\n a) indicar com antecedência a manobra pretendida, acionando a luz indicadora de direção do veículo ou por meio de gesto convencional de braço;\n b) afastar-se do usuário ou usuários aos quais ultrapassa, de tal forma que deixe livre uma distância lateral de segurança;\n c) retomar, após a efetivação da manobra, a faixa de trânsito de origem, acionando a luz indicadora de direção do veículo ou fazendo gesto convencional de braço, adotando os cuidados necessários para não pôr em perigo ou obstruir o trânsito dos veículos que ultrapassou;\n XII - os veículos que se deslocam sobre trilhos terão preferência de passagem sobre os demais, respeitadas as normas de circulação.\n XIII - (VETADO). (Incluído pela Lei nº 13.281, de 2016) (Vigência)\n § 1º As normas de ultrapassagem previstas nas alíneas a e b do inciso X e a e b do inciso XI aplicam-se à transposição de faixas, que pode ser realizada tanto pela faixa da esquerda como pela da direita.\n § 2º Respeitadas as normas de circulação e conduta estabelecidas neste artigo, em ordem decrescente, os veículos de maior porte serão sempre responsáveis pela segurança dos menores, os motorizados pelos não motorizados e, juntos, pela incolumidade dos pedestres.\n § 3º Compete ao Contran regulamentar os dispositivos de alarme sonoro e iluminação intermitente previstos no inciso VII do caput deste artigo. (Incluído pela Lei nº 14.071, de 2020) (Vigência)\n § 4º Em situações especiais, ato da autoridade máxima federal de segurança pública poderá dispor sobre a aplicação das exceções tratadas no inciso VII do caput deste artigo aos veículos oficiais descaracterizados. (Incluído pela Lei nº 14.071, de 2020) (Vigência)"}, {"art": "Art. 30", "key": "30", "texto": "Art. 30. Todo condutor, ao perceber que outro que o segue tem o propósito de ultrapassá-lo, deverá:\n I - se estiver circulando pela faixa da esquerda, deslocar-se para a faixa da direita, sem acelerar a marcha;\n II - se estiver circulando pelas demais faixas, manter-se naquela na qual está circulando, sem acelerar a marcha.\n Parágrafo único. Os veículos mais lentos, quando em fila, deverão manter distância suficiente entre si para permitir que veículos que os ultrapassem possam se intercalar na fila com segurança."}, {"art": "Art. 31", "key": "31", "texto": "Art. 31. O condutor que tenha o propósito de ultrapassar um veículo de transporte coletivo que esteja parado, efetuando embarque ou desembarque de passageiros, deverá reduzir a velocidade, dirigindo com atenção redobrada ou parar o veículo com vistas à segurança dos pedestres."}, {"art": "Art. 32", "key": "32", "texto": "Art. 32. O condutor não poderá ultrapassar veículos em vias com duplo sentido de direção e pista única, nos trechos em curvas e em aclives sem visibilidade suficiente, nas passagens de nível, nas pontes e viadutos e nas travessias de pedestres, exceto quando houver sinalização permitindo a ultrapassagem."}, {"art": "Art. 33", "key": "33", "texto": "Art. 33. Nas interseções e suas proximidades, o condutor não poderá efetuar ultrapassagem."}, {"art": "Art. 34", "key": "34", "texto": "Art. 34. O condutor que queira executar uma manobra deverá certificar-se de que pode executá-la sem perigo para os demais usuários da via que o seguem, precedem ou vão cruzar com ele, considerando sua posição, sua direção e sua velocidade."}, {"art": "Art. 35", "key": "35", "texto": "Art. 35. Antes de iniciar qualquer manobra que implique um deslocamento lateral, o condutor deverá indicar seu propósito de forma clara e com a devida antecedência, por meio da luz indicadora de direção de seu veículo, ou fazendo gesto convencional de braço.\n\f Parágrafo único. Entende-se por deslocamento lateral a transposição de faixas, movimentos de conversão à direita, à esquerda e retornos."}, {"art": "Art. 36", "key": "36", "texto": "Art. 36. O condutor que for ingressar numa via, procedente de um lote lindeiro a essa via, deverá dar preferência aos veículos e pedestres que por ela estejam transitando."}, {"art": "Art. 37", "key": "37", "texto": "Art. 37. Nas vias providas de acostamento, a conversão à esquerda e a operação de retorno deverão ser feitas nos locais apropriados e, onde estes não existirem, o condutor deverá aguardar no acostamento, à direita, para cruzar a pista com segurança."}, {"art": "Art. 38", "key": "38", "texto": "Art. 38. Antes de entrar à direita ou à esquerda, em outra via ou em lotes lindeiros, o condutor deverá:\n I - ao sair da via pelo lado direito, aproximar-se o máximo possível do bordo direito da pista e executar sua manobra no menor espaço possível;\n II - ao sair da via pelo lado esquerdo, aproximar-se o máximo possível de seu eixo ou da linha divisória da pista, quando houver, caso se trate de uma pista com circulação nos dois sentidos, ou do bordo esquerdo, tratando-se de uma pista de um só sentido.\n Parágrafo único. Durante a manobra de mudança de direção, o condutor deverá ceder passagem aos pedestres e ciclistas, aos veículos que transitem em sentido contrário pela pista da via da qual vai sair, respeitadas as normas de preferência de passagem."}, {"art": "Art. 39", "key": "39", "texto": "Art. 39. Nas vias urbanas, a operação de retorno deverá ser feita nos locais para isto determinados, quer por meio de sinalização, quer pela existência de locais apropriados, ou, ainda, em outros locais que ofereçam condições de segurança e fluidez, observadas as características da via, do veículo, das condições meteorológicas e da movimentação de pedestres e ciclistas."}, {"art": "Art. 40", "key": "40", "texto": "Art. 40. O uso de luzes em veículo obedecerá às seguintes determinações:\n I - o condutor manterá acesos os faróis do veículo, por meio da utilização da luz baixa: (Redação dada pela Lei nº 14.071, de 2020) (Vigência)\n a) à noite; (Incluído pela Lei nº 14.071, de 2020) (Vigência)\n b) mesmo durante o dia, em túneis e sob chuva, neblina ou cerração; (Incluído pela Lei nº 14.071, de 2020)\n(Vigência)\n II - nas vias não iluminadas o condutor deve usar luz alta, exceto ao cruzar com outro veículo ou ao segui-lo;\n III - a troca de luz baixa e alta, de forma intermitente e por curto período de tempo, com o objetivo de advertir outros motoristas, só poderá ser utilizada para indicar a intenção de ultrapassar o veículo que segue à frente ou para indicar a existência de risco à segurança para os veículos que circulam no sentido contrário;\n IV - (revogado); (Redação dada pela Lei nº 14.071, de 2020) (Vigência)\n V - O condutor utilizará o pisca-alerta nas seguintes situações:\n a) em imobilizações ou situações de emergência;\n b) quando a regulamentação da via assim o determinar;\n VI - durante a noite, em circulação, o condutor manterá acesa a luz de placa;\n VII - o condutor manterá acesas, à noite, as luzes de posição quando o veículo estiver parado para fins de embarque ou desembarque de passageiros e carga ou descarga de mercadorias.\n § 1º Os veículos de transporte coletivo de passageiros, quando circularem em faixas ou pistas a eles destinadas, e as motocicletas, motonetas e ciclomotores deverão utilizar-se de farol de luz baixa durante o dia e à noite. (Redação dada pela Lei nº 14.071, de 2020) (Vigência)\n § 2º Os veículos que não dispuserem de luzes de rodagem diurna deverão manter acesos os faróis nas rodovias de pista simples situadas fora dos perímetros urbanos, mesmo durante o dia. (Incluído pela Lei nº 14.071, de 2020)\n(Vigência)"}, {"art": "Art. 41", "key": "41", "texto": "Art. 41. O condutor de veículo só poderá fazer uso de buzina, desde que em toque breve, nas seguintes situações:\n I - para fazer as advertências necessárias a fim de evitar sinistros; (Redação dada pela Lei nº 14.599, de 2023)\n\f II - fora das áreas urbanas, quando for conveniente advertir a um condutor que se tem o propósito de ultrapassá- lo."}, {"art": "Art. 42", "key": "42", "texto": "Art. 42. Nenhum condutor deverá frear bruscamente seu veículo, salvo por razões de segurança."}, {"art": "Art. 43", "key": "43", "texto": "Art. 43. Ao regular a velocidade, o condutor deverá observar constantemente as condições físicas da via, do veículo e da carga, as condições meteorológicas e a intensidade do trânsito, obedecendo aos limites máximos de velocidade estabelecidos para a via, além de:\n I - não obstruir a marcha normal dos demais veículos em circulação sem causa justificada, transitando a uma velocidade anormalmente reduzida;\n II - sempre que quiser diminuir a velocidade de seu veículo deverá antes certificar-se de que pode fazê-lo sem risco nem inconvenientes para os outros condutores, a não ser que haja perigo iminente;\n III - indicar, de forma clara, com a antecedência necessária e a sinalização devida, a manobra de redução de velocidade."}, {"art": "Art. 44", "key": "44", "texto": "Art. 44. Ao aproximar-se de qualquer tipo de cruzamento, o condutor do veículo deve demonstrar prudência especial, transitando em velocidade moderada, de forma que possa deter seu veículo com segurança para dar passagem a pedestre e a veículos que tenham o direito de preferência."}, {"art": "Art. 44-A", "key": "44-A", "texto": "Art. 44-A. É livre o movimento de conversão à direita diante de sinal vermelho do semáforo onde houver sinalização indicativa que permita essa conversão, observados os arts. 44, 45 e 70 deste Código. (Incluído pela Lei nº 14.071, de 2020) (Vigência)"}, {"art": "Art. 45", "key": "45", "texto": "Art. 45. Mesmo que a indicação luminosa do semáforo lhe seja favorável, nenhum condutor pode entrar em uma interseção se houver possibilidade de ser obrigado a imobilizar o veículo na área do cruzamento, obstruindo ou impedindo a passagem do trânsito transversal."}, {"art": "Art. 46", "key": "46", "texto": "Art. 46. Sempre que for necessária a imobilização temporária de um veículo no leito viário, em situação de emergência, deverá ser providenciada a imediata sinalização de advertência, na forma estabelecida pelo CONTRAN."}, {"art": "Art. 47", "key": "47", "texto": "Art. 47. Quando proibido o estacionamento na via, a parada deverá restringir-se ao tempo indispensável para embarque ou desembarque de passageiros, desde que não interrompa ou perturbe o fluxo de veículos ou a locomoção de pedestres.\n Parágrafo único. A operação de carga ou descarga será regulamentada pelo órgão ou entidade com circunscrição sobre a via e é considerada estacionamento."}, {"art": "Art. 48", "key": "48", "texto": "Art. 48. Nas paradas, operações de carga ou descarga e nos estacionamentos, o veículo deverá ser posicionado no sentido do fluxo, paralelo ao bordo da pista de rolamento e junto à guia da calçada (meio-fio), admitidas as exceções devidamente sinalizadas.\n § 1º Nas vias providas de acostamento, os veículos parados, estacionados ou em operação de carga ou descarga deverão estar situados fora da pista de rolamento.\n § 2º O estacionamento dos veículos motorizados de duas rodas será feito em posição perpendicular à guia da calçada (meio-fio) e junto a ela, salvo quando houver sinalização que determine outra condição.\n § 3º O estacionamento dos veículos sem abandono do condutor poderá ser feito somente nos locais previstos neste Código ou naqueles regulamentados por sinalização específica."}, {"art": "Art. 49", "key": "49", "texto": "Art. 49. O condutor e os passageiros não deverão abrir a porta do veículo, deixá-la aberta ou descer do veículo sem antes se certificarem de que isso não constitui perigo para eles e para outros usuários da via.\n Parágrafo único. O embarque e o desembarque devem ocorrer sempre do lado da calçada, exceto para o condutor."}, {"art": "Art. 50", "key": "50", "texto": "Art. 50. O uso de faixas laterais de domínio e das áreas adjacentes às estradas e rodovias obedecerá às condições de segurança do trânsito estabelecidas pelo órgão ou entidade com circunscrição sobre a via."}, {"art": "Art. 51", "key": "51", "texto": "Art. 51. Nas vias internas pertencentes a condomínios constituídos por unidades autônomas, a sinalização de regulamentação da via será implantada e mantida às expensas do condomínio, após aprovação dos p
