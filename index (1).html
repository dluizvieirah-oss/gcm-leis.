 a retirada do bem do depósito, mediante a quitação das despesas com remoção e estada, ou para a autorização do leilão nos termos deste artigo. (Redação dada pela Lei nº 13.281, de 2016) (Vigência)\n § 15. Se no prazo de 60 (sessenta) dias, a contar da notificação de que trata o § 14, não houver manifestação da autoridade responsável pela restrição judicial ou policial, estará o órgão de trânsito autorizado a promover o leilão do\n\fveículo nos termos deste artigo. (Incluído pela Lei nº 13.281, de 2016) (Vigência)\n § 16. Os veículos, sucatas e materiais inservíveis de bens automotores que se encontrarem nos depósitos há mais de 1 (um) ano poderão ser destinados à reciclagem, independentemente da existência de restrições sobre o veículo.\n(Incluído pela Lei nº 13.281, de 2016) (Vigência)\n § 17. O procedimento de hasta pública na hipótese do § 16 será realizado por lote de tonelagem de material ferroso, observando-se, no que couber, o disposto neste artigo, condicionando-se a entrega do material arrematado aos procedimentos necessários à descaracterização total do bem e à destinação exclusiva, ambientalmente adequada, à reciclagem siderúrgica, vedado qualquer aproveitamento de peças e partes. (Incluído pela Lei nº 13.281, de 2016)\n(Vigência)\n § 18. Os veículos sinistrados irrecuperáveis queimados, adulterados ou estrangeiros, bem como aqueles sem possibilidade de regularização perante o órgão de trânsito, serão destinados à reciclagem, independentemente do período em que estejam em depósito, respeitado o prazo previsto no caput deste artigo, sempre que a autoridade responsável pelo leilão julgar ser essa a medida apropriada. (Incluído pela Lei nº 13.281, de 2016) (Vigência)"}, {"art": "Art. 329", "key": "329", "texto": "Art. 329. Os condutores dos veículos de que tratam os arts. 135 e 136, para exercerem suas atividades, deverão apresentar, previamente, certidão negativa do registro de distribuição criminal relativamente aos crimes de homicídio, roubo, estupro e corrupção de menores, renovável a cada cinco anos, junto ao órgão responsável pela respectiva concessão ou autorização."}, {"art": "Art. 330", "key": "330", "texto": "Art. 330. Os estabelecimentos onde se executem reformas ou recuperação de veículos e os que comprem, vendam ou desmontem veículos, usados ou não, são obrigados a possuir livros de registro de seu movimento de entrada e saída e de uso de placas de experiência, conforme modelos aprovados e rubricados pelos órgãos de trânsito.\n § 1º Os livros indicarão:\n I - data de entrada do veículo no estabelecimento;\n II - nome, endereço e identidade do proprietário ou vendedor;\n III - data da saída ou baixa, nos casos de desmontagem;\n IV - nome, endereço e identidade do comprador;\n V - características do veículo constantes do seu certificado de registro;\n VI - número da placa de experiência.\n § 2º Os livros terão suas páginas numeradas tipograficamente e serão encadernados ou em folhas soltas, sendo que, no primeiro caso, conterão termo de abertura e encerramento lavrados pelo proprietário e rubricados pela repartição de trânsito, enquanto, no segundo, todas as folhas serão autenticadas pela repartição de trânsito.\n § 3º A entrada e a saída de veículos nos estabelecimentos referidos neste artigo registrar-se-ão no mesmo dia em que se verificarem assinaladas, inclusive, as horas a elas correspondentes, podendo os veículos irregulares lá encontrados ou suas sucatas ser apreendidos ou retidos para sua completa regularização.\n § 4º As autoridades de trânsito e as autoridades policiais terão acesso aos livros sempre que o solicitarem, não podendo, entretanto, retirá-los do estabelecimento.\n § 5º A falta de escrituração dos livros, o atraso, a fraude ao realizá-lo e a recusa de sua exibição serão punidas com a multa prevista para as infrações gravíssimas, independente das demais cominações legais cabíveis.\n § 6o Os livros previstos neste artigo poderão ser substituídos por sistema eletrônico, na forma regulamentada pelo\nContran. (Incluído pela Lei nº 13.154, de 2015)"}, {"art": "Art. 331", "key": "331", "texto": "Art. 331. Até a nomeação e posse dos membros que passarão a integrar os colegiados destinados ao julgamento dos recursos administrativos previstos na Seção II do Capítulo XVIII deste Código, o julgamento dos recursos ficará a cargo dos órgãos ora existentes."}, {"art": "Art. 332", "key": "332", "texto": "Art. 332. Os órgãos e entidades integrantes do Sistema Nacional de Trânsito proporcionarão aos membros do\nCONTRAN, CETRAN e CONTRANDIFE, em serviço, todas as facilidades para o cumprimento de sua missão, fornecendo-lhes as informações que solicitarem, permitindo-lhes inspecionar a execução de quaisquer serviços e deverão atender prontamente suas requisições."}, {"art": "Art. 333", "key": "333", "texto": "Art. 333. O CONTRAN estabelecerá, em até cento e vinte dias após a nomeação de seus membros, as disposições previstas nos arts. 91 e 92, que terão de ser atendidas pelos órgãos e entidades executivos de trânsito e executivos rodoviários para exercerem suas competências.\n § 1º Os órgãos e entidades de trânsito já existentes terão prazo de um ano, após a edição das normas, para se adequarem às novas disposições estabelecidas pelo CONTRAN, conforme disposto neste artigo.\n § 2º Os órgãos e entidades de trânsito a serem criados exercerão as competências previstas neste Código em cumprimento às exigências estabelecidas pelo CONTRAN, conforme disposto neste artigo, acompanhados pelo respectivo CETRAN, se órgão ou entidade municipal, ou CONTRAN, se órgão ou entidade estadual, do Distrito Federal ou da União, passando a integrar o Sistema Nacional de Trânsito."}, {"art": "Art. 334", "key": "334", "texto": "Art. 334. As ondulações transversais existentes deverão ser homologadas pelo órgão ou entidade competente no prazo de um ano, a partir da publicação deste Código, devendo ser retiradas em caso contrário."}, {"art": "Art. 335", "key": "335", "texto": "Art. 335. (VETADO)"}, {"art": "Art. 336", "key": "336", "texto": "Art. 336. Aplicam-se os sinais de trânsito previstos no Anexo II até a aprovação pelo CONTRAN, no prazo de trezentos e sessenta dias da publicação desta Lei, após a manifestação da Câmara Temática de Engenharia, de Vias e\nVeículos e obedecidos os padrões internacionais."}, {"art": "Art. 337", "key": "337", "texto": "Art. 337. Os CETRAN terão suporte técnico e financeiro dos Estados e Municípios que os compõem e, o\nCONTRANDIFE, do Distrito Federal."}, {"art": "Art. 338", "key": "338", "texto": "Art. 338. As montadoras, encarroçadoras, os importadores e fabricantes, ao comerciarem veículos automotores de qualquer categoria e ciclos, são obrigados a fornecer, no ato da comercialização do respectivo veículo, manual contendo normas de circulação, infrações, penalidades, direção defensiva, primeiros socorros e Anexos do Código de\nTrânsito Brasileiro."}, {"art": "Art. 338-A", "key": "338-A", "texto": "Art. 338-A. As competências previstas no inciso XV do caput do art. 21 e no inciso XXII do caput do art. 24 deste\nCódigo serão atribuídas aos órgãos ou entidades descritos no caput dos referidos artigos a partir de 1º de janeiro de 2024. (Incluído pela Lei nº 14.229, de 2021)\n Parágrafo único. Até 31 de dezembro de 2023, as competências a que se refere o caput deste artigo serão exercidas pelos órgãos e entidades executivos de trânsito dos Estados e do Distrito Federal. (Incluído pela Lei nº 14.229, de 2021)"}, {"art": "Art. 339", "key": "339", "texto": "Art. 339. Fica o Poder Executivo autorizado a abrir crédito especial no valor de R$ 264.954,00 (duzentos e sessenta e quatro mil, novecentos e cinqüenta e quatro reais), em favor do ministério ou órgão a que couber a coordenação máxima do Sistema Nacional de Trânsito, para atender as despesas decorrentes da implantação deste\nCódigo."}, {"art": "Art. 340", "key": "340", "texto": "Art. 340. Este Código entra em vigor cento e vinte dias após a data de sua publicação."}, {"art": "Art. 341", "key": "341", "texto": "Art. 341. Ficam revogadas as Leis nºs 5.108, de 21 de setembro de 1966, 5.693, de 16 de agosto de 1971, 5.820, de 10 de novembro de 1972, 6.124, de 25 de outubro de 1974, 6.308, de 15 de dezembro de 1975, 6.369, de 27 de outubro de 1976, 6.731, de 4 de dezembro de 1979, 7.031, de 20 de setembro de 1982, 7.052, de 02 de dezembro de 1982, 8.102, de 10 de dezembro de 1990, os arts. 1º a 6º e 11 do Decreto-lei nº 237, de 28 de fevereiro de 1967, e os\nDecretos-leis nºs 584, de 16 de maio de 1969, 912, de 2 de outubro de 1969, e 2.448, de 21 de julho de 1988.\n Brasília, 23 de setembro de 1997; 176º da Independência e 109º da República.\nFERNANDO HENRIQUE CARDOSO\nIris Rezende\nEliseu Padilha\nEste texto não substitui o publicado no DOU de 24.9.1997 e retificado em 25.9.1997."}, {"art": "Anexo I", "key": "ANEXOI", "texto": "ANEXO I\n DOS CONCEITOS E DEFINIÇÕES\n (Vide Lei nº 14.071, de 2020) (Vigência)\n Para efeito deste Código adotam-se as seguintes definições:\n ACOSTAMENTO - parte da via diferenciada da pista de rolamento destinada à parada ou estacionamento de veículos, em caso de emergência, e à circulação de pedestres e bicicletas, quando não houver local apropriado para esse fim.\n Â\n\f AGENTE DA AUTORIDADE DE TRÂNSITO - agente de trânsito e policial rodoviário federal que atuam na fiscalização, no controle e na operação de trânsito e no patrulhamento, competentes para a lavratura do auto de infração e para os procedimentos dele decorrentes, incluídos o policial militar ou os agentes referidos no art. 25-A deste Código, quando designados pela autoridade de trânsito com circunscrição sobre a via, mediante convênio, na forma prevista neste Código. (Redação dada pela Lei nº 14.229, de 2021)\n AGENTE DE TRÂNSITO - servidor civil efetivo de carreira do órgão ou entidade executivos de trânsito ou rodoviário, com as atribuições de educação, operação e fiscalização de trânsito e de transporte no exercício regular do poder de polícia de trânsito para promover a segurança viária nos termos da Constituição Federal. (Incluído pela\nLei nº 14.229, de 2021)\n AR ALVEOLAR - ar expirado pela boca de um indivíduo, originário dos alvéolos pulmonares. (Incluído pela Lei nº 12.760, de 2012)\n ÁREA DE ESPERA - área delimitada por 2 (duas) linhas de retenção, destinada exclusivamente à espera de motocicletas, motonetas e ciclomotores, junto à aproximação semafórica, imediatamente à frente da linha de retenção dos demais veículos. (Incluído pela Lei nº 14.071, de 2020) (Vigência)\n AUTOMÓVEL - veículo automotor destinado ao transporte de passageiros, com capacidade para até oito pessoas, exclusive o condutor.\n AUTORIDADE DE TRÂNSITO - dirigente máximo de órgão ou entidade executivo integrante do Sistema Nacional de\nTrânsito ou pessoa por ele expressamente credenciada.\n BALANÇO TRASEIRO - distância entre o plano vertical passando pelos centros das rodas traseiras extremas e o ponto mais recuado do veículo, considerando-se todos os elementos rigidamente fixados ao mesmo.\n BICICLETA - veículo de propulsão humana, dotado de duas rodas, não sendo, para efeito deste Código, similar à motocicleta, motoneta e ciclomotor.\n BICICLETÁRIO - local, na via ou fora dela, destinado ao estacionamento de bicicletas.\n BONDE - veículo de propulsão elétrica que se move sobre trilhos.\n BORDO DA PISTA - margem da pista, podendo ser demarcada por linhas longitudinais de bordo que delineiam a parte da via destinada à circulação de veículos.\n CALÇADA - parte da via, normalmente segregada e em nível diferente, não destinada à circulação de veículos, reservada ao trânsito de pedestres e, quando possível, à implantação de mobiliário urbano, sinalização, vegetação e outros fins.\n CAMINHÃO-TRATOR - veículo automotor destinado a tracionar ou arrastar outro.\n CAMINHONETE - veículo destinado ao transporte de carga com peso bruto total de até três mil e quinhentos quilogramas.\n CAMIONETA - veículo misto destinado ao transporte de passageiros e carga no mesmo compartimento.\n CAMINHÃO - veículo automotor destinado ao transporte de carga com peso bruto total superior a 3.500 kg (três mil e quinhentos quilogramas), podendo tracionar ou arrastar outro veículo, respeitada a capacidade máxima de tração. (Incluído pela Lei nº 14.440, de 2022)\n CANTEIRO CENTRAL - obstáculo físico construído como separador de duas pistas de rolamento, eventualmente substituído por marcas viárias (canteiro fictício).\n CAPACIDADE MÁXIMA DE TRAÇÃO - máximo peso que a unidade de tração é capaz de tracionar, indicado pelo fabricante, baseado em condições sobre suas limitações de geração e multiplicação de momento de força e resistência dos elementos que compõem a transmissão.\n CARREATA - deslocamento em fila na via de veículos automotores em sinal de regozijo, de reivindicação, de protesto cívico ou de uma classe.\n CARRO DE MÃO - veículo de propulsão humana utilizado no transporte de pequenas cargas.\n CARROÇA - veículo de tração animal destinado ao transporte de carga.\n CATADIÓPTRICO - dispositivo de reflexão e refração da luz utilizado na sinalização de vias e veículos (olho-de- gato).\n\f CHARRETE - veículo de tração animal destinado ao transporte de pessoas.\n CICLO - veículo de pelo menos duas rodas a propulsão humana.\n CICLOFAIXA - parte da pista de rolamento destinada à circulação exclusiva de ciclos, delimitada por sinalização específica.\n CICLOMOTOR - veículo de 2 (duas) ou 3 (três) rodas, provido de motor de combustão interna, cuja cilindrada não exceda a 50 cm 3 (cinquenta centímetros cúbicos), equivalente a 3,05 pol 3 (três polegadas cúbicas e cinco centésimos), ou de motor de propulsão elétrica com potência máxima de 4 kW (quatro quilowatts), e cuja velocidade máxima de fabricação não exceda a 50 Km/h (cinquenta quilômetros por hora). (Redãção dada pela Lei nº 14.071, de 2020)\n(Vigência)\n CICLOVIA - pista própria destinada à circulação de ciclos, separada fisicamente do tráfego comum.\n CIRCULAÇÃO - movimentação de pessoas, animais e veículos em deslocamento, conduzidos ou não, em vias públicas ou privadas abertas ao público e de uso coletivo. (Incluído pela Lei nº 14.229, de 2021)\n CONVERSÃO - movimento em ângulo, à esquerda ou à direita, de mudança da direção original do veículo.\n CRUZAMENTO - interseção de duas vias em nível.\n DISPOSITIVO DE SEGURANÇA - qualquer elemento que tenha a função específica de proporcionar maior segurança ao usuário da via, alertando-o sobre situações de perigo que possam colocar em risco sua integridade física e dos demais usuários da via, ou danificar seriamente o veículo.\n ESTACIONAMENTO - imobilização de veículos por tempo superior ao necessário para embarque ou desembarque de passageiros.\n ESTRADA - via rural não pavimentada.\n ETILÔMETRO - aparelho destinado à medição do teor alcoólico no ar alveolar. (Incluído pela Lei nº 12.760, de 2012)\n FAIXAS DE DOMÍNIO - superfície lindeira às vias rurais, delimitada por lei específica e sob responsabilidade do órgão ou entidade de trânsito competente com circunscrição sobre a via.\n FAIXAS DE TRÂNSITO - qualquer uma das áreas longitudinais em que a pista pode ser subdividida, sinalizada ou não por marcas viárias longitudinais, que tenham uma largura suficiente para permitir a circulação de veículos automotores.\n FISCALIZAÇÃO - ato de controlar o cumprimento das normas estabelecidas na legislação de trânsito, por meio do poder de polícia administrativa de trânsito, no âmbito de circunscrição dos órgãos e entidades executivos de trânsito e de acordo com as competências definidas neste Código.\n FOCO DE PEDESTRES - indicação luminosa de permissão ou impedimento de locomoção na faixa apropriada.\n FREIO DE ESTACIONAMENTO - dispositivo destinado a manter o veículo imóvel na ausência do condutor ou, no caso de um reboque, se este se encontra desengatado.\n FREIO DE SEGURANÇA OU MOTOR - dispositivo destinado a diminuir a marcha do veículo no caso de falha do freio de serviço.\n FREIO DE SERVIÇO - dispositivo destinado a provocar a diminuição da marcha do veículo ou pará-lo.\n GESTOS DE AGENTES - movimentos convencionais de braço, adotados exclusivamente pelos agentes de autoridades de trânsito nas vias, para orientar, indicar o direito de passagem dos veículos ou pedestres ou emitir ordens, sobrepondo-se ou completando outra sinalização ou norma constante deste Código.\n GESTOS DE CONDUTORES - movimentos convencionais de braço, adotados exclusivamente pelos condutores, para orientar ou indicar que vão efetuar uma manobra de mudança de direção, redução brusca de velocidade ou parada.\n ILHA - obstáculo físico, colocado na pista de rolamento, destinado à ordenação dos fluxos de trânsito em uma interseção.\n INFRAÇÃO - inobservância a qualquer preceito da legislação de trânsito, às normas emanadas do Código de\nTrânsito, do Conselho Nacional de Trânsito e a regulamentação estabelecida pelo órgão ou entidade executiva do\n\ftrânsito.\n INTERSEÇÃO - todo cruzamento em nível, entroncamento ou bifurcação, incluindo as áreas formadas por tais cruzamentos, entroncamentos ou bifurcações.\n INTERRUPÇÃO DE MARCHA - imobilização do veículo para atender circunstância momentânea do trânsito.\n LICENCIAMENTO - procedimento anual, relativo a obrigações do proprietário de veículo, comprovado por meio de documento específico (Certificado de Licenciamento Anual).\n LOGRADOURO PÚBLICO - espaço livre destinado pela municipalidade à circulação, parada ou estacionamento de veículos, ou à circulação de pedestres, tais como calçada, parques, áreas de lazer, calçadões.\n LOTAÇÃO - carga útil máxima, incluindo condutor e passageiros, que o veículo transporta, expressa em quilogramas para os veículos de carga, ou número de pessoas, para os veículos de passageiros.\n LOTE LINDEIRO - aquele situado ao longo das vias urbanas ou rurais e que com elas se limita.\n LUZ ALTA - facho de luz do veículo destinado a iluminar a via até uma grande distância do veículo.\n LUZ BAIXA - facho de luz do veículo destinada a iluminar a via diante do veículo, sem ocasionar ofuscamento ou incômodo injustificáveis aos condutores e outros usuários da via que venham em sentido contrário.\n LUZ DE FREIO - luz do veículo destinada a indicar aos demais usuários da via, que se encontram atrás do veículo, que o condutor está aplicando o freio de serviço.\n LUZ INDICADORA DE DIREÇÃO (pisca-pisca) - luz do veículo destinada a indicar aos demais usuários da via que o condutor tem o propósito de mudar de direção para a direita ou para a esquerda.\n LUZ DE MARCHA À RÉ - luz do veículo destinada a iluminar atrás do veículo e advertir aos demais usuários da via que o veículo está efetuando ou a ponto de efetuar uma manobra de marcha à ré.\n LUZ DE NEBLINA - luz do veículo destinada a aumentar a iluminação da via em caso de neblina, chuva forte ou nuvens de pó.\n LUZ DE POSIÇÃO (lanterna) - luz do veículo destinada a indicar a presença e a largura do veículo.\n MANOBRA - movimento executado pelo condutor para alterar a posição em que o veículo está no momento em relação à via.\n MARCAS VIÁRIAS - conjunto de sinais constituídos de linhas, marcações, símbolos ou legendas, em tipos e cores diversas, apostos ao pavimento da via.\n MICROÔNIBUS - veículo automotor de transporte coletivo com capacidade para até vinte passageiros.\n MOTOCICLETA - veículo automotor de duas rodas, com ou sem side-car, dirigido por condutor em posição montada.\n MOTONETA - veículo automotor de duas rodas, dirigido por condutor em posição sentada.\n MOTOR-CASA (MOTOR-HOME) - veículo automotor cuja carroçaria seja fechada e destinada a alojamento, escritório, comércio ou finalidades análogas.\n NOITE - período do dia compreendido entre o pôr-do-sol e o nascer do sol.\n ÔNIBUS - veículo automotor de transporte coletivo com capacidade para mais de vinte passageiros, ainda que, em virtude de adaptações com vista à maior comodidade destes, transporte número menor.\n OPERAÇÃO DE CARGA E DESCARGA - imobilização do veículo, pelo tempo estritamente necessário ao carregamento ou descarregamento de animais ou carga, na forma disciplinada pelo órgão ou entidade executivo de trânsito competente com circunscrição sobre a via.\n OPERAÇÃO DE TRÂNSITO - monitoramento técnico, baseado nos conceitos de engenharia de tráfego, das condições de fluidez, de estacionamento e de parada na via, de forma a reduzir as interferências, tais como veículos quebrados, sinistrados, estacionados irregularmente atrapalhando o trânsito, prestando socorros imediatos e informações aos pedestres e condutores. (Redação dada pela Lei nº 14.599, de 2023)\n\f PARADA - imobilização do veículo com a finalidade e pelo tempo estritamente necessário para efetuar embarque ou desembarque de passageiros.\n PASSAGEM DE NÍVEL - todo cruzamento de nível entre uma via e uma linha férrea ou trilho de bonde com pista própria.\n PASSAGEM POR OUTRO VEÍCULO - movimento de passagem à frente de outro veículo que se desloca no mesmo sentido, em menor velocidade, mas em faixas distintas da via.\n PASSAGEM SUBTERRÂNEA - obra de arte destinada à transposição de vias, em desnível subterrâneo, e ao uso de pedestres ou veículos.\n PASSARELA - obra de arte destinada à transposição de vias, em desnível aéreo, e ao uso de pedestres.\n PASSEIO - parte da calçada ou da pista de rolamento, neste último caso, separada por pintura ou elemento físico separador, livre de interferências, destinada à circulação exclusiva de pedestres e, excepcionalmente, de ciclistas.\n PATRULHAMENTO - Revogado pela Lei nº 14.599, de 2023\n PATRULHAMENTO OSTENSIVO - função exercida pela Polícia Rodoviária Federal com o objetivo de prevenir e reprimir infrações penais no âmbito de sua competência e de garantir obediência às normas relativas à segurança de trânsito, de forma a assegurar a livre circulação e a prevenir sinistros. (Redação dada pela Lei nº 14.599, de 2023)\n PATRULHAMENTO VIÁRIO - função exercida pelos agentes de trânsito dos órgãos e entidades executivos de trânsito e rodoviário, no âmbito de suas competências, com o objetivo de garantir a segurança viária nos termos do § 10 do art. 144 da Constituição Federal. (Incluído pela Lei nº 14.229, de 2021)\n PERÍMETRO URBANO - limite entre área urbana e área rural.\n PESO BRUTO TOTAL - peso máximo que o veículo transmite ao pavimento, constituído da soma da tara mais a lotação.\n PESO BRUTO TOTAL COMBINADO - peso máximo transmitido ao pavimento pela combinação de um caminhão- trator mais seu semi-reboque ou do caminhão mais o seu reboque ou reboques.\n PISCA-ALERTA - luz intermitente do veículo, utilizada em caráter de advertência, destinada a indicar aos demais usuários da via que o veículo está imobilizado ou em situação de emergência.\n PISTA - parte da via normalmente utilizada para a circulação de veículos, identificada por elementos separadores ou por diferença de nível em relação às calçadas, ilhas ou aos canteiros centrais.\n PLACAS - elementos colocados na posição vertical, fixados ao lado ou suspensos sobre a pista, transmitindo mensagens de caráter permanente e, eventualmente, variáveis, mediante símbolo ou legendas pré-reconhecidas e legalmente instituídas como sinais de trânsito.\n POLICIAMENTO OSTENSIVO DE TRÂNSITO - função exercida pelas Polícias Militares com o objetivo de prevenir e reprimir atos relacionados com a segurança pública e de garantir obediência às normas relativas à segurança de trânsito, assegurando a livre circulação e evitando sinistros. (Redação dada pela Lei nº 14.599, de 2023)\n PONTE - obra de construção civil destinada a ligar margens opostas de uma superfície líquida qualquer.\n QUADRICICLO - veículo automotor de 4 (quatro) rodas, com ou sem cabine, com massa em ordem de marcha não superior a 450 kg (quatrocentos e cinquenta quilogramas) para o transporte de passageiros, ou não superior a 600 kg\n(seiscentos quilogramas) para o transporte de cargas. (Incluído pela Lei nº 14.599, de 2023)\n REBOQUE - veículo destinado a ser engatado atrás de um veículo automotor.\n REGULAMENTAÇÃO DA VIA - implantação de sinalização de regulamentação pelo órgão ou entidade competente com circunscrição sobre a via, definindo, entre outros, sentido de direção, tipo de estacionamento, horários e dias.\n REFÚGIO - parte da via, devidamente sinalizada e protegida, destinada ao uso de pedestres durante a travessia da mesma.\n RENACH - Registro Nacional de Carteiras de Habilitação. (Redação dada pela Lei nº 14.440, de 2022)\n RENAVAM - Registro Nacional de Veículos Automotores.\n\f RETORNO - movimento de inversão total de sentido da direção original de veículos.\n RODOVIA - via rural pavimentada.\n SEMI-REBOQUE - veículo de um ou mais eixos que se apóia na sua unidade tratora ou é a ela ligado por meio de articulação.\n SINAIS DE TRÂNSITO - elementos de sinalização viária que se utilizam de placas, marcas viárias, equipamentos de controle luminosos, dispositivos auxiliares, apitos e gestos, destinados exclusivamente a ordenar ou dirigir o trânsito dos veículos e pedestres.\n SINALIZAÇÃO - conjunto de sinais de trânsito e dispositivos de segurança colocados na via pública com o objetivo de garantir sua utilização adequada, possibilitando melhor fluidez no trânsito e maior segurança dos veículos e pedestres que nela circulam.\n SINISTRO DE TRÂNSITO - evento que resulta em dano ao veículo ou à sua carga e/ou em lesões a pessoas ou animais e que pode trazer dano material ou prejuízo ao trânsito, à via ou ao meio ambiente, em que pelo menos uma das partes está em movimento nas vias terrestres ou em áreas abertas ao público. (Incluído pela Lei nº 14.599, de 2023)\n SONS POR APITO - sinais sonoros, emitidos exclusivamente pelos agentes da autoridade de trânsito nas vias, para orientar ou indicar o direito de passagem dos veículos ou pedestres, sobrepondo-se ou completando sinalização existente no local ou norma estabelecida neste Código.\n TARA - peso próprio do veículo, acrescido dos pesos da carroçaria e equipamento, do combustível, das ferramentas e acessórios, da roda sobressalente, do extintor de incêndio e do fluido de arrefecimento, expresso em quilogramas.\n TRAILER - reboque ou semi-reboque tipo casa, com duas, quatro, ou seis rodas, acoplado ou adaptado à traseira de automóvel ou camionete, utilizado em geral em atividades turísticas como alojamento, ou para atividades comerciais.\n TRÂNSITO - movimentação e imobilização de veículos, pessoas e animais nas vias terrestres.\n TRANSPOSIÇÃO DE FAIXAS - passagem de um veículo de uma faixa demarcada para outra.\n TRATOR - veículo automotor construído para realizar trabalho agrícola, de construção e pavimentação e tracionar outros veículos e equipamentos.\n TRICICLO - veículo automotor de 3 (três) rodas, com ou sem cabine, dirigido por condutor em posição sentada ou montada, que não possui as características de ciclomotor. (Incluído pela Lei nº 14.599, de 2023)\n ULTRAPASSAGEM - movimento de passar à frente de outro veículo que se desloca no mesmo sentido, em menor velocidade e na mesma faixa de tráfego, necessitando sair e retornar à faixa de origem.\n UTILITÁRIO - veículo misto caracterizado pela versatilidade do seu uso, inclusive fora de estrada.\n VEÍCULO ARTICULADO - combinação de veículos acoplados, sendo um deles automotor.\n VEÍCULO AUTOMOTOR - veículo a motor de propulsão a combustão, elétrica ou híbrida que circula por seus próprios meios e que serve normalmente para o transporte viário de pessoas e coisas ou para a tração viária de veículos utilizados para o transporte de pessoas e coisas, compreendidos na definição os veículos conectados a uma linha elétrica e que não circulam sobre trilhos (ônibus elétrico). (Redação dada pela Lei nº 14.599, de 2023)\n VEÍCULO DE CARGA - veículo destinado ao transporte de carga, podendo transportar dois passageiros, exclusive o condutor.\n VEÍCULO DE COLEÇÃO - veículo fabricado há mais de 30 (trinta) anos, original ou modificado, que possui valor histórico próprio. (Redação dada pela Lei nº 14.071, de 2020) (Vigência)\n VEÍCULO CONJUGADO - combinação de veículos, sendo o primeiro um veículo automotor e os demais reboques ou equipamentos de trabalho agrícola, construção, terraplenagem ou pavimentação.\n VEÍCULO DE GRANDE PORTE - veículo automotor destinado ao transporte de carga com peso bruto total máximo superior a dez mil quilogramas e de passageiros, superior a vinte passageiros.\n VEÍCULO DE PASSAGEIROS - veículo destinado ao transporte de pessoas e suas bagagens.\n Í\n\f VEÍCULO MISTO - veículo automotor destinado ao transporte simultâneo de carga e passageiro.\n VEÍCULO EM ESTADO DE ABANDONO - veículo estacionado na via ou em estacionamento público, sem capacidade de locomoção por meios próprios e que, devido a seu estado de conservação e processo de deterioração, ofereça risco à saúde pública, à segurança pública ou ao meio ambiente, independentemente de encontrar-se estacionado em local permitido. (Incluído pela Lei nº 14.440, de 2022)\n VEÍCULO ESPECIAL - veículo de passageiro, de carga, de tração, de coleção ou misto que possui características diferenciadas para realização de função especial para a qual são necessários arranjos específicos da carroceria e/ou equipamento. (Incluído pela Lei nº 14.599, de 2023)\n VIA - superfície por onde transitam veículos, pessoas e animais, compreendendo a pista, a calçada, o acostamento, ilha e canteiro central.\n VIA DE TRÂNSITO RÁPIDO - aquela caracterizada por acessos especiais com trânsito livre, sem interseções em nível, sem acessibilidade direta aos lotes lindeiros e sem travessia de pedestres em nível.\n VIA ARTERIAL - aquela caracterizada por interseções em nível, geralmente controlada por semáforo, com acessibilidade aos lotes lindeiros e às vias secundárias e locais, possibilitando o trânsito entre as regiões da cidade.\n VIA COLETORA - aquela destinada a coletar e distribuir o trânsito que tenha necessidade de entrar ou sair das vias de trânsito rápido ou arteriais, possibilitando o trânsito dentro das regiões da cidade.\n VIA LOCAL - aquela caracterizada por interseções em nível não semaforizadas, destinada apenas ao acesso local ou a áreas restritas.\n VIA RURAL - estradas e rodovias.\n VIA URBANA - ruas, avenidas, vielas, ou caminhos e similares abertos à circulação pública, situados na área urbana, caracterizados principalmente por possuírem imóveis edificados ao longo de sua extensão.\n VIAS E ÁREAS DE PEDESTRES - vias ou conjunto de vias destinadas à circulação prioritária de pedestres.\n VIADUTO - obra de construção civil destinada a transpor uma depressão de terreno ou servir de passagem superior.\n Download para Anexo II\n (Vide Resolução nº 160, de 2004 do CONTRAN)\n (Vide Resolução nº 704, de 2017 do CONTRAN)\n (Vide Lei nº 14.071, de 2020) (Vigência)\n *"}]}};

const LAW_ICON_OPTIONS = ["📕","🚓","🧒","🛡️","🚦","⚖️","🏛️","🔫","🚨","📋","🐾","🏗️","🌳","🍺","🎯"];
const LAW_COLOR_OPTIONS = ["#B8264B","#1B6E3C","#0B4F8A","#8A5A0B","#6B3FA0","#2C5C7A","#8C2F2F","#3B6E4E"];

let state = {
  view: "home",          // home | law | search | article
  currentLawId: null,
  query: "",
  customLaws: {},         // same shape as BUILTIN_LAWS entries, loaded from storage
  storageReady: false,
};

function allLaws(){
  return Object.assign({}, BUILTIN_LAWS, state.customLaws);
}

async function loadCustomLaws(){
  try{
    for(let i = 0; i < localStorage.length; i++){
      const k = localStorage.key(i);
      if(!k || !k.startsWith("lei:")) continue;
      try{
        const raw = localStorage.getItem(k);
        if(raw){
          const parsed = JSON.parse(raw);
          state.customLaws[parsed.meta.id] = parsed;
        }
      }catch(e){}
    }
  }catch(e){ /* storage unavailable */ }
  state.storageReady = true;
  render();
}

async function saveCustomLaw(lawObj){
  state.customLaws[lawObj.meta.id] = lawObj;
  try{
    localStorage.setItem("lei:" + lawObj.meta.id, JSON.stringify(lawObj));
  }catch(e){ console.error("Falha ao salvar", e); }
}

async function deleteCustomLaw(id){
  delete state.customLaws[id];
  try{ localStorage.removeItem("lei:" + id); }catch(e){}
}

/* ---------------- Article parsing (mirrors server-side heuristic) ---------------- */
function parseArticles(rawText){
  const re = /Art\.\s*(\d+)(?:[\-–]([A-Za-zÀ-ú]+))?\.?º?/g;
  let matches = [];
  let m;
  while((m = re.exec(rawText)) !== null){
    matches.push({index:m.index, num:m[1], suf:m[2]});
  }
  const order = [];
  const map = {};
  for(let i=0;i<matches.length;i++){
    const start = matches[i].index;
    const end = (i+1<matches.length) ? matches[i+1].index : rawText.length;
    let chunk = rawText.slice(start,end).trim();
    if(chunk.length < 5) continue;
    const key = matches[i].suf ? (matches[i].num + "-" + matches[i].suf.toUpperCase()) : matches[i].num;
    if(!(key in map)) order.push(key);
    map[key] = chunk; // last occurrence = most recent redação
  }
  return order.map(key => {
    const label = key.includes("-") ? ("Art. " + key.replace("-", "-")) : ("Art. " + key);
    return {art: label, key: key, texto: map[key].replace(/[ \t]{2,}/g," ").trim()};
  });
}

/* ---------------- Search ---------------- */
function searchAll(query){
  const q = query.trim().toLowerCase();
  if(q.length < 2) return [];
  const results = [];
  const laws = allLaws();
  for(const id in laws){
    const law = laws[id];
    for(const a of law.artigos){
      const idx = a.texto.toLowerCase().indexOf(q);
      if(idx !== -1){
        results.push({lawId:id, lawNome:law.meta.nome, art:a.art, texto:a.texto, idx});
      }
    }
  }
  return results.slice(0, 200);
}

function highlightSnippet(texto, idx, query){
  const radius = 70;
  let start = Math.max(0, idx - radius);
  let end = Math.min(texto.length, idx + query.length + radius);
  let snippet = (start>0?"…":"") + texto.slice(start,end) + (end<texto.length?"…":"");
  const re = new RegExp("("+query.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")+")","ig");
  return snippet.replace(re, "<mark>$1</mark>");
}

/* ---------------- Rendering ---------------- */
function esc(s){
  return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}

function render(){
  const app = document.getElementById("app");
  app.innerHTML = "";
  app.appendChild(renderTopbar());
  const content = document.createElement("div");
  content.className = "content";

  if(state.view === "home") content.appendChild(renderHome());
  else if(state.view === "law") content.appendChild(renderLawDetail());
  else if(state.view === "search") content.appendChild(renderSearch());

  app.appendChild(content);

  if(state.view !== "search"){
    const fab = document.createElement("button");
    fab.className = "fab";
    fab.textContent = "+";
    fab.title = "Adicionar lei";
    fab.onclick = openAddModal;
    app.appendChild(fab);
  }
}

function renderTopbar(){
  const bar = document.createElement("div");
  bar.className = "topbar";

  const row = document.createElement("div");
  row.className = "topbar-row";

  if(state.view !== "home"){
    const back = document.createElement("button");
    back.className = "back-btn";
    back.innerHTML = "←";
    back.onclick = () => { state.view = "home"; state.query=""; render(); };
    row.appendChild(back);
  }

  const mark = document.createElement("div");
  mark.className = "badge-mark";
  mark.textContent = "GCM";
  row.appendChild(mark);

  const txt = document.createElement("div");
  txt.className = "brand-text";
  txt.innerHTML = `<span class="brand-title">Códex GCM</span><span class="brand-sub">Legislação de referência</span>`;
  row.appendChild(txt);

  bar.appendChild(row);

  const searchWrap = document.createElement("div");
  searchWrap.className = "search-wrap";
  const input = document.createElement("input");
  input.className = "search-input";
  input.placeholder = "Buscar palavra-chave em todas as leis…";
  input.value = state.query;
  input.oninput = (e) => {
    state.query = e.target.value;
    state.view = state.query.trim().length >= 2 ? "search" : (state.view === "search" ? "home" : state.view);
    render();
    // refocus + restore cursor after re-render
    const el = document.querySelector(".search-input");
    if(el){ el.focus(); el.selectionStart = el.selectionEnd = el.value.length; }
  };
  searchWrap.appendChild(input);
  const icon = document.createElement("span");
  icon.className = "search-icon";
  icon.textContent = "⌕";
  searchWrap.appendChild(icon);
  bar.appendChild(searchWrap);

  if(state.view === "search"){
    const meta = document.createElement("div");
    meta.className = "search-meta";
    const n = searchAll(state.query).length;
    meta.textContent = state.query.trim().length < 2 ? "Digite ao menos 2 letras" : `${n} artigo(s) encontrado(s)`;
    bar.appendChild(meta);
  }

  return bar;
}

function renderHome(){
  const frag = document.createDocumentFragment();
  const laws = allLaws();

  const cats = {};
  for(const id in laws){
    const c = laws[id].meta.categoria || "Outras leis";
    (cats[c] = cats[c] || []).push(laws[id]);
  }

  for(const cat in cats){
    const title = document.createElement("div");
    title.className = "section-title";
    title.innerHTML = `${esc(cat)} <span class="count">${cats[cat].length}</span>`;
    frag.appendChild(title);

    const grid = document.createElement("div");
    grid.className = "law-grid";
    cats[cat].forEach(law => grid.appendChild(renderLawCard(law)));
    frag.appendChild(grid);
  }

  const addTitle = document.createElement("div");
  addTitle.className = "section-title";
  addTitle.textContent = "Ampliar o acervo";
  frag.appendChild(addTitle);

  const addCard = document.createElement("div");
  addCard.className = "add-law-card";
  addCard.onclick = openAddModal;
  addCard.innerHTML = `
    <div class="add-plus">+</div>
    <div>
      <div class="add-law-text">Adicionar nova lei</div>
      <div class="add-law-sub">Cole o texto oficial e os artigos são organizados automaticamente</div>
    </div>`;
  frag.appendChild(addCard);

  return frag;
}

function renderLawCard(law){
  const card = document.createElement("div");
  card.className = "law-card";
  card.onclick = () => { state.view = "law"; state.currentLawId = law.meta.id; render(); window.scrollTo(0,0); };

  const icon = document.createElement("div");
  icon.className = "law-icon";
  icon.style.background = law.meta.cor || "#2C5C7A";
  icon.textContent = law.meta.icone || "📕";
  card.appendChild(icon);

  const info = document.createElement("div");
  info.className = "law-info";
  info.innerHTML = `
    <div class="law-name">${esc(law.meta.nome)}</div>
    <div class="law-number">${esc(law.meta.numero)}</div>
    <div class="law-ementa">${esc(law.meta.ementa || "")}</div>
    <div class="law-meta-row">
      <span class="pill">${law.artigos.length} artigos</span>
      ${law.meta.custom ? '<span class="pill custom">Adicionada por você</span>' : ''}
    </div>`;
  card.appendChild(info);

  const chevron = document.createElement("div");
  chevron.className = "open-chevron";
  chevron.textContent = "›";
  card.appendChild(chevron);

  return card;
}

function renderSearch(){
  const frag = document.createDocumentFragment();
  const q = state.query.trim();
  if(q.length < 2){
    frag.appendChild(emptyState("⌕", "Continue digitando", "A busca localiza o termo em qualquer artigo do acervo."));
    return frag;
  }
  const results = searchAll(q);
  if(results.length === 0){
    frag.appendChild(emptyState("🗂️", "Nenhum artigo encontrado", `Nada com "${esc(q)}" no acervo atual. Tente outro termo ou adicione uma nova lei.`));
    return frag;
  }
  results.forEach(r => {
    const card = document.createElement("div");
    card.className = "result-card";
    card.onclick = () => {
      state.view = "law"; state.currentLawId = r.lawId; render();
      window.scrollTo(0,0);
      setTimeout(() => {
        const target = document.querySelector(`[data-art-key="${CSS.escape(r.art)}"]`);
        if(target){ target.classList.add("open"); target.scrollIntoView({behavior:"smooth", block:"center"}); }
      }, 60);
    };
    card.innerHTML = `
      <div class="result-top">
        <span class="result-law">${esc(r.lawNome)}</span>
        <span class="result-art">${esc(r.art)}</span>
      </div>
      <div class="result-snippet">${highlightSnippet(r.texto, r.idx, q)}</div>`;
    frag.appendChild(card);
  });
  return frag;
}

function emptyState(glyph, msg, sub){
  const div = document.createElement("div");
  div.className = "empty-state";
  div.innerHTML = `<div class="glyph">${glyph}</div><div class="msg">${msg}</div><div class="sub">${sub}</div>`;
  return div;
}

let articleFilterValue = "";

function renderLawDetail(){
  const frag = document.createDocumentFragment();
  const law = allLaws()[state.currentLawId];
  if(!law) return emptyState("⚠️", "Lei não encontrada", "");

  const hero = document.createElement("div");
  hero.className = "law-hero";
  hero.style.background = `linear-gradient(135deg, ${law.meta.cor || "#2C5C7A"}, ${shade(law.meta.cor || "#2C5C7A", -18)})`;
  hero.innerHTML = `
    <span class="hero-numero">${esc(law.meta.numero)}</span>
    <span class="hero-nome">${esc(law.meta.nome)}</span>
    <span class="hero-ementa">${esc(law.meta.ementa || "")}</span>
    <span class="hero-stats">${law.artigos.length} artigos indexados</span>`;
  frag.appendChild(hero);

  if(law.meta.custom){
    const delBtn = document.createElement("button");
    delBtn.className = "btn btn-danger";
    delBtn.style.marginBottom = "14px";
    delBtn.textContent = "Remover esta lei do acervo";
    delBtn.onclick = async () => {
      if(confirm(`Remover "${law.meta.nome}" do acervo?`)){
        await deleteCustomLaw(law.meta.id);
        state.view = "home"; render();
      }
    };
    frag.appendChild(delBtn);
  }

  const filter = document.createElement("input");
  filter.className = "article-filter";
  filter.placeholder = "Filtrar artigos desta lei por palavra-chave…";
  filter.value = articleFilterValue;
  filter.oninput = (e) => { articleFilterValue = e.target.value; renderArticleList(law, listWrap); };
  frag.appendChild(filter);

  const listWrap = document.createElement("div");
  frag.appendChild(listWrap);
  renderArticleList(law, listWrap);

  return frag;
}

function renderArticleList(law, container){
  container.innerHTML = "";
  const q = articleFilterValue.trim().toLowerCase();
  const arts = q.length > 0 ? law.artigos.filter(a => a.texto.toLowerCase().includes(q)) : law.artigos;

  if(arts.length === 0){
    container.appendChild(emptyState("🗂️", "Nenhum artigo corresponde", "Tente outro termo de busca."));
    return;
  }

  arts.forEach(a => {
    const item = document.createElement("div");
    item.className = "article-item";
    item.setAttribute("data-art-key", a.art);

    const head = document.createElement("div");
    head.className = "article-head";
    head.innerHTML = `<div><div class="a-num">${esc(a.art)}</div><div class="a-preview">${esc(a.texto.slice(0,90))}</div></div><div class="caret">›</div>`;
    head.onclick = () => { item.classList.toggle("open"); };
    item.appendChild(head);

    const body = document.createElement("div");
    body.className = "article-body";
    body.textContent = a.texto;
    item.appendChild(body);

    container.appendChild(item);
  });
}

function shade(hex, percent){
  try{
    let num = parseInt(hex.replace("#",""),16);
    let r = (num >> 16) + Math.round(255*percent/100);
    let g = ((num >> 8) & 0x00FF) + Math.round(255*percent/100);
    let b = (num & 0x0000FF) + Math.round(255*percent/100);
    r = Math.min(255,Math.max(0,r)); g = Math.min(255,Math.max(0,g)); b = Math.min(255,Math.max(0,b));
    return "#" + (0x1000000 + r*0x10000 + g*0x100 + b).toString(16).slice(1);
  }catch(e){ return hex; }
}

    opt.onclick = () => { modalIcon = ic; document.querySelectorAll(".icon-opt").forEach(x=>x.classList.remove("selected")); opt.classList.add("selected"); };
    iconPicker.appendChild(opt);
  });

  document.getElementById("fTexto").addEventListener("input", (e) => {
    const parsed = parseArticles(e.target.value);
    document.getElementById("parseHint").textContent = parsed.length > 0
      ? `${parsed.length} artigo(s) reconhecido(s) — ex.: ${parsed[0].art}${parsed.length>1 ? ", " + parsed[1].art : ""}…`
      : "Nenhum artigo reconhecido ainda. Verifique se o texto contém 'Art. 1º', 'Art. 2º'...";
  });

  setupPdfUpload();

  document.getElementById("closeModal").onclick = closeAddModal;
  document.getElementById("cancelAdd").onclick = closeAddModal;
  overlay.addEventListener("click", (e) => { if(e.target === overlay) closeAddModal(); });

  document.getElementById("confirmAdd").onclick = async () => {
    const nome = document.getElementById("fNome").value.trim();
    const numero = document.getElementById("fNumero").value.trim();
    const ementa = document.getElementById("fEmenta").value.trim();
    const categoria = document.getElementById("fCategoria").value.trim() || "Outras leis";
    const texto = document.getElementById("fTexto").value;

    if(!nome || !texto.trim()){
      alert("Preencha ao menos o nome da lei e o texto integral.");
      return;
    }
    const artigos = parseArticles(texto);
    if(artigos.length === 0){
      if(!confirm("Nenhum artigo foi reconhecido automaticamente. Salvar mesmo assim como texto único?")) return;
      artigos.push({art:"Texto integral", key:"full", texto: texto.trim()});
    }
    const id = "custom-" + nome.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[^a-z0-9]+/g,"-").replace(/(^-|-$)/g,"") + "-" + Date.now();
    const lawObj = {
      meta: {id, nome, numero: numero || "—", ementa, cor: modalColor, icone: modalIcon, categoria, custom: true},
      artigos
    };
    await saveCustomLaw(lawObj);
    closeAddModal();
    state.view = "law"; state.currentLawId = id; render();
    window.scrollTo(0,0);
  };
}

function closeAddModal(){
  const overlay = document.getElementById("modalOverlay");
  if(overlay) overlay.remove();
}

/* ---------------- PDF upload & extraction ---------------- */
const PDF_WORKER_URL = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
let pdfWorkerReadyPromise = null;

// Some sandboxed/iframe contexts silently block a worker loaded straight from a
// cross-origin URL: the Worker object gets created but never actually starts,
// so pdf.js's getDocument() promise just hangs forever with no error. Fetching
// the worker script ourselves and running it from a same-origin blob: URL avoids
// that class of failure. If even the fetch fails, we fall back to disabling the
// worker so pdf.js parses on the main thread instead of hanging indefinitely.
function ensurePdfWorkerReady(){
  if(pdfWorkerReadyPromise) return pdfWorkerReadyPromise;
  pdfWorkerReadyPromise = (async () => {
    if(!window.pdfjsLib) return;
    try{
      const res = await fetch(PDF_WORKER_URL);
      const code = await res.text();
      const blob = new Blob([code], {type:"application/javascript"});
      pdfjsLib.GlobalWorkerOptions.workerSrc = URL.createObjectURL(blob);
    }catch(e){
      // Couldn't fetch/blob-ify the worker — disable it so pdf.js runs
      // in the main thread instead of hanging while waiting for a worker
      // that will never respond.
      pdfjsLib.GlobalWorkerOptions.workerSrc = "";
      pdfjsLib.disableWorker = true;
    }
  })();
  return pdfWorkerReadyPromise;
}

function withTimeout(promise, ms, timeoutMsg){
  let timer;
  const timeout = new Promise((_, reject) => {
    timer = setTimeout(() => reject(new Error(timeoutMsg)), ms);
  });
  return Promise.race([promise, timeout]).finally(() => clearTimeout(timer));
}

function setupPdfUpload(){
  const drop = document.getElementById("pdfDrop");
  const input = document.getElementById("fPdf");
  if(!drop || !input) return;

  // The <input type="file"> lives inside the <label>, so the browser already
  // opens the native file picker on click — no JS needed, and no need to call
  // input.click() manually. Some sandboxed embeds block programmatic .click()
  // on file inputs, which silently no-ops the picker; relying on the native
  // label->input association avoids that entirely.
  input.addEventListener("change", async (e) => {
    const file = e.target.files && e.target.files[0];
    if(!file) return;
    await handlePdfFile(file, drop);
    // allow re-selecting the same file later (change won't fire otherwise)
    input.value = "";
  });
}

async function handlePdfFile(file, drop){
  const statusEl = document.getElementById("pdfStatus");
  const dropText = document.getElementById("pdfDropText");
  const dropSub = document.getElementById("pdfDropSub");

  if(!window.pdfjsLib){
    setPdfStatus(statusEl, "err", "Não foi possível carregar o leitor de PDF. Cole o texto manualmente.");
    return;
  }
  if(file.type !== "application/pdf" && !file.name.toLowerCase().endsWith(".pdf")){
    setPdfStatus(statusEl, "err", "Selecione um arquivo em formato PDF.");
    return;
  }

  drop.classList.add("has-file");
  dropText.textContent = file.name;
  dropSub.textContent = "Toque para escolher outro arquivo";
  setPdfStatus(statusEl, "loading", "Preparando leitor de PDF…");

  try{
    await withTimeout(ensurePdfWorkerReady(), 10000, "Não foi possível preparar o leitor de PDF a tempo.");

    setPdfStatus(statusEl, "loading", "Lendo o arquivo…");
    const buffer = await file.arrayBuffer();
    const loadingTask = pdfjsLib.getDocument({data: buffer});
    const pdf = await withTimeout(loadingTask.promise, 20000, "Tempo esgotado ao abrir o PDF.");

    let fullText = "";
    for(let p = 1; p <= pdf.numPages; p++){
      setPdfStatus(statusEl, "loading", `Extraindo página ${p} de ${pdf.numPages}…`);
      const page = await withTimeout(pdf.getPage(p), 15000, `Tempo esgotado na página ${p}.`);
      const content = await withTimeout(page.getTextContent(), 15000, `Tempo esgotado na página ${p}.`);
      const pageText = content.items.map(it => it.str).join(" ");
      fullText += pageText + "\n\n";
      // yield to the UI thread so the status text actually updates
      await new Promise(r => setTimeout(r, 0));
    }

    const textarea = document.getElementById("fTexto");
    textarea.value = fullText.trim();
    textarea.dispatchEvent(new Event("input"));

    autofillFromExtractedText(fullText);

    const parsed = parseArticles(fullText);
    if(parsed.length > 0){
      setPdfStatus(statusEl, "ok", `PDF lido com sucesso: ${pdf.numPages} página(s), ${parsed.length} artigo(s) reconhecido(s).`);
    } else {
      setPdfStatus(statusEl, "err", `PDF lido (${pdf.numPages} página(s)), mas nenhum "Art. Nº" foi reconhecido. Revise o texto abaixo.`);
    }
  }catch(err){
    console.error(err);
    const msg = (err && /Tempo esgotado|a tempo/.test(err.message))
      ? `${err.message} Isso costuma acontecer quando o leitor de PDF não consegue carregar neste ambiente. Cole o texto manualmente abaixo.`
      : "Não foi possível ler este PDF (pode estar escaneado como imagem, sem texto selecionável, ou protegido). Cole o texto manualmente.";
    setPdfStatus(statusEl, "err", msg);
  }
}

function setPdfStatus(el, kind, msg){
  if(!el) return;
  el.className = "pdf-status show" + (kind === "ok" ? " ok" : kind === "err" ? " err" : "");
  el.innerHTML = kind === "loading" ? `<span class="pdf-spinner"></span><span>${esc(msg)}</span>` : esc(msg);
}

function autofillFromExtractedText(text){
  const head = text.slice(0, 1500);

  const numeroField = document.getElementById("fNumero");
  if(numeroField && !numeroField.value.trim()){
    const m = head.match(/(LEI\s+N[ºO°]?\s*[\d.]+(?:-[A-Z]+)?,?\s+DE\s+\d{1,2}\s+DE\s+[A-ZÇÃÁ]+\s+DE\s+\d{4}|DECRETO[\-\s]LEI\s+N[ºO°]?\s*[\d.]+,?\s+DE\s+\d{1,2}\s+DE\s+[A-ZÇÃÁ]+\s+DE\s+\d{4})/i);
    if(m) numeroField.value = m[0].replace(/\s+/g," ").trim();
  }

  const ementaField = document.getElementById("fEmenta");
  if(ementaField && !ementaField.value.trim()){
    const m = head.match(/Disp[õo]e\s+sobre[^.]{5,140}\./i) || head.match(/Institui[^.]{5,140}\./i) || head.match(/Cria[^.]{5,140}\./i);
    if(m) ementaField.value = m[0].replace(/\s+/g," ").trim();
  }
}

render();
loadCustomLaws();

if("serviceWorker" in navigator){
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("sw.js").catch((e) => console.warn("SW falhou:", e));
  });
}
