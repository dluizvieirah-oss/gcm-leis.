º (VETADO)\n § 3º A imposição da penalidade será comunicada aos órgãos ou entidades executivos de trânsito responsáveis pelo licenciamento do veículo e habilitação do condutor."}, {"art": "Art. 257", "key": "257", "texto": "Art. 257. As penalidades serão impostas ao condutor, ao proprietário do veículo, ao embarcador e ao transportador, salvo os casos de descumprimento de obrigações e deveres impostos a pessoas físicas ou jurídicas expressamente mencionados neste Código.\n § 1º Aos proprietários e condutores de veículos serão impostas concomitantemente as penalidades de que trata este Código toda vez que houver responsabilidade solidária em infração dos preceitos que lhes couber observar, respondendo cada um de per si pela falta em comum que lhes for atribuída.\n § 2º Ao proprietário caberá sempre a responsabilidade pela infração referente à prévia regularização e preenchimento das formalidades e condições exigidas para o trânsito do veículo na via terrestre, conservação e inalterabilidade de suas características, componentes, agregados, habilitação legal e compatível de seus condutores, quando esta for exigida, e outras disposições que deva observar.\n § 3º Ao condutor caberá a responsabilidade pelas infrações decorrentes de atos praticados na direção do veículo.\n § 4º O embarcador é responsável pela infração relativa ao transporte de carga com excesso de peso nos eixos ou no peso bruto total, quando simultaneamente for o único remetente da carga e o peso declarado na nota fiscal, fatura ou manifesto for inferior àquele aferido.\n § 5º O transportador é o responsável pela infração relativa ao transporte de carga com excesso de peso nos eixos ou quando a carga proveniente de mais de um embarcador ultrapassar o peso bruto total.\n § 6º O transportador e o embarcador são solidariamente responsáveis pela infração relativa ao excesso de peso bruto total, se o peso declarado na nota fiscal, fatura ou manifesto for superior ao limite legal.\n § 7º Quando não for imediata a identificação do infrator, o principal condutor ou o proprietário do veículo terá o prazo de 30 (trinta) dias, contado da notificação da autuação, para apresentá-lo, na forma em que dispuser o Contran, e, transcorrido o prazo, se não o fizer, será considerado responsável pela infração o principal condutor ou, em sua ausência, o proprietário do veículo. (Redação dada pela Lei nº 14.071, de 2020) (Vigência)\n\f § 8º Após o prazo previsto no § 7º deste artigo, se o infrator não tiver sido identificado, e o veículo for de propriedade de pessoa jurídica, será lavrada nova multa ao proprietário do veículo, mantida a originada pela infração, cujo valor será igual a 2 (duas) vezes o da multa originária, garantidos o direito de defesa prévia e de interposição de recursos previstos neste Código, na forma estabelecida pelo Contran. (Redação dada pela Lei nº 14.229, de 2021)\n(Vigência)\n § 9º O fato de o infrator ser pessoa jurídica não o exime do disposto no § 3º do art. 258 e no art. 259.\n § 10. O proprietário poderá indicar ao órgão executivo de trânsito o principal condutor do veículo, o qual, após aceitar a indicação, terá seu nome inscrito em campo próprio do cadastro do veículo no Renavam. (Incluído pela\nLei nº 13.495, 2017) (Vigência)\n § 11. O principal condutor será excluído do Renavam: (Incluído pela Lei nº 13.495, 2017) (Vigência)\n I - quando houver transferência de propriedade do veículo; (Incluído pela Lei nº 13.495, 2017) (Vigência)\n II - mediante requerimento próprio ou do proprietário do veículo; (Incluído pela Lei nº 13.495, 2017)\n(Vigência)\n III - a partir da indicação de outro principal condutor. (Incluído pela Lei nº 13.495, 2017) (Vigência)"}, {"art": "Art. 258", "key": "258", "texto": "Art. 258. As infrações punidas com multa classificam-se, de acordo com sua gravidade, em quatro categorias:\n I - infração de natureza gravíssima, punida com multa no valor de R$ 293,47 (duzentos e noventa e três reais e quarenta e sete centavos); (Redação dada pela Lei nº 13.281, de 2016) (Vigência)\n II - infração de natureza grave, punida com multa no valor de R$ 195,23 (cento e noventa e cinco reais e vinte e três centavos); (Redação dada pela Lei nº 13.281, de 2016) (Vigência)\n III - infração de natureza média, punida com multa no valor de R$ 130,16 (cento e trinta reais e dezesseis centavos); (Redação dada pela Lei nº 13.281, de 2016) (Vigência)\n IV - infração de natureza leve, punida com multa no valor de R$ 88,38 (oitenta e oito reais e trinta e oito centavos). (Redação dada pela Lei nº 13.281, de 2016) (Vigência)\n § 1º (Revogado). (Redação dada pela Lei nº 13.281, de 2016) (Vigência)\n § 2º Quando se tratar de multa agravada, o fator multiplicador ou índice adicional específico é o previsto neste\nCódigo.\n § 3º (VETADO)\n § 4º (VETADO)"}, {"art": "Art. 259", "key": "259", "texto": "Art. 259. A cada infração cometida são computados os seguintes números de pontos:\n I - gravíssima - sete pontos;\n II - grave - cinco pontos;\n III - média - quatro pontos;\n IV - leve - três pontos.\n § 1º (VETADO)\n § 2º (VETADO)\n § 3o (VETADO). (Incluído pela Lei nº 12.619, de 2012) (Vigência)\n § 4º Ao condutor identificado será atribuída pontuação pelas infrações de sua responsabilidade, nos termos previstos no § 3º do art. 257 deste Código, exceto aquelas: (Redação dada pela Lei nº 14.071, de 2020)\n I - praticadas por passageiros usuários do serviço de transporte rodoviário de passageiros em viagens de longa distância transitando em rodovias com a utilização de ônibus, em linhas regulares intermunicipal, interestadual, internacional e aquelas em viagem de longa distância por fretamento e turismo ou de qualquer modalidade, excluídas as\n\fsituações regulamentadas pelo Contran conforme disposto no art. 65 deste Código; (Incluído pela Lei nº 14.071, de 2020)\n II - previstas no art. 221, nos incisos VII e XXI do art. 230 e nos arts. 232, 233, 233-A, 240 e 241 deste Código, sem prejuízo da aplicação das penalidades e medidas administrativas cabíveis; (Incluído pela Lei nº 14.071, de 2020)\n III - puníveis de forma específica com suspensão do direito de dirigir. (Incluído pela Lei nº 14.071, de 2020)\n(Vigência)"}, {"art": "Art. 260", "key": "260", "texto": "Art. 260. As multas serão impostas e arrecadadas pelo órgão ou entidade de trânsito com circunscrição sobre a via onde haja ocorrido a infração, de acordo com a competência estabelecida neste Código.\n § 1º As multas decorrentes de infração cometida em unidade da Federação diversa da do licenciamento do veículo serão arrecadadas e compensadas na forma estabelecida pelo CONTRAN.\n § 2º As multas decorrentes de infração cometida em unidade da Federação diversa daquela do licenciamento do veículo poderão ser comunicadas ao órgão ou entidade responsável pelo seu licenciamento, que providenciará a notificação.\n § 3º (Revogado pela Lei nº 9.602, de 1998)\n § 4º Quando a infração for cometida com veículo licenciado no exterior, em trânsito no território nacional, a multa respectiva deverá ser paga antes de sua saída do País, respeitado o princípio de reciprocidade."}, {"art": "Art. 261", "key": "261", "texto": "Art. 261. A penalidade de suspensão do direito de dirigir será imposta nos seguintes casos: (Redação dada pela\nLei nº 13.281, de 2016) (Vigência)\n I - sempre que, conforme a pontuação prevista no art. 259 deste Código, o infrator atingir, no período de 12 (doze) meses, a seguinte contagem de pontos: (Redação dada pela Lei nº 14.071, de 2020) (Vigência)\n a) 20 (vinte) pontos, caso constem 2 (duas) ou mais infrações gravíssimas na pontuação; (Incluído pela Lei nº 14.071, de 2020) (Vigência)\n b) 30 (trinta) pontos, caso conste 1 (uma) infração gravíssima na pontuação; (Incluído pela Lei nº 14.071, de 2020) (Vigência)\n c) 40 (quarenta) pontos, caso não conste nenhuma infração gravíssima na pontuação; (Incluído pela Lei nº 14.071, de 2020) (Vigência)\n II - por transgressão às normas estabelecidas neste Código, cujas infrações preveem, de forma específica, a penalidade de suspensão do direito de dirigir. (Incluído pela Lei nº 13.281, de 2016) (Vigência)\n III - (VETADO). (Incluído pela Lei nº 14.304, de 2022) (Vigência)\n § 1º Os prazos para aplicação da penalidade de suspensão do direito de dirigir são os seguintes: (Redação dada pela Lei nº 13.281, de 2016) (Vigência)\n I - no caso do inciso I do caput: de 6 (seis) meses a 1 (um) ano e, no caso de reincidência no período de 12 (doze) meses, de 8 (oito) meses a 2 (dois) anos; (Incluído pela Lei nº 13.281, de 2016) (Vigência)\n II - no caso do inciso II do caput: de 2 (dois) a 8 (oito) meses, exceto para as infrações com prazo descrito no dispositivo infracional, e, no caso de reincidência no período de 12 (doze) meses, de 8 (oito) a 18 (dezoito) meses, respeitado o disposto no inciso II do art. 263. (Incluído pela Lei nº 13.281, de 2016) (Vigência)\n III - (VETADO). (Incluído pela Lei nº 14.304, de 2022) (Vigência)\n § 2º Quando ocorrer a suspensão do direito de dirigir, a Carteira Nacional de Habilitação será devolvida a seu titular imediatamente após cumprida a penalidade e o curso de reciclagem.\n § 3º A imposição da penalidade de suspensão do direito de dirigir elimina a quantidade de pontos computados, prevista no inciso I do caput ou no § 5º deste artigo, para fins de contagem subsequente. (Redação dada pela Lei nº 14.071, de 2020) (Vigência)\n § 4o (VETADO). (Incluído pela Lei nº 12.619, de 2012) (Vigência)\n § 5º No caso do condutor que exerce atividade remunerada ao veículo, a penalidade de suspensão do direito de dirigir de que trata o caput deste artigo será imposta quando o infrator atingir o limite de pontos previsto na alínea c do inciso I do caput deste artigo, independentemente da natureza das infrações cometidas, facultado a ele participar de\n\fcurso preventivo de reciclagem sempre que, no período de 12 (doze) meses, atingir 30 (trinta) pontos, conforme regulamentação do Contran. (Redação dada pela Lei nº 14.071, de 2020) (Vigência)\n § 6o Concluído o curso de reciclagem previsto no § 5o, o condutor terá eliminados os pontos que lhe tiverem sido atribuídos, para fins de contagem subsequente. (Incluído pela Lei nº 13.154, de 2015)\n § 7º O motorista que optar pelo curso previsto no § 5º não poderá fazer nova opção no período de 12 (doze) meses. (Redação dada pela Lei nº 13.281, de 2016) (Vigência)\n § 8o A pessoa jurídica concessionária ou permissionária de serviço público tem o direito de ser informada dos pontos atribuídos, na forma do art. 259, aos motoristas que integrem seu quadro funcional, exercendo atividade remunerada ao volante, na forma que dispuser o Contran. (Incluído pela Lei nº 13.154, de 2015)\n § 9º Incorrerá na infração prevista no inciso II do art. 162 o condutor que, notificado da penalidade de que trata este artigo, dirigir veículo automotor em via pública. (Incluído pela Lei nº 13.281, de 2016) (Vigência)\n § 10. O processo de suspensão do direito de dirigir a que se refere o inciso II do caput deste artigo deverá ser instaurado concomitantemente ao processo de aplicação da penalidade de multa, e ambos serão de competência do órgão ou entidade responsável pela aplicação da multa, na forma definida pelo Contran. (Redação dada pela Lei nº 14.071, de 2020) (Vigência)\n § 11. O Contran regulamentará as disposições deste artigo. (Incluído pela Lei nº 13.281, de 2016)\n(Vigência)\n § 12. (VETADO). (Incluído pela Lei nº 14.304, de 2022) (Vigência)\n § 13. (VETADO). (Incluído pela Lei nº 14.304, de 2022) (Vigência)"}, {"art": "Art. 262", "key": "262", "texto": "Art. 262. (Revogado pela Lei nº 13.281, de 2016) (Vigência)"}, {"art": "Art. 263", "key": "263", "texto": "Art. 263. A cassação do documento de habilitação dar-se-á:\n I - quando, suspenso o direito de dirigir, o infrator conduzir qualquer veículo;\n II - no caso de reincidência, no prazo de doze meses, das infrações previstas no inciso III do art. 162 e nos arts. 163, 164, 165, 173, 174 e 175;\n III - quando condenado judicialmente por delito de trânsito, observado o disposto no art. 160.\n IV - (VETADO). (Incluído pela Lei nº 14.304, de 2022) (Vigência)\n § 1º Constatada, em processo administrativo, a irregularidade na expedição do documento de habilitação, a autoridade expedidora promoverá o seu cancelamento.\n § 2º Decorridos dois anos da cassação da Carteira Nacional de Habilitação, o infrator poderá requerer sua reabilitação, submetendo-se a todos os exames necessários à habilitação, na forma estabelecida pelo CONTRAN.\n § 3º (VETADO). (Incluído pela Lei nº 14.304, de 2022) (Vigência)"}, {"art": "Art. 264", "key": "264", "texto": "Art. 264. (VETADO)"}, {"art": "Art. 265", "key": "265", "texto": "Art. 265. As penalidades de suspensão do direito de dirigir e de cassação do documento de habilitação serão aplicadas por decisão fundamentada da autoridade de trânsito competente, em processo administrativo, assegurado ao infrator amplo direito de defesa."}, {"art": "Art. 266", "key": "266", "texto": "Art. 266. Quando o infrator cometer, simultaneamente, duas ou mais infrações, ser-lhe-ão aplicadas, cumulativamente, as respectivas penalidades."}, {"art": "Art. 267", "key": "267", "texto": "Art. 267. Deverá ser imposta a penalidade de advertência por escrito à infração de natureza leve ou média, passível de ser punida com multa, caso o infrator não tenha cometido nenhuma outra infração nos últimos 12 (doze) meses.\n(Redação dada pela Lei nº 14.071, de 2020) (Vigência)\n § 1º (Revogado). (Redação dada pela Lei nº 14.071, de 2020) (Vigência)\n § 2º (Revogado). (Redação dada pela Lei nº 14.071, de 2020) (Vigência)"}, {"art": "Art. 268", "key": "268", "texto": "Art. 268. O infrator será submetido a curso de reciclagem, na forma estabelecida pelo CONTRAN:\n I - (revogado); (Redação dada pela Lei nº 14.071, de 2020) (Vigência)\n II - quando suspenso do direito de dirigir;\n III - quando se envolver em sinistro grave para o qual haja contribuído, independentemente de processo judicial; (Redação dada pela Lei nº 14.599, de 2023)\n IV - quando condenado judicialmente por delito de trânsito;\n V - a qualquer tempo, se for constatado que o condutor está colocando em risco a segurança do trânsito;\n VI - (revogado). (Redação dada pela Lei nº 14.071, de 2020) (Vigência)\n Parágrafo único. Além do curso de reciclagem previsto no caput deste artigo, o infrator será submetido à avaliação psicológica nos casos dos incisos III, IV e V do caput deste artigo. (Incluído pela Lei nº 14.071, de 2020)\n(Vigência) (Parte promulgada pelo Congresso Nacional)"}, {"art": "Art. 268-A", "key": "268-A", "texto": "Art. 268-A. Fica criado o Registro Nacional Positivo de Condutores (RNPC), administrado pelo órgão máximo executivo de trânsito da União, com a finalidade de cadastrar os condutores que não cometeram infração de trânsito sujeita à pontuação prevista no art. 259 deste Código, nos últimos 12 (doze) meses, conforme regulamentação do\nContran. (Incluído pela Lei nº 14.071, de 2020) (Vigência)\n § 1º O RNPC deverá ser atualizado mensalmente. (Incluído pela Lei nº 14.071, de 2020) (Vigência)\n § 2º A abertura de cadastro requer autorização prévia e expressa do potencial cadastrado. (Incluído\n pela Lei nº 14.071, de 2020) (Vigência)\n § 3º Após a abertura do cadastro, a anotação de informação no RNPC independe de autorização e de\n comunicação ao cadastrado. (Incluído pela Lei nº 14.071, de 2020) (Vigência)\n § 4º A exclusão do RNPC dar-se-á: (Incluído pela Lei nº 14.071, de 2020) (Vigência)\n I - por solicitação do cadastrado; (Incluído pela Lei nº 14.071, de 2020) (Vigência)\n II - quando for atribuída ao cadastrado pontuação por infração; (Incluído pela Lei nº 14.071, de\n 2020) (Vigência)\n III - quando o cadastrado tiver o direito de dirigir suspenso; (Incluído pela Lei nº 14.071, de 2020)\n (Vigência)\n IV - quando a Carteira Nacional de Habilitação do cadastrado estiver cassada ou com validade vencida há\n mais de 30 (trinta) dias; (Incluído pela Lei nº 14.071, de 2020) (Vigência)\n V - quando o cadastrado estiver cumprindo pena privativa de liberdade. (Incluído pela Lei nº 14.071, de\n 2020) (Vigência)\n § 5º A consulta ao RNPC é garantida a todos os cidadãos, nos termos da regulamentação do Contran.\n (Incluído pela Lei nº 14.071, de 2020) (Vigência)\n § 6º A União, os Estados, o Distrito Federal e os Municípios poderão utilizar o RNPC para conceder benefícios fiscais ou tarifários aos condutores cadastrados, na forma da legislação específica de cada ente da\nFederação. (Incluído pela Lei nº 14.071, de 2020) (Vigência)\n § 7º O condutor que, ao término do período de validade da Carteira Nacional de Habilitação ou da Autorização para Conduzir Ciclomotor, estiver cadastrado no RNPC terá sua habilitação renovada automaticamente e ficará dispensado dos procedimentos previstos no art. 147 deste Código, com exceção dos exames de aptidão física e mental. (Redação dada pela Lei nº 15.428, de 2026)\n § 8º (Incluído pela Medida Provisória nº 1.327, de 2025)\n I- (Incluído pela Medida Provisória nº 1.327, de 2025)\n II - (Incluído pela Medida Provisória nº 1.327, de 2025)\n III - (Incluído pela Medida Provisória nº 1.327, de 2025)\n Í\n\f CAPÍTULO XVII\n DAS MEDIDAS ADMINISTRATIVAS"}, {"art": "Art. 269", "key": "269", "texto": "Art. 269. A autoridade de trânsito ou seus agentes, na esfera das competências estabelecidas neste Código e dentro de sua circunscrição, deverá adotar as seguintes medidas administrativas:\n I - retenção do veículo;\n II - remoção do veículo;\n III - recolhimento da Carteira Nacional de Habilitação;\n IV - recolhimento da Permissão para Dirigir;\n V - recolhimento do Certificado de Registro;\n VI - recolhimento do Certificado de Licenciamento Anual;\n VII - (VETADO)\n VIII - transbordo do excesso de carga;\n IX - realização de teste de dosagem de alcoolemia ou perícia de substância entorpecente ou que determine dependência física ou psíquica;\n X - recolhimento de animais que se encontrem soltos nas vias e na faixa de domínio das vias de circulação, restituindo-os aos seus proprietários, após o pagamento de multas e encargos devidos.\n XI - realização de exames de aptidão física, mental, de legislação, de prática de primeiros socorros e de direção veicular. (Incluído pela Lei nº 9.602, de 1998)\n § 1º A ordem, o consentimento, a fiscalização, as medidas administrativas e coercitivas adotadas pelas autoridades de trânsito e seus agentes terão por objetivo prioritário a proteção à vida e à incolumidade física da pessoa.\n § 2º As medidas administrativas previstas neste artigo não elidem a aplicação das penalidades impostas por infrações estabelecidas neste Código, possuindo caráter complementar a estas.\n § 3º São documentos de habilitação: (Redação dada pela Lei nº 14.599, de 2023)\n I - a Carteira Nacional de Habilitação; (Incluído pela Lei nº 14.599, de 2023)\n II - a Permissão para Dirigir; e (Incluído pela Lei nº 14.599, de 2023)\n III - a Autorização para Conduzir Ciclomotor. (Incluído pela Lei nº 14.599, de 2023)\n § 4º Aplica-se aos animais recolhidos na forma do inciso X o disposto nos arts. 271 e 328, no que couber.\n § 5º No caso de documentos em meio digital, as medidas administrativas previstas nos incisos III, IV, V e VI do caput deste artigo serão realizadas por meio de registro no Renach ou Renavam, conforme o caso, na forma estabelecida pelo\nContran. (Incluído pela Lei nº 14.071, de 2020) (Vigência)"}, {"art": "Art. 270", "key": "270", "texto": "Art. 270. O veículo poderá ser retido nos casos expressos neste Código.\n § 1º Quando a irregularidade puder ser sanada no local da infração, o veículo será liberado tão logo seja regularizada a situação.\n § 2º Quando não for possível sanar a falha no local da infração, o veículo, desde que ofereça condições de segurança para circulação, deverá ser liberado e entregue a condutor regularmente habilitado, mediante recolhimento do\nCertificado de Licenciamento Anual, contra apresentação de recibo, assinalando-se ao condutor prazo razoável, não superior a 30 (trinta) dias, para regularizar a situação, e será considerado notificado para essa finalidade na mesma ocasião. (Redação dada pela Lei nº 14.071, de 2020) (Vigência)\n § 3º O Certificado de Licenciamento Anual será devolvido ao condutor no órgão ou entidade aplicadores das medidas administrativas, tão logo o veículo seja apresentado à autoridade devidamente regularizado.\n § 4º Não se apresentando condutor habilitado no local da infração, o veículo será removido a depósito, aplicando-se neste caso o disposto no art. 271. (Redação dada pela Lei nº 13.281, de 2016) (Vigência)\n\f § 5º A critério do agente, não se dará a retenção imediata, quando se tratar de veículo de transporte coletivo transportando passageiros ou veículo transportando produto perigoso ou perecível, desde que ofereça condições de segurança para circulação em via pública.\n § 6º Não efetuada a regularização no prazo a que se refere o § 2o, será feito registro de restrição administrativa no\nRenavam por órgão ou entidade executivo de trânsito dos Estados e do Distrito Federal, que será retirada após comprovada a regularização. (Incluído pela Lei nº 13.160, de 2015)\n § 7o O descumprimento das obrigações estabelecidas no § 2o resultará em recolhimento do veículo ao depósito, aplicando-se, nesse caso, o disposto no art. 271. (Incluído pela Lei nº 13.160, de 2015)"}, {"art": "Art. 271", "key": "271", "texto": "Art. 271. O veículo será removido, nos casos previstos neste Código, para o depósito fixado pelo órgão ou entidade competente, com circunscrição sobre a via.\n § 1o A restituição do veículo removido só ocorrerá mediante prévio pagamento de multas, taxas e despesas com remoção e estada, além de outros encargos previstos na legislação específica. (Incluído pela Lei nº 13.160, de 2015)\n § 2o A liberação do veículo removido é condicionada ao reparo de qualquer componente ou equipamento obrigatório que não esteja em perfeito estado de funcionamento. (Incluído pela Lei nº 13.160, de 2015)\n § 3º Se o reparo referido no § 2º demandar providência que não possa ser tomada no depósito, a autoridade responsável pela remoção liberará o veículo para reparo, na forma transportada, mediante autorização, assinalando prazo para reapresentação. (Redação dada pela Lei nº 13.281, de 2016)\n § 4º Os serviços de remoção, depósito e guarda de veículo poderão ser realizados por órgão público, diretamente, ou por particular contratado por licitação pública, sendo o proprietário do veículo o responsável pelo pagamento dos custos desses serviços. (Redação dada pela Lei nº 13.281, de 2016)\n § 5o O proprietário ou o condutor deverá ser notificado, no ato de remoção do veículo, sobre as providências necessárias à sua restituição e sobre o disposto no art. 328, conforme regulamentação do CONTRAN. (Incluído pela\nLei nº 13.160, de 2015)\n § 6º Caso o proprietário ou o condutor não esteja presente no momento da remoção do veículo, a autoridade de trânsito, no prazo de 10 (dez) dias contado da data da remoção, deverá expedir ao proprietário a notificação prevista no § 5º, por remessa postal ou por outro meio tecnológico hábil que assegure a sua ciência, e, caso reste frustrada, a notificação poderá ser feita por edital. (Redação dada pela Lei nº 13.281, de 2016)\n § 7o A notificação devolvida por desatualização do endereço do proprietário do veículo ou por recusa desse de recebê-la será considerada recebida para todos os efeitos (Incluído pela Lei nº 13.160, de 2015)\n § 8o Em caso de veículo licenciado no exterior, a notificação será feita por edital. (Incluído pela Lei nº 13.160, de 2015)\n § 9º Não caberá remoção nos casos em que a irregularidade for sanada no local da infração. (Redação dada pela Lei nº 14.071, de 2020) (Vigência)\n § 9º-A. Quando não for possível sanar a irregularidade no local da infração, o veículo, desde que ofereça condições de segurança para circulação, será liberado e entregue a condutor regularmente habilitado, mediante recolhimento do Certificado de Licenciamento Anual, contra a apresentação de recibo, e prazo razoável, não superior a 15 (quinze) dias, será assinalado ao condutor para regularizar a situação, o qual será considerado notificado para essa finalidade na mesma ocasião. (Incluído pela Lei nº 14.229, de 2021)\n § 9º-B. O disposto no § 9º-A deste artigo não se aplica às infrações previstas no inciso V do caput do art. 230 e no inciso VIII do caput do art. 231 deste Código. (Incluído pela Lei nº 14.229, de 2021)\n § 9º-C. Não efetuada a regularização no prazo referido no § 9º-A deste artigo, será feito registro de restrição administrativa no Renavam por órgão ou entidade executivos de trânsito dos Estados ou do Distrito Federal, o qual será retirado após comprovada a regularização. (Incluído pela Lei nº 14.229, de 2021)\n § 9º-D. O descumprimento da obrigação estabelecida no § 9º-A deste artigo resultará em recolhimento do veículo ao depósito, aplicando-se, nesse caso, o disposto neste artigo. (Incluído pela Lei nº 14.229, de 2021)\n § 10. O pagamento das despesas de remoção e estada será correspondente ao período integral, contado em dias, em que efetivamente o veículo permanecer em depósito, limitado ao prazo de 6 (seis) meses. (Incluído pela Lei nº 13.281, de 2016)\n\f § 11. Os custos dos serviços de remoção e estada prestados por particulares poderão ser pagos pelo proprietário diretamente ao contratado. (Incluído pela Lei nº 13.281, de 2016)\n § 12. O disposto no § 11 não afasta a possibilidade de o respectivo ente da Federação estabelecer a cobrança por meio de taxa instituída em lei. (Incluído pela Lei nº 13.281, de 2016)\n § 13. No caso de o proprietário do veículo objeto do recolhimento comprovar, administrativa ou judicialmente, que o recolhimento foi indevido ou que houve abuso no período de retenção em depósito, é da responsabilidade do ente público a devolução das quantias pagas por força deste artigo, segundo os mesmos critérios da devolução de multas indevidas. (Incluído pela Lei nº 13.281, de 2016)"}, {"art": "Art. 272", "key": "272", "texto": "Art. 272. O recolhimento da Carteira Nacional de Habilitação e da Permissão para Dirigir dar-se-á mediante recibo, além dos casos previstos neste Código, quando houver suspeita de sua inautenticidade ou adulteração."}, {"art": "Art. 273", "key": "273", "texto": "Art. 273. O recolhimento do Certificado de Registro dar-se-á mediante recibo, além dos casos previstos neste\nCódigo, quando:\n I - houver suspeita de inautenticidade ou adulteração;\n II - se, alienado o veículo, não for transferida sua propriedade no prazo de trinta dias."}, {"art": "Art. 274", "key": "274", "texto": "Art. 274. O recolhimento do Certificado de Licenciamento Anual dar-se-á mediante recibo, além dos casos previstos neste Código, quando:\n I - houver suspeita de inautenticidade ou adulteração;\n II - se o prazo de licenciamento estiver vencido;\n III - no caso de retenção do veículo, se a irregularidade não puder ser sanada no local."}, {"art": "Art. 275", "key": "275", "texto": "Art. 275. O transbordo da carga com peso excedente é condição para que o veículo possa prosseguir viagem e será efetuado às expensas do proprietário do veículo, sem prejuízo da multa aplicável.\n Parágrafo único. Não sendo possível desde logo atender ao disposto neste artigo, o veículo será recolhido ao depósito, sendo liberado após sanada a irregularidade e pagas as despesas de remoção e estada."}, {"art": "Art. 276", "key": "276", "texto": "Art. 276. Qualquer concentração de álcool por litro de sangue ou por litro de ar alveolar sujeita o condutor às penalidades previstas no art. 165. (Redação dada pela Lei nº 12.760, de 2012)\n Parágrafo único. O Contran disciplinará as margens de tolerância quando a infração for apurada por meio de aparelho de medição, observada a legislação metrológica. (Redação dada pela Lei nº 12.760, de 2012)"}, {"art": "Art. 277", "key": "277", "texto": "Art. 277. O condutor de veículo automotor envolvido em sinistro de trânsito ou que for alvo de fiscalização de trânsito poderá ser submetido a teste, exame clínico, perícia ou outro procedimento que, por meios técnicos ou científicos, na forma disciplinada pelo Contran, permita certificar influência de álcool ou outra substância psicoativa que determine dependência. (Redação dada pela Lei nº 14.599, de 2023)\n § 1o (Revogado). (Redação dada pela Lei nº 12.760, de 2012)\n § 2o A infração prevista no art. 165 também poderá ser caracterizada mediante imagem, vídeo, constatação de sinais que indiquem, na forma disciplinada pelo Contran, alteração da capacidade psicomotora ou produção de quaisquer outras provas em direito admitidas. (Redação dada pela Lei nº 12.760, de 2012)\n § 3º Serão aplicadas as penalidades e medidas administrativas estabelecidas no art. 165-A deste Código ao condutor que se recusar a se submeter a qualquer dos procedimentos previstos no caput deste artigo. (Redação dada pela Lei nº 13.281, de 2016) (Vigência)"}, {"art": "Art. 278", "key": "278", "texto": "Art. 278. Ao condutor que se evadir da fiscalização, não submetendo veículo à pesagem obrigatória nos pontos de pesagem, fixos ou móveis, será aplicada a penalidade prevista no art. 209, além da obrigação de retornar ao ponto de evasão para fim de pesagem obrigatória.\n Parágrafo único. No caso de fuga do condutor à ação policial, a apreensão do veículo dar-se-á tão logo seja localizado, aplicando-se, além das penalidades em que incorre, as estabelecidas no art. 210."}, {"art": "Art. 278-A", "key": "278-A", "texto": "Art. 278-A. O condutor que se utilize de veículo para a prática do crime de receptação, descaminho, contrabando, previstos nos arts. 180, 334 e 334-A do Decreto-Lei nº 2.848, de 7 de dezembro de 1940 (Código Penal), condenado por um desses crimes em decisão judicial transitada em julgado, terá cassado seu documento de habilitação ou será proibido de obter a habilitação para dirigir veículo automotor pelo prazo de 5 (cinco) anos. (Incluído pela Lei nº 13.804, de 2019)\n § 1º O condutor condenado poderá requerer sua reabilitação, submetendo-se a todos os exames necessários à habilitação, na forma deste Código. (Incluído pela Lei nº 13.804, de 2019)\n § 2º No caso do condutor preso em flagrante na prática dos crimes de que trata o caput deste artigo, poderá o juiz, em qualquer fase da investigação ou da ação penal, se houver necessidade para a garantia da ordem pública, como medida cautelar, de ofício, ou a requerimento do Ministério Público ou ainda mediante representação da autoridade policial, decretar, em decisão motivada, a suspensão da permissão ou da habilitação para dirigir veículo automotor, ou a proibição de sua obtenção. (Incluído pela Lei nº 13.804, de 2019)"}, {"art": "Art. 279", "key": "279", "texto": "Art. 279. Em caso de sinistro com vítima envolvendo veículo equipado com registrador instantâneo de velocidade e tempo, somente o perito oficial encarregado do levantamento pericial poderá retirar o disco ou unidade armazenadora do registro. (Redação dada pela Lei nº 14.599, de 2023)"}, {"art": "Art. 279-A", "key": "279-A", "texto": "Art. 279-A. O veículo em estado de abandono ou sinistrado poderá ser removido para o depósito fixado pelo órgão ou entidade competente do Sistema Nacional de Trânsito independentemente da existência de infração à legislação de trânsito, nos termos da regulamentação do Contran. (Redação dada pela Lei nº 14.599, de 2023)\n § 1º A remoção do veículo sinistrado será realizada quando não houver responsável por ele no local do sinistro. (Redação dada pela Lei nº 14.599, de 2023)\n § 2º Aplicam-se à remoção de veículo em estado de abandono ou sinistrado as disposições constantes do art. 328, sem prejuízo das demais disposições deste Código. (Redação dada pela Lei nº 14.599, de 2023)\n CAPÍTULO XVIII\n DO PROCESSO ADMINISTRATIVO\n Seção I\n Da Autuação"}, {"art": "Art. 280", "key": "280", "texto": "Art. 280. Ocorrendo infração prevista na legislação de trânsito, lavrar-se-á auto de infração, do qual constará:\n I - tipificação da infração;\n II - local, data e hora do cometimento da infração;\n III - caracteres da placa de identificação do veículo, sua marca e espécie, e outros elementos julgados necessários\nà sua identificação;\n IV - o prontuário do condutor, sempre que possível;\n V - identificação do órgão ou entidade e da autoridade ou agente autuador ou equipamento que comprovar a infração;\n VI - assinatura do infrator, sempre que possível, valendo esta como notificação do cometimento da infração.\n § 1º (VETADO)\n § 2º A infração deverá ser comprovada por declaração da autoridade ou do agente da autoridade de trânsito, por aparelho eletrônico ou por equipamento audiovisual, reações químicas ou qualquer outro meio tecnologicamente disponível, previamente regulamentado pelo CONTRAN.\n § 3º Não sendo possível a autuação em flagrante, o agente de trânsito relatará o fato à autoridade no próprio auto de infração, informando os dados a respeito do veículo, além dos constantes nos incisos I, II e III, para o procedimento previsto no artigo seguinte.\n § 4º O agente da autoridade de trânsito competente para lavrar o auto de infração poderá ser servidor civil, estatutário ou celetista ou, ainda, policial militar designado pela autoridade de trânsito com jurisdição sobre a via no âmbito de sua competência.\n § 5º (VETADO). (Incluído pela Lei nº 14.599, de 2023)\n\f § 6º Não há infração de circulação, parada ou estacionamento relativa aos veículos destinados a socorro de incêndio e salvamento, aos de polícia, aos de fiscalização e operação de trânsito e às ambulâncias, ainda que não identificados ostensivamente. (Incluído pela Lei nº 14.599, de 2023\n Seção II\n Do Julgamento das Autuações e Penalidades"}, {"art": "Art. 281", "key": "281", "texto": "Art. 281. A autoridade de trânsito, na esfera da competência estabelecida neste Código e dentro de sua circunscrição, julgará a consistência do auto de infração e aplicará a penalidade cabível.\n § 1º O auto de infração será arquivado e seu registro julgado insubsistente: (Renumerado do parágrafo único pela Lei nº 14.304, de 2022) (Vigência)\n I - se considerado inconsistente ou irregular;\n II - se, no prazo máximo de trinta dias, não for expedida a notificação da autuação. (Redação dada pela Lei nº 9.602, de 1998)\n § 2º O prazo para expedição da notificação da autuação referente às penalidades de suspensão do direito de dirigir e de cassação do documento de habilitação será contado a partir da data da instauração do processo destinado\nà aplicação dessas penalidades. (Incluído pela Lei nº 14.304, de 2022) (Vigência)"}, {"art": "Art. 281-A", "key": "281-A", "texto": "Art. 281-A. Na notificação de autuação e no auto de infração, quando valer como notificação de autuação, deverá constar o prazo para apresentação de defesa prévia, que não será inferior a 30 (trinta) dias, contado da data de expedição da notificação. (Incluído pela Lei nº 14.071, de 2020) (Vigência)"}, {"art": "Art. 282", "key": "282", "texto": "Art. 282. Caso a defesa prévia seja indeferida ou não seja apresentada no prazo estabelecido, será aplicada a penalidade e expedida notificação ao proprietário do veículo ou ao infrator, por remessa postal ou por qualquer outro meio tecnológico hábil que assegure a ciência da imposição da penalidade. (Redação dada pela Lei nº 14.229, de 2021)\n § 1º A notificação devolvida por desatualização do endereço do proprietário do veículo ou por recusa em recebê- la será considerada válida para todos os efeitos. (Redação dada pela Lei nº 14.229, de 2021)\n § 2º A notificação a pessoal de missões diplomáticas, de repartições consulares de carreira e de representações de organismos internacionais e de seus integrantes será remetida ao Ministério das Relações Exteriores para as providências cabíveis e cobrança dos valores, no caso de multa.\n § 3º Sempre que a penalidade de multa for imposta a condutor, à exceção daquela de que trata o § 1º do art. 259, a notificação será encaminhada ao proprietário do veículo, responsável pelo seu pagamento.\n § 4º Da notificação deverá constar a data do término do prazo para apresentação de recurso pelo responsável pela infração, que não será inferior a trinta dias contados da data da notificação da penalidade. (Incluído pela Lei nº 9.602, de 1998)\n § 5º No caso de penalidade de multa, a data estabelecida no parágrafo anterior será a data para o recolhimento de seu valor. (Incluído pela Lei nº 9.602, de 1998)\n § 6º O prazo para expedição das notificações das penalidades previstas no art. 256 deste Código é de 180 (cento e oitenta) dias ou, se houver interposição de defesa prévia, de 360 (trezentos e sessenta) dias, contado: (Redação dada pela Lei nº 14.229, de 2021)\n I - no caso das penalidades previstas nos incisos I e II do caput do art. 256 deste Código, da data do cometimento da infração; (Incluído pela Lei nº 14.229, de 2021)\n II - no caso das demais penalidades previstas no art. 256 deste Código, da conclusão do processo administrativo da penalidade que lhe der causa. (Incluído pela Lei nº 14.229, de 2021)\n § 6º-A. Para fins de aplicação do inciso I do § 6º deste artigo, no caso das autuações que não sejam em flagrante, o prazo será contado da data do conhecimento da infração pelo órgão de trânsito responsável pela aplicação da penalidade, na forma definida pelo Contran. (Incluído pela Lei nº 14.229, de 2021)\n § 7º O descumprimento dos prazos previstos no § 6º deste artigo implicará a decadência do direito de aplicar a respectiva penalidade. (Redação dada pela Lei nº 14.229, de 2021)\n § 8º (VETADO). (Incluído pela Lei nº 14.304, de 2022) (Vigência)"}, {"art": "Art. 282-A", "key": "282-A", "texto": "Art. 282-A. O órgão do Sistema Nacional de Trânsito responsável pela autuação deverá oferecer ao proprietário do veículo ou ao condutor autuado a opção de notificação por meio eletrônico, na forma definida pelo Contran. (Redação dada pela Lei nº 14.071, de 2020) (Vigência) (Vide Lei nº 14.440, de 2022) (Vigência)\n § 1º O proprietário e o condutor autuado deverão manter seu cadastro atualizado no órgão executivo de trânsito do\nEstado ou do Distrito Federal. (Redação dada pela Lei nº 14.071, de 2020) (Vigência)\n § 2º Na hipótese de notificação prevista no caput deste artigo, o proprietário ou o condutor autuado será considerado notificado 30 (trinta) dias após a inclusão da informação no sistema eletrônico e do envio da respectiva mensagem. (Redação dada pela Lei nº 14.071, de 2020) (Vigência)\n § 3º O sistema previsto no caput será certificado digitalmente, atendidos os requisitos de autenticidade, integridade, validade jurídica e interoperabilidade da Infraestrutura de Chaves Públicas Brasileira (ICP-Brasil).\n(Incluído pela Lei nº 13.281, de 2016) (Vigência)\n § 4º A coordenação do sistema de que trata o caput deste artigo é de responsabilidade do órgão máximo executivo de trânsito da União. (Incluído pela Lei nº 14.440, de 2022)\n § 5º (Vide Lei nº 14.440, de 2022) (Vigência)"}, {"art": "Art. 283", "key": "283", "texto": "Art. 283. (VETADO)"}, {"art": "Art. 284", "key": "284", "texto": "Art. 284. O pagamento da multa poderá ser efetuado até a data do vencimento expressa na notificação, por oitenta por cento do seu valor.\n § 1º Caso o infrator declare pelo sistema de notificação eletrônica de que trata o art. 282-A deste Código a opção por não apresentar defesa prévia nem recurso, reconhecendo o cometimento da infração, o pagamento da multa poderá ser efetuado por 60% (sessenta por cento) do seu valor, em qualquer fase do processo, até o vencimento do prazo de pagamento da multa, desde que a adesão ao sistema seja realizada antes do correspondente envio da notificação da autuação. (Redação dada pela Lei nº 14.599, de 2023)\n § 2º O recolhimento do valor da multa não implica renúncia ao questionamento administrativo, que pode ser realizado a qualquer momento, respeitado o disposto no § 1º. (Incluído pela Lei nº 13.281, de 2016) (Vigência)\n § 3º Não incidirá cobrança moratória e não poderá ser aplicada qualquer restrição, inclusive para fins de licenciamento e transferência, enquanto não for encerrada a instância administrativa de julgamento de infrações e penalidades. (Incluído pela Lei nº 13.281, de 2016) (Vigência)\n § 4º Encerrada a instância administrativa de julgamento de infrações e penalidades, a multa não paga até o vencimento será acrescida de juros de mora equivalentes à taxa referencial do Sistema Especial de Liquidação e de\nCustódia (Selic) para títulos federais acumulada mensalmente, calculados a partir do mês subsequente ao da consolidação até o mês anterior ao do pagamento, e de 1% (um por cento) relativamente ao mês em que o pagamento estiver sendo efetuado. (Incluído pela Lei nº 13.281, de 2016) (Vigência)\n § 5º O sistema de notificação eletrônica de que trata o art. 282-A deste Código deve disponibilizar, na mesma plataforma, campo destinado à apresentação de defesa prévia e de recurso, quando o infrator não reconhecer o cometimento da infração, na forma regulamentada pelo Contran. (Redação dada pela Lei nº 14.440, de 2022)\n § 6º O desconto previsto no § 1º deste artigo será concedido ainda que o órgão responsável pela aplicação da penalidade de multa não tiver aderido ao sistema de notificação eletrônica de que trata o art. 282-A deste Código, desde que o infrator tenha cumprido os requisitos nele descritos. (Incluído pela Lei nº 14.599, de 2023)"}, {"art": "Art. 285", "key": "285", "texto": "Art. 285. O recurso contra a penalidade imposta nos termos do art. 282 deste Código será interposto perante a autoridade que imputou a penalidade e terá efeito suspensivo. (Redação dada pela Lei nº 14.229, de 2021)\n(Vigência)\n § 1º O recurso intempestivo ou interposto por parte ilegítima não terá efeito suspensivo. (Redação dada pela Lei nº 14.229, de 2021) (Vigência)\n § 2º Recebido o recurso tempestivo, a autoridade o remeterá à Jari, no prazo de 10 (dez) dias, contado da data de sua interposição. (Redação dada pela Lei nº 14.229, de 2021) (Vigência)\n § 3º (Revogado). (Redação dada pela Lei nº 14.229, de 2021) (Vigência)\n § 4º Na apresentação de defesa ou recurso, em qualquer fase do processo, para efeitos de admissibilidade, não serão exigidos documentos ou cópia de documentos emitidos pelo órgão responsável pela autuação. (Incluído pela\nLei nº 14.071, de 2020) (Vigência)\n § 5º O recurso intempestivo será arquivado. (Incluído pela Lei nº 14.229, de 2021)\n\f § 6º O recurso de que trata o caput deste artigo deverá ser julgado no prazo de 24 (vinte e quatro) meses, contado do recebimento do recurso pelo órgão julgador. (Incluído pela Lei nº 14.229, de 2021) (Vigência)"}, {"art": "Art. 286", "key": "286", "texto": "Art. 286. O recurso contra a imposição de multa poderá ser interposto no prazo legal, sem o recolhimento do seu valor.\n § 1º No caso de não provimento do recurso, aplicar-se-á o estabelecido no parágrafo único do art. 284.\n § 2º Se o infrator recolher o valor da multa e apresentar recurso, se julgada improcedente a penalidade, ser-lhe-á devolvida a importância paga, atualizada em UFIR ou por índice legal de correção dos débitos fiscais."}, {"art": "Art. 287", "key": "287", "texto": "Art. 287. Se a infração for cometida em localidade diversa daquela do licenciamento do veículo, o recurso poderá ser apresentado junto ao órgão ou entidade de trânsito da residência ou domicílio do infrator.\n Parágrafo único. A autoridade de trânsito que receber o recurso deverá remetê-lo, de pronto, à autoridade que impôs a penalidade acompanhado das cópias dos prontuários necessários ao julgamento."}, {"art": "Art. 288", "key": "288", "texto": "Art. 288. Das decisões da JARI cabe recurso a ser interposto, na forma do artigo seguinte, no prazo de trinta dias contado da publicação ou da notificação da decisão.\n § 1º O recurso será interposto, da decisão do não provimento, pelo responsável pela infração, e da decisão de provimento, pela autoridade que impôs a penalidade.\n § 2º (Revogado pela Lei nº 12.249, de 2010) (Vide ADIN 2998)"}, {"art": "Art. 289", "key": "289", "texto": "Art. 289. O recurso de que trata o art. 288 deste Código deverá ser julgado no prazo de 24 (vinte e quatro) meses, contado do recebimento do recurso pelo órgão julgador: (Redação dada pela Lei nº 14.229, de 2021) (Vigência)\n I - tratando-se de penalidade imposta por órgão ou entidade da União, por colegiado especial integrado pelo\nCoordenador-Geral da Jari, pelo Presidente da Junta que apreciou o recurso e por mais um Presidente de Junta;\n(Redação dada pela Lei nº 14.071, de 2020) (Vigência)\n a) (revogada); (Redação dada pela Lei nº 14.071, de 2020) (Vigência)\n b) (revogada); (Redação dada pela Lei nº 14.071, de 2020) (Vigência)\n II - tratando-se de penalidade imposta por órgão ou entidade de trânsito estadual, municipal ou do Distrito Federal, pelos CETRAN E CONTRANDIFE, respectivamente.\n Parágrafo único. No caso do inciso I do caput deste artigo: (Redação dada pela Lei nº 14.229, de 2021)\n(Vigência)\n I - quando houver apenas 1 (uma) Jari, o recurso será julgado por seus membros; (Incluído pela Lei nº 14.229, de 2021) (Vigência)\n II - quando necessário, novos colegiados especiais poderão ser formados, compostos pelo Presidente da Junta que apreciou o recurso e por mais 2 (dois) Presidentes de Junta, na forma estabelecida pelo Contran. (Incluído pela\nLei nº 14.229, de 2021) (Vigência)"}, {"art": "Art. 289-A", "key": "289-A", "texto": "Art. 289-A. O não julgamento dos recursos nos prazos previstos no § 6º do art. 285 e no caput do art. 289 deste\nCódigo ensejará a prescrição da pretensão punitiva. (Incluído pela Lei nº 14.229, de 2021) (Vigência)"}, {"art": "Art. 290", "key": "290", "texto": "Art. 290. Implicam encerramento da instância administrativa de julgamento de infrações e penalidades:\n(Redação dada pela Lei nº 13.281, de 2016) (Vigência)\n I - o julgamento do recurso de que tratam os arts. 288 e 289; (Incluído pela Lei nº 13.281, de 2016) (Vigência)\n II - a não interposição do recurso no prazo legal; e (Incluído pela Lei nº 13.281, de 2016) (Vigência)\n III - o pagamento da multa, com reconhecimento da infração e requerimento de encerramento do processo na fase em que se encontra, sem apresentação de defesa ou recurso. (Incluído pela Lei nº 13.281, de 2016) (Vigência)\n Parágrafo único. Esgotados os recursos, as penalidades aplicadas nos termos deste Código serão cadastradas no\nRENACH."}, {"art": "Art. 290-A", "key": "290-A", "texto": "Art. 290-A. Os prazos processuais de que trata este Código não se suspendem, salvo por motivo de força maior devidamente comprovado, nos termos de regulamento do Contran. (Incluído pela Lei nº 14.229, de 2021)\n(Vigência)\n Í\n\f CAPÍTULO XIX\n DOS CRIMES DE TRÂNSITO\n Seção I\n Disposições Gerais"}, {"art": "Art. 291", "key": "291", "texto": "Art. 291. Aos crimes cometidos na direção de veículos automotores, previstos neste Código, aplicam-se as normas gerais do Código Penal e do Código de Processo Penal, se este Capítulo não dispuser de modo diverso, bem como a Lei nº 9.099, de 26 de setembro de 1995, no que couber.\n § 1o Aplica-se aos crimes de trânsito de lesão corporal culposa o disposto nos arts. 74, 76 e 88 da Lei no 9.099, de 26 de setembro de 1995, exceto se o agente estiver: (Renumerado do parágrafo único pela Lei nº 11.705, de 2008)\n I - sob a influência de álcool ou qualquer outra substância psicoativa que determine dependência; (Incluído pela\nLei nº 11.705, de 2008)\n II - participando, em via pública, de corrida, disputa ou competição automobilística, de exibição ou demonstração de perícia em manobra de veículo automotor, não autorizada pela autoridade competente; (Incluído pela Lei nº 11.705, de 2008)\n III - transitando em velocidade superior à máxima permitida para a via em 50 km/h (cinqüenta quilômetros por hora). (Incluído pela Lei nº 11.705, de 2008)\n § 2o Nas hipóteses previstas no § 1o deste artigo, deverá ser instaurado inquérito policial para a investigação da infração penal. (Incluído pela Lei nº 11.705, de 2008)\n § 3º (VETADO). (Incluído pela Lei nº 13.546, de 2017) (Vigência)\n § 4º O juiz fixará a pena-base segundo as diretrizes previstas no art. 59 do Decreto-Lei nº 2.848, de 7 de dezembro de 1940 (Código Penal), dando especial atenção à culpabilidade do agente e às circunstâncias e consequências do crime. (Incluído pela Lei nº 13.546, de 2017) (Vigência)"}, {"art": "Art. 292", "key": "292", "texto": "Art. 292. A suspensão ou a proibição de se obter a permissão ou a habilitação para dirigir veículo automotor pode ser imposta isolada ou cumulativamente com outras penalidades. (Redação dada pela Lei nº 12.971, de 2014)\n(Vigência)"}, {"art": "Art. 293", "key": "293", "texto": "Art. 293. A penalidade de suspensão ou de proibição de se obter a permissão ou a habilitação, para dirigir veículo automotor, tem a duração de dois meses a cinco anos.\n § 1º Transitada em julgado a sentença condenatória, o réu será intimado a entregar à autoridade judiciária, em quarenta e oito horas, a Permissão para Dirigir ou a Carteira de Habilitação.\n § 2º A penalidade de suspensão ou de proibição de se obter a permissão ou a habilitação para dirigir veículo automotor não se inicia enquanto o sentenciado, por efeito de condenação penal, estiver recolhido a estabelecimento prisional."}, {"art": "Art. 294", "key": "294", "texto": "Art. 294. Em qualquer fase da investigação ou da ação penal, havendo necessidade para a garantia da ordem pública, poderá o juiz, como medida cautelar, de ofício, ou a requerimento do Ministério Público ou ainda mediante representação da autoridade policial, decretar, em decisão motivada, a suspensão da permissão ou da habilitação para dirigir veículo automotor, ou a proibição de sua obtenção.\n Parágrafo único. Da decisão que decretar a suspensão ou a medida cautelar, ou da que indeferir o requerimento do Ministério Público, caberá recurso em sentido estrito, sem efeito suspensivo."}, {"art": "Art. 295", "key": "295", "texto": "Art. 295. A suspensão para dirigir veículo automotor ou a proibição de se obter a permissão ou a habilitação será sempre comunicada pela autoridade judiciária ao Conselho Nacional de Trânsito - CONTRAN, e ao órgão de trânsito do\nEstado em que o indiciado ou réu for domiciliado ou residente."}, {"art": "Art. 296", "key": "296", "texto": "Art. 296. Se o réu for reincidente na prática de crime previsto neste Código, o juiz aplicará a penalidade de suspensão da permissão ou habilitação para dirigir veículo automotor, sem prejuízo das demais sanções penais cabíveis. (Redação dada pela Lei nº 11.705, de 2008)"}, {"art": "Art. 297", "key": "297", "texto": "Art. 297. A penalidade de multa reparatória consiste no pagamento, mediante depósito judicial em favor da vítima, ou seus sucessores, de quantia calculada com base no disposto no § 1º do art. 49 do Código Penal, sempre que houver prejuízo material resultante do crime.\n § 1º A multa reparatória não poderá ser superior ao valor do prejuízo demonstrado no processo.\n\f § 2º Aplica-se à multa reparatória o disposto nos arts. 50 a 52 do Código Penal.\n § 3º Na indenização civil do dano, o valor da multa reparatória será descontado."}, {"art": "Art. 298", "key": "298", "texto": "Art. 298. São circunstâncias que sempre agravam as penalidades dos crimes de trânsito ter o condutor do veículo cometido a infração:\n I - com dano potencial para duas ou mais pessoas ou com grande risco de grave dano patrimonial a terceiros;\n II - utilizando o veículo sem placas, com placas falsas ou adulteradas;\n III - sem possuir Permissão para Dirigir ou Carteira de Habilitação;\n IV - com Permissão para Dirigir ou Carteira de Habilitação de categoria diferente da do veículo;\n V - quando a sua profissão ou atividade exigir cuidados especiais com o transporte de passageiros ou de carga;\n VI - utilizando veículo em que tenham sido adulterados equipamentos ou características que afetem a sua segurança ou o seu funcionamento de acordo com os limites de velocidade prescritos nas especificações do fabricante;\n VII - sobre faixa de trânsito temporária ou permanentemente destinada a pedestres.\n Parágrafo único. (VETADO). (Incluído pela Lei nº 14.304, de 2022) (Vigência)"}, {"art": "Art. 299", "key": "299", "texto": "Art. 299. (VETADO)"}, {"art": "Art. 300", "key": "300", "texto": "Art. 300. (VETADO)"}, {"art": "Art. 301", "key": "301", "texto": "Art. 301. Ao condutor de veículo, nos casos de sinistros de trânsito que resultem em vítima, não se imporá a prisão em flagrante nem se exigirá fiança, se prestar pronto e integral socorro àquela. (Redação dada pela Lei nº 14.599, de 2023)\n Seção II\n Dos Crimes em Espécie"}, {"art": "Art. 302", "key": "302", "texto": "Art. 302. Praticar homicídio culposo na direção de veículo automotor:\n Penas - detenção, de dois a quatro anos, e suspensão ou proibição de se obter a permissão ou a habilitação para dirigir veículo automotor.\n § 1o No homicídio culposo cometido na direção de veículo automotor, a pena é aumentada de 1/3 (um terço) à metade, se o agente: (Incluído pela Lei nº 12.971, de 2014) (Vigência)\n I - não possuir Permissão para Dirigir ou Carteira de Habilitação; (Incluído pela Lei nº 12.971, de 2014)\n(Vigência)\n II - praticá-lo em faixa de pedestres ou na calçada; (Incluído pela Lei nº 12.971, de 2014) (Vigência)\n III - deixar de prestar socorro, quando possível fazê-lo sem risco pessoal, à vítima do sinistro; (Redação dada pela Lei nº 14.599, de 2023)\n IV - no exercício de sua profissão ou atividade, estiver conduzindo veículo de transporte de passageiros.\n(Incluído pela Lei nº 12.971, de 2014) (Vigência)\n V- (Revogado pela Lei nº 11.705, de 2008)\n § 2o (Revogado pela Lei nº 13.281, de 2016) (Vigência)\n § 3o Se o agente conduz veículo automotor sob a influência de álcool ou de qualquer outra substância psicoativa que determine dependência: (Incluído pela Lei nº 13.546, de 2017) (Vigência)\n Penas - reclusão, de cinco a oito anos, e suspensão ou proibição do direito de se obter a permissão ou a habilitação para dirigir veículo automotor. (Incluído pela Lei nº 13.546, de 2017) (Vigência)"}, {"art": "Art. 303", "key": "303", "texto": "Art. 303. Praticar lesão corporal culposa na direção de veículo automotor:\n Penas - detenção, de seis meses a dois anos e suspensão ou proibição de se obter a permissão ou a habilitação para dirigir veículo automotor.\n § 1o Aumenta-se a pena de 1/3 (um terço) à metade, se ocorrer qualquer das hipóteses do § 1o do art. 302.\n(Renumerado do parágrafo único pela Lei nº 13.546, de 2017) (Vigência)\n § 2o A pena privativa de liberdade é de reclusão de dois a cinco anos, sem prejuízo das outras penas previstas neste artigo, se o agente conduz o veículo com capacidade psicomotora alterada em razão da influência de álcool ou de outra substância psicoativa que determine dependência, e se do crime resultar lesão corporal de natureza grave ou gravíssima.\n (Incluído pela Lei nº 13.546, de 2017) (Vigência)"}, {"art": "Art. 304", "key": "304", "texto": "Art. 304. Deixar o condutor do veículo, na ocasião do sinistro, de prestar imediato socorro à vítima, ou, não podendo fazê-lo diretamente, por justa causa, deixar de solicitar auxílio da autoridade pública: (Redação dada pela\nLei nº 14.599, de 2023)\n Penas - detenção, de seis meses a um ano, ou multa, se o fato não constituir elemento de crime mais grave.\n Parágrafo único. Incide nas penas previstas neste artigo o condutor do veículo, ainda que a sua omissão seja suprida por terceiros ou que se trate de vítima com morte instantânea ou com ferimentos leves."}, {"art": "Art. 305", "key": "305", "texto": "Art. 305. Afastar-se o condutor do veículo do local do sinistro, para fugir à responsabilidade penal ou civil que lhe possa ser atribuída: (Redação dada pela Lei nº 14.599, de 2023)\n Penas - detenção, de seis meses a um ano, ou multa."}, {"art": "Art. 306", "key": "306", "texto": "Art. 306. Conduzir veículo automotor com capacidade psicomotora alterada em razão da influência de álcool ou de outra substância psicoativa que determine dependência: (Redação dada pela Lei nº 12.760, de 2012)\n Penas - detenção, de seis meses a três anos, multa e suspensão ou proibição de se obter a permissão ou a habilitação para dirigir veículo automotor.\n § 1o As condutas previstas no caput serão constatadas por: (Incluído pela Lei nº 12.760, de 2012)\n I - concentração igual ou superior a 6 decigramas de álcool por litro de sangue ou igual ou superior a 0,3 miligrama de álcool por litro de ar alveolar; ou (Incluído pela Lei nº 12.760, de 2012)\n II - sinais que indiquem, na forma disciplinada pelo Contran, alteração da capacidade psicomotora. (Incluído pela Lei nº 12.760, de 2012)\n § 2o A verificação do disposto neste artigo poderá ser obtida mediante teste de alcoolemia ou toxicológico, exame clínico, perícia, vídeo, prova testemunhal ou outros meios de prova em direito admitidos, observado o direito à contraprova. (Redação dada pela Lei nº 12.971, de 2014) (Vigência)\n § 3o O Contran disporá sobre a equivalência entre os distintos testes de alcoolemia ou toxicológicos para efeito de caracterização do crime tipificado neste artigo. (Redação dada pela Lei nº 12.971, de 2014) (Vigência)\n § 4º Poderá ser empregado qualquer aparelho homologado pelo Instituto Nacional de Metrologia, Qualidade e\nTecnologia - INMETRO - para se determinar o previsto no caput. (Incluído pela Lei nº 13.840, de 2019)"}, {"art": "Art. 307", "key": "307", "texto": "Art. 307. Violar a suspensão ou a proibição de se obter a permissão ou a habilitação para dirigir veículo automotor imposta com fundamento neste Código:\n Penas - detenção, de seis meses a um ano e multa, com nova imposição adicional de idêntico prazo de suspensão ou de proibição.\n Parágrafo único. Nas mesmas penas incorre o condenado que deixa de entregar, no prazo estabelecido no § 1º do art. 293, a Permissão para Dirigir ou a Carteira de Habilitação."}, {"art": "Art. 308", "key": "308", "texto": "Art. 308. Participar, na direção de veículo automotor, em via pública, de corrida, disputa ou competição automobilística ou ainda de exibição ou demonstração de perícia em manobra de veículo automotor, não autorizada pela autoridade competente, gerando situação de risco à incolumidade pública ou privada: (Redação dada pela Lei nº 13.546, de 2017) (Vigência)\n\f Penas - detenção, de 6 (seis) meses a 3 (três) anos, multa e suspensão ou proibição de se obter a permissão ou a habilitação para dirigir v e í c u l o automotor. (Redação dada pela Lei nº 12.971, de 2014) (Vigência)\n § 1o Se da prática do crime previsto no caput resultar lesão corporal de natureza grave, e as circunstâncias demonstrarem que o agente não quis o resultado nem assumiu o risco de produzi-lo, a pena privativa de liberdade é de reclusão, de 3 (três) a 6 (seis) anos, sem prejuízo das outras penas previstas neste artigo. (Incluído pela Lei nº 12.971, de 2014) (Vigência)\n § 2o Se da prática do crime previsto no caput resultar morte, e as circunstâncias demonstrarem que o agente não quis o resultado nem assumiu o risco de produzi-lo, a pena privativa de liberdade é de reclusão de 5 (cinco) a 10 (dez) anos, sem prejuízo das outras penas previstas neste artigo. (Incluído pela Lei nº 12.971, de 2014) (Vigência)"}, {"art": "Art. 309", "key": "309", "texto": "Art. 309. Dirigir veículo automotor, em via pública, sem a devida Permissão para Dirigir ou Habilitação ou, ainda, se cassado o direito de dirigir, gerando perigo de dano:\n Penas - detenção, de seis meses a um ano, ou multa."}, {"art": "Art. 310", "key": "310", "texto": "Art. 310. Permitir, confiar ou entregar a direção de veículo automotor a pessoa não habilitada, com habilitação cassada ou com o direito de dirigir suspenso, ou, ainda, a quem, por seu estado de saúde, física ou mental, ou por embriaguez, não esteja em condições de conduzi-lo com segurança:\n Penas - detenção, de seis meses a um ano, ou multa."}, {"art": "Art. 310-A", "key": "310-A", "texto": "Art. 310-A. (VETADO) (Incluído pela Lei nº 12.619, de 2012) (Vigência)"}, {"art": "Art. 311", "key": "311", "texto": "Art. 311. Trafegar em velocidade incompatível com a segurança nas proximidades de escolas, hospitais, estações de embarque e desembarque de passageiros, logradouros estreitos, ou onde haja grande movimentação ou concentração de pessoas, gerando perigo de dano:\n Penas - detenção, de seis meses a um ano, ou multa."}, {"art": "Art. 312", "key": "312", "texto": "Art. 312. Inovar artificiosamente, em caso de sinistro automobilístico com vítima, na pendência do respectivo procedimento policial preparatório, inquérito policial ou processo penal, o estado de lugar, de coisa ou de pessoa, a fim de induzir a erro o agente policial, o perito ou o juiz: (Redação dada pela Lei nº 14.599, de 2023)\n Penas - detenção, de seis meses a um ano, ou multa.\n Parágrafo único. Aplica-se o disposto neste artigo, ainda que não iniciados, quando da inovação, o procedimento preparatório, o inquérito ou o processo aos quais se refere."}, {"art": "Art. 312-A", "key": "312-A", "texto": "Art. 312-A. Para os crimes relacionados nos arts. 302 a 312 deste Código, nas situações em que o juiz aplicar a substituição de pena privativa de liberdade por pena restritiva de direitos, esta deverá ser de prestação de serviço à comunidade ou a entidades públicas, em uma das seguintes atividades: (Incluído pela Lei nº 13.281, de 2016)\n(Vigência)\n I - trabalho, aos fins de semana, em equipes de resgate dos corpos de bombeiros e em outras unidades móveis especializadas no atendimento a vítimas de trânsito; (Incluído pela Lei nº 13.281, de 2016) (Vigência)\n II - trabalho em unidades de pronto-socorro de hospitais da rede pública que recebem vítimas de sinistro de trânsito e politraumatizados; (Redação dada pela Lei nº 14.599, de 2023)\n III - trabalho em clínicas ou instituições especializadas na recuperação de sinistrados de trânsito; (Redação dada pela Lei nº 14.599, de 2023)\n IV - outras atividades relacionadas a resgate, atendimento e recuperação de vítimas de sinistros de trânsito.\n(Redação dada pela Lei nº 14.599, de 2023)"}, {"art": "Art. 312-B", "key": "312-B", "texto": "Art. 312-B. Aos crimes previstos no § 3º do art. 302 e no § 2º do art. 303 deste Código não se aplica o disposto no inciso I do caput do art. 44 do Decreto-Lei nº 2.848, de 7 de dezembro de 1940 (Código Penal) . (Incluído pela Lei nº 14.071, de 2020)\n CAPÍTULO XX\n DISPOSIÇÕES FINAIS E TRANSITÓRIAS"}, {"art": "Art. 313", "key": "313", "texto": "Art. 313. O Poder Executivo promoverá a nomeação dos membros do CONTRAN no prazo de sessenta dias da publicação deste Código."}, {"art": "Art. 314", "key": "314", "texto": "Art. 314. O Contran tem prazo de 240 (duzentos e quarenta) dias a partir da publicação deste Código para expedir as resoluções necessárias à sua melhor execução, bem como para revisar todas as resoluções anteriores à sua publicação, dando prioridade àquelas que visam a diminuir o número de sinistros e a assegurar a proteção de pedestres. (Redação dada pela Lei nº 14.599, de 2023)\n Parágrafo único. As resoluções do CONTRAN, existentes até a data de publicação deste Código, continuam em vigor naquilo em que não conflitem com ele."}, {"art": "Art. 315", "key": "315", "texto": "Art. 315. O Ministério da Educação, mediante proposta do Contran, deverá, no prazo de 240 (duzentos e quarenta) dias contado da publicação deste Código, estabelecer o currículo com conteúdo programático relativo à segurança e à educação de trânsito, a fim de atender ao disposto neste Código. (Redação dada pela Lei nº 14.599, de 2023)"}, {"art": "Art. 316", "key": "316", "texto": "Art. 316. O prazo de notificação previsto no inciso II do parágrafo único do art. 281 só entrará em vigor após duzentos e quarenta dias contados da publicação desta Lei."}, {"art": "Art. 317", "key": "317", "texto": "Art. 317. Os órgãos e entidades de trânsito concederão prazo de até um ano para a adaptação dos veículos de condução de escolares e de aprendizagem às normas do inciso III do art. 136 e art. 154, respectivamente."}, {"art": "Art. 318", "key": "318", "texto": "Art. 318. (VETADO)"}, {"art": "Art. 319", "key": "319", "texto": "Art. 319. Enquanto não forem baixadas novas normas pelo CONTRAN, continua em vigor o disposto no art. 92 do\nRegulamento do Código Nacional de Trânsito - Decreto nº 62.127, de 16 de janeiro de 1968."}, {"art": "Art. 319-A", "key": "319-A", "texto": "Art. 319-A. Os valores de multas constantes deste Código poderão ser corrigidos monetariamente pelo Contran, respeitado o limite da variação do Índice Nacional de Preços ao Consumidor Amplo (IPCA) no exercício anterior.\n(Incluído pela Lei nº 13.281, de 2016) (Vigência)\n Parágrafo único. Os novos valores decorrentes do disposto no caput serão divulgados pelo Contran com, no mínimo, 90 (noventa) dias de antecedência de sua aplicação. (Incluído pela Lei nº 13.281, de 2016) (Vigência)"}, {"art": "Art. 320", "key": "320", "texto": "Art. 320. A receita arrecadada com a cobrança das multas de trânsito será aplicada, exclusivamente, em sinalização, em engenharia de tráfego, em engenharia de campo, em policiamento, em fiscalização, em renovação de frota circulante, em educação de trânsito e em custeio do processo de habilitação de condutores de baixa renda.\n(Redação dada pela Lei nº 15.153, de 2025) Vigência\n § 1º O percentual de cinco por cento do valor das multas de trânsito arrecadadas será depositado, mensalmente, na conta de fundo de âmbito nacional destinado à segurança e educação de trânsito. (Redação dada pela Lei nº 13.281, de 2016) (Vigência)\n § 2º O órgão responsável deverá publicar, anualmente, na rede mundial de computadores (internet), dados sobre a receita arrecadada com a cobrança de multas de trânsito e sua destinação. (Incluído pela Lei nº 13. 281, de 2016)\n(Vigência)\n § 3º O valor total destinado à recomposição das perdas de receita das concessionárias de rodovias e vias urbanas, em decorrência do não pagamento de pedágio por usuários da via, não poderá ultrapassar o montante total arrecadado por meio das multas aplicadas com fundamento no art. 209-A deste Código, ressalvado o previsto em regulamento do Poder Executivo. (Incluído pela Lei nº 14.157, de 2021)\n § 4º O custeio do processo de habilitação de condutores a que se refere o caput deste artigo contemplará as taxas e demais despesas relativas ao processo de formação de condutores e de concessão do documento de habilitação para candidatos de baixa renda. (Incluído pela Lei nº 15.153, de 2025) Vigência\n § 5º O candidato de baixa renda de que trata o § 4º deste artigo será caracterizado pela sua inclusão no\nCadastro Único para Programas Sociais do Governo Federal (CadÚnico). (Incluído pela Lei nº 15.153, de 2025)\nVigência"}, {"art": "Art. 320-A", "key": "320-A", "texto": "Art. 320-A. Os órgãos e as entidades do Sistema Nacional de Trânsito poderão integrar-se para a ampliação e o aprimoramento da fiscalização de trânsito, inclusive por meio do compartilhamento da receita arrecadada com a cobrança das multas de trânsito. (Incluído pela Lei nº 13.281, de 2016)"}, {"art": "Art. 321", "key": "321", "texto": "Art. 321. (VETADO)"}, {"art": "Art. 322", "key": "322", "texto": "Art. 322. (VETADO)"}, {"art": "Art. 323", "key": "323", "texto": "Art. 323. O CONTRAN, em cento e oitenta dias, fixará a metodologia de aferição de peso de veículos, estabelecendo percentuais de tolerância, sendo durante este período suspensa a vigência das penalidades previstas no inciso V do art. 231, aplicando-se a penalidade de vinte UFIR por duzentos quilogramas ou fração de excesso.\n\f Parágrafo único. Revogado pela Lei nº 14.599, de 2023"}, {"art": "Art. 324", "key": "324", "texto": "Art. 324. (VETADO)"}, {"art": "Art. 325", "key": "325", "texto": "Art. 325. As repartições de trânsito conservarão por, no mínimo, 5 (cinco) anos os documentos relativos à habilitação de condutores, ao registro e ao licenciamento de veículos e aos autos de infração de trânsito. (Redação dada pela Lei nº 13.281, de 2016) (Vigência)\n § 1º Os documentos previstos no caput poderão ser gerados e tramitados eletronicamente, bem como arquivados e armazenados em meio digital, desde que assegurada a autenticidade, a fidedignidade, a confiabilidade e a segurança das informações, e serão válidos para todos os efeitos legais, sendo dispensada, nesse caso, a sua guarda física.\n(Incluído pela Lei nº 13.281, de 2016) (Vigência)\n § 2º O Contran regulamentará a geração, a tramitação, o arquivamento, o armazenamento e a eliminação de documentos eletrônicos e físicos gerados em decorrência da aplicação das disposições deste Código. (Incluído pela\nLei nº 13.281, de 2016) (Vigência)\n § 3º Na hipótese prevista nos §§ 1º e 2º, o sistema deverá ser certificado digitalmente, atendidos os requisitos de autenticidade, integridade, validade jurídica e interoperabilidade da Infraestrutura de Chaves Públicas Brasileira (ICP-\nBrasil). (Incluído pela Lei nº 13.281, de 2016) (Vigência)"}, {"art": "Art. 326", "key": "326", "texto": "Art. 326. A Semana Nacional de Trânsito será comemorada anualmente no período compreendido entre 18 e 25 de setembro."}, {"art": "Art. 326-A", "key": "326-A", "texto": "Art. 326-A. A atuação dos integrantes do Sistema Nacional de Trânsito, no que se refere ao Plano Nacional de\nRedução de Mortes e Lesões no Trânsito (Pnatrans), deverá ser direcionada prioritariamente para o cumprimento da meta anual de redução do índice de mortes por grupo de habitantes, apurado anualmente por Estado e pelo Distrito\nFederal, detalhando-se os dados levantados e as ações realizadas em vias federais, estaduais, distritais e municipais, na forma regulamentada pelo Contran. (Redação dada pela Lei nº 14.599, de 2023)\n § 1º O objetivo geral do estabelecimento de metas é, ao final de 2030, reduzir à metade, no mínimo, o índice de mortes por grupo de habitantes, relativamente ao índice apurado em 2020. (Redação dada pela Lei nº 14.599, de 2023)\n § 2o As metas expressam a diferença a menor, em base percentual, entre os índices mais recentes, oficialmente apurados, e os índices que se pretende alcançar. (Incluído pela Lei nº 13.614, de 2018) (Vigência)\n § 3o A decisão que fixar as metas anuais estabelecerá as respectivas margens de tolerância. (Incluído pela\nLei nº 13.614, de 2018) (Vigência)\n § 4º As metas serão fixadas pelo Contran para os Estados e para o Distrito Federal, mediante propostas fundamentadas dos Cetran, do Contrandife e da Polícia Rodoviária Federal, no âmbito das respectivas circunscrições. (Redação dada pela Lei nº 14.599, de 2023)\n § 5º Antes de submeterem as propostas ao Contran, os Cetran, o Contrandife e a Polícia Rodoviária Federal realizarão consulta ou audiência pública para manifestação da sociedade sobre as metas a serem propostas.\n(Redação dada pela Lei nº 14.599, de 2023)\n § 6º As propostas dos Cetran, do Contrandife e da Polícia Rodoviária Federal serão encaminhadas ao Contran até o dia 1º de agosto de cada ano, conforme regulamentação do Contran. (Redação dada pela Lei nº 14.599, de 2023)\n § 7o As metas fixadas serão divulgadas em setembro, durante a Semana Nacional de Trânsito, assim como o desempenho, absoluto e relativo, de cada Estado e do Distrito Federal no cumprimento das metas vigentes no ano anterior, detalhados os dados levantados e as ações realizadas por vias federais, estaduais e municipais, devendo tais informações permanecer à disposição do público na rede mundial de computadores, em sítio eletrônico do órgão máximo executivo de trânsito da União. (Incluído pela Lei nº 13.614, de 2018) (Vigência)\n § 8º O Contran, ouvidos os Cetran, o Contrandife, a Polícia Rodoviária Federal e os demais órgãos do Sistema\nNacional de Trânsito, definirá as fórmulas para apuração do índice de que trata este artigo, assim como a metodologia para a coleta e o tratamento dos dados estatísticos necessários para a composição dos termos das fórmulas.\n(Redação dada pela Lei nº 14.599, de 2023)\n § 9º Os dados estatísticos coletados em cada Estado e no Distrito Federal serão tratados e consolidados pelos respectivos órgãos ou entidades executivos de trânsito, que os repassarão ao órgão máximo executivo de trânsito da\nUnião, conforme regulamentação do Contran. (Redação dada pela Lei nº 14.599, de 2023)\n\f § 10. Os dados estatísticos sujeitos à consolidação pelo órgão ou entidade executivos de trânsito do Estado ou do\nDistrito Federal compreendem os coletados naquela circunscrição: (Incluído pela Lei nº 13.614, de 2018)\n(Vigência)\n I - pela Polícia Rodoviária Federal e pelo órgão executivo rodoviário da União; (Incluído pela Lei nº 13.614, de 2018) (Vigência)\n II - pela Polícia Militar e pelo órgão ou entidade executivos rodoviários do Estado ou do Distrito Federal;\n(Incluído pela Lei nº 13.614, de 2018) (Vigência)\n III - pelos órgãos ou entidades executivos rodoviários e pelos órgãos ou entidades executivos de trânsito dos\nMunicípios. (Incluído pela Lei nº 13.614, de 2018) (Vigência)\n § 11. O cálculo do índice, para cada Estado e para o Distrito Federal, será feito pelo órgão máximo executivo de trânsito da União, ouvidos os Cetran, o Contrandife, a Polícia Rodoviária Federal e os demais órgãos do Sistema\nNacional de Trânsito. (Redação dada pela Lei nº 14.599, de 2023)\n § 12. Os índices serão divulgados oficialmente até o dia 30 de abril de cada ano. (Redação dada pela Lei nº 14.599, de 2023)\n § 13. Com base em índices parciais, apurados no decorrer do ano, o Contran, os Cetran e o Contrandife poderão recomendar aos integrantes do Sistema Nacional de Trânsito alterações nas ações, projetos e programas em desenvolvimento ou previstos, com o fim de atingir as metas fixadas para cada um dos Estados e para o Distrito\nFederal. (Incluído pela Lei nº 13.614, de 2018) (Vigência)\n § 14. A partir da análise de desempenho a que se refere o § 7o deste artigo, o Contran elaborará e divulgará, também durante a Semana Nacional de Trânsito: (Incluído pela Lei nº 13.614, de 2018) (Vigência)\n I - duas classificações ordenadas dos Estados e do Distrito Federal, uma referente ao ano analisado e outra que considere a evolução do desempenho dos Estados e do Distrito Federal desde o início das análises; (Incluído pela Lei nº 13.614, de 2018) (Vigência)\n II - relatório a respeito do cumprimento do objetivo geral do estabelecimento de metas previsto no § 1o deste artigo. (Incluído pela Lei nº 13.614, de 2018) (Vigência)"}, {"art": "Art. 326-B", "key": "326-B", "texto": "Art. 326-B. É instituída a Semana Nacional de Prevenção a Acidentes com Motociclistas, a ser realizada, anualmente, na semana que compreender o dia 27 do mês de julho, o qual é instituído como o Dia Nacional do\nMotociclista. (Incluído pela Lei nº 15.006, de 2024)"}, {"art": "Art. 326-C", "key": "326-C", "texto": "Art. 326-C. Fica reconhecido o terceiro domingo do mês de novembro de cada ano como o Dia Mundial em Memória das Vítimas do Trânsito. (Incluído pela Lei nº 15.452, de 2026)"}, {"art": "Art. 327", "key": "327", "texto": "Art. 327. A partir da publicação deste Código, somente poderão ser fabricados e licenciados veículos que obedeçam aos limites de peso e dimensões fixados na forma desta Lei, ressalvados os que vierem a ser regulamentados pelo CONTRAN.\n Parágrafo único. (VETADO)"}, {"art": "Art. 328", "key": "328", "texto": "Art. 328. O veículo apreendido ou removido a qualquer título e não reclamado por seu proprietário dentro do prazo de sessenta dias, contado da data de recolhimento, será avaliado e levado a leilão, a ser realizado preferencialmente por meio eletrônico. (Redação dada pela Lei nº 13.160, de 2015)\n § 1o Publicado o edital do leilão, a preparação poderá ser iniciada após trinta dias, contados da data de recolhimento do veículo, o qual será classificado em duas categorias: (Incluído pela Lei nº 13.160, de 2015)\n I – conservado, quando apresenta condições de segurança para trafegar; e (Incluído pela Lei nº 13.160, de 2015)\n II – sucata, quando não está apto a trafegar. (Incluído pela Lei nº 13.160, de 2015)\n § 2o Se não houver oferta igual ou superior ao valor da avaliação, o lote será incluído no leilão seguinte, quando será arrematado pelo maior lance, desde que por valor não inferior a cinquenta por cento do avaliado. (Incluído pela\nLei nº 13.160, de 2015)\n\f § 3o Mesmo classificado como conservado, o veículo que for levado a leilão por duas vezes e não for arrematado será leiloado como sucata. (Incluído pela Lei nº 13.160, de 2015)\n § 4o É vedado o retorno do veículo leiloado como sucata à circulação. (Incluído pela Lei nº 13.160, de 2015)\n § 5o A cobrança das despesas com estada no depósito será limitada ao prazo de seis meses. (Incluído pela\nLei nº 13.160, de 2015)\n § 6o Os valores arrecadados em leilão deverão ser utilizados para custeio da realização do leilão, dividindo-se os custos entre os veículos arrematados, proporcionalmente ao valor da arrematação, e destinando-se os valores remanescentes, na seguinte ordem, para: (Incluído pela Lei nº 13.160, de 2015)\n I – as despesas com remoção e estada; (Incluído pela Lei nº 13.160, de 2015)\n II – os tributos vinculados ao veículo, na forma do § 10; (Incluído pela Lei nº 13.160, de 2015)\n III – os credores trabalhistas, tributários e titulares de crédito com garantia real, segundo a ordem de preferência estabelecida no art. 186 da Lei no 5.172, de 25 de outubro de 1966 (Código Tributário Nacional); (Incluído pela Lei nº 13.160, de 2015)\n IV – as multas devidas ao órgão ou à entidade responsável pelo leilão; (Incluído pela Lei nº 13.160, de 2015)\n V – as demais multas devidas aos órgãos integrantes do Sistema Nacional de Trânsito, segundo a ordem cronológica; e (Incluído pela Lei nº 13.160, de 2015)\n VI – os demais créditos, segundo a ordem de preferência legal. (Incluído pela Lei nº 13.160, de 2015)\n § 7o Sendo insuficiente o valor arrecadado para quitar os débitos incidentes sobre o veículo, a situação será comunicada aos credores. (Incluído pela Lei nº 13.160, de 2015)\n § 8o Os órgãos públicos responsáveis serão comunicados do leilão previamente para que formalizem a desvinculação dos ônus incidentes sobre o veículo no prazo máximo de dez dias. (Incluído pela Lei nº 13.160, de 2015)\n § 9o Os débitos incidentes sobre o veículo antes da alienação administrativa ficam dele automaticamente desvinculados, sem prejuízo da cobrança contra o proprietário anterior. (Incluído pela Lei nº 13.160, de 2015)\n § 10. Aplica-se o disposto no § 9o inclusive ao débito relativo a tributo cujo fato gerador seja a propriedade, o domínio útil, a posse, a circulação ou o licenciamento de veículo. (Incluído pela Lei nº 13.160, de 2015)\n § 11. Na hipótese de o antigo proprietário reaver o veículo, por qualquer meio, os débitos serão novamente vinculados ao bem, aplicando-se, nesse caso, o disposto nos §§ 1o, 2o e 3o do art. 271. (Incluído pela Lei nº 13.160, de 2015)\n § 12. Quitados os débitos, o saldo remanescente será depositado em conta específica do órgão responsável pela realização do leilão e ficará à disposição do antigo proprietário, devendo ser expedida notificação a ele, no máximo em trinta dias após a realização do leilão, para o levantamento do valor no prazo de cinco anos, após os quais o valor será transferido, definitivamente, para o fundo a que se refere o parágrafo único do art. 320. (Incluído pela Lei nº 13.160, de 2015)\n § 13. Aplica-se o disposto neste artigo, no que couber, ao animal recolhido, a qualquer título, e não reclamado por seu proprietário no prazo de sessenta dias, a contar da data de recolhimento, conforme regulamentação do CONTRAN.\n (Incluído pela Lei nº 13.160, de 2015)\n § 14. Se identificada a existência de restrição policial ou judicial sobre o prontuário do veículo, a autoridade responsável pela restrição será notificada para
